<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>華嚴位階實機檢查 - 信、住、迴向</title>
    <style>
        body {
            background-color: #020203; /* 曜石黑 */
            color: #f5eabf;
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 40px;
        }
        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 40px;
            margin-top: 50px;
        }
        .lotus-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            background: rgba(255, 255, 255, 0.03);
            padding: 30px;
            border-radius: 20px;
            border: 1px solid rgba(191, 158, 72, 0.2);
        }
        .svg-box {
            width: 250px;
            height: 250px;
        }
        .rank-label {
            font-size: 1.2rem;
            letter-spacing: 4px;
            color: #bf9e48;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h2 style="font-weight: 300; letter-spacing: 5px;">華嚴位階圖騰：實機校對單元</h2>

    <div class="container">
        <div class="lotus-card">
            <div class="svg-box">
                <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                    <defs>
                        <radialGradient id="rg-unified-gold" cx="50%" cy="50%" r="60%">
                            <stop offset="0%" stop-color="#fffce0"/><stop offset="28%" stop-color="#f0c030"/><stop offset="65%" stop-color="#906010"/><stop offset="100%" stop-color="#4c3008"/>
                        </radialGradient>
                    </defs>
                    <circle cx="50" cy="50" r="21" fill="url(#rg-unified-gold)" stroke="#f0d060" stroke-width=".7"/>
                    <circle cx="50" cy="50" r="15.5" fill="none" stroke="#fffce0" stroke-width="1.2" opacity="0.8"/>
                    <g transform="translate(50, 50) scale(0.35) translate(-50, -50)">
                        <path d="M44 32 L44 68 M56 32 L56 68" stroke="#fffce0" stroke-width="2.5" fill="none"/>
                        <g stroke="#fffce0" stroke-width="2.5" stroke-linecap="round">
                            <line x1="40" y1="30" x2="44" y2="32" />
                            <line x1="60" y1="30" x2="56" y2="32" />
                            <line x1="40" y1="70" x2="44" y2="68" />
                            <line x1="60" y1="70" x2="56" y2="68" />
                        </g>
                        <g stroke="#fffce0" stroke-width="2.5" stroke-linecap="round" fill="none">
                            <path d="M50 29 L50 4 M40 30 L50 4 L60 30"/>
                            <path d="M50 71 L50 96 M40 70 L50 96 L60 70"/>
                        </g>
                        <circle cx="50" cy="50" r="8" fill="none" stroke="#fffce0" stroke-width="2.5"/>
                        <circle cx="50" cy="50" r="4" fill="#fffce0"/>
                    </g>
                </svg>
            </div>
            <div class="rank-label">信 (Faith)</div>
        </div>

        <div class="lotus-card">
            <div class="svg-box">
                <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                    <defs>
                        <radialGradient id="rg-unified-gold-2" cx="50%" cy="50%" r="60%">
                            <stop offset="0%" stop-color="#fffce0"/><stop offset="28%" stop-color="#f0c030"/><stop offset="65%" stop-color="#906010"/><stop offset="100%" stop-color="#4c3008"/>
                        </radialGradient>
                    </defs>
                    <circle cx="50" cy="50" r="21" fill="url(#rg-unified-gold-2)" stroke="#f0d060" stroke-width=".7"/>
                    <g transform="translate(50, 50) scale(0.6) translate(-50, -50)" stroke="#fffce0" stroke-width="1.2" fill="none" stroke-linejoin="round">
                        <path d="M 30 68 L 70 68 L 70 65 L 67 65 L 67 62 L 64 62 L 64 59 L 61 59 L 61 56 L 39 56 L 39 59 L 36 59 L 36 62 L 33 62 L 33 65 L 30 65 Z"/>
                        <line x1="33" y1="65" x2="67" y2="65"/>
                        <line x1="36" y1="62" x2="64" y2="62"/>
                        <line x1="39" y1="59" x2="61" y2="59"/>
                        <path d="M 39 56 C 39 39 61 39 61 56 Z" fill="url(#rg-unified-gold-2)"/>
                        <polygon points="46,41 54,41 52,47 48,47" fill="url(#rg-unified-gold-2)"/>
                        <polygon points="48,47 52,47 50,25" fill="url(#rg-unified-gold-2)"/>
                    </g>
                </svg>
            </div>
            <div class="rank-label">住 (Abiding)</div>
        </div>

        <div class="lotus-card">
            <div class="svg-box">
                <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                    <defs>
                        <radialGradient id="rg-unified-gold-3" cx="50%" cy="50%" r="60%">
                            <stop offset="0%" stop-color="#fffce0"/><stop offset="28%" stop-color="#f0c030"/><stop offset="65%" stop-color="#906010"/><stop offset="100%" stop-color="#4c3008"/>
                        </radialGradient>
                    </defs>
                    <circle cx="50" cy="50" r="21" fill="url(#rg-unified-gold-3)" stroke="#f0d060" stroke-width=".7"/>
                    <polygon points="50,33 52.5,42.5 62,38 57.5,47.5 67,50 57.5,52.5 62,62 52.5,57.5 50,67 47.5,57.5 38,62 42.5,52.5 33,50 42.5,47.5 38,38 47.5,42.5" fill="#fffce0" opacity="0.95"/>
                </svg>
            </div>
            <div class="rank-label">迴向 (Dedication)</div>
        </div>
    </div>

</body>
</html>
