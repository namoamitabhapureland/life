<!DOCTYPE html>
<html lang="zh-TW">
<head>

    <style>

            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 40px;
        }
        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 30px;
            margin-top: 50px;
        }
        .lotus-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            background: rgba(255, 255, 255, 0.03);
            padding: 20px;
            border-radius: 20px;
            border: 1px solid rgba(191, 158, 72, 0.2);
            width: 240px;
        }
        .svg-box {
            width: 200px;
            height: 200px;
        }
        .rank-label {
            font-size: 1.1rem;
            letter-spacing: 4px;
            color: #bf9e48;
            font-weight: bold;
        }

</head>
