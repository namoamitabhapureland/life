<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>華嚴五位階 - 幾何美學統一版</title>
    <style>
        body { background-color: #020203; color: #f5eabf; font-family: system-ui, sans-serif; display: flex; flex-direction: column; align-items: center; padding: 40px; }
        .container { display: flex; flex-wrap: wrap; justify-content: center; gap: 30px; margin-top: 50px; }
        .lotus-card { display: flex; flex-direction: column; align-items: center; gap: 15px; background: rgba(255, 255, 255, 0.02); padding: 20px; border-radius: 15px; border: 1px solid rgba(191, 158, 72, 0.15); width: 220px; }
        .svg-box { width: 180px; height: 180px; }
        .rank-label { font-size: 1rem; letter-spacing: 3px; color: #bf9e48; font-weight: bold; }
    </style>
</head>
<body>

    <h2 style="font-weight: 300; letter-spacing: 5px;">華嚴法印：幾何幾何化全系列</h2>

    <div class="container">
        <div class="lotus-card">
            <div class="svg-box">
                <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                    <defs>
                        <radialGradient id="rg-gold" cx="50%" cy="50%" r="60%">
                            <stop offset="0%" stop-color="#fffce0"/><stop offset="28%" stop-color="#f0c030"/><stop offset="65%" stop-color="#906010"/><stop offset="100%" stop-color="#4c3008"/>
                        </radialGradient>
                    </defs>
                    <circle cx="50" cy="50" r="21" fill="url(#rg-gold)" stroke="#f0d060" stroke-width=".7"/>
                    <g transform="translate(50, 50) scale(0.48) translate(-50, -50)">
                        <circle cx="50" cy="50" r="35" fill="none" stroke="#fffce0" stroke-width="0.8" stroke-dasharray="2 2" opacity="0.5"/>
                        <path d="M44 32 L44 68 M56 32 L56 68 M40 30 L50 4 L60 30 M40 70 L50 96 L60 70" stroke="#fffce0" stroke-width="2.5" fill="none" stroke-linecap="round"/>
                        <g stroke="#fffce0" stroke-width="2" stroke-linecap="round">
                            <line x1="40" y1="30" x2="44" y2="32"/><line x1="60" y1="30" x2="56" y2="32"/>
                            <line x1="40" y1="70" x2="44" y2="68"/><line x1="60" y1="70" x2="56" y2="68"/>
                            <path d="M40 30 Q50 35 60 30 M40 70 Q50 65 60 70" fill="none" opacity="0.6"/>
                        </g>
                        <circle cx="50" cy="50" r="8" fill="none" stroke="#fffce0" stroke-width="2"/>
                        <circle cx="50" cy="50" r="4" fill="#fffce0"/>
                    </g>
                </svg>
            </div>
            <div class="rank-label">信 Faith</div>
        </div>

        <div class="lotus-card">
            <div class="svg-box">
                <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="50" cy="50" r="21" fill="url(#rg-gold)" stroke="#f0d060" stroke-width=".7"/>
                    <g transform="translate(50, 50) scale(0.55) translate(-50, -50)" stroke="#fffce0" stroke-width="1.5" fill="none">
                        <path d="M30 75 L70 75 L70 70 L30 70 Z M35 70 L35 60 L65 60 L65 70 M40 60 L50 35 L60 60" />
                        <line x1="35" y1="65" x2="65" y2="65" stroke-width="0.8" opacity="0.7"/>
                        <circle cx="50" cy="50" r="5" fill="url(#rg-gold)" stroke-width="1"/>
                        <path d="M50 35 L50 20 M45 25 L55 25" stroke-width="2"/>
                    </g>
                </svg>
            </div>
            <div class="rank-label">住 Abiding</div>
        </div>

        <div class="lotus-card">
            <div class="svg-box">
                <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="50" cy="50" r="21" fill="url(#rg-gold)" stroke="#f0d060" stroke-width=".7"/>
                    <g transform="translate(50, 50) scale(0.5) translate(-50, -50)" stroke="#fffce0" fill="none">
                        <circle cx="50" cy="50" r="30" stroke-width="1.5"/>
                        <circle cx="50" cy="50" r="10" stroke-width="1.5"/>
                        ${[0,45,90,135,180,225,270,315].map(a => `
                            <line x1="50" y1="50" x2="${50+Math.cos(a*Math.PI/180)*30}" y2="${50+Math.sin(a*Math.PI/180)*30}" stroke-width="1.5"/>
                            <circle cx="${50+Math.cos(a*Math.PI/180)*30}" cy="${50+Math.sin(a*Math.PI/180)*30}" r="3" fill="#fffce0"/>
                        `).join('')}
                    </g>
                </svg>
            </div>
            <div class="rank-label">行 Practice</div>
        </div>

        <div class="lotus-card">
            <div class="svg-box">
                <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="50" cy="50" r="21" fill="url(#rg-gold)" stroke="#f0d060" stroke-width=".7"/>
                    <g transform="translate(50, 50) scale(0.48) translate(-50, -50)">
                        <polygon points="50,33 52.5,42.5 62,38 57.5,47.5 67,50 57.5,52.5 62,62 52.5,57.5 50,67 47.5,57.5 38,62 42.5,52.5 33,50 42.5,47.5 38,38 47.5,42.5" fill="url(#rg-gold)" stroke="#fffce0" stroke-width="1.0"/>
                        <g stroke="#fffce0" stroke-width="1.2" stroke-linecap="round" fill="none" opacity="0.8">
                            <path d="M 50 33 L 62 38 L 67 50 L 62 62 L 50 67 L 38 62 L 33 50 L 38 38 Z" />
                            <line x1="50" y1="50" x2="50" y2="33"/><line x1="50" y1="50" x2="62" y2="38"/>
                            <line x1="50" y1="50" x2="67" y2="50"/><line x1="50" y1="50" x2="62" y2="62"/>
                            <line x1="50" y1="50" x2="50" y2="67"/><line x1="50" y1="50" x2="38" y2="62"/>
                            <line x1="50" y1="50" x2="33" y2="50"/><line x1="50" y1="50" x2="38" y2="38"/>
                            <path d="M 50 33 L 67 50 L 50 67 L 33 50 Z" stroke-width="0.8" opacity="0.5"/>
                        </g>
                        <circle cx="50" cy="50" r="8" fill="none" stroke="#fffce0" stroke-width="2"/>
                        <circle cx="50" cy="50" r="4" fill="#fffce0"/>
                    </g>
                </svg>
            </div>
            <div class="rank-label">迴向 Dedication</div>
        </div>

        <div class="lotus-card">
            <div class="svg-box">
                <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="50" cy="50" r="21" fill="url(#rg-gold)" stroke="#f0d060" stroke-width=".7"/>
                    <g transform="translate(50, 50) scale(0.5) translate(-50, -50)">
                        <polygon points="50,20 55,45 80,50 55,55 50,80 45,55 20,50 45,45" fill="#fffce0" opacity="0.9"/>
                        <g stroke="#fffce0" stroke-width="1.5" fill="none">
                            <circle cx="50" cy="50" r="30" stroke-dasharray="2 2"/>
                            <line x1="20" y1="50" x2="80" y2="50"/><line x1="50" y1="20" x2="50" y2="80"/>
                            <rect x="35" y="35" width="30" height="30" stroke-width="1" opacity="0.6"/>
                        </g>
                        <circle cx="50" cy="50" r="5" fill="#fffce0"/>
                    </g>
                </svg>
            </div>
            <div class="rank-label">地 Bhumi</div>
        </div>
    </div>
</body>
</html>
