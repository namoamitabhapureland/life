<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>彌陀淨土系統 - 華嚴圖騰昇華預覽</title>
    <style>
        body {
            background-color: #020203;
            color: #f5eabf;
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            gap: 50px;
            padding: 50px;
        }
        .totem-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }
        .svg-box {
            width: 180px;
            height: 180px;
            background: radial-gradient(circle, #111111 0%, #050505 60%, #000000 100%);
            border-radius: 50%;
            box-shadow: 0 0 30px rgba(191, 158, 72, 0.08);
            position: relative;
        }
        .totem-title {
            font-size: 1.1rem;
            letter-spacing: 4px;
            font-weight: 300;
            color: #bf9e48;
        }
    </style>
</head>
<body>

    <svg width="0" height="0" style="position:absolute;">
        <defs>
            <linearGradient id="paleGold3DGrad" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%" stop-color="#bf9e48" />
                <stop offset="25%" stop-color="#f5eabf" />
                <stop offset="50%" stop-color="#ffffff" />
                <stop offset="75%" stop-color="#f5eabf" />
                <stop offset="100%" stop-color="#bf9e48" />
            </linearGradient>

            <linearGradient id="cloudGrad" x1="0%" y1="100%" x2="100%" y2="0%">
                <stop offset="0%" stop-color="#FFB6C1" stop-opacity="0.7"/> 
                <stop offset="50%" stop-color="#FFFFFF" stop-opacity="0.9"/> 
                <stop offset="100%" stop-color="#b0dfdb" stop-opacity="0.7"/>
            </linearGradient>

            <filter id="sacred-glow" x="-20%" y="-20%" width="140%" height="140%">
                <feGaussianBlur stdDeviation="2.5" result="blur" />
                <feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge>
            </filter>

            <g id="lotus-outline" stroke="rgba(255,255,255,0.04)" stroke-width="0.8" fill="none">
                <path d="M 50 12 C 38 35, 45 48, 50 50 C 55 48, 62 35, 50 12 Z" transform="rotate(0 50 50)"/>
                <path d="M 50 12 C 38 35, 45 48, 50 50 C 55 48, 62 35, 50 12 Z" transform="rotate(45 50 50)"/>
                <path d="M 50 12 C 38 35, 45 48, 50 50 C 55 48, 62 35, 50 12 Z" transform="rotate(90 50 50)"/>
                <path d="M 50 12 C 38 35, 45 48, 50 50 C 55 48, 62 35, 50 12 Z" transform="rotate(135 50 50)"/>
                <path d="M 50 12 C 38 35, 45 48, 50 50 C 55 48, 62 35, 50 12 Z" transform="rotate(180 50 50)"/>
                <path d="M 50 12 C 38 35, 45 48, 50 50 C 55 48, 62 35, 50 12 Z" transform="rotate(225 50 50)"/>
                <path d="M 50 12 C 38 35, 45 48, 50 50 C 55 48, 62 35, 50 12 Z" transform="rotate(270 50 50)"/>
                <path d="M 50 12 C 38 35, 45 48, 50 50 C 55 48, 62 35, 50 12 Z" transform="rotate(315 50 50)"/>
            </g>
        </defs>
    </svg>

    <div class="totem-card">
        <div class="svg-box">
            <svg viewBox="0 0 100 100" width="100%" height="100%">
                <use href="#lotus-outline" />
                <circle cx="50" cy="50" r="21" fill="none" stroke="url(#paleGold3DGrad)" stroke-width="0.5" stroke-dasharray="1 3" opacity="0.6"/>
                <g filter="url(#sacred-glow)">
                    <circle cx="50" cy="50" r="9" fill="url(#cloudGrad)" opacity="0.4" filter="blur(3px)"/>
                    
                    <path d="M42,42 L58,42 L55,32 L45,32 Z M42,58 L58,58 L55,68 L45,68 Z" fill="none" stroke="url(#paleGold3DGrad)" stroke-width="1.2" stroke-linejoin="round"/>
                    <path d="M45,32 L55,42 M55,32 L45,42 M45,68 L55,58 M55,68 L45,58" stroke="url(#paleGold3DGrad)" stroke-width="0.8" opacity="0.7"/>
                    
                    <circle cx="50" cy="50" r="8" fill="none" stroke="url(#paleGold3DGrad)" stroke-width="1.2"/>
                    <circle cx="50" cy="50" r="3" fill="url(#paleGold3DGrad)"/>

                    <path d="M48,28 L50,4 L52,28 Z" fill="url(#paleGold3DGrad)" stroke="url(#paleGold3DGrad)" stroke-width="1.2" stroke-linejoin="round"/>
                    <path d="M38,32 C20,15 45,6 50,4" fill="none" stroke="url(#paleGold3DGrad)" stroke-width="1.5" stroke-linecap="round"/>
                    <path d="M62,32 C80,15 55,6 50,4" fill="none" stroke="url(#paleGold3DGrad)" stroke-width="1.5" stroke-linecap="round"/>

                    <path d="M48,72 L50,96 L52,72 Z" fill="url(#paleGold3DGrad)" stroke="url(#paleGold3DGrad)" stroke-width="1.2" stroke-linejoin="round"/>
                    <path d="M38,68 C20,85 45,94 50,96" fill="none" stroke="url(#paleGold3DGrad)" stroke-width="1.5" stroke-linecap="round"/>
                    <path d="M62,68 C80,85 55,94 50,96" fill="none" stroke="url(#paleGold3DGrad)" stroke-width="1.5" stroke-linecap="round"/>
                </g>
                <circle cx="50" cy="50" r="1.5" fill="#fff" filter="drop-shadow(0 0 2px #fff)"/>
            </svg>
        </div>
        <div class="totem-title">信 (Faith)</div>
    </div>

    <div class="totem-card">
        <div class="svg-box">
            <svg viewBox="0 0 100 100" width="100%" height="100%">
                <use href="#lotus-outline" />
                <g filter="url(#sacred-glow)">
                    <path d="M 20 75 L 80 75 M 30 70 L 70 70 M 35 65 L 65 65" stroke="url(#paleGold3DGrad)" stroke-width="1.2" fill="none" stroke-linecap="round"/>
                    
                    <path d="M 35 65 C 35 40 65 40 65 65 Z" fill="url(#cloudGrad)" opacity="0.25"/>
                    <path d="M 35 65 C 35 40 65 40 65 65 Z" stroke="url(#paleGold3DGrad)" stroke-width="1.5" fill="none"/>
                    
                    <path d="M 45 42 L 50 15 L 55 42 Z" stroke="url(#paleGold3DGrad)" stroke-width="1.2" fill="none" stroke-linejoin="round"/>
                    <line x1="42" y1="42" x2="58" y2="42" stroke="url(#paleGold3DGrad)" stroke-width="1.2" stroke-linecap="round"/>
                    <line x1="44" y1="36" x2="56" y2="36" stroke="url(#paleGold3DGrad)" stroke-width="1.2" stroke-linecap="round"/>
                    <line x1="47" y1="30" x2="53" y2="30" stroke="url(#paleGold3DGrad)" stroke-width="1.2" stroke-linecap="round"/>
                    
                    <circle cx="50" cy="53" r="3" fill="url(#paleGold3DGrad)"/>
                    <circle cx="50" cy="53" r="1.5" fill="#fff"/>
                </g>
            </svg>
        </div>
        <div class="totem-title">住 (Abiding)</div>
    </div>

    <div class="totem-card">
        <div class="svg-box">
            <svg viewBox="0 0 100 100" width="100%" height="100%">
                <use href="#lotus-outline" />
                <g filter="url(#sacred-glow)">
                    <circle cx="50" cy="50" r="24" stroke="url(#paleGold3DGrad)" stroke-width="1.5" fill="none"/>
                    <circle cx="50" cy="50" r="28" stroke="url(#paleGold3DGrad)" stroke-width="0.6" stroke-dasharray="2 4" fill="none" opacity="0.8"/>
                    
                    <circle cx="50" cy="50" r="8" fill="url(#cloudGrad)" opacity="0.5" filter="blur(2px)"/>
                    
                    <g stroke="url(#paleGold3DGrad)" stroke-width="1.2" fill="none" stroke-linecap="round">
                        <path d="M 50 44 Q 58 35 50 26 Q 42 35 50 44" transform="rotate(0 50 50)"/>
                        <path d="M 50 44 Q 58 35 50 26 Q 42 35 50 44" transform="rotate(45 50 50)"/>
                        <path d="M 50 44 Q 58 35 50 26 Q 42 35 50 44" transform="rotate(90 50 50)"/>
                        <path d="M 50 44 Q 58 35 50 26 Q 42 35 50 44" transform="rotate(135 50 50)"/>
                        <path d="M 50 44 Q 58 35 50 26 Q 42 35 50 44" transform="rotate(180 50 50)"/>
                        <path d="M 50 44 Q 58 35 50 26 Q 42 35 50 44" transform="rotate(225 50 50)"/>
                        <path d="M 50 44 Q 58 35 50 26 Q 42 35 50 44" transform="rotate(270 50 50)"/>
                        <path d="M 50 44 Q 58 35 50 26 Q 42 35 50 44" transform="rotate(315 50 50)"/>
                    </g>
                    <circle cx="50" cy="50" r="2.5" fill="#fffce0"/>
                </g>
            </svg>
        </div>
        <div class="totem-title">行 (Practice)</div>
    </div>

    <div class="totem-card">
        <div class="svg-box">
            <svg viewBox="0 0 100 100" width="100%" height="100%">
                <use href="#lotus-outline" />
                <g filter="url(#sacred-glow)">
                    <circle cx="50" cy="50" r="16" fill="url(#cloudGrad)" opacity="0.3" filter="blur(4px)"/>
                    
                    <g transform="translate(50, 50) scale(4.5)" stroke="url(#paleGold3DGrad)" stroke-width="0.4">
                        <circle cx="0" cy="0" r="1.5" fill="url(#paleGold3DGrad)" stroke="none"/>
                        <circle cx="0" cy="0" r="3" fill="none"/>
                        <path d="M 0,-4 C 1.5,-6 3.5,-6 5,-4 C 3.5,-2 1.5,-2 0,-4 Z" fill="url(#paleGold3DGrad)" transform="rotate(0)"/>
                        <path d="M 0,-4 C 1.5,-6 3.5,-6 5,-4 C 3.5,-2 1.5,-2 0,-4 Z" fill="url(#paleGold3DGrad)" transform="rotate(45)"/>
                        <path d="M 0,-4 C 1.5,-6 3.5,-6 5,-4 C 3.5,-2 1.5,-2 0,-4 Z" fill="url(#paleGold3DGrad)" transform="rotate(90)"/>
                        <path d="M 0,-4 C 1.5,-6 3.5,-6 5,-4 C 3.5,-2 1.5,-2 0,-4 Z" fill="url(#paleGold3DGrad)" transform="rotate(135)"/>
                        <path d="M 0,-4 C 1.5,-6 3.5,-6 5,-4 C 3.5,-2 1.5,-2 0,-4 Z" fill="url(#paleGold3DGrad)" transform="rotate(180)"/>
                        <path d="M 0,-4 C 1.5,-6 3.5,-6 5,-4 C 3.5,-2 1.5,-2 0,-4 Z" fill="url(#paleGold3DGrad)" transform="rotate(225)"/>
                        <path d="M 0,-4 C 1.5,-6 3.5,-6 5,-4 C 3.5,-2 1.5,-2 0,-4 Z" fill="url(#paleGold3DGrad)" transform="rotate(270)"/>
                        <path d="M 0,-4 C 1.5,-6 3.5,-6 5,-4 C 3.5,-2 1.5,-2 0,-4 Z" fill="url(#paleGold3DGrad)" transform="rotate(315)"/>
                    </g>
                    
                    <g stroke="url(#paleGold3DGrad)" stroke-width="0.8" stroke-linecap="round">
                        <line x1="50" y1="28" x2="50" y2="15" transform="rotate(0 50 50)"/>
                        <circle cx="50" cy="13" r="1.5" fill="#fff" transform="rotate(0 50 50)"/>
                        
                        <line x1="50" y1="28" x2="50" y2="15" transform="rotate(45 50 50)"/>
                        <circle cx="50" cy="13" r="1.5" fill="#fff" transform="rotate(45 50 50)"/>
                        
                        <line x1="50" y1="28" x2="50" y2="15" transform="rotate(90 50 50)"/>
                        <circle cx="50" cy="13" r="1.5" fill="#fff" transform="rotate(90 50 50)"/>
                        
                        <line x1="50" y1="28" x2="50" y2="15" transform="rotate(135 50 50)"/>
                        <circle cx="50" cy="13" r="1.5" fill="#fff" transform="rotate(135 50 50)"/>
                        
                        <line x1="50" y1="28" x2="50" y2="15" transform="rotate(180 50 50)"/>
                        <circle cx="50" cy="13" r="1.5" fill="#fff" transform="rotate(180 50 50)"/>
                        
                        <line x1="50" y1="28" x2="50" y2="15" transform="rotate(225 50 50)"/>
                        <circle cx="50" cy="13" r="1.5" fill="#fff" transform="rotate(225 50 50)"/>
                        
                        <line x1="50" y1="28" x2="50" y2="15" transform="rotate(270 50 50)"/>
                        <circle cx="50" cy="13" r="1.5" fill="#fff" transform="rotate(270 50 50)"/>
                        
                        <line x1="50" y1="28" x2="50" y2="15" transform="rotate(315 50 50)"/>
                        <circle cx="50" cy="13" r="1.5" fill="#fff" transform="rotate(315 50 50)"/>
                    </g>
                </g>
            </svg>
        </div>
        <div class="totem-title">迴向 (Dedication)</div>
    </div>

    <div class="totem-card">
        <div class="svg-box">
            <svg viewBox="0 0 100 100" width="100%" height="100%">
                <use href="#lotus-outline" />
                <g filter="url(#sacred-glow)">
                    <rect x="25" y="25" width="50" height="50" fill="url(#cloudGrad)" opacity="0.2" transform="rotate(45 50 50)"/>
                    <circle cx="50" cy="50" r="22" stroke="url(#paleGold3DGrad)" stroke-width="0.8" fill="none" opacity="0.7"/>
                    <rect x="28" y="28" width="44" height="44" stroke="url(#paleGold3DGrad)" stroke-width="0.6" fill="none" transform="rotate(45 50 50)" opacity="0.5"/>
                    
                    <g id="vajra-blade">
                        <path d="M48,32 L50,8 L52,32 Z" fill="url(#paleGold3DGrad)" stroke="url(#paleGold3DGrad)" stroke-width="1.0" stroke-linejoin="round"/>
                        <path d="M40,35 C25,20 45,10 50,8" fill="none" stroke="url(#paleGold3DGrad)" stroke-width="1.2" stroke-linecap="round"/>
                        <path d="M60,35 C75,20 55,10 50,8" fill="none" stroke="url(#paleGold3DGrad)" stroke-width="1.2" stroke-linecap="round"/>
                    </g>
                    <use href="#vajra-blade" transform="rotate(180 50 50)"/>
                    <use href="#vajra-blade" transform="rotate(90 50 50)"/>
                    <use href="#vajra-blade" transform="rotate(270 50 50)"/>
                    
                    <circle cx="50" cy="50" r="10" fill="none" stroke="url(#paleGold3DGrad)" stroke-width="1.5"/>
                    <circle cx="50" cy="50" r="6" fill="#020203"/>
                    <circle cx="50" cy="50" r="3" fill="#fff"/>
                </g>
            </svg>
        </div>
        <div class="totem-title">地 (Bhumi)</div>
    </div>

</body>
</html>
