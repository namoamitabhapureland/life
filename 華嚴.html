<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>彌陀淨土系統 - 華嚴位階圖預覽 (依指示實體化)</title>
    <style>
        body {
            background-color: #020203;
            color: #f5eabf;
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            gap: 40px;
            padding: 40px;
        }
        .totem-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }
        .svg-box {
            width: 160px;
            height: 160px;
            background: radial-gradient(circle, #111111 0%, #050505 70%, #000000 100%);
            border-radius: 50%;
            box-shadow: 0 0 20px rgba(191, 158, 72, 0.05);
            position: relative;
        }
        .totem-title {
            font-size: 1rem;
            letter-spacing: 3px;
            font-weight: 300;
            color: #bf9e48;
        }
    </style>
</head>
<body>

    <svg width="0" height="0" style="position:absolute;">
        <defs>
            <radialGradient id="rg-unified-gold" cx="50%" cy="50%" r="60%">
                <stop offset="0%" stop-color="#fffce0"/>
                <stop offset="28%" stop-color="#f0c030"/>
                <stop offset="65%" stop-color="#906010"/>
                <stop offset="100%" stop-color="#4c3008"/>
            </radialGradient>
            
            <g id="lotus-outline" stroke="rgba(255,255,255,0.06)" stroke-width="0.8" fill="none">
                <path d="M 50 18 C 38 35, 45 48, 50 50 C 55 48, 62 35, 50 18 Z" transform="rotate(0 50 50)"/>
                <path d="M 50 18 C 38 35, 45 48, 50 50 C 55 48, 62 35, 50 18 Z" transform="rotate(45 50 50)"/>
                <path d="M 50 18 C 38 35, 45 48, 50 50 C 55 48, 62 35, 50 18 Z" transform="rotate(90 50 50)"/>
                <path d="M 50 18 C 38 35, 45 48, 50 50 C 55 48, 62 35, 50 18 Z" transform="rotate(135 50 50)"/>
                <path d="M 50 18 C 38 35, 45 48, 50 50 C 55 48, 62 35, 50 18 Z" transform="rotate(180 50 50)"/>
                <path d="M 50 18 C 38 35, 45 48, 50 50 C 55 48, 62 35, 50 18 Z" transform="rotate(225 50 50)"/>
                <path d="M 50 18 C 38 35, 45 48, 50 50 C 55 48, 62 35, 50 18 Z" transform="rotate(270 50 50)"/>
                <path d="M 50 18 C 38 35, 45 48, 50 50 C 55 48, 62 35, 50 18 Z" transform="rotate(315 50 50)"/>
            </g>

            <g id="base-plate">
                <circle cx="50" cy="50" r="21" fill="url(#rg-unified-gold)" stroke="#f0d060" stroke-width="0.7"/>
            </g>
        </defs>
    </svg>

    <div class="totem-card">
        <div class="svg-box">
            <svg viewBox="0 0 100 100" width="100%" height="100%">
                <use href="#lotus-outline" />
                <use href="#base-plate" />
                
                <path d="M46 43 L54 43 M46 57 L54 57 M47 43 L47 57 M53 43 L53 57" stroke="#fffce0" stroke-width="1.2" fill="none"/>
                <circle cx="50" cy="50" r="2.5" fill="#ffe8a0"/>
                
                <path d="M50 43 L50 29" stroke="#fffce0" stroke-width="1.2" fill="none" stroke-linecap="round"/>
                <path d="M46 43 C43 33, 48 29, 50 29" stroke="#fffce0" stroke-width="1.2" fill="none" stroke-linecap="round"/>
                <path d="M54 43 C57 33, 52 29, 50 29" stroke="#fffce0" stroke-width="1.2" fill="none" stroke-linecap="round"/>

                <path d="M50 57 L50 71" stroke="#fffce0" stroke-width="1.2" fill="none" stroke-linecap="round"/>
                <path d="M46 57 C43 67, 48 71, 50 71" stroke="#fffce0" stroke-width="1.2" fill="none" stroke-linecap="round"/>
                <path d="M54 57 C57 67, 52 71, 50 71" stroke="#fffce0" stroke-width="1.2" fill="none" stroke-linecap="round"/>
            </svg>
        </div>
        <div class="totem-title">信 (Faith)</div>
    </div>

    <div class="totem-card">
        <div class="svg-box">
            <svg viewBox="0 0 100 100" width="100%" height="100%">
                <use href="#lotus-outline" />
                <use href="#base-plate" />

                <path d="M35 65 L65 65 L65 62 L62 62 L62 59 L59 59 L59 56 L41 56 L41 59 L38 59 L38 62 L35 62 Z" fill="url(#rg-unified-gold)" stroke="#fffce0" stroke-width="1" stroke-linejoin="round"/>
                
                <line x1="38" y1="62" x2="62" y2="62" stroke="#fffce0" stroke-width="1"/>
                <line x1="41" y1="59" x2="59" y2="59" stroke="#fffce0" stroke-width="1"/>

                <path d="M38 56 C38 42, 62 42, 62 56 Z" fill="url(#rg-unified-gold)" stroke="#fffce0" stroke-width="1"/>
                
                <polygon points="46,42 54,42 52,48 48,48" fill="url(#rg-unified-gold)" stroke="#fffce0" stroke-width="1" stroke-linejoin="round"/>
                
                <polygon points="48,48 52,48 50,30" fill="url(#rg-unified-gold)" stroke="#fffce0" stroke-width="1" stroke-linejoin="round"/>
            </svg>
        </div>
        <div class="totem-title">住 (Abiding)</div>
    </div>

    <div class="totem-card">
        <div class="svg-box">
            <svg viewBox="0 0 100 100" width="100%" height="100%">
                <use href="#lotus-outline" />
                <use href="#base-plate" />
                <circle cx="50" cy="50" r="14" fill="none" stroke="#f0c868" stroke-width="1.1"/>
                <circle cx="66" cy="50" r="1.5" fill="#f0c868"/>
                <circle cx="61.3" cy="61.3" r="1.5" fill="#f0c868"/>
                <circle cx="50" cy="66" r="1.5" fill="#f0c868"/>
                <circle cx="38.7" cy="61.3" r="1.5" fill="#f0c868"/>
                <circle cx="34" cy="50" r="1.5" fill="#f0c868"/>
                <circle cx="38.7" cy="38.7" r="1.5" fill="#f0c868"/>
                <circle cx="50" cy="34" r="1.5" fill="#f0c868"/>
                <circle cx="61.3" cy="38.7" r="1.5" fill="#f0c868"/>
                <circle cx="50" cy="50" r="4.2" fill="#ffe8a0"/>
            </svg>
        </div>
        <div class="totem-title">行 (Practice)</div>
    </div>

    <div class="totem-card">
        <div class="svg-box">
            <svg viewBox="0 0 100 100" width="100%" height="100%">
                <use href="#lotus-outline" />
                <use href="#base-plate" />
                
                <polygon points="65,50 60.6,60.6 50,65 39.4,60.6 35,50 39.4,39.4 50,35 60.6,39.4" fill="none" stroke="#fffce0" stroke-width="1.0" opacity="0.8"/>
                
                <g stroke="#f0c868" stroke-width="0.8" opacity="0.6">
                    <line x1="50" y1="50" x2="65" y2="50"/><circle cx="65" cy="50" r="1.5" fill="#fffce0" stroke="none" opacity="1"/>
                    <line x1="50" y1="50" x2="60.6" y2="60.6"/><circle cx="60.6" cy="60.6" r="1.5" fill="#fffce0" stroke="none" opacity="1"/>
                    <line x1="50" y1="50" x2="50" y2="65"/><circle cx="50" cy="65" r="1.5" fill="#fffce0" stroke="none" opacity="1"/>
                    <line x1="50" y1="50" x2="39.4" y2="60.6"/><circle cx="39.4" cy="60.6" r="1.5" fill="#fffce0" stroke="none" opacity="1"/>
                    <line x1="50" y1="50" x2="35" y2="50"/><circle cx="35" cy="50" r="1.5" fill="#fffce0" stroke="none" opacity="1"/>
                    <line x1="50" y1="50" x2="39.4" y2="39.4"/><circle cx="39.4" cy="39.4" r="1.5" fill="#fffce0" stroke="none" opacity="1"/>
                    <line x1="50" y1="50" x2="50" y2="35"/><circle cx="50" cy="35" r="1.5" fill="#fffce0" stroke="none" opacity="1"/>
                    <line x1="50" y1="50" x2="60.6" y2="39.4"/><circle cx="60.6" cy="39.4" r="1.5" fill="#fffce0" stroke="none" opacity="1"/>
                </g>

                <circle cx="50" cy="50" r="4.5" fill="url(#rg-unified-gold)" stroke="#f0c868" stroke-width="0.6"/>
                <g fill="#ffe8a0">
                    <path d="M50,46 C51.5,44 53.5,44 55,46 C53.5,48 51.5,48 50,46 Z" transform="rotate(0 50 50)"/>
                    <path d="M50,46 C51.5,44 53.5,44 55,46 C53.5,48 51.5,48 50,46 Z" transform="rotate(45 50 50)"/>
                    <path d="M50,46 C51.5,44 53.5,44 55,46 C53.5,48 51.5,48 50,46 Z" transform="rotate(90 50 50)"/>
                    <path d="M50,46 C51.5,44 53.5,44 55,46 C53.5,48 51.5,48 50,46 Z" transform="rotate(135 50 50)"/>
                    <path d="M50,46 C51.5,44 53.5,44 55,46 C53.5,48 51.5,48 50,46 Z" transform="rotate(180 50 50)"/>
                    <path d="M50,46 C51.5,44 53.5,44 55,46 C53.5,48 51.5,48 50,46 Z" transform="rotate(225 50 50)"/>
                    <path d="M50,46 C51.5,44 53.5,44 55,46 C53.5,48 51.5,48 50,46 Z" transform="rotate(270 50 50)"/>
                    <path d="M50,46 C51.5,44 53.5,44 55,46 C53.5,48 51.5,48 50,46 Z" transform="rotate(315 50 50)"/>
                </g>
                <circle cx="50" cy="50" r="1.5" fill="#fffce0"/>
            </svg>
        </div>
        <div class="totem-title">迴向 (Dedication)</div>
    </div>

    <div class="totem-card">
        <div class="svg-box">
            <svg viewBox="0 0 100 100" width="100%" height="100%">
                <use href="#lotus-outline" />
                <use href="#base-plate" />
                <polygon points="50,33 52.5,42.5 62,38 57.5,47.5 67,50 57.5,52.5 62,62 52.5,57.5 50,67 47.5,57.5 38,62 42.5,52.5 33,50 42.5,47.5 38,38 47.5,42.5" fill="#fffce0" opacity="0.95"/>
            </svg>
        </div>
        <div class="totem-title">地 (Bhumi)</div>
    </div>

</body>
</html>
