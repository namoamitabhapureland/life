<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>彌陀淨土系統 - 流線法界圖騰預覽</title>
    <style>
        body {
            background-color: #020203;
            color: #f5eabf;
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            gap: 40px;
            padding: 40px;
        }
        .totem-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }
        .svg-box {
            width: 160px;
            height: 160px;
            background: radial-gradient(circle, #111111 0%, #050505 70%, #000000 100%);
            border-radius: 50%;
            box-shadow: 0 0 20px rgba(191, 158, 72, 0.05);
            position: relative;
        }
        .totem-title {
            font-size: 1rem;
            letter-spacing: 3px;
            font-weight: 300;
            color: #bf9e48;
        }
    </style>
</head>
<body>

    <svg width="0" height="0" style="position:absolute;">
        <defs>
            <radialGradient id="rg-unified-gold" cx="50%" cy="50%" r="60%">
                <stop offset="0%" stop-color="#fffce0"/>
                <stop offset="28%" stop-color="#f0c030"/>
                <stop offset="65%" stop-color="#906010"/>
                <stop offset="100%" stop-color="#4c3008"/>
            </radialGradient>
            
            <linearGradient id="cloudGrad" x1="0%" y1="100%" x2="100%" y2="0%">
                <stop offset="0%" stop-color="#FFB6C1" stop-opacity="0.6"/> 
                <stop offset="50%" stop-color="#FFFFFF" stop-opacity="0.8"/> 
                <stop offset="100%" stop-color="#b0dfdb" stop-opacity="0.6"/>
            </linearGradient>

            <filter id="sacred-glow" x="-50%" y="-50%" width="200%" height="200%">
                <feGaussianBlur stdDeviation="1.5" result="b"/>
                <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
            </filter>

            <g id="lotus-outline" stroke="rgba(255,255,255,0.06)" stroke-width="0.8" fill="none">
                <path d="M 50 18 C 38 35, 45 48, 50 50 C 55 48, 62 35, 50 18 Z" transform="rotate(0 50 50)"/>
                <path d="M 50 18 C 38 35, 45 48, 50 50 C 55 48, 62 35, 50 18 Z" transform="rotate(45 50 50)"/>
                <path d="M 50 18 C 38 35, 45 48, 50 50 C 55 48, 62 35, 50 18 Z" transform="rotate(90 50 50)"/>
                <path d="M 50 18 C 38 35, 45 48, 50 50 C 55 48, 62 35, 50 18 Z" transform="rotate(135 50 50)"/>
                <path d="M 50 18 C 38 35, 45 48, 50 50 C 55 48, 62 35, 50 18 Z" transform="rotate(180 50 50)"/>
                <path d="M 50 18 C 38 35, 45 48, 50 50 C 55 48, 62 35, 50 18 Z" transform="rotate(225 50 50)"/>
                <path d="M 50 18 C 38 35, 45 48, 50 50 C 55 48, 62 35, 50 18 Z" transform="rotate(270 50 50)"/>
                <path d="M 50 18 C 38 35, 45 48, 50 50 C 55 48, 62 35, 50 18 Z" transform="rotate(315 50 50)"/>
            </g>

            <g id="base-ring">
                <circle cx="50" cy="50" r="21" fill="url(#rg-unified-gold)" stroke="#f0d060" stroke-width="0.7" opacity="0.9"/>
            </g>
        </defs>
    </svg>

    <div class="totem-card">
        <div class="svg-box">
            <svg viewBox="0 0 100 100" width="100%" height="100%">
                <use href="#lotus-outline" />
                <use href="#base-ring" />
                <g filter="url(#sacred-glow)">
                    <circle cx="50" cy="50" r="8" fill="url(#cloudGrad)" opacity="0.4" filter="blur(2px)"/>
                    <path d="M 50 32 C 38 32, 38 48, 50 50 C 62 52, 62 68, 50 68 C 38 68, 38 52, 50 50 C 62 48, 62 32, 50 32 Z" stroke="url(#rg-unified-gold)" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
                    <circle cx="50" cy="50" r="2" fill="#fffce0"/>
                </g>
            </svg>
        </div>
        <div class="totem-title">信 (Faith)</div>
    </div>

    <div class="totem-card">
        <div class="svg-box">
            <svg viewBox="0 0 100 100" width="100%" height="100%">
                <use href="#lotus-outline" />
                <use href="#base-ring" />
                <g filter="url(#sacred-glow)">
                    <path d="M 50 32 C 35 38, 35 60, 50 65 C 65 60, 65 38, 50 32 Z" fill="url(#cloudGrad)" opacity="0.3" filter="blur(2px)"/>
                    <path d="M 32 60 C 32 35, 68 35, 68 60" stroke="url(#rg-unified-gold)" stroke-width="1.5" fill="none" stroke-linecap="round"/>
                    <path d="M 40 60 C 40 45, 60 45, 60 60" stroke="url(#rg-unified-gold)" stroke-width="1.2" fill="none" stroke-linecap="round"/>
                    <circle cx="50" cy="38" r="2.5" fill="#fffce0"/>
                </g>
            </svg>
        </div>
        <div class="totem-title">住 (Abiding)</div>
    </div>

    <div class="totem-card">
        <div class="svg-box">
            <svg viewBox="0 0 100 100" width="100%" height="100%">
                <use href="#lotus-outline" />
                <use href="#base-ring" />
                <g filter="url(#sacred-glow)">
                    <ellipse cx="50" cy="50" rx="15" ry="6" fill="url(#cloudGrad)" opacity="0.4" filter="blur(3px)"/>
                    <path d="M 32 50 C 32 38, 46 38, 50 50 C 54 62, 68 62, 68 50 C 68 38, 54 38, 50 50 C 46 62, 32 62, 32 50 Z" stroke="url(#rg-unified-gold)" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
                </g>
            </svg>
        </div>
        <div class="totem-title">行 (Practice)</div>
    </div>

    <div class="totem-card">
        <div class="svg-box">
            <svg viewBox="0 0 100 100" width="100%" height="100%">
                <use href="#lotus-outline" />
                <use href="#base-ring" />
                <g filter="url(#sacred-glow)">
                    <rect x="36" y="36" width="28" height="28" rx="8" fill="url(#cloudGrad)" opacity="0.3" filter="blur(2px)"/>
                    <path d="M 40 38 L 60 38 A 8 8 0 0 1 68 46 L 68 54 A 8 8 0 0 1 60 62 L 40 62 A 8 8 0 0 1 32 54 L 32 46 A 8 8 0 0 1 40 38 Z" stroke="url(#rg-unified-gold)" stroke-width="1.3" fill="none"/>
                    <path d="M 45 32 L 45 68 M 55 32 L 55 68 M 32 45 L 68 45 M 32 55 L 68 55" stroke="url(#rg-unified-gold)" stroke-width="1.3" fill="none" opacity="0.7"/>
                </g>
            </svg>
        </div>
        <div class="totem-title">迴向 (Dedication)</div>
    </div>

    <div class="totem-card">
        <div class="svg-box">
            <svg viewBox="0 0 100 100" width="100%" height="100%">
                <use href="#lotus-outline" />
                <use href="#base-ring" />
                <g filter="url(#sacred-glow)">
                    <circle cx="50" cy="50" r="14" fill="url(#cloudGrad)" opacity="0.3" filter="blur(2px)"/>
                    <path d="M 50 28 C 65 28, 72 40, 72 50 C 72 60, 65 72, 50 72 C 35 72, 28 60, 28 50 C 28 40, 35 28, 50 28 Z" stroke="url(#rg-unified-gold)" stroke-width="1.2" fill="none"/>
                    <path d="M 50 35 C 58 35, 65 42, 65 50 C 65 58, 58 65, 50 65 C 42 65, 35 58, 35 50 C 35 42, 42 35, 50 35 Z" stroke="url(#rg-unified-gold)" stroke-width="1.0" fill="none" opacity="0.8"/>
                    <path d="M 38 38 L 62 62 M 38 62 L 62 38" stroke="url(#rg-unified-gold)" stroke-width="0.8" opacity="0.6"/>
                    <circle cx="50" cy="50" r="3" fill="#fffce0"/>
                </g>
            </svg>
        </div>
        <div class="totem-title">地 (Bhumi)</div>
    </div>

</body>
</html>
