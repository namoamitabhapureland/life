<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>彌陀淨土系統 - 華嚴圖騰 (星空黑底版)</title>
    <style>
        body {
            background-color: #020203;
            color: #f5eabf;
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            gap: 50px;
            padding: 50px;
        }
        .totem-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }
        .svg-box {
            width: 180px;
            height: 180px;
            background: radial-gradient(circle, #111111 0%, #050505 60%, #000000 100%);
            border-radius: 50%;
            box-shadow: 0 0 30px rgba(191, 158, 72, 0.08);
            position: relative;
        }
        .totem-title {
            font-size: 1.1rem;
            letter-spacing: 4px;
            font-weight: 300;
            color: #bf9e48;
        }
    </style>
</head>
<body>

    <svg width="0" height="0" style="position:absolute;">
        <defs>
            <linearGradient id="paleGold3DGrad" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%" stop-color="#bf9e48" />
                <stop offset="25%" stop-color="#f5eabf" />
                <stop offset="50%" stop-color="#ffffff" />
                <stop offset="75%" stop-color="#f5eabf" />
                <stop offset="100%" stop-color="#bf9e48" />
            </linearGradient>

            <linearGradient id="cloudGrad" x1="0%" y1="100%" x2="100%" y2="0%">
                <stop offset="0%" stop-color="#FFB6C1" stop-opacity="0.7"/> 
                <stop offset="50%" stop-color="#FFFFFF" stop-opacity="0.9"/> 
                <stop offset="100%" stop-color="#b0dfdb" stop-opacity="0.7"/>
            </linearGradient>

            <filter id="sacred-glow" x="-20%" y="-20%" width="140%" height="140%">
                <feGaussianBlur stdDeviation="2.5" result="blur" />
                <feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge>
            </filter>

            <g id="lotus-outline" stroke="rgba(255,255,255,0.04)" stroke-width="0.8" fill="none">
                <path d="M 50 12 C 38 35, 45 48, 50 50 C 55 48, 62 35, 50 12 Z" transform="rotate(0 50 50)"/>
                <path d="M 50 12 C 38 35, 45 48, 50 50 C 55 48, 62 35, 50 12 Z" transform="rotate(45 50 50)"/>
                <path d="M 50 12 C 38 35, 45 48, 50 50 C 55 48, 62 35, 50 12 Z" transform="rotate(90 50 50)"/>
                <path d="M 50 12 C 38 35, 45 48, 50 50 C 55 48, 62 35, 50 12 Z" transform="rotate(135 50 50)"/>
                <path d="M 50 12 C 38 35, 45 48, 50 50 C 55 48, 62 35, 50 12 Z" transform="rotate(180 50 50)"/>
                <path d="M 50 12 C 38 35, 45 48, 50 50 C 55 48, 62 35, 50 12 Z" transform="rotate(225 50 50)"/>
                <path d="M 50 12 C 38 35, 45 48, 50 50 C 55 48, 62 35, 50 12 Z" transform="rotate(270 50 50)"/>
                <path d="M 50 12 C 38 35, 45 48, 50 50 C 55 48, 62 35, 50 12 Z" transform="rotate(315 50 50)"/>
            </g>

            <g id="base-plate">
                <circle cx="50" cy="50" r="21" fill="#050508" stroke="url(#paleGold3DGrad)" stroke-width="0.8"/>
            </g>
        </defs>
    </svg>

    <div class="totem-card">
        <div class="svg-box">
            <svg viewBox="0 0 100 100" width="100%" height="100%">
                <use href="#lotus-outline" />
                <use href="#base-plate" />
                
                <path d="M46 43 L54 43 M46 57 L54 57 M47 43 L47 57 M53 43 L53 57" stroke="#fffce0" stroke-width="1.2" fill="none"/>
                <circle cx="50" cy="50" r="2.5" fill="#ffe8a0"/>
                
                <path d="M50 43 L50 29" stroke="#fffce0" stroke-width="1.2" fill="none" stroke-linecap="round"/>
                <path d="M46 43 L48 31" stroke="#fffce0" stroke-width="1.2" fill="none" stroke-linecap="round"/>
                <path d="M54 43 L52 31" stroke="#fffce0" stroke-width="1.2" fill="none" stroke-linecap="round"/>

                <path d="M50 57 L50 71" stroke="#fffce0" stroke-width="1.2" fill="none" stroke-linecap="round"/>
                <path d="M46 57 L48 69" stroke="#fffce0" stroke-width="1.2" fill="none" stroke-linecap="round"/>
                <path d="M54 57 L52 69" stroke="#fffce0" stroke-width="1.2" fill="none" stroke-linecap="round"/>
            </svg>
        </div>
        <div class="totem-title">信 (Faith)</div>
    </div>

    <div class="totem-card">
        <div class="svg-box">
            <svg viewBox="0 0 100 100" width="100%" height="100%">
                <use href="#lotus-outline" />
                <use href="#base-plate" />

                <g stroke="url(#paleGold3DGrad)" stroke-width="1.2" fill="none" stroke-linejoin="round">
                    <path d="M 34 66 L 66 66 L 66 64 L 64 64 L 64 62 L 62 62 L 62 60 L 60 60 L 60 58 L 58 58 L 58 56 L 42 56 L 42 58 L 40 58 L 40 60 L 38 60 L 38 62 L 36 62 L 36 64 L 34 64 Z" fill="#111111"/>
                    
                    <line x1="36" y1="64" x2="64" y2="64"/>
                    <line x1="38" y1="62" x2="62" y2="62"/>
                    <line x1="40" y1="60" x2="60" y2="60"/>
                    <line x1="42" y1="58" x2="58" y2="58"/>
                    
                    <path d="M 42 56 C 42 43 58 43 58 56 Z" fill="url(#cloudGrad)" opacity="0.3"/>
                    <path d="M 42 56 C 42 43 58 43 58 56 Z"/>
                    
                    <polygon points="46,43 54,43 52,49 48,49" fill="#111111"/>
                    
                    <polygon points="48,49 52,49 50,30" fill="#111111"/>
                </g>
                
                <circle cx="50" cy="51" r="3" fill="url(#paleGold3DGrad)"/>
                <circle cx="50" cy="51" r="1.5" fill="#fff"/>
            </svg>
        </div>
        <div class="totem-title">住 (Abiding)</div>
    </div>

    <div class="totem-card">
        <div class="svg-box">
            <svg viewBox="0 0 100 100" width="100%" height="100%">
                <use href="#lotus-outline" />
                <use href="#base-plate" />
                <circle cx="50" cy="50" r="14" fill="none" stroke="#f0c868" stroke-width="1.1"/>
                <circle cx="66" cy="50" r="1.5" fill="#f0c868"/>
                <circle cx="61.3" cy="61.3" r="1.5" fill="#f0c868"/>
                <circle cx="50" cy="66" r="1.5" fill="#f0c868"/>
                <circle cx="38.7" cy="61.3" r="1.5" fill="#f0c868"/>
                <circle cx="34" cy="50" r="1.5" fill="#f0c868"/>
                <circle cx="38.7" cy="38.7" r="1.5" fill="#f0c868"/>
                <circle cx="50" cy="34" r="1.5" fill="#f0c868"/>
                <circle cx="61.3" cy="38.7" r="1.5" fill="#f0c868"/>
                <circle cx="50" cy="50" r="4.2" fill="#ffe8a0"/>
            </svg>
        </div>
        <div class="totem-title">行 (Practice)</div>
    </div>

    <div class="totem-card">
        <div class="svg-box">
            <svg viewBox="0 0 100 100" width="100%" height="100%">
                <use href="#lotus-outline" />
                <use href="#base-plate" />
                <polygon points="65,50 60.6,60.6 50,65 39.4,60.6 35,50 39.4,39.4 50,35 60.6,39.4" fill="none" stroke="#fffce0" stroke-width="1.0" opacity="0.8"/>
                <g stroke="#f0c868" stroke-width="0.8" opacity="0.6">
                    <line x1="50" y1="50" x2="65" y2="50"/>
                    <line x1="50" y1="50" x2="60.6" y2="60.6"/>
                    <line x1="50" y1="50" x2="50" y2="65"/>
                    <line x1="50" y1="50" x2="39.4" y2="60.6"/>
                    <line x1="50" y1="50" x2="35" y2="50"/>
                    <line x1="50" y1="50" x2="39.4" y2="39.4"/>
                    <line x1="50" y1="50" x2="50" y2="35"/>
                    <line x1="50" y1="50" x2="60.6" y2="39.4"/>
                </g>
                <circle cx="50" cy="50" r="4.5" fill="#050508" stroke="#f0c868" stroke-width="0.6"/>
                <g fill="#ffe8a0">
                    <path d="M50,46 C51.5,44 53.5,44 55,46 C53.5,48 51.5,48 50,46 Z" transform="rotate(0 50 50)"/>
                    <path d="M50,46 C51.5,44 53.5,44 55,46 C53.5,48 51.5,48 50,46 Z" transform="rotate(45 50 50)"/>
                    <path d="M50,46 C51.5,44 53.5,44 55,46 C53.5,48 51.5,48 50,46 Z" transform="rotate(90 50 50)"/>
                    <path d="M50,46 C51.5,44 53.5,44 55,46 C53.5,48 51.5,48 50,46 Z" transform="rotate(135 50 50)"/>
                    <path d="M50,46 C51.5,44 53.5,44 55,46 C53.5,48 51.5,48 50,46 Z" transform="rotate(180 50 50)"/>
                    <path d="M50,46 C51.5,44 53.5,44 55,46 C53.5,48 51.5,48 50,46 Z" transform="rotate(225 50 50)"/>
                    <path d="M50,46 C51.5,44 53.5,44 55,46 C53.5,48 51.5,48 50,46 Z" transform="rotate(270 50 50)"/>
                    <path d="M50,46 C51.5,44 53.5,44 55,46 C53.5,48 51.5,48 50,46 Z" transform="rotate(315 50 50)"/>
                </g>
                <circle cx="50" cy="50" r="1.5" fill="#fffce0"/>
            </svg>
        </div>
        <div class="totem-title">迴向 (Dedication)</div>
    </div>

    <div class="totem-card">
        <div class="svg-box">
            <svg viewBox="0 0 100 100" width="100%" height="100%">
                <use href="#lotus-outline" />
                <use href="#base-plate" />
                <polygon points="50,33 52.5,42.5 62,38 57.5,47.5 67,50 57.5,52.5 62,62 52.5,57.5 50,67 47.5,57.5 38,62 42.5,52.5 33,50 42.5,47.5 38,38 47.5,42.5" fill="#fffce0" opacity="0.95"/>
            </svg>
        </div>
        <div class="totem-title">地 (Bhumi)</div>
    </div>

</body>
</html>
