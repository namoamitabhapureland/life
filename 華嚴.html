<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>華嚴五法印 - 幾何美學終極化與比例修正</title>
    <style>
        body {
            background-color: #020203; /* 曜石黑 */
            color: #f5eabf;
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 40px;
        }
        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 30px;
            margin-top: 50px;
        }
        .lotus-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            background: rgba(255, 255, 255, 0.03);
            padding: 20px;
            border-radius: 20px;
            border: 1px solid rgba(191, 158, 72, 0.2);
            width: 260px; /* 寬度稍微拉寬一點以容納放大的圖形 */
        }
        .svg-box {
            width: 220px;
            height: 220px;
        }
        .rank-label {
            font-size: 1.1rem;
            letter-spacing: 4px;
            color: #bf9e48;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h2 style="font-weight: 300; letter-spacing: 5px;">華嚴法印：幾何美學終極化全系列</h2>

    <div class="container">
        <div class="lotus-card">
            <div class="svg-box">
                <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                    <defs>
                        <radialGradient id="rg-unified-gold" cx="50%" cy="50%" r="60%">
                            <stop offset="0%" stop-color="#fffce0"/><stop offset="28%" stop-color="#f0c030"/><stop offset="65%" stop-color="#906010"/><stop offset="100%" stop-color="#4c3008"/>
                        </radialGradient>
                    </defs>
                    <circle cx="50" cy="50" r="21" fill="url(#rg-unified-gold)" stroke="#f0d060" stroke-width=".7"/>
                    <g transform="translate(50, 50) scale(0.55) translate(-50, -50)">
                        <g stroke="#81d4fa" stroke-width="1.2" stroke-linecap="round" fill="none">
                            <path d="M44 32 L44 68 M56 32 L56 68"/><path d="M40 30 L50 4 L60 30 M40 70 L50 96 L60 70"/>
                            <path d="M40 30 L44 32 L60 30 L56 32 Z" opacity="0.6"/><path d="M40 70 L44 68 L60 70 L56 68 Z" opacity="0.6"/>
                            <path d="M 40 30 L 60 30 L 67 50 L 60 70 L 40 70 L 33 50 Z" stroke-width="0.8"/>
                        </g>
                        <circle cx="50" cy="50" r="8" fill="none" stroke="#81d4fa" stroke-width="2"/>
                        <circle cx="50" cy="50" r="4" fill="#81d4fa"/>
                    </g>
                </svg>
            </div>
            <div class="rank-label">信 (Faith)</div>
        </div>

        <div class="lotus-card">
            <div class="svg-box">
                <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="50" cy="50" r="21" fill="url(#rg-unified-gold)" stroke="#f0d060" stroke-width=".7"/>
                    <g transform="translate(50, 50) scale(0.6) translate(-50, -50)" stroke="#fffce0" stroke-width="1.2" fill="none">
                        <polygon points="30,70 70,70 65,60 35,60" fill="url(#rg-unified-gold)" stroke-width="1"/>
                        <rect x="35" y="55" width="30" height="5" stroke-width="0.8"/>
                        <rect x="30" y="70" width="40" height="5" stroke-width="0.8"/>
                        <path d="M 39 55 C 39 39 61 39 61 55 Z" fill="url(#rg-unified-gold)"/>
                        <g stroke-width="1.5" stroke-linecap="round">
                            <line x1="45" y1="40" x2="55" y2="40"/><line x1="48" y1="45" x2="52" y2="45"/><line x1="50" y1="25" x2="50" y2="40"/>
                        </g>
                        <g stroke-width="0.8" opacity="0.6">
                            <path d="M30 75 L70 75 Z"/><path d="M35 70 L30 75 Z M65 70 L70 75 Z"/>
                            <line x1="39" y1="55" x2="61" y2="55"/>
                        </g>
                    </g>
                </svg>
            </div>
            <div class="rank-label">住 (Abiding)</div>
        </div>

        <div class="lotus-card">
            <div class="svg-box">
                <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="50" cy="50" r="21" fill="url(#rg-unified-gold)" stroke="#f0d060" stroke-width=".7"/>
                    <g transform="translate(50, 50) scale(0.55) translate(-50, -50)">
                        <polygon points="50,25 54,41 68,32 60,46 75,50 60,54 68,68 54,59 50,75 46,59 32,68 40,54 25,50 40,46 32,32 46,41" 
                                 fill="url(#rg-unified-gold)" stroke="#fffce0" stroke-width="0.8"/>
                        <g stroke="#fffce0" stroke-width="1.2" stroke-linecap="round" fill="none" opacity="0.9">
                            <path d="M 50 25 L 68 32 L 75 50 L 68 68 L 50 75 L 32 68 L 25 50 L 32 32 Z" />
                            <line x1="50" y1="50" x2="50" y2="25"/><line x1="50" y1="50" x2="68" y2="32"/><line x1="50" y1="50" x2="75" y2="50"/>
                            <line x1="50" y1="50" x2="50" y2="75"/><line x1="50" y1="50" x2="25" y2="50"/><line x1="50" y1="50" x2="32" y2="32"/>
                            <g stroke-width="0.8" opacity="0.7">
                                <circle cx="50" cy="50" r="8"/>
                                <line x1="50" y1="42" x2="50" y2="58"/><line x1="42" y1="50" x2="58" y2="50"/>
                                <line x1="44" y1="44" x2="56" y2="56"/><line x1="56" y1="44" x2="44" y2="56"/>
                                <circle cx="50" cy="50" r="4"/><path d="M50 46 L50 54 Z M46 50 L54 50 Z" />
                            </g>
                        </g>
                    </g>
                </svg>
            </div>
            <div class="rank-label">行 (Practice)</div>
        </div>

        <div class="lotus-card">
            <div class="svg-box">
                <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="50" cy="50" r="21" fill="url(#rg-unified-gold)" stroke="#f0d060" stroke-width=".7"/>
                    <g transform="translate(50, 50) scale(0.6) translate(-50, -50)">
                        <polygon points="50,33 52.5,42.5 62,38 57.5,47.5 67,50 57.5,52.5 62,62 52.5,57.5 50,67 47.5,57.5 38,62 42.5,52.5 33,50 42.5,47.5 38,38 47.5,42.5" 
                                 fill="url(#rg-unified-gold)" stroke="#fb8c00" stroke-width="1.0" opacity="0.95"/>
                        <g stroke="#fb8c00" stroke-width="1.2" stroke-linecap="round" fill="none">
                            <path d="M 50 33 L 62 38 L 67 50 L 62 62 L 50 67 L 38 62 L 33 50 L 38 38 Z" />
                            <line x1="50" y1="50" x2="50" y2="33"/> <line x1="50" y1="50" x2="62" y2="38"/><line x1="50" y1="50" x2="67" y2="50"/>
                            <line x1="50" y1="50" x2="50" y2="67"/> <line x1="50" y1="50" x2="33" y2="50"/><line x1="50" y1="50" x2="38" y2="38"/>
                            <line x1="50" y1="33" x2="67" y2="50"/> <line x1="67" y1="50" x2="50" y2="67"/><line x1="50" y1="67" x2="33" y2="50"/>
                        </g>
                        <circle cx="50" cy="50" r="8" fill="none" stroke="#fb8c00" stroke-width="2.5"/><circle cx="50" cy="50" r="4" fill="#fb8c00"/>
                    </g>
                </svg>
            </div>
            <div class="rank-label">迴向 (Dedication)</div>
        </div>

        <div class="lotus-card">
            <div class="svg-box">
                <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="50" cy="50" r="21" fill="url(#rg-unified-gold)" stroke="#f0d060" stroke-width=".7"/>
                    <g transform="translate(50, 50) scale(0.65) translate(-50, -50)">
                        <polygon points="50,20 54,40 70,30 60,46 80,50 60,54 70,70 54,60 50,80 46,60 30,70 40,54 20,50 40,46 30,30 46,40" 
                                 fill="url(#rg-unified-gold)" stroke="#ba68c8" stroke-width="1.0"/>
                        <g stroke="#ba68c8" stroke-width="1.1" stroke-linecap="round" fill="none">
                            <path d="M 50 20 L 70 30 L 80 50 L 70 70 L 50 80 L 30 70 L 20 50 L 30 30 Z" />
                            <line x1="50" y1="50" x2="50" y2="20"/><line x1="50" y1="50" x2="80" y2="50"/><line x1="50" y1="50" x2="50" y2="80"/><line x1="50" y1="50" x2="20" y2="50"/>
                            <line x1="50" y1="50" x2="70" y2="30"/><line x1="50" y1="50" x2="70" y2="70"/><line x1="50" y1="50" x2="30" y2="70"/><line x1="50" y1="50" x2="30" y2="30"/>
                            <path d="M 50 20 L 80 50 L 50 80 L 20 50 Z" opacity="0.6"/>
                            <path d="M 70 30 L 70 70 L 30 70 L 30 30 Z" opacity="0.6"/>
                        </g>
                        <circle cx="50" cy="50" r="8" fill="none" stroke="#ba68c8" stroke-width="2.5"/><circle cx="50" cy="50" r="4" fill="#ba68c8"/>
                    </g>
                </svg>
            </div>
            <div class="rank-label">地 (Bhumi)</div>
        </div>
    </div>

</body>
</html>
