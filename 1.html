<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>右旋寶螺</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #030008;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}
canvas { display: block; max-width: 100%; }
.label { text-align: center; margin-top: 14px; font-family: 'Georgia', serif; }
.t1 {
  font-size: 1.35rem;
  font-weight: 300;
  letter-spacing: 10px;
  background: linear-gradient(90deg, #ffb0cc, #ffd490, #aaffcc, #aaddff, #ddaaff, #ffb0cc);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.t2 { margin-top: 7px; font-size: 0.68rem; letter-spacing: 4px; color: rgba(180,150,220,0.38); }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="label">
  <div class="t1">右 旋 寶 螺</div>
  <div class="t2">妙音吉祥　法音遠播</div>
</div>
<script>
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
const dpr    = Math.min(window.devicePixelRatio || 1, 2);
const W = 360, H = 410;
canvas.width  = W * dpr;
canvas.height = H * dpr;
canvas.style.width  = W + 'px';
canvas.style.height = H + 'px';
ctx.scale(dpr, dpr);

// Shell center & spiral nucleus
const BX = 165, BY = 210;
const SCX = BX - 20, SCY = BY + 14;

// ── Conch silhouette (flat-spiral style) ──────────────────
function conchPath() {
  ctx.beginPath();
  ctx.moveTo(BX+98, BY-50);
  ctx.bezierCurveTo(BX+130,BY-10,  BX+130,BY+58,  BX+80, BY+108);
  ctx.bezierCurveTo(BX+38, BY+148, BX-28, BY+162, BX-82, BY+136);
  ctx.bezierCurveTo(BX-138,BY+108, BX-152,BY+42,  BX-144,BY-10);
  ctx.bezierCurveTo(BX-136,BY-64,  BX-96, BY-110, BX-38, BY-128);
  ctx.bezierCurveTo(BX+22, BY-148, BX+80, BY-132, BX+98, BY-88);
  // beak
  ctx.bezierCurveTo(BX+112,BY-72,  BX+138,BY-78,  BX+158,BY-98);
  ctx.bezierCurveTo(BX+178,BY-118, BX+172,BY-150, BX+150,BY-156);
  ctx.bezierCurveTo(BX+130,BY-162, BX+110,BY-148, BX+104,BY-130);
  ctx.bezierCurveTo(BX+98, BY-112, BX+92, BY-93,  BX+90, BY-70);
  ctx.bezierCurveTo(BX+93, BY-58,  BX+96, BY-53,  BX+98, BY-50);
  ctx.closePath();
}

// ── Rainbow spiral: solid filled arms ────────────────────
function drawRainbowSpiral() {
  const MAX_R = 222;
  const TURNS = 9;
  const SEGS  = TURNS * 380;          // ~380 steps per turn
  const armW  = (MAX_R / TURNS) * 1.12; // slightly overlap adjacent arms

  ctx.save();
  ctx.lineCap = 'round';

  for (let i = 0; i < SEGS; i++) {
    const t  = i       / SEGS;
    const t2 = (i + 1) / SEGS;

    const r  = MAX_R * t;
    const r2 = MAX_R * t2;
    const theta  = t  * Math.PI * 2 * TURNS;
    const theta2 = t2 * Math.PI * 2 * TURNS;

    const x  = SCX + r  * Math.cos(theta);
    const y  = SCY + r  * Math.sin(theta);
    const x2 = SCX + r2 * Math.cos(theta2);
    const y2 = SCY + r2 * Math.sin(theta2);

    // One full rainbow per turn
    const hue = ((theta / (Math.PI * 2)) % 1) * 360;

    ctx.beginPath();
    ctx.moveTo(x,  y);
    ctx.lineTo(x2, y2);
    ctx.strokeStyle = `hsl(${hue}, 92%, 62%)`;
    ctx.lineWidth   = armW;
    ctx.stroke();
  }
  ctx.restore();
}

// ── Faint white whorl structure hints ────────────────────
function drawWhorls() {
  [[66,58,4.5,0.22],[38,34,3,0.16],[18,16,2,0.10]].forEach(([rx,ry,lw,op])=>{
    ctx.beginPath();
    ctx.ellipse(SCX, SCY, rx, ry, -0.18, 0.1*Math.PI, 1.6*Math.PI);
    ctx.strokeStyle = `rgba(255,255,255,${op})`;
    ctx.lineWidth = lw;
    ctx.stroke();
  });
}

// ── Draw (once, static) ───────────────────────────────────
(function draw() {
  ctx.clearRect(0, 0, W, H);

  // Faint background bloom
  const bg = ctx.createRadialGradient(BX,BY,0,BX,BY,210);
  bg.addColorStop(0, 'rgba(45,8,85,0.18)');
  bg.addColorStop(1, 'rgba(0,0,8,0)');
  ctx.fillStyle = bg;
  ctx.fillRect(0,0,W,H);

  // 1 ── Clip & dark base
  ctx.save();
  conchPath();
  ctx.clip();
  ctx.fillStyle = 'rgba(3,1,12,0.96)';
  ctx.fillRect(0,0,W,H);

  // 2 ── Rainbow spiral
  drawRainbowSpiral();

  // 3 ── Radial luminosity overlay (bright nucleus, dark edge)
  const radial = ctx.createRadialGradient(SCX,SCY,0,SCX,SCY,220);
  radial.addColorStop(0,    'rgba(255,255,255,0.18)');
  radial.addColorStop(0.12, 'rgba(255,255,255,0.07)');
  radial.addColorStop(0.55, 'rgba(0,0,0,0)');
  radial.addColorStop(1,    'rgba(0,0,0,0.30)');
  ctx.fillStyle = radial;
  ctx.fillRect(0,0,W,H);

  // 4 ── Whorl lines
  drawWhorls();

  ctx.restore();

  // 5 ── Iridescent outline
  ctx.save();
  conchPath();
  const rim = ctx.createLinearGradient(BX-158,BY-165,BX+175,BY+165);
  rim.addColorStop(0,    'rgba(255,175,205,0.95)');
  rim.addColorStop(0.25, 'rgba(175,215,255,0.92)');
  rim.addColorStop(0.50, 'rgba(175,255,215,0.90)');
  rim.addColorStop(0.75, 'rgba(215,175,255,0.90)');
  rim.addColorStop(1,    'rgba(255,225,155,0.92)');
  ctx.strokeStyle = rim;
  ctx.lineWidth   = 2.5;
  ctx.stroke();
  ctx.restore();

  // 6 ── Purple outer glow
  ctx.save();
  conchPath();
  ctx.shadowColor = 'rgba(140,90,255,0.45)';
  ctx.shadowBlur  = 32;
  ctx.strokeStyle = 'rgba(0,0,0,0)';
  ctx.lineWidth   = 1;
  ctx.stroke();
  ctx.restore();

  // 7 ── Center nucleus sparkle
  ctx.save();
  conchPath();
  ctx.clip();
  const spark = ctx.createRadialGradient(SCX,SCY,0,SCX,SCY,20);
  spark.addColorStop(0,   'rgba(255,255,255,0.98)');
  spark.addColorStop(0.35,'rgba(255,235,255,0.55)');
  spark.addColorStop(1,   'rgba(200,150,255,0)');
  ctx.fillStyle = spark;
  ctx.beginPath();
  ctx.arc(SCX,SCY,20,0,Math.PI*2);
  ctx.fill();
  ctx.restore();
})();
</script>
</body>
</html>
