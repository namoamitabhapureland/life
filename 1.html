<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>吉祥八寶系列 - 寶螺</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #020405;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}
canvas { display: block; max-width: 100%; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
const dpr    = Math.min(window.devicePixelRatio || 1, 2);
const W = 360, H = 410;
canvas.width  = W * dpr;
canvas.height = H * dpr;
canvas.style.width  = W + 'px';
canvas.style.height = H + 'px';
ctx.scale(dpr, dpr);

// Shell center & spiral nucleus
const BX = 165, BY = 210;
const SCX = BX - 20, SCY = BY + 14;

// ── Conch silhouette (flat-spiral style) ──────────────────
function conchPath() {
  ctx.beginPath();
  ctx.moveTo(BX+98, BY-50);
  ctx.bezierCurveTo(BX+130,BY-10,  BX+130,BY+58,  BX+80, BY+108);
  ctx.bezierCurveTo(BX+38, BY+148, BX-28, BY+162, BX-82, BY+136);
  ctx.bezierCurveTo(BX-138,BY+108, BX-152,BY+42,  BX-144,BY-10);
  ctx.bezierCurveTo(BX-136,BY-64,  BX-96, BY-110, BX-38, BY-128);
  ctx.bezierCurveTo(BX+22, BY-148, BX+80, BY-132, BX+98, BY-88);
  
  // 核心改造：大幅向右上延伸拉長，讓開口顯得更宏大、破除圓形侷限
  ctx.bezierCurveTo(BX+130, BY-80,  BX+180, BY-110, BX+210, BY-140); 
  ctx.bezierCurveTo(BX+240, BY-170, BX+225, BY-220, BX+190, BY-220); 
  ctx.bezierCurveTo(BX+150, BY-220, BX+120, BY-180, BX+106, BY-140); 
  ctx.bezierCurveTo(BX+96,  BY-115, BX+92,  BY-93,  BX+90,  BY-70);
  ctx.bezierCurveTo(BX+93,  BY-58,  BX+96,  BY-53,  BX+98,  BY-50);
  ctx.closePath();
}

// ── 明確雙色交替漩渦 ────────────────────
function drawRainbowSpiral() {
  const MAX_R = 222;
  const TURNS = 3.8; 
  const ARMS = 4;
  const SEGS = 350;
  // 淡紅與淡藍雙色交替
  const palette = ['#FFB3B3', '#81D4FA', '#FFB3B3', '#81D4FA'];

  ctx.save();
  ctx.lineCap = 'round';
  ctx.lineWidth = 4.2; 

  for(let a=0; a<ARMS; a++) {
    ctx.beginPath();
    ctx.strokeStyle = palette[a];
    ctx.shadowBlur = 14; 
    ctx.shadowColor = palette[a];
    
    for(let i=0; i<=SEGS; i++) {
      const t = i/SEGS;
      const r = MAX_R * Math.pow(t, 0.88); 
      const theta = t * Math.PI * 2 * TURNS + (Math.PI * 2 / ARMS) * a;
      const x = SCX + r * Math.cos(theta);
      const y = SCY + r * Math.sin(theta);
      
      if(i === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    }
    ctx.stroke();
  }
  ctx.restore();
}

// ── Faint white whorl structure hints ────────────────────
function drawWhorls() {
  [[66,58,4.5,0.22],[38,34,3,0.16],[18,16,2,0.10]].forEach(([rx,ry,lw,op])=>{
    ctx.beginPath();
    ctx.ellipse(SCX, SCY, rx, ry, -0.18, 0.1*Math.PI, 1.6*Math.PI);
    ctx.strokeStyle = `rgba(255,255,255,${op})`;
    ctx.lineWidth = lw;
    ctx.stroke();
  });
}

// ── Draw (once, static) ───────────────────────────────────
(function draw() {
  ctx.clearRect(0, 0, W, H);

  // Faint background bloom
  const bg = ctx.createRadialGradient(BX,BY,0,BX,BY,210);
  bg.addColorStop(0, 'rgba(198,147,32,0.12)');
  bg.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = bg;
  ctx.fillRect(0,0,W,H);

  // 1 ── Clip & dark base
  ctx.save();
  conchPath();
  ctx.clip();
  ctx.fillStyle = 'rgba(2,4,5,0.96)';
  ctx.fillRect(0,0,W,H);

  // 2 ── 雙色交替螺旋
  drawRainbowSpiral();

  // 3 ── Radial luminosity overlay
  const radial = ctx.createRadialGradient(SCX,SCY,0,SCX,SCY,220);
  radial.addColorStop(0,    'rgba(255,255,255,0.15)');
  radial.addColorStop(0.12, 'rgba(255,255,255,0.05)');
  radial.addColorStop(0.55, 'rgba(0,0,0,0)');
  radial.addColorStop(1,    'rgba(0,0,0,0.40)');
  ctx.fillStyle = radial;
  ctx.fillRect(0,0,W,H);

  // 4 ── Whorl lines
  drawWhorls();

  ctx.restore();

  // 5 ── 金色法華描邊 (外框完全改為純金漸層)
  ctx.save();
  conchPath();
  const rim = ctx.createLinearGradient(BX-158, BY-220, BX+210, BY+165);
  rim.addColorStop(0,    '#FFF3D1');
  rim.addColorStop(0.50, '#C6972E');
  rim.addColorStop(1,    '#FCD873');
  ctx.strokeStyle = rim;
  ctx.lineWidth   = 3.0;
  ctx.stroke();
  ctx.restore();

  // 6 ── 金色外部柔光
  ctx.save();
  conchPath();
  ctx.shadowColor = 'rgba(239,208,123,0.35)';
  ctx.shadowBlur  = 35;
  ctx.strokeStyle = 'rgba(0,0,0,0)';
  ctx.lineWidth   = 1;
  ctx.stroke();
  ctx.restore();

  // 7 ── Center nucleus sparkle
  ctx.save();
  conchPath();
  ctx.clip();
  const spark = ctx.createRadialGradient(SCX,SCY,0,SCX,SCY,22);
  spark.addColorStop(0,   'rgba(255,255,255,0.98)');
  spark.addColorStop(0.40,'rgba(254,241,212,0.60)');
  spark.addColorStop(1,   'rgba(254,241,212,0)');
  ctx.fillStyle = spark;
  ctx.beginPath();
  ctx.arc(SCX,SCY,22,0,Math.PI*2);
  ctx.fill();
  ctx.restore();
})();
</script>
</body>
</html>
