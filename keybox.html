<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>淨息流 ． 琉璃鑰匙盒</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #FDFDFD, #F5F2EF);
            --glass-bg: rgba(255, 255, 255, 0.75);
            --glass-border: rgba(255, 255, 255, 0.95);
            --text-main: #58504A; --text-light: #968E86;
            --accent-gold: #CBA37A; --accent-jade: #82968C; --accent-amber: #C1A583;
            --accent-red: #D29498;
            --shadow-soft: 0 10px 40px rgba(160, 155, 150, 0.1);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; padding: 20px; background: var(--bg-gradient); color: var(--text-main); font-family: -apple-system, sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow-x: hidden; line-height: 1.6; }

        /* --- 頁面標題 --- */
        .header { width: 100%; max-width: 600px; text-align: center; margin-bottom: 30px; padding: 20px 0; border-bottom: 1px solid rgba(193, 165, 131, 0.2); }
        .title { font-size: 1.25rem; letter-spacing: 5px; color: var(--accent-amber); font-weight: 500; }
        .subtitle { font-size: 0.7rem; color: var(--text-light); letter-spacing: 2px; margin-top: 5px; }

        /* --- 鑰匙容器 --- */
        .key-box { width: 100%; max-width: 600px; display: flex; flex-direction: column; gap: 20px; }
        .glass-card { background: var(--glass-bg); backdrop-filter: blur(15px); border: 1px solid var(--glass-border); border-radius: 28px; padding: 25px; box-shadow: var(--shadow-soft); position: relative; animation: fadeIn 0.5s ease; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .card-type { font-size: 0.65rem; letter-spacing: 2px; color: var(--text-light); border: 1px solid rgba(193,165,131,0.3); padding: 2px 10px; border-radius: 10px; }
        .card-name { font-size: 1rem; font-weight: 500; letter-spacing: 2px; }

        .key-icon { width: 42px; height: 42px; margin-right: 15px; }
        .info-row { margin-top: 15px; padding: 15px; background: rgba(255,255,255,0.4); border-radius: 18px; border: 1px solid rgba(255,255,255,0.6); }
        .info-label { font-size: 0.65rem; color: var(--text-light); letter-spacing: 1px; display: block; margin-bottom: 5px; }
        .info-value { font-family: monospace; font-size: 1rem; color: var(--accent-amber); word-break: break-all; }

        /* --- 互動按鈕 --- */
        .btn-add { width: 56px; height: 56px; background: var(--text-main); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.8rem; border: none; margin: 30px 0; box-shadow: 0 10px 30px rgba(0,0,0,0.1); cursor: pointer; transition: 0.2s; }
        .btn-add:active { transform: scale(0.9); }

        .delete-btn { font-size: 0.65rem; color: var(--accent-red); background: none; border: none; cursor: pointer; opacity: 0.6; }

        /* --- 彈窗模式 --- */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.2); backdrop-filter: blur(8px); display: none; justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: #FDFDFD; width: 85%; max-width: 350px; border-radius: 30px; padding: 30px; box-shadow: var(--shadow-soft); text-align: center; }
        .modal-title { font-size: 1.1rem; color: var(--accent-amber); margin-bottom: 20px; letter-spacing: 3px; }
        
        .styled-input { width: 100%; background: #F5F2EF; border: 1px solid var(--glass-border); border-radius: 15px; padding: 15px; margin-bottom: 15px; font-size: 1rem; outline: none; text-align: center; color: var(--text-main); }
        .btn-submit { width: 100%; background: var(--accent-amber); color: white; border: none; padding: 15px; border-radius: 15px; font-size: 1rem; letter-spacing: 3px; cursor: pointer; }

        .footer { font-size: 0.7rem; color: var(--text-light); text-align: center; padding: 40px 20px; line-height: 2; letter-spacing: 1px; }
    </style>
</head>
<body>

    <header class="header">
        <div class="title">琉璃鑰匙盒</div>
        <div class="subtitle">iPhone 邏輯補完 ． 斷網可用</div>
    </header>

    <div class="key-box" id="key-container">
        </div>

    <button class="btn-add" id="open-modal">+</button>

    <div class="modal" id="add-modal">
        <div class="modal-content">
            <div class="modal-title">錄入新鑰匙</div>
            <input type="text" id="new-name" class="styled-input" placeholder="鑰匙名稱 (如: 社區大門)">
            <input type="text" id="new-uid" class="styled-input" placeholder="UID (留空則自動生成)">
            <div style="display:flex; gap:10px;">
                <button class="btn-submit" style="background:#CCC;" onclick="closeModal()">取消</button>
                <button class="btn-submit" onclick="addNewKey()">確定錄入</button>
            </div>
            <div style="font-size:0.6rem; color:var(--text-light); margin-top:15px; line-height:1.5;">
                ※ iPhone 使用者若無 UID，系統將根據名稱生成一組「金剛邏輯 UID」供管理員錄入。
            </div>
        </div>
    </div>

    <footer class="footer">
        識智合一 ． 邏輯即法律<br>
        2026 妙依 ． 阿智 協作修復
    </footer>

    <script>
        // 核心資料庫 (存在手機本機 LocalStorage)
        const DB_NAME = 'miaoyi_keys_v4';
        let keys = JSON.parse(localStorage.getItem(DB_NAME)) || [
            { id: 1, name: '預設演示：社區大門', type: '物理貼紙映射', uid: '8A:3F:DE:09:CC:12', icon: 'sticker' }
        ];

        // --- 核心邏輯：修復 iPhone 缺少的 UID ---
        // 若使用者沒輸入 UID，我們用簡單的雜湊邏輯生成一個看起來專業的十六進制 ID
        function generateLogicUID(name) {
            const salt = "PRAJNA_2026";
            let hash = 0;
            const str = name + salt;
            for (let i = 0; i < str.length; i++) {
                hash = ((hash << 5) - hash) + str.charCodeAt(i);
                hash |= 0; 
            }
            const hex = Math.abs(hash).toString(16).toUpperCase().padStart(8, '0');
            // 格式化成管理員熟悉的 XX:XX:XX:XX 格式
            return hex.match(/.{1,2}/g).join(':');
        }

        // --- 介面渲染 ---
        function render() {
            const container = document.getElementById('key-container');
            if (keys.length === 0) {
                container.innerHTML = '<div style="text-align:center; color:var(--text-light); font-size:0.8rem; margin-top:20px;">暫無鑰匙，點擊 + 號新增</div>';
                return;
            }

            container.innerHTML = keys.map(key => `
                <div class="glass-card">
                    <div class="card-header">
                        <span class="card-name">${key.name}</span>
                        <div style="display:flex; align-items:center; gap:10px;">
                            <span class="card-type">${key.type}</span>
                            <button class="delete-btn" onclick="deleteKey(${key.id})">移除</button>
                        </div>
                    </div>
                    <div style="display:flex; align-items:center;">
                        ${getSVG(key.icon)}
                        <div style="font-size:0.8rem; color:var(--text-main); opacity:0.8;">
                            ${key.type === '物理貼紙映射' ? '已感應物理貼紙' : '數位邏輯授權載具'}
                        </div>
                    </div>
                    <div class="info-row">
                        <span class="info-label">授權識別碼 (UID)</span>
                        <div class="info-value">${key.uid}</div>
                    </div>
                </div>
            `).join('');
        }

        function getSVG(type) {
            if (type === 'sticker') {
                return `<svg class="key-icon" viewBox="0 0 100 100"><circle cx="50" cy="50" r="38" fill="none" stroke="var(--accent-amber)" stroke-width="1.5" stroke-dasharray="4 3" /><rect x="38" y="38" width="24" height="24" rx="3" fill="var(--accent-amber)" opacity="0.2" /><path d="M45 50 L55 50 M50 45 L50 55" stroke="var(--accent-amber)" stroke-width="2" /></svg>`;
            }
            return `<svg class="key-icon" viewBox="0 0 100 100"><path d="M50 25 Q65 25 65 40 T50 55 T35 40 T50 25" fill="none" stroke="var(--accent-jade)" stroke-width="2" /><circle cx="50" cy="40" r="4" fill="var(--accent-jade)" /><path d="M50 55 L50 75 M40 65 L60 65" stroke="var(--accent-jade)" stroke-width="1.5" /></svg>`;
        }

        // --- 互動控制 ---
        const modal = document.getElementById('add-modal');
        document.getElementById('open-modal').onclick = () => modal.style.display = 'flex';

        function closeModal() {
            modal.style.display = 'none';
            document.getElementById('new-name').value = '';
            document.getElementById('new-uid').value = '';
        }

        function addNewKey() {
            const name = document.getElementById('new-name').value.trim();
            let uid = document.getElementById('new-uid').value.trim();
            
            if (!name) return alert('請輸入鑰匙名稱');

            let type = '物理貼紙映射';
            if (!uid) {
                uid = generateLogicUID(name);
                type = '邏輯 ID 生成';
            }

            const newKey = {
                id: Date.now(),
                name: name,
                type: type,
                uid: uid,
                icon: type === '邏輯 ID 生成' ? 'logic' : 'sticker'
            };

            keys.push(newKey);
            save();
            render();
            closeModal();
        }

        function deleteKey(id) {
            if (confirm('確定要移除此鑰匙嗎？')) {
                keys = keys.filter(k => k.id !== id);
                save();
                render();
            }
        }

        function save() {
            localStorage.setItem(DB_NAME, JSON.stringify(keys));
        }

        // 初始化
        window.onload = render;
    </script>
</body>
</html>
