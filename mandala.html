<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SVG 陣法靜態預覽 ‧ 五階演化</title>
    <style>
        body { 
            background: #010204; color: #fff; margin: 0; padding: 40px;
            display: flex; flex-wrap: wrap; justify-content: center; gap: 40px;
            font-family: "PingFang TC", serif;
        }
        .svg-container {
            width: 280px; height: 320px; position: relative;
            display: flex; flex-direction: column; align-items: center;
            background: rgba(255,255,255,0.02); border-radius: 8px; border: 1px solid rgba(139,168,156,0.1);
            padding-top: 20px;
        }
        .label {
            margin-top: 25px; color: #8ba89c; letter-spacing: 4px; font-size: 0.85rem; font-weight: bold;
        }
        .desc {
            font-size: 0.7rem; color: #555; margin-top: 8px; letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <div class="svg-container">
        <svg viewBox="-150 -150 300 300" style="filter: drop-shadow(0 0 8px rgba(139,168,156,0.3));">
            <g stroke="#8ba89c" stroke-width="1.2" fill="rgba(139,168,156,0.05)">
                <polygon points="0,-80 69.3,40 -69.3,40" />
                <line x1="0" y1="0" x2="0" y2="-80" />
                <line x1="0" y1="0" x2="69.3" y2="40" />
                <line x1="0" y1="0" x2="-69.3" y2="40" />
                <circle cx="0" cy="0" r="3" fill="#fff" stroke="none"/>
            </g>
            <text x="0" y="100" text-anchor="middle" fill="#8ba89c" font-size="24" font-weight="bold" font-family="monospace" letter-spacing="4">045</text>
        </svg>
        <div class="label">【 一 ‧ 微塵 】</div>
        <div class="desc">單純四面體 ‧ 基礎發心</div>
    </div>

    <div class="svg-container">
        <svg viewBox="-150 -150 300 300" style="filter: drop-shadow(0 0 10px rgba(139,168,156,0.4));">
            <g stroke="#8ba89c" stroke-width="1" fill="rgba(139,168,156,0.08)">
                <rect x="-60" y="-60" width="120" height="120" />
                <rect x="-60" y="-60" width="120" height="120" transform="rotate(45)" fill="rgba(139,168,156,0.1)"/>
                <line x1="-85" y1="0" x2="85" y2="0" stroke-dasharray="2 3"/>
                <line x1="0" y1="-85" x2="0" y2="85" stroke-dasharray="2 3"/>
                <circle cx="0" cy="0" r="40" fill="none" stroke-width="0.5"/>
            </g>
            <text x="0" y="100" text-anchor="middle" fill="#8ba89c" font-size="24" font-weight="bold" font-family="monospace" letter-spacing="4">120</text>
        </svg>
        <div class="label">【 二 ‧ 方圓 】</div>
        <div class="desc">八角方陣 ‧ 戒律初成</div>
    </div>

    <div class="svg-container">
        <svg viewBox="-150 -150 300 300" style="filter: drop-shadow(0 0 15px rgba(243,229,171,0.3));">
            <defs>
                <radialGradient id="grad-3" cx="50%" cy="50%" r="50%">
                    <stop offset="0%" stop-color="#f3e5ab" stop-opacity="0.15"/>
                    <stop offset="100%" stop-color="#8ba89c" stop-opacity="0"/>
                </radialGradient>
            </defs>
            <circle cx="0" cy="0" r="70" fill="url(#grad-3)"/>
            <g stroke="#8ba89c" stroke-width="1.5" fill="rgba(243,229,171,0.05)">
                <polygon points="0,-90 77.9,45 -77.9,45" />
                <polygon points="0,90 77.9,-45 -77.9,-45" />
                <polygon points="0,-45 39,-22.5 39,22.5 0,45 -39,22.5 -39,-22.5" fill="rgba(139,168,156,0.15)" stroke="#f3e5ab" stroke-width="0.8"/>
            </g>
            <text x="0" y="100" text-anchor="middle" fill="#f3e5ab" font-size="26" font-weight="bold" font-family="monospace" letter-spacing="4">240</text>
        </svg>
        <div class="label" style="color:#f3e5ab;">【 三 ‧ 星軌 】</div>
        <div class="desc">六芒交織 ‧ 願力相續</div>
    </div>

    <div class="svg-container">
        <svg viewBox="-150 -150 300 300" style="filter: drop-shadow(0 0 18px rgba(212,175,55,0.4));">
            <g stroke="#f3e5ab" stroke-width="1" fill="none">
                <rect x="-65" y="-65" width="130" height="130" transform="rotate(15)" fill="rgba(212,175,55,0.05)"/>
                <rect x="-65" y="-65" width="130" height="130" transform="rotate(45)" fill="rgba(212,175,55,0.05)"/>
                <rect x="-65" y="-65" width="130" height="130" transform="rotate(75)" fill="rgba(212,175,55,0.05)"/>
                
                <circle cx="0" cy="0" r="50" stroke="#d4af37" stroke-width="1.5" fill="rgba(212,175,55,0.1)"/>
                <circle cx="0" cy="0" r="40" stroke-dasharray="2 6" stroke-width="2"/>
            </g>
            <text x="0" y="100" text-anchor="middle" fill="#d4af37" font-size="28" font-weight="bold" font-family="monospace" letter-spacing="4">360</text>
        </svg>
        <div class="label" style="color:#d4af37;">【 四 ‧ 九宮 】</div>
        <div class="desc">多維角點 ‧ 般若漸明</div>
    </div>

    <div class="svg-container" style="border-color: rgba(212,175,55,0.3); background: rgba(212,175,55,0.03);">
        <svg viewBox="-150 -150 300 300" style="filter: drop-shadow(0 0 25px rgba(212,175,55,0.7));">
            <defs>
                <filter id="blur-core"><feGaussianBlur stdDeviation="2" result="blur" /><feComposite in="SourceGraphic" in2="blur" operator="over" /></filter>
            </defs>

            <g stroke="#f3e5ab" stroke-width="0.5" fill="none" opacity="0.4">
                <circle cx="0" cy="0" r="110" stroke-dasharray="1 4"/>
                <circle cx="0" cy="0" r="125" />
            </g>

            <g stroke="#d4af37" stroke-width="1" fill="rgba(212,175,55,0.08)" filter="url(#blur-core)">
                <polygon points="0,-95 82,-47 82,47 0,95 -82,47 -82,-47" />
                <polygon points="0,-95 82,-47 82,47 0,95 -82,47 -82,-47" transform="rotate(30)" />
                <polygon points="0,-95 82,-47 82,47 0,95 -82,47 -82,-47" transform="rotate(60)" />
                <polygon points="0,-95 82,-47 82,47 0,95 -82,47 -82,-47" transform="rotate(90)" />
            </g>

            <g stroke="#fff" stroke-width="1.5" fill="rgba(255,255,255,0.1)">
                <polygon points="0,-50 43,25 -43,25" />
                <polygon points="0,50 43,-25 -43,-25" />
                <circle cx="0" cy="0" r="15" fill="#fff" filter="url(#blur-core)"/>
            </g>
            <text x="0" y="100" text-anchor="middle" fill="#fff" font-size="32" font-weight="bold" font-family="monospace" letter-spacing="4" filter="url(#blur-core)">450</text>
        </svg>
        <div class="label" style="color:#d4af37; font-size: 1rem;">【 五 ‧ 大千 】</div>
        <div class="desc" style="color: #f3e5ab;">無盡嵌套 ‧ 圓滿無漏</div>
    </div>

</body>
</html>
