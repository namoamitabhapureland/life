<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>純向量法界美學 ‧ 局部優化示範頁</title>
    <style>
        :root {
            --bg-deep: #010103;
            --gold-light: #f3e5ab;
            --gold-solid: #d4af37;
            --cyan-glow: #8ba89c;
        }
        * {
            box-sizing: border-box;
            user-select: none;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: var(--bg-deep);
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 星空背景畫布 */
        #starCanvas {
            position: absolute;
            inset: 0;
            z-index: 1;
            pointer-events: none;
        }

        /* 主 SVG 視覺層 */
        #mainStage {
            position: absolute;
            width: 100vw;
            height: 100vh;
            z-index: 2;
        }

        /* 供水與大蓮花群組定位 */
        .vector-group {
            transition: all 0.5s ease;
        }
    </style>
</head>
<body>

    <canvas id="starCanvas"></canvas>

    <svg id="mainStage" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000" preserveAspectRatio="xMidYMid slice">
        <defs>
            <filter id="fine-glow" x="-50%" y="-50%" width="200%" height="200%">
                <feGaussianBlur stdDeviation="2.5" result="blur" />
                <feMerge>
                    <feMergeNode in="blur" />
                    <feMergeNode in="SourceGraphic" />
                </feMerge>
            </filter>

            <g id="base-lotus">
                <g stroke="var(--gold-light)" stroke-width="1.2" fill="none" opacity="0.4">
                    <path d="M0,0 C-8,-15 -12,-30 0,-45 C12,-30 8,-15 0,0 Z" transform="rotate(36)" />
                    <path d="M0,0 C-8,-15 -12,-30 0,-45 C12,-30 8,-15 0,0 Z" transform="rotate(108)" />
                    <path d="M0,0 C-8,-15 -12,-30 0,-45 C12,-30 8,-15 0,0 Z" transform="rotate(180)" />
                    <path d="M0,0 C-8,-15 -12,-30 0,-45 C12,-30 8,-15 0,0 Z" transform="rotate(252)" />
                    <path d="M0,0 C-8,-15 -12,-30 0,-45 C12,-30 8,-15 0,0 Z" transform="rotate(324)" />
                </g>
                <g stroke="var(--gold-solid)" stroke-width="1.2" fill="none" opacity="0.8" filter="url(#fine-glow)">
                    <path d="M0,0 C-12,-20 -18,-40 0,-55 C18,-40 12,-20 0,0 Z" transform="rotate(0)" />
                    <path d="M0,0 C-12,-20 -18,-40 0,-55 C18,-40 12,-20 0,0 Z" transform="rotate(72)" />
                    <path d="M0,0 C-12,-20 -18,-40 0,-55 C18,-40 12,-20 0,0 Z" transform="rotate(144)" />
                    <path d="M0,0 C-12,-20 -18,-40 0,-55 C18,-40 12,-20 0,0 Z" transform="rotate(216)" />
                    <path d="M0,0 C-12,-20 -18,-40 0,-55 C18,-40 12,-20 0,0 Z" transform="rotate(288)" />
                </g>
            </g>

            <g id="water-cup">
                <g stroke="var(--cyan-glow)" stroke-width="1.2" fill="none" filter="url(#fine-glow)">
                    <path d="M-12,-18 C-12,8 -8,12 0,12 C8,12 12,8 12,-18" />
                    <ellipse cx="0" cy="-18" rx="12" ry="3.5" />
                    <path d="M-5,12 C-5,14 5,14 5,12" />
                    <path d="M-11.5,-4 C-6,-1 6,-1 11.5,-4" stroke="#ffffff" opacity="0.6" stroke-width="1.0" />
                </g>
            </g>

            <g id="falling-petal">
                <path d="M0,0 C-6,-10 -9,-18 0,-26 C9,-18 6,-10 0,0 Z" stroke="var(--gold-light)" stroke-width="1.2" fill="none" opacity="0.7" />
            </g>
        </defs>

        <g id="petal-layer"></g>

        <g id="bottom-lotus-field" class="vector-group">
            <use href="#base-lotus" x="420" y="820" transform="scale(0.8)" opacity="0.3"/>
            <use href="#base-lotus" x="580" y="820" transform="scale(0.8)" opacity="0.3"/>
            
            <use href="#base-lotus" x="350" y="850" transform="scale(1.2)" opacity="0.5"/>
            <use href="#base-lotus" x="650" y="850" transform="scale(1.2)" opacity="0.5"/>
            <use href="#base-lotus" x="440" y="860" transform="scale(1.4)" opacity="0.6"/>
            <use href="#base-lotus" x="560" y="860" transform="scale(1.4)" opacity="0.6"/>

            <use href="#base-lotus" x="500" y="880" transform="scale(1.8)" opacity="0.9"/>
        </g>

        <g id="three-water-cups" class="vector-group">
            <use href="#water-cup" x="430" y="700" transform="scale(1.3)" />
            <use href="#water-cup" x="500" y="705" transform="scale(1.3)" />
            <use href="#water-cup" x="570" y="700" transform="scale(1.3)" />
        </g>
    </svg>

    <script>
        // ==========================================
        // 1. 純粹星空背景邏輯 (Canvas)
        // ==========================================
        const canvas = document.getElementById('starCanvas');
        const ctx = canvas.getContext('2d');
        let stars = [];

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            initStars();
        }

        function initStars() {
            stars = [];
            const count = Math.floor((canvas.width * canvas.height) / 7000);
            for (let i = 0; i < count; i++) {
                stars.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    radius: Math.random() * 1.2,
                    alpha: Math.random(),
                    speed: 0.01 + Math.random() * 0.02
                });
            }
        }

        function drawStars() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = 'rgba(255, 255, 255, filter)';
            
            for (let i = 0; i < stars.length; i++) {
                let s = stars[i];
                s.alpha += s.speed;
                if (s.alpha > 1 || s.alpha < 0) s.speed = -s.speed;
                
                ctx.beginPath();
                ctx.arc(s.x, s.y, s.radius, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(243, 229, 171, ${Math.max(0, s.alpha)})`; // 採用淡金色微光
                ctx.fill();
            }
            requestAnimationFrame(drawStars);
        }

        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();
        drawStars();

        // ==========================================
        // 2. 局部落花動態邏輯 (SVG RequestAnimationFrame)
        // ==========================================
        const petalLayer = document.getElementById('petal-layer');
        const activePetals = [];
        const maxPetals = 35; // 控制法界落花的清淨密度

        function createPetal() {
            if (activePetals.length >= maxPetals) return;

            const useTag = document.createElementNS('http://www.w3.org/2000/svg', 'use');
            useTag.setAttributeNS('http://www.w3.org/1999/xlink', 'href', '#falling-petal');
            
            // 隨機初始水平分佈與縮放
            const x = Math.random() * 1200 - 100; // 超出邊界緩衝
            const y = -50;
            const scale = 0.5 + Math.random() * 0.8;
            const speedY = 1.0 + Math.random() * 1.5;
            const speedX = (Math.random() - 0.5) * 0.5;
            const rotSpeed = (Math.random() - 0.5) * 1.2;
            let rotation = Math.random() * 360;
            let swayStep = Math.random() * 100;

            useTag.setAttribute('transform', `translate(${x}, ${y}) scale(${scale}) rotate(${rotation})`);
            petalLayer.appendChild(useTag);

            activePetals.push({
                element: useTag,
                x: x,
                y: y,
                scale: scale,
                speedY: speedY,
                speedX: speedX,
                rotSpeed: rotSpeed,
                rotation: rotation,
                swayStep: swayStep
            });
        }

        function updatePetals() {
            for (let i = activePetals.length - 1; i >= 0; i--) {
                const p = activePetals[i];
                p.y += p.speedY;
                p.swayStep += 0.02;
                p.x += p.speedX + Math.sin(p.swayStep) * 0.4; // 輕微空氣物理搖擺
                p.rotation += p.rotSpeed;

                // 更新 SVG transform 矩陣屬性
                p.element.setAttribute('transform', `translate(${p.x}, ${p.y}) scale(${p.scale}) rotate(${p.rotation})`);

                // 越過大蓮花海邊界後自動功德圓滿移除
                if (p.y > 950) {
                    p.element.remove();
                    activePetals.splice(i, 1);
                }
            }
            
            // 每隔特定幀隨機產生新花瓣
            if (Math.random() < 0.08) {
                createPetal();
            }

            requestAnimationFrame(updatePetals);
        }

        // 啟動花落動態
        updatePetals();
    </script>
</body>
</html>
