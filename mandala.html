<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>淨土法界美學 ‧ 局部優化測試 (純淨版)</title>
    <style>
        :root {
            --bg-deep: #010103;
            --gold-light: #f3e5ab;
            --gold-solid: #d4af37;
        }
        * { box-sizing: border-box; user-select: none; margin: 0; padding: 0; }
        body {
            background: radial-gradient(circle at 50% 50%, #16110a 0%, var(--bg-deep) 100%);
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #starCanvas { position: absolute; inset: 0; z-index: 1; pointer-events: none; }
        #mainStage { position: absolute; width: 100vw; height: 100vh; z-index: 2; }
    </style>
</head>
<body>

    <canvas id="starCanvas"></canvas>

    <svg id="mainStage" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000" preserveAspectRatio="xMidYMid slice">
        <defs>
            <linearGradient id="facet-light" x1="0%" y1="0%" x2="50%" y2="100%">
                <stop offset="0%" stop-color="#fff" stop-opacity="0.95"/>
                <stop offset="100%" stop-color="#fff" stop-opacity="0.1"/>
            </linearGradient>
            <linearGradient id="facet-dark" x1="50%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#d4af37" stop-opacity="0.2"/>
                <stop offset="100%" stop-color="#b8860b" stop-opacity="0.8"/>
            </linearGradient>
            <linearGradient id="facet-cyan" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#e0f7fa" stop-opacity="0.9"/>
                <stop offset="100%" stop-color="#00838f" stop-opacity="0.5"/>
            </linearGradient>

            <filter id="fine-glow" x="-50%" y="-50%" width="200%" height="200%">
                <feGaussianBlur stdDeviation="2.5" result="blur" />
                <feMerge>
                    <feMergeNode in="blur" />
                    <feMergeNode in="SourceGraphic" />
                </feMerge>
            </filter>

            <g id="organic-mandala">
                <g stroke="var(--gold-light)" stroke-width="1.2" fill="none" style="filter: drop-shadow(0 0 6px rgba(243,229,171,0.5));">
                    <path d="M 0,0 C -25,-10 -35,-35 -15,-45 C 5,-25 0,-10 0,0 Z" fill="rgba(255,255,255,0.02)" />
                    <path d="M 0,0 C 20,-5 35,-25 15,-40 C -5,-20 0,-10 0,0 Z" fill="rgba(255,255,255,0.02)" />
                    <path d="M 0,0 C -15,-20 -20,-50 0,-60 C 15,-40 5,-15 0,0 Z" fill="rgba(212,175,55,0.04)" />
                    <path d="M 0,0 C 15,-15 25,-45 5,-55 C -10,-35 -5,-15 0,0 Z" fill="rgba(212,175,55,0.04)" />
                    <path d="M 0,0 C -8,-25 -2,-45 0,-48 C 8,-35 4,-15 0,0 Z" stroke="#ffffff" fill="rgba(255,255,255,0.08)" />
                </g>
                <circle cx="0" cy="0" r="1.5" fill="#ffffff" style="filter: drop-shadow(0 0 8px #d4af37);"/>
            </g>

            <g id="treasure-vase">
                <polygon points="45,20 55,20 60,40 40,40" fill="url(#facet-light)" stroke="#fff" stroke-width="0.5"/>
                <polygon points="40,40 60,40 75,90 25,90" fill="url(#facet-cyan)" opacity="0.8" stroke="#fff" stroke-width="0.5"/>
                <polygon points="50,40 60,40 75,90 50,90" fill="url(#facet-dark)" opacity="0.6"/>
                <polygon points="25,90 75,90 60,120 40,120" fill="url(#facet-light)" stroke="#f3e5ab" stroke-width="0.5"/>
                <polygon points="50,90 75,90 60,120 50,120" fill="url(#facet-dark)" opacity="0.7"/>
                <polygon points="40,25 60,25" stroke="#f3e5ab" stroke-width="1"/>
                
                <path d="M 45 20 Q 35 0 25 -10" fill="none" stroke="var(--gold-light)" stroke-width="1.2" opacity="0.8" style="filter: drop-shadow(0 0 5px #f3e5ab);"/>
                <path d="M 55 20 Q 65 -5 75 -5" fill="none" stroke="var(--gold-light)" stroke-width="1.2" opacity="0.8" style="filter: drop-shadow(0 0 5px #f3e5ab);"/>
            </g>

            <g id="base-lotus">
                <g stroke="var(--gold-solid)" stroke-width="1.2" fill="none" opacity="0.4" filter="url(#fine-glow)">
                    <path d="M0,0 C-12,-20 -18,-40 0,-55 C18,-40 12,-20 0,0 Z" transform="rotate(0)" />
                    <path d="M0,0 C-12,-20 -18,-40 0,-55 C18,-40 12,-20 0,0 Z" transform="rotate(72)" />
                    <path d="M0,0 C-12,-20 -18,-40 0,-55 C18,-40 12,-20 0,0 Z" transform="rotate(144)" />
                    <path d="M0,0 C-12,-20 -18,-40 0,-55 C18,-40 12,-20 0,0 Z" transform="rotate(216)" />
                    <path d="M0,0 C-12,-20 -18,-40 0,-55 C18,-40 12,-20 0,0 Z" transform="rotate(288)" />
                </g>
            </g>
        </defs>

        <g id="bottom-lotus-field">
            <use href="#base-lotus" x="350" y="850" transform="scale(1.2)" />
            <use href="#base-lotus" x="650" y="850" transform="scale(1.2)" />
            <use href="#base-lotus" x="500" y="880" transform="scale(1.8)" opacity="0.8" />
        </g>

        <g id="petal-layer"></g>

        <g id="three-pure-vases">
            <ellipse cx="500" cy="980" rx="140" ry="25" fill="#010103" opacity="0.6" filter="blur(6px)"/>
            
            <use href="#treasure-vase" x="370" y="865" />
            
            <use href="#treasure-vase" x="450" y="875" />
            
            <use href="#treasure-vase" x="530" y="865" />
        </g>

    </svg>

    <script>
        // --- 1. 星空畫布 ---
        const canvas = document.getElementById('starCanvas');
        const ctx = canvas.getContext('2d');
        let width, height, stars = [];

        function resize() { width = window.innerWidth; height = window.innerHeight; canvas.width = width; canvas.height = height; }
        window.addEventListener('resize', resize); resize();

        const STAR_COLORS = ['#8ba89c', '#ffffff', '#f3e5ab'];
        for (let i = 0; i < 120; i++) {
            stars.push({ x: (Math.random() - 0.5) * 2000, y: (Math.random() - 0.5) * 2000, z: Math.random() * 2000, color: STAR_COLORS[Math.floor(Math.random() * STAR_COLORS.length)], s: Math.random() * 2.5 + 0.5 });
        }

        function renderStars() {
            ctx.clearRect(0, 0, width, height);
            ctx.globalCompositeOperation = 'screen';
            stars.forEach(s => {
                s.z -= 0.5;
                if (s.z <= 0) { s.z = 2000; s.x = (Math.random() - 0.5) * 2000; s.y = (Math.random() - 0.5) * 2000; }
                let sc = 400 / (400 + s.z);
                let drawY = (height / 2) + s.y * sc;
                if (drawY > height * 0.75) return;
                ctx.beginPath();
                ctx.arc((width / 2) + s.x * sc, drawY, s.s * sc, 0, Math.PI * 2);
                ctx.fillStyle = s.color;
                ctx.globalAlpha = Math.min(1, sc * 2.5) * 0.5;
                ctx.fill();
                ctx.globalAlpha = 1;
            });
            requestAnimationFrame(renderStars);
        }
        renderStars();

        // --- 2. 借花獻佛動態落花 ---
        const petalLayer = document.getElementById('petal-layer');
        const activePetals = [];

        function createPetal() {
            if (activePetals.length >= 30) return;
            const useTag = document.createElementNS('http://www.w3.org/2000/svg', 'use');
            useTag.setAttributeNS('http://www.w3.org/1999/xlink', 'href', '#organic-mandala'); 
            
            const x = Math.random() * 1200 - 100;
            const y = -60;
            // 控制花朵大小
            const scale = 0.5 + Math.random() * 0.4;
            const speedY = 0.8 + Math.random() * 1.2;
            const speedX = (Math.random() - 0.5) * 0.6;
            // 賦予不規則的自轉
            const rotSpeed = (Math.random() - 0.5) * 1.5;
            let rotation = Math.random() * 360;
            let swayStep = Math.random() * 100;

            useTag.setAttribute('transform', `translate(${x}, ${y}) scale(${scale}) rotate(${rotation})`);
            petalLayer.appendChild(useTag);

            activePetals.push({ 
                element: useTag, x: x, y: y, scale: scale, 
                speedY: speedY, speedX: speedX, rotSpeed: rotSpeed, 
                rotation: rotation, swayStep: swayStep 
            });
        }

        function updatePetals() {
            for (let i = activePetals.length - 1; i >= 0; i--) {
                const p = activePetals[i];
                p.y += p.speedY; 
                p.swayStep += 0.02; 
                p.x += p.speedX + Math.sin(p.swayStep) * 0.5; 
                p.rotation += p.rotSpeed;
                
                p.element.setAttribute('transform', `translate(${p.x}, ${p.y}) scale(${p.scale}) rotate(${p.rotation})`);
                
                // 落地消散
                if (p.y > 980) { 
                    p.element.remove(); 
                    activePetals.splice(i, 1); 
                }
            }
            // 控制法雨的密度與頻率
            if (Math.random() < 0.06) createPetal();
            
            requestAnimationFrame(updatePetals);
        }
        
        // 啟動曼陀羅華飄落
        updatePetals();
    </script>
</body>
</html>
