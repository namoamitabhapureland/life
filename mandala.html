<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>華藏月相 ‧ 華嚴五位演化</title>
    <style>
        body { 
            background: #010204; color: #fff; margin: 0; padding: 40px;
            display: flex; flex-wrap: wrap; justify-content: center; gap: 40px;
            font-family: "PingFang TC", serif;
        }
        .svg-container {
            width: 280px; height: 320px; position: relative;
            display: flex; flex-direction: column; align-items: center;
            background: rgba(255,255,255,0.02); border-radius: 12px; 
            border: 1px solid rgba(212,175,55,0.1); padding-top: 20px;
        }
        .label { margin-top: 25px; color: #f3e5ab; letter-spacing: 5px; font-size: 0.9rem; font-weight: bold; }
        .desc { font-size: 0.75rem; color: #8ba89c; margin-top: 8px; letter-spacing: 2px; }
    </style>
</head>
<body>

    <svg style="width:0; height:0; position:absolute;">
        <defs>
            <radialGradient id="rg-unified-gold" cx="50%" cy="50%" r="50%">
                <stop offset="0%" stop-color="#f3e5ab" stop-opacity="0.8"/>
                <stop offset="100%" stop-color="#d4af37" stop-opacity="0.1"/>
            </radialGradient>
            <filter id="glow-light"><feGaussianBlur stdDeviation="2" result="blur"/><feComposite in="SourceGraphic" in2="blur" operator="over"/></filter>
            <filter id="glow-heavy"><feGaussianBlur stdDeviation="4" result="blur"/><feComposite in="SourceGraphic" in2="blur" operator="over"/></filter>
        </defs>
    </svg>

    <div class="svg-container">
        <svg viewBox="-150 -150 300 300" style="filter: drop-shadow(0 0 10px rgba(243,229,171,0.2));">
            <circle cx="0" cy="0" r="60" fill="url(#rg-unified-gold)" stroke="#f0d060" stroke-width="1.5" opacity="0.5"/>
            <g transform="scale(2.2) translate(-50, -50)">
                <path d="M44 32 L44 68 M56 32 L56 68" stroke="#fffce0" stroke-width="2.5" fill="none"/>
                <g stroke="#fffce0" stroke-width="2.5" stroke-linecap="round">
                    <line x1="40" y1="30" x2="44" y2="32" /><line x1="60" y1="30" x2="56" y2="32" />
                    <line x1="40" y1="70" x2="44" y2="68" /><line x1="60" y1="70" x2="56" y2="68" />
                </g>
                <g stroke="#fffce0" stroke-width="2.5" stroke-linecap="round" fill="none">
                    <path d="M50 29 L50 4 M40 30 L50 4 L60 30"/><path d="M50 71 L50 96 M40 70 L50 96 L60 70"/>
                </g>
                <g transform="translate(50, 50) scale(0.65) translate(-50, -50)">
                    <polygon points="50,33 52.5,42.5 62,38 57.5,47.5 67,50 57.5,52.5 62,62 52.5,57.5 50,67 47.5,57.5 38,62 42.5,52.5 33,50 42.5,47.5 38,38 47.5,42.5" 
                             fill="url(#rg-unified-gold)" stroke="#fffce0" stroke-width="1.0" opacity="0.95"/>
                    <g stroke="#fffce0" stroke-width="1.2" stroke-linecap="round" fill="none">
                        <path d="M 50 33 L 62 38 L 67 50 L 62 62 L 50 67 L 38 62 L 33 50 L 38 38 Z" />
                        <line x1="50" y1="50" x2="50" y2="33"/> <line x1="50" y1="50" x2="62" y2="38"/>
                        <line x1="50" y1="50" x2="67" y2="50"/> <line x1="50" y1="50" x2="62" y2="62"/>
                        <line x1="50" y1="50" x2="50" y2="67"/> <line x1="50" y1="50" x2="38" y2="62"/>
                        <line x1="50" y1="50" x2="33" y2="50"/> <line x1="50" y1="50" x2="38" y2="38"/>
                        <line x1="50" y1="33" x2="67" y2="50"/> <line x1="67" y1="50" x2="50" y2="67"/>
                        <line x1="50" y1="67" x2="33" y2="50"/> <line x1="33" y1="50" x2="50" y2="33"/>
                    </g>
                    <circle cx="50" cy="50" r="8" fill="none" stroke="#fffce0" stroke-width="2.5"/><circle cx="50" cy="50" r="4" fill="#fffce0"/>
                </g>
            </g>
            <text x="0" y="120" text-anchor="middle" fill="#8ba89c" font-size="22" font-family="monospace" letter-spacing="4">045</text>
        </svg>
        <div class="label">【 初發心 ‧ 信 】</div><div class="desc">金剛杵立 ‧ 信根深扎</div>
    </div>

    <div class="svg-container">
        <svg viewBox="-150 -150 300 300" style="filter: drop-shadow(0 0 15px rgba(243,229,171,0.3));">
            <circle cx="0" cy="0" r="65" fill="url(#rg-unified-gold)" stroke="#f0d060" stroke-width="1.5" opacity="0.6"/>
            <g transform="scale(2.4) translate(-50, -50)">
                <g transform="translate(50, 40) scale(0.85) translate(-50, -50)">
                    <polygon points="50,33 52.5,42.5 62,38 57.5,47.5 67,50 57.5,52.5 62,62 52.5,57.5 50,67 47.5,57.5 38,62 42.5,52.5 33,50 42.5,47.5 38,38 47.5,42.5" fill="url(#rg-unified-gold)" stroke="#fffce0" stroke-width="1.0" opacity="0.95"/>
                    <g stroke="#fffce0" stroke-width="1.2" stroke-linecap="round" fill="none">
                        <path d="M 50 33 L 62 38 L 67 50 L 62 62 L 50 67 L 38 62 L 33 50 L 38 38 Z" />
                        <line x1="50" y1="50" x2="50" y2="33"/> <line x1="50" y1="50" x2="62" y2="38"/>
                        <line x1="50" y1="50" x2="67" y2="50"/> <line x1="50" y1="50" x2="62" y2="62"/>
                        <line x1="50" y1="50" x2="50" y2="67"/> <line x1="50" y1="50" x2="38" y2="62"/>
                        <line x1="50" y1="50" x2="33" y2="50"/> <line x1="50" y1="50" x2="38" y2="38"/>
                        <line x1="50" y1="33" x2="67" y2="50"/> <line x1="67" y1="50" x2="50" y2="67"/>
                        <line x1="50" y1="67" x2="33" y2="50"/> <line x1="33" y1="50" x2="50" y2="33"/>
                    </g>
                    <circle cx="50" cy="50" r="8" fill="none" stroke="#fffce0" stroke-width="2.5"/><circle cx="50" cy="50" r="4" fill="#fffce0"/>
                </g>
                <g stroke="#fffce0" stroke-width="1.2" fill="none" stroke-linejoin="round">
                    <path d="M 30 68 L 70 68 L 70 65 L 67 65 L 67 62 L 64 62 L 64 59 L 61 59 L 61 56 L 39 56 L 39 59 L 36 59 L 36 62 L 33 62 L 33 65 L 30 65 Z"/>
                    <line x1="33" y1="65" x2="67" y2="65"/><line x1="36" y1="62" x2="64" y2="62"/><line x1="39" y1="59" x2="61" y2="59"/>
                </g>
            </g>
            <text x="0" y="120" text-anchor="middle" fill="#8ba89c" font-size="22" font-family="monospace" letter-spacing="4">120</text>
        </svg>
        <div class="label">【 安立境 ‧ 住 】</div><div class="desc">蓮台高築 ‧ 定力安住</div>
    </div>

    <div class="svg-container">
        <svg viewBox="-150 -150 300 300" style="filter: drop-shadow(0 0 18px rgba(212,175,55,0.4));">
            <circle cx="0" cy="0" r="75" fill="none" stroke="#f0d060" stroke-width="2" opacity="0.8"/>
            <circle cx="0" cy="0" r="70" fill="url(#rg-unified-gold)" opacity="0.7"/>
            <g transform="scale(2.6) translate(-50, -50)">
                <polygon points="50,25 54,41 68,32 60,46 75,50 60,54 68,68 54,59 50,75 46,59 32,68 40,54 25,50 40,46 32,32 46,41" 
                         fill="url(#rg-unified-gold)" stroke="#fffce0" stroke-width="0.8"/>
                <g stroke="#fffce0" stroke-width="1.2" stroke-linecap="round" fill="none" opacity="0.9">
                    <path d="M 50 25 L 68 32 L 75 50 L 68 68 L 50 75 L 32 68 L 25 50 L 32 32 Z" filter="url(#glow-light)"/>
                    <line x1="50" y1="50" x2="50" y2="25"/><line x1="50" y1="50" x2="68" y2="32"/>
                    <line x1="50" y1="50" x2="75" y2="50"/><line x1="50" y1="50" x2="68" y2="68"/>
                    <line x1="50" y1="50" x2="50" y2="75"/><line x1="50" y1="50" x2="32" y2="68"/>
                    <line x1="50" y1="50" x2="25" y2="50"/><line x1="50" y1="50" x2="32" y2="32"/>
                </g>
                <circle cx="50" cy="50" r="8" fill="none" stroke="#fffce0" stroke-width="2.5"/><circle cx="50" cy="50" r="4" fill="#fffce0"/>
            </g>
            <text x="0" y="120" text-anchor="middle" fill="#f3e5ab" font-size="24" font-family="monospace" letter-spacing="4">240</text>
        </svg>
        <div class="label">【 萬行起 ‧ 行 】</div><div class="desc">八芒齊綻 ‧ 願力外顯</div>
    </div>

    <div class="svg-container">
        <svg viewBox="-150 -150 300 300" style="filter: drop-shadow(0 0 25px rgba(212,175,55,0.5));">
            <circle cx="0" cy="0" r="85" fill="none" stroke="#fffce0" stroke-width="1" opacity="0.5"/>
            <circle cx="0" cy="0" r="80" fill="url(#rg-unified-gold)" stroke="#f0d060" stroke-width="2" opacity="0.8"/>
            <g transform="scale(2.7) translate(-50, -50)">
                <path d="M 50 33 L 62 38 L 67 50 L 62 62 L 50 67 L 38 62 L 33 50 L 38 38 Z" 
                      transform="translate(50, 50) scale(1.35) translate(-50, -50)" 
                      stroke="#fffce0" stroke-width="1.2" fill="none" opacity="0.8"/>
                <polygon points="50,33 52.5,42.5 62,38 57.5,47.5 67,50 57.5,52.5 62,62 52.5,57.5 50,67 47.5,57.5 38,62 42.5,52.5 33,50 42.5,47.5 38,38 47.5,42.5" 
                         fill="url(#rg-unified-gold)" stroke="#fffce0" stroke-width="1.0" opacity="0.95"/>
                <g stroke="#fffce0" stroke-width="1.2" stroke-linecap="round" fill="none">
                    <path d="M 50 33 L 62 38 L 67 50 L 62 62 L 50 67 L 38 62 L 33 50 L 38 38 Z" filter="url(#glow-light)"/>
                    <line x1="50" y1="50" x2="50" y2="33"/> <line x1="50" y1="50" x2="62" y2="38"/>
                    <line x1="50" y1="50" x2="67" y2="50"/> <line x1="50" y1="50" x2="62" y2="62"/>
                    <line x1="50" y1="50" x2="50" y2="67"/> <line x1="50" y1="50" x2="38" y2="62"/>
                    <line x1="50" y1="50" x2="33" y2="50"/> <line x1="50" y1="50" x2="38" y2="38"/>
                    <line x1="50" y1="33" x2="67" y2="50"/> <line x1="67" y1="50" x2="50" y2="67"/>
                    <line x1="50" y1="67" x2="33" y2="50"/> <line x1="33" y1="50" x2="50" y2="33"/>
                </g>
                <circle cx="50" cy="50" r="8" fill="none" stroke="#fffce0" stroke-width="2.5"/><circle cx="50" cy="50" r="4" fill="#fffce0"/>
            </g>
            <text x="0" y="120" text-anchor="middle" fill="#d4af37" font-size="26" font-weight="bold" font-family="monospace" letter-spacing="4">360</text>
        </svg>
        <div class="label">【 普迴向 ‧ 迴 】</div><div class="desc">內外八角 ‧ 互攝互入</div>
    </div>

    <div class="svg-container" style="border-color: rgba(212,175,55,0.5); background: rgba(212,175,55,0.05); box-shadow: 0 0 30px rgba(212,175,55,0.1);">
        <svg viewBox="-150 -150 300 300" style="filter: drop-shadow(0 0 35px rgba(212,175,55,0.8));">
            <circle cx="0" cy="0" r="95" fill="none" stroke="#fffce0" stroke-width="0.5" opacity="0.6"/>
            <circle cx="0" cy="0" r="90" fill="url(#rg-unified-gold)" stroke="#f0d060" stroke-width="2" opacity="0.9"/>
            <g transform="scale(2.9) translate(-50, -50)">
                <polygon points="50,20 54,40 70,30 60,46 80,50 60,54 70,70 54,60 50,80 46,60 30,70 40,54 20,50 40,46 30,30 46,40" 
                         fill="url(#rg-unified-gold)" stroke="#fffce0" stroke-width="1.0" filter="url(#glow-light)"/>
                <g stroke="#fffce0" stroke-width="1.1" stroke-linecap="round" fill="none">
                    <path d="M 50 20 L 70 30 L 80 50 L 70 70 L 50 80 L 30 70 L 20 50 L 30 30 Z" filter="url(#glow-light)"/>
                    <line x1="50" y1="50" x2="50" y2="20"/><line x1="50" y1="50" x2="80" y2="50"/><line x1="50" y1="50" x2="50" y2="80"/><line x1="50" y1="50" x2="20" y2="50"/>
                    <line x1="50" y1="50" x2="70" y2="30"/><line x1="50" y1="50" x2="70" y2="70"/><line x1="50" y1="50" x2="30" y2="70"/><line x1="50" y1="50" x2="30" y2="30"/>
                    <path d="M 50 20 L 80 50 L 50 80 L 20 50 Z" opacity="0.8"/>
                    <path d="M 70 30 L 70 70 L 30 70 L 30 30 Z" opacity="0.8"/>
                </g>
                <circle cx="50" cy="50" r="8" fill="none" stroke="#fffce0" stroke-width="2.5"/><circle cx="50" cy="50" r="4" fill="#fffce0"/>
            </g>
            <text x="0" y="125" text-anchor="middle" fill="#fff" font-size="30" font-weight="bold" font-family="monospace" letter-spacing="5" filter="url(#glow-heavy)">450</text>
        </svg>
        <div class="label" style="color: #fffce0; font-size: 1rem; text-shadow: 0 0 10px #d4af37;">【 十地圓滿 ‧ 地 】</div>
        <div class="desc" style="color: #f3e5ab;">無漏金剛 ‧ 悲智雙運</div>
    </div>

</body>
</html>
