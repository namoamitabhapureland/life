<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
        <link rel="manifest" href="manifest_en.json">
    <title>Amitabha Pure Land ‧ Golden Body & Celestial Realm</title>
    <style>
        :root {
            --bg-deep: #010103; 
            --gold-light: #f3e5ab; 
            --gold-solid: #d4af37; 
            --cyan: #8ba89c; 
        }
        * { box-sizing: border-box; user-select: none; margin: 0; padding: 0; outline: none; }
        body { 
            background: radial-gradient(circle at 50% 50%, #0a0e14 0%, var(--bg-deep) 100%); 
            font-family: "PingFang TC", "Microsoft JhengHei", serif;
            overflow: hidden; touch-action: none; width: 100vw; height: 100dvh;
            display: flex; flex-direction: column; justify-content: center; align-items: center; color: #fff;
            transition: background 2s ease;
        }

        /* Background Canvas */
        canvas { position: absolute; inset: 0; }
        #starCanvas { z-index: 1; pointer-events: none; transition: filter 2s ease; }
        #waterCanvas { z-index: 2; mix-blend-mode: screen; opacity: 0.6; pointer-events: none; transition: opacity 2s ease; }

        /* Navigation */
        .nav-top { position: absolute; top: max(20px, env(safe-area-inset-top)); left: 20px; z-index: 1000; }
        .nav-btn { color: var(--gold-light); display: flex; align-items: center; gap: 6px; cursor: pointer; background: rgba(0,0,0,0.3); padding: 8px 16px; border-radius: 20px; border: 1px solid rgba(212,175,55,0.2); backdrop-filter: blur(5px); font-size: 0.8rem; letter-spacing: 1px; transition: 0.4s; opacity: 0.7; }
        .nav-btn:hover { opacity: 1; border-color: var(--gold-solid); }

        /* Practice Info Bar */
        .info-top { position: absolute; top: max(20px, env(safe-area-inset-top)); right: 20px; z-index: 1000; display: flex; flex-direction: column; align-items: flex-end; gap: 8px; }
        .info-row { display: flex; gap: 15px; align-items: center; }
        .streak-text { font-size: 0.75rem; color: var(--gold-light); letter-spacing: 1px; opacity: 0.9; text-shadow: 0 0 5px rgba(212,175,55,0.5); }
        .info-icon { cursor: pointer; opacity: 0.8; display: flex; align-items: center; transition: 0.3s; filter: drop-shadow(0 0 5px rgba(212,175,55,0.5)); }
        .info-icon:hover { opacity: 1; filter: drop-shadow(0 0 10px var(--gold-solid)); }

                
        #buddha-scene {
            position: absolute; inset: 0; z-index: 10;
            margin: 0 auto;
            display: flex; justify-content: center; align-items: center;
            transform-origin: 50% 80%; 
            transition: transform 4s cubic-bezier(0.25, 1, 0.5, 1);
            pointer-events: none;
            width: 100%; max-width: 650px; 
        }
        #buddha-scene.bowing {
            transform: scale(1.35) translateY(5%);
        }


              
        #burst-container {
            position: absolute; inset: 0; /* 🌟 這裡改成 inset: 0; 確保金光也滿版置中 */
            display: flex; justify-content: center; align-items: center;
            z-index: 5; pointer-events: none;
        }

        .screen-flash {
            position: absolute; inset: 0; 
            background: radial-gradient(circle at 50% 50%, #fff 0%, #ffdf00 40%, transparent 80%);
            opacity: 1; pointer-events: none; z-index: 100; mix-blend-mode: screen;
            animation: flash-fade 2.5s cubic-bezier(0.1, 0.9, 0.2, 1) forwards;
        }
        @keyframes flash-fade { 0% { opacity: 1; transform: scale(0.8); } 100% { opacity: 0; transform: scale(1.5); } }
        .gold-ray {
            position: absolute; width: 3px; height: 100vh;
            background: linear-gradient(to top, transparent, #FFD700, #FFFFFF, #FFD700, transparent);
            box-shadow: 0 0 20px #FFD700, 0 0 10px #FFFFFF;
            opacity: 0; transform-origin: center;
        }
        @keyframes ray-burst { 0% { transform: scaleY(0.1) rotate(var(--rot)) translateY(0); opacity: 0; } 20% { opacity: 1; } 100% { transform: scaleY(2) rotate(var(--rot)) translateY(-100vh); opacity: 0; } }

        /* Buddha Floating Animation */
        .buddha-breathe {
            width: 100%; height: auto;
            animation: floating 8s ease-in-out infinite alternate;
            position: relative; 
        }
        @keyframes floating {
            0% { transform: translateY(0px); filter: drop-shadow(0 5px 15px rgba(243,229,171,0.2)); }
            100% { transform: translateY(-30px); filter: drop-shadow(0 35px 50px rgba(243,229,171,0.6)); }
        }

        /* Halo Animation */
        .halo-pulse { transform-origin: 500px 245px; animation: halo-anim 4s infinite alternate ease-in-out; }
        @keyframes halo-anim { 0% { transform: scale(0.95); opacity: 0.6; stroke-width: 1.5; filter: drop-shadow(0 0 15px rgba(255,215,0,0.4)); } 100% { transform: scale(1.02); opacity: 1; stroke-width: 3.0; filter: drop-shadow(0 0 35px rgba(255,215,0,0.8)); } }

        /* Incense State */
        body.incense-on #starCanvas { filter: brightness(2) drop-shadow(0 0 5px #fff); }
        body.incense-on #waterCanvas { opacity: 0.9; }
        body.incense-on #censer-group { opacity: 1; transform: translateY(0); }

        #censer-group { opacity: 0; transform: translateY(20px); transition: all 1.5s cubic-bezier(0.25, 1, 0.5, 1); }
        .incense-glow { animation: glow-pulse 1.5s infinite alternate ease-in-out; }
        @keyframes glow-pulse { 0% { r: 3.5px; opacity: 0.8; filter: drop-shadow(0 0 6px #ff4500); } 100% { r: 5px; opacity: 1; filter: drop-shadow(0 0 15px #ffaa00); } }

        /* Smoke Effects */
        #smoke-container { position: absolute; inset: 0; pointer-events: none; z-index: 15; overflow: hidden; }
        .smoke-fine { position: absolute; width: 8px; height: 60px; background: linear-gradient(to top, rgba(200, 220, 240, 0.4), transparent); border-radius: 4px; filter: blur(4px); opacity: 0; animation: smoke-rise-fine 4s cubic-bezier(0.4, 0.1, 0.4, 1) forwards; }
        @keyframes smoke-rise-fine { 0% { transform: translateY(0) scaleX(1); opacity: 0; } 20% { opacity: 0.7; } 100% { transform: translateY(-40vh) scaleX(2) translateX(var(--drift)); opacity: 0; } }
        .smoke-diffused { position: absolute; width: 40px; height: 40px; background: radial-gradient(circle, rgba(180, 200, 220, 0.15) 0%, transparent 70%); border-radius: 50%; filter: blur(12px); opacity: 0; animation: smoke-rise-diffused 7s cubic-bezier(0.2, 0.1, 0.8, 1) forwards; }
        @keyframes smoke-rise-diffused { 0% { transform: translateY(0) scale(1) translateX(0); opacity: 0; } 30% { opacity: 0.6; } 100% { transform: translateY(-60vh) scale(6) translateX(var(--drift)); opacity: 0; } }

        /* Bottom Control Panel */
        .ritual-container { position: absolute; bottom: max(30px, env(safe-area-inset-bottom)); display: flex; flex-direction: column; align-items: center; width: 100%; z-index: 100; }
        #blessing-text { height: 25px; margin-bottom: 20px; color: var(--gold-light); font-size: 1.1rem; letter-spacing: 4px; text-shadow: 0 0 20px rgba(243,229,171,0.9), 0 0 10px #fff; opacity: 0; pointer-events: none; white-space: nowrap; }
        @keyframes float-blessing { 0% { opacity: 0; transform: translateY(15px); filter: brightness(1.5); } 20% { opacity: 1; transform: translateY(0); filter: brightness(1.5); } 80% { opacity: 1; transform: translateY(-5px); filter: brightness(1); } 100% { opacity: 0; transform: translateY(-15px); filter: brightness(1); } }

        /* ✨ 英文版底部控制區：確保換行後依舊置中與對齊 */
.ritual-panel { 
    display: flex; 
    gap: 20px; 
    flex-wrap: wrap; 
    justify-content: center; 
    width: 100%;
    padding: 0 20px;
}

.ritual-btn { 
    color: var(--gold-light); 
    font-size: 0.9rem; 
    letter-spacing: 1px; 
    cursor: pointer; 
    transition: all 0.4s; 
    padding: 12px 20px; 
    background: rgba(255,255,255,0.05); 
    border: 1px solid rgba(212,175,55,0.5); 
    border-radius: 25px; 
    backdrop-filter: blur(8px); 
    box-shadow: 0 4px 15px rgba(0,0,0,0.3); 
    font-weight: bold; 
    text-shadow: 0 0 8px rgba(243,229,171,0.6); 
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    min-width: 145px; /* 🛑 確保兩顆按鈕寬度一致，換行堆疊時才莊嚴 */
}

/* 保持發光與啟動狀態不變 */
.ritual-btn:hover, .ritual-btn.active { 
    color: #fff; 
    text-shadow: 0 0 15px var(--gold-light); 
    border-color: rgba(212,175,55,0.9); 
    background: rgba(212,175,55,0.2); 
    box-shadow: 0 0 20px rgba(212,175,55,0.4); 
}

        .chant-hint { margin-top: 18px; font-size: 0.8rem; color: rgba(255,255,255,0.8); letter-spacing: 2px; pointer-events: none; text-shadow: 0 0 5px rgba(255,255,255,0.3); }

        /* Milestone & Modals Styles (The Fixed Obsidian-Gold Edition) */
        .modal-overlay { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.88); backdrop-filter: blur(12px); 
            z-index: 10000; display: none; justify-content: center; align-items: center; 
            opacity: 0; transition: opacity 0.5s ease; pointer-events: none; 
        }
        .modal-overlay.show { display: flex !important; opacity: 1 !important; pointer-events: auto !important; }
       /* ✨ 修改 modal-box 樣式，增加滾動支持 */
.modal-box { 
    width: 85%; 
    max-width: 340px; 
    max-height: 80vh; /* 🛑 限制最大高度為螢幕的 80%，防止超出 */
    overflow-y: auto; /* 🛑 開啟垂直滾動 */
    background: linear-gradient(135deg, #151515, #050505); 
    border: 1px solid var(--gold-solid); 
    border-radius: 20px; 
    padding: 35px 25px; 
    text-align: center; 
    box-shadow: 0 0 50px rgba(212,175,55,0.3); 
    transform: scale(0.9); 
    transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1); 
    
    /* 自定義隱藏式極細金色滾動條 */
    scrollbar-width: thin;
    scrollbar-color: var(--gold-solid) transparent;
}

.modal-box::-webkit-scrollbar { width: 3px; }
.modal-box::-webkit-scrollbar-thumb { background: var(--gold-solid); border-radius: 10px; }
.modal-box::-webkit-scrollbar-track { background: transparent; }

        .modal-overlay.show .modal-box { transform: scale(1); }
        .m-title { color: var(--gold-light); font-size: 1.2rem; letter-spacing: 2px; margin-bottom: 15px; text-shadow: 0 0 15px rgba(212,175,55,0.5); font-weight: bold;}
        .m-divider { width: 40px; height: 1px; background: var(--gold-solid); margin: 0 auto 20px; opacity: 0.5; }
        .m-text { font-size: 0.95rem; line-height: 1.8; margin-bottom: 30px; letter-spacing: 1px; color: #e0e0e0; text-align: center; }
        .m-btn-prime { background: linear-gradient(135deg, rgba(212,175,55,0.2), rgba(212,175,55,0.05)); border: 1px solid var(--gold-solid); color: var(--gold-light); padding: 12px; border-radius: 20px; font-size: 0.95rem; cursor: pointer; transition: all 0.3s; letter-spacing: 2px; width: 100%; box-shadow: 0 0 15px rgba(212,175,55,0.1); }
        .m-btn-prime:hover { background: rgba(212,175,55,0.2); }

/* 🕯️ 燭火微動態 */
.candle-flicker {
    transform-origin: center bottom;
    animation: flicker-anim 3s ease-in-out infinite alternate;
}
@keyframes flicker-anim {
    0% { transform: scale(0.95) rotate(-1.5deg); opacity: 0.85; }
    50% { transform: scale(1.02) rotate(1deg); opacity: 1; }
    100% { transform: scale(0.98) rotate(0deg); opacity: 0.9; }
}

        /* ✨ 天雨曼陀羅華：下落與消散動畫 */
        @keyframes heavenlyFall {
            0% { transform: translate(var(--startX), var(--startY)) scale(var(--size)) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            80% { opacity: 1; }
            100% { transform: translate(var(--endX), var(--endY)) scale(var(--size)) rotate(var(--rot)); opacity: 0; }
        }
        .heavenly-flower {
            animation: heavenlyFall var(--dur) linear forwards; 
            transform-origin: center center;
            pointer-events: none;
        }
        /* 統一旋轉中心，解決跑位問題 */
@keyframes mandala-rotate-sync {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
}

@keyframes mandala-rotate-sync {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
}

@keyframes mandala-breathe-glow {
    0% { opacity: 0.6; filter: drop-shadow(0 0 10px rgba(255,215,0,0.5)); }
    100% { opacity: 1; filter: drop-shadow(0 0 35px rgba(255,215,0,1)); }
}

.mandala-sync-container {
    transform-origin: 500px 245px; /* 關鍵：嚴格對齊頭部圓心 */
    animation: mandala-rotate-sync 180s linear infinite;
}

.mandala-glow-layer {
    animation: mandala-breathe-glow 8s ease-in-out infinite alternate;
}



    </style>

    <style>@keyframes slow-spin { 100% { transform: rotate(360deg); } }</style>

<script>
    // 🌟 1. 寫死英文版專屬資料庫真金鑰匙，拒絕任何誤判風險 🌟
    const STORAGE_KEY = 'PX_EN_V15.0'; 
    
    let db = null;
    try {
        db = JSON.parse(localStorage.getItem(STORAGE_KEY));
        if (!db || typeof db !== 'object') db = null;
        
        // 舊行者無損防護
        if (db && !db.dailyTasks) db.dailyTasks = [];
        if (db && !db.visitedRealms) db.visitedRealms = [];
        if (db && !db.treasures) db.treasures = { sword: 0, vase: 0, jewel: 0, lotus_lamp: 0, dharma_wheel: 0, white_lotus: 0, indra_net: 0 };
        if (db && !db.bodhiRecords) db.bodhiRecords = [];
        if (db && !db.bowData) db.bowData = { streakCount: 0, lastLoginDate: "", lastRewardStreak: 0 }; // ✨ 補齊舊行者的頂禮抽屜
    } catch(e) { 
        db = null; 
    }

    if (!db) {
        // 新行者創世預設值
        db = { 
            name: "", totalNian: 0, points: 0, dailyTasks: [], todayCount: 0, lastDate: new Date().toLocaleDateString(), 
            currentRank: "", streakDays: 0, lastNianDate: "",
            treasures: { sword: 0, vase: 0, jewel: 0, lotus_lamp: 0, dharma_wheel: 0, white_lotus: 0, indra_net: 0 },
            bodhiRecords: [], visitedRealms: [],
            // ✨ 新行者的頂禮抽屜
            bowData: { streakCount: 0, lastLoginDate: "", lastRewardStreak: 0 }
        };
    }
    
    function saveDB() { localStorage.setItem(STORAGE_KEY, JSON.stringify(db)); }

    // 🌟 2. 頂禮彌陀：修持天數引擎 🌟
    function handleStreak() {
        const now = new Date();
        const todayStr = now.toDateString(); 
        
        if (!db.bowData) db.bowData = { streakCount: 0, lastLoginDate: "", lastRewardStreak: 0 };
        
        if (db.bowData.lastLoginDate !== todayStr) {
            db.bowData.streakCount++; 
            db.bowData.lastLoginDate = todayStr;
            
            if (db.bowData.streakCount % 10 === 0 && db.bowData.lastRewardStreak !== db.bowData.streakCount) {
                db.points += 100;
                db.bowData.lastRewardStreak = db.bowData.streakCount; 
                
                let title = "Ten Days: Initial Aspiration";
                if (db.bowData.streakCount >= 100000) title = "Incalculable: To the End of Time";
                else if (db.bowData.streakCount >= 10000) title = "Ten Thousand Days: Non-Retrogression";
                else if (db.bowData.streakCount >= 1000) title = "Thousand Days: Samadhi Attainment";
                else if (db.bowData.streakCount >= 100) title = "Hundred Days: Constant Mindfulness";
                
                let currentName = "Practitioner"; 
if (db.name && db.name.trim() !== "") {
    currentName = db.name;
}
document.getElementById('milestone-name-display').innerText = currentName;

                
                setTimeout(() => {
                    const bar = document.getElementById('streak-bar');
                    if (bar) bar.style.width = '100%';
                    
                    setTimeout(() => {
                        document.getElementById('milestone-title').innerText = `【 ${title} 】`;
                        document.getElementById('milestone-text').innerHTML = `Completed ${db.bowData.streakCount} days of Pure Visualization.<br><b style='color:var(--gold-solid)'>+100</b> merits added to the Dojo.`;
                        
                        const modal = document.getElementById('milestone-modal');
                        modal.style.display = 'flex';
                        void modal.offsetWidth; 
                        modal.classList.add('show');
                    }, 800);
                }, 500);
                
                saveDB();
                document.getElementById('streak-text').innerText = `Practice: Day ${db.bowData.streakCount}`;
                return;
            }
            saveDB();
        }
        
        document.getElementById('streak-text').innerText = `Practice: Day ${db.bowData.streakCount || 1}`;
        const bar = document.getElementById('streak-bar');
        if (bar) {
            if (db.bowData.streakCount % 10 === 0 && db.bowData.streakCount > 0) {
                bar.style.width = '100%';
            } else {
                bar.style.width = ((db.bowData.streakCount % 10) * 10) + '%';
            }
        }
    }
    // ✨ 專屬：優雅關閉里程碑彈框，並觸發天雨曼陀羅華
    function closeMilestone() {
        const modal = document.getElementById('milestone-modal');
        if (!modal) return;
        
        modal.classList.remove('show');
        
        // 里程碑圓滿，降下金花 45 朵
        if (typeof spawnFlowerRain === 'function') {
            spawnFlowerRain(45);
        }
        
        setTimeout(() => { 
            modal.style.display = 'none'; 
            const bar = document.getElementById('streak-bar');
            if (bar) bar.style.width = '0%';

    function spawnFlowerRain(totalFlowers = 45) {

            { id: 'whiteGoldGradient', size: 1.9, type: 'big', stroke: 'hsla(45, 80%, 90%, 0.8)' }
        ];

        let spawned = 0;
        let interval = setInterval(() => {
            if (spawned >= totalFlowers) {
                clearInterval(interval);
                return;
            }
            spawned++;

            const fType = flowerTypes[Math.floor(Math.random() * flowerTypes.length)];

            const flower = document.createElementNS('http://www.w3.org/2000/svg', 'use');
            flower.setAttribute('href', '#flower-base-model');
            flower.setAttribute('fill', `url(#${fType.id})`);
            flower.setAttribute('stroke', fType.stroke);
            flower.setAttribute('class', 'heavenly-flower');

            const durVal = (Math.random() * 4 + 8); // 8-12秒
            const startX = (Math.random() * 800 + 100);
            const endX = (startX + (Math.random() - 0.5) * 350);
            const endY = (950 + Math.random() * 50); // 落在較低位置消散
            const rot = ((Math.random() - 0.5) * 720) + 'deg';

            flower.style.setProperty('--dur', durVal + 's');
            flower.style.setProperty('--size', fType.size);
            flower.style.setProperty('--startX', startX + 'px');
            flower.style.setProperty('--startY', '-100px');
            flower.style.setProperty('--endX', endX + 'px');
            flower.style.setProperty('--endY', endY + 'px');
            flower.style.setProperty('--rot', rot);

            fallingRain.appendChild(flower);

            // 嚴格釋放記憶體：動畫結束即移除節點，不留殘影
            setTimeout(() => {
                if (flower.parentNode) flower.remove();
            }, durVal * 1000);
        }, 220);
    }

    // 🌟 4. 星空與水面繪製引擎 🌟
    const canvas = document.getElementById('starCanvas'); 
    const ctx = canvas.getContext('2d'); 
    let width, height, stars = [], warpSpeed = 0.5, starScale = 1; 

    function resize() { width = window.innerWidth; height = window.innerHeight; canvas.width = width; canvas.height = height; } 
    window.addEventListener('resize', resize); resize(); 

    const STAR_COLORS = ['#8ba89c', '#ffffff', '#f3e5ab', '#ff9a9e', '#b2dfdb', '#C9A0DC', '#ffeb3b']; 
    for (let i = 0; i < 250; i++) { 
        stars.push({ x: (Math.random() - 0.5) * 2000, y: (Math.random() - 0.5) * 2000, z: Math.random() * 2000, color: STAR_COLORS[Math.floor(Math.random() * STAR_COLORS.length)], s: Math.random() * 2.5 + 0.5 }); 
    } 

    function renderStars() { 
        ctx.fillStyle = 'rgba(1, 1, 3, 0.4)'; 
        ctx.fillRect(0, 0, width, height); 
        ctx.globalCompositeOperation = 'screen'; 
        stars.forEach(s => { 
            s.z -= warpSpeed; 
            if (s.z <= 0) { s.z = 2000; s.x = (Math.random() - 0.5) * 2000; s.y = (Math.random() - 0.5) * 2000; } 
            let sc = 400 / (400 + s.z); 
            let drawY = (height / 2) + s.y * sc; 
            if (drawY > height * 0.75) return; 
            ctx.beginPath(); 
            ctx.arc((width / 2) + s.x * sc, drawY, s.s * sc * starScale, 0, Math.PI * 2); 
            ctx.fillStyle = s.color; 
            ctx.globalAlpha = Math.min(1, sc * 2.5); 
            ctx.fill(); 
            ctx.globalAlpha = 1; 
        }); 
        ctx.globalCompositeOperation = 'source-over'; 
        requestAnimationFrame(renderStars); 
    } 
    renderStars();

    const wCvs = document.getElementById('waterCanvas'), wCtx = wCvs.getContext('2d'); 
    let ww, wh, wTime=0; 
    function resW() { ww=wCvs.width=window.innerWidth; wh=wCvs.height=window.innerHeight; } 
    window.addEventListener('resize', resW); resW(); 
    const waterThemes = [ { h: 195, s: 80, l: 65 }, { h: 340, s: 80, l: 70 }, { h: 45,  s: 90, l: 65 } ]; 
    
    function drawW() { 
        wCtx.clearRect(0,0,ww,wh); wTime += 0.005; 
        for (let i = 0; i < 3; i++) { 
            wCtx.beginPath(); let shift = i * 2; 
            let grad = wCtx.createLinearGradient(0, wh*0.5, 0, wh); 
            let t = waterThemes[i]; 
            grad.addColorStop(0, `hsla(${t.h}, ${t.s}%, ${t.l}%, 0.1)`); 
            grad.addColorStop(0.5, `hsla(${t.h}, ${t.s}%, ${t.l}%, 0.3)`); 
            grad.addColorStop(1, `hsla(${t.h}, ${t.s}%, ${t.l}%, 0.6)`); 
            wCtx.fillStyle = grad; 
            for (let x = 0; x <= ww; x += 5) { 
                let y = Math.sin(x * 0.005 + wTime + shift) * 40 + Math.sin(x * 0.01 - wTime * 2) * 20 + (wh * 0.7) + Math.cos(wTime + i) * 30; 
                if (x === 0) wCtx.moveTo(x, y); else wCtx.lineTo(x, y); 
            } 
            wCtx.lineTo(ww, wh); wCtx.lineTo(0, wh); wCtx.fill(); 
        } 
        requestAnimationFrame(drawW); 
    } 
    drawW();

    function finishIncenseRitual() {
        cancelAnimationFrame(incenseTimer);
        clearTimeout(smokeTimer);
        clearTimeout(ashTimer);
        
        document.getElementById('stick-left').setAttribute('y1', '1020');
        document.getElementById('stick-center').setAttribute('y1', '1020');
        document.getElementById('stick-right').setAttribute('y1', '1020');
        document.getElementById('glow-left').setAttribute('r', '0');
        document.getElementById('glow-center').setAttribute('r', '0');
        document.getElementById('glow-right').setAttribute('r', '0');

        const beamGroup = document.getElementById('orb-layer');
        if(!beamGroup) return;
        beamGroup.style.opacity = '1';

        const targetX = 500, targetY = 460;
        const curves = [
            { x: 475, y: 1010, cpX: 300, cpY: 600, id: 'left' },  
            { x: 500, y: 1010, cpX: 500, cpY: 650, id: 'center' }, 
            { x: 525, y: 1010, cpX: 700, cpY: 600, id: 'right' }  
        ];

        function getQBezier(t, p0, p1, p2) { return (1-t)*(1-t)*p0 + 2*(1-t)*t*p1 + t*t*p2; }

        let animStart = Date.now();
        const duration = 1200; 

        function animateBeams() {
            let elapsed = Date.now() - animStart;
            let progress = Math.min(elapsed / duration, 1); 
            
            curves.forEach((p) => {
                let headT = progress;
                let tailT = Math.max(0, progress - 0.2); 
                
                let headX = getQBezier(headT, p.x, p.cpX, targetX);
                let headY = getQBezier(headT, p.y, p.cpY, targetY);
                let tailX = getQBezier(tailT, p.x, p.cpX, targetX);
                let tailY = getQBezier(tailT, p.y, p.cpY, targetY);
                
                let d = `M ${tailX} ${tailY}`;
                for(let t = tailT; t <= headT; t += 0.05) {
                    d += ` L ${getQBezier(t, p.x, p.cpX, targetX)} ${getQBezier(t, p.y, p.cpY, targetY)}`;
                }
                d += ` L ${headX} ${headY}`;
                
                let glowEl = document.getElementById(`beam-${p.id}-glow`);
                let coreEl = document.getElementById(`beam-${p.id}-core`);
                
                if (glowEl && coreEl) {
                    glowEl.setAttribute('d', d);
                    coreEl.setAttribute('d', d);
                    glowEl.setAttribute('stroke-width', 15 * (1 - progress * 0.4));
                    coreEl.setAttribute('stroke-width', 6 * (1 - progress * 0.4));
                    glowEl.style.opacity = (1 - Math.pow(progress, 3)) * 0.3;
                    coreEl.style.opacity = (1 - Math.pow(progress, 2.5)) * 0.9;
                }
            });

            if (progress < 1) {
                requestAnimationFrame(animateBeams);
            } else {
                beamGroup.style.opacity = '0';
                curves.forEach((p) => {
                    document.getElementById(`beam-${p.id}-glow`).setAttribute('d', '');
                    document.getElementById(`beam-${p.id}-core`).setAttribute('d', '');
                });
                document.body.classList.remove('incense-on');
                document.getElementById('btn-incense').classList.remove('active');
                setTimeout(restoreIncensePosition, 1500);
            }
        }
        animateBeams();
    }
