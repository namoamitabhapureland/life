<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SVG 陣法靜態預覽</title>
    <style>
        body { 
            background: #010204; color: #fff; margin: 0; display: flex; 
            flex-direction: row; justify-content: space-around; align-items: center; 
            height: 100vh; font-family: "PingFang TC", serif;
        }
        .svg-container {
            width: 300px; height: 300px; position: relative;
            display: flex; flex-direction: column; align-items: center;
        }
        .label {
            margin-top: 30px; color: #8ba89c; letter-spacing: 4px; font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <div class="svg-container">
        <svg viewBox="-150 -150 300 300" style="filter: drop-shadow(0 0 10px rgba(139,168,156,0.5));">
            <defs>
                <radialGradient id="cyan-glow" cx="50%" cy="50%" r="50%">
                    <stop offset="0%" stop-color="#8ba89c" stop-opacity="0.4"/>
                    <stop offset="100%" stop-color="#8ba89c" stop-opacity="0"/>
                </radialGradient>
            </defs>
            
            <circle cx="0" cy="0" r="60" fill="url(#cyan-glow)"/>
            
            <g stroke="#8ba89c" stroke-width="1.5" fill="none" opacity="0.8">
                <polygon points="0,-100 86,50 -86,50" />
                <polygon points="0,100 86,-50 -86,-50" />
                <line x1="0" y1="-100" x2="0" y2="100" stroke-width="0.5" stroke-dasharray="2 4"/>
                <line x1="-86" y1="-50" x2="86" y2="50" stroke-width="0.5" stroke-dasharray="2 4"/>
                <line x1="-86" y1="50" x2="86" y2="-50" stroke-width="0.5" stroke-dasharray="2 4"/>
                
                <circle cx="0" cy="-100" r="3" fill="#fff"/>
                <circle cx="0" cy="100" r="3" fill="#fff"/>
                <circle cx="86" cy="50" r="3" fill="#fff"/>
                <circle cx="-86" cy="50" r="3" fill="#fff"/>
                <circle cx="86" cy="-50" r="3" fill="#fff"/>
                <circle cx="-86" cy="-50" r="3" fill="#fff"/>
            </g>

            <text x="0" y="12" text-anchor="middle" fill="#fff" font-size="32" font-weight="bold" font-family="monospace" letter-spacing="4">
                180
            </text>
            <text x="0" y="40" text-anchor="middle" fill="#8ba89c" font-size="10" letter-spacing="6">
                PHASE
            </text>
        </svg>
        <div class="label">【 星軌初現 ‧ 中分境界 】</div>
    </div>

    <div class="svg-container">
        <svg viewBox="-150 -150 300 300" style="filter: drop-shadow(0 0 25px rgba(212,175,55,0.7));">
            <defs>
                <radialGradient id="gold-glow" cx="50%" cy="50%" r="50%">
                    <stop offset="0%" stop-color="#d4af37" stop-opacity="0.6"/>
                    <stop offset="100%" stop-color="#d4af37" stop-opacity="0"/>
                </radialGradient>
                <filter id="blur-core">
                    <feGaussianBlur stdDeviation="3" result="blur" />
                    <feComposite in="SourceGraphic" in2="blur" operator="over" />
                </filter>
            </defs>

            <circle cx="0" cy="0" r="90" fill="url(#gold-glow)"/>

            <g stroke="#f3e5ab" stroke-width="0.5" fill="none" opacity="0.3">
                <circle cx="0" cy="0" r="120" stroke-dasharray="1 3"/>
                <circle cx="0" cy="0" r="135" />
                <line x1="0" y1="-135" x2="0" y2="135" />
                <line x1="-135" y1="0" x2="135" y2="0" />
                <line x1="-95" y1="-95" x2="95" y2="95" />
                <line x1="-95" y1="95" x2="95" y2="-95" />
            </g>

            <g stroke="#d4af37" stroke-width="1.5" fill="none" filter="url(#blur-core)">
                <polygon points="0,-110 95,-55 95,55 0,110 -95,55 -95,-55" opacity="0.8"/>
                <polygon points="0,-110 95,-55 95,55 0,110 -95,55 -95,-55" transform="rotate(30)" opacity="0.4"/>
                <polygon points="0,-110 95,-55 95,55 0,110 -95,55 -95,-55" transform="rotate(60)" opacity="0.8"/>
                <polygon points="0,-110 95,-55 95,55 0,110 -95,55 -95,-55" transform="rotate(90)" opacity="0.4"/>
            </g>

            <g stroke="#fff" stroke-width="1" fill="rgba(212,175,55,0.05)">
                <polygon points="0,-70 60,35 -60,35" />
                <polygon points="0,70 60,-35 -60,-35" />
                <circle cx="0" cy="-70" r="2.5" fill="#fff" filter="url(#blur-core)"/>
                <circle cx="0" cy="70" r="2.5" fill="#fff" filter="url(#blur-core)"/>
                <circle cx="60" cy="35" r="2.5" fill="#fff" filter="url(#blur-core)"/>
                <circle cx="-60" cy="35" r="2.5" fill="#fff" filter="url(#blur-core)"/>
                <circle cx="60" cy="-35" r="2.5" fill="#fff" filter="url(#blur-core)"/>
                <circle cx="-60" cy="-35" r="2.5" fill="#fff" filter="url(#blur-core)"/>
            </g>

            <text x="0" y="16" text-anchor="middle" fill="#fff" font-size="42" font-weight="bold" font-family="monospace" letter-spacing="6" filter="url(#blur-core)">
                450
            </text>
            <text x="0" y="45" text-anchor="middle" fill="#f3e5ab" font-size="11" letter-spacing="8" font-weight="bold">
                ULTIMATE
            </text>
        </svg>
        <div class="label" style="color: #d4af37;">【 大千光藏 ‧ 滿分境界 】</div>
    </div>

</body>
</html>
