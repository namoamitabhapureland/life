<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>華藏月相 ‧ 第一步：定力樞紐</title>
    <style>
        :root { --bg: #010204; --gold: #f3e5ab; --solid: #d4af37; --cyan: #8ba89c; }
        body { margin: 0; background: var(--bg); overflow: hidden; font-family: "PingFang TC", serif; color: #fff; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100dvh; user-select: none; }
        
        /* 3D 星空畫布 */
        canvas { position: absolute; inset: 0; z-index: 0; pointer-events: none; }

        /* 互動 UI 區塊 */
        #ui-layer { position: relative; z-index: 10; display: flex; flex-direction: column; align-items: center; }
        
        #hint-text { font-size: 1rem; color: var(--cyan); letter-spacing: 5px; margin-bottom: 50px; text-shadow: 0 0 10px rgba(139,168,156,0.5); transition: color 0.3s; }

        /* 能量圓框與按鈕容器 */
        .btn-wrapper { position: relative; width: 220px; height: 220px; display: flex; justify-content: center; align-items: center; }

        /* 能量圓框 (彩色與金色切換) */
        #energy-ring {
            position: absolute; inset: 0; border-radius: 50%;
            /* 預設：彩色能量流動 */
            background: conic-gradient(from 0deg, #ff4d4d, #ffb703, #80ed99, #00e5ff, #d8b4fe, #ff4d4d);
            animation: spin 3s linear infinite;
            /* 掏空中心，只留邊框 */
            -webkit-mask: radial-gradient(transparent 62%, black 63%);
            mask: radial-gradient(transparent 62%, black 63%);
            opacity: 0.7; transition: all 0.3s ease;
        }
        
        /* 金色狀態 */
        #energy-ring.is-gold {
            background: conic-gradient(from 0deg, #d4af37, #fff, #f3e5ab, #d4af37, #fff, #d4af37);
            animation: spin 1s linear infinite; /* 轉更快 */
            opacity: 1; filter: drop-shadow(0 0 15px var(--solid));
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* 透明毛玻璃 浮雕按鈕 */
        #glass-btn {
            position: relative; z-index: 5;
            width: 170px; height: 170px; border-radius: 50%;
            display: flex; justify-content: center; align-items: center; cursor: pointer;
            
            /* 毛玻璃與背景 */
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            
            /* 浮雕邊框與陰影 */
            border: 1px solid rgba(243, 229, 171, 0.2);
            box-shadow: 
                inset 0 4px 20px rgba(255, 255, 255, 0.08),  /* 頂部內發光 */
                inset 0 -4px 20px rgba(0, 0, 0, 0.8),        /* 底部內陰影 */
                0 15px 35px rgba(0, 0, 0, 0.9),              /* 底部外陰影 */
                0 0 20px rgba(139,168,156,0.1);              /* 外圍微光 */
            
            transition: all 0.15s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #glass-btn:active {
            transform: scale(0.95);
            box-shadow: 
                inset 0 8px 25px rgba(0, 0, 0, 0.8),
                inset 0 -2px 10px rgba(255, 255, 255, 0.05),
                0 5px 15px rgba(0, 0, 0, 0.9);
        }

        /* 爆炸白光轉場 */
        #warp-flash { position: absolute; inset: 0; background: #fff; opacity: 0; z-index: 100; pointer-events: none; transition: opacity 2s ease-out; }
    </style>
</head>
<body>

<canvas id="starCanvas"></canvas>
<div id="warp-flash"></div>

<div id="ui-layer">
    <div id="hint-text">心念收攝 ‧ 待金光化現</div>
    
    <div class="btn-wrapper">
        <div id="energy-ring"></div>
        
        <div id="glass-btn" onclick="checkTiming()">
            <svg viewBox="0 0 200 320" style="width: 70px; height: 112px; filter: drop-shadow(0 0 8px rgba(212,175,55,0.8));">
                <path d="M 100 25 C 97 18, 93 20, 92 30 L 62 165 C 55 190, 40 230, 10 245 L 30 275 C 65 265, 85 245, 100 225 C 115 245, 135 265, 170 275 L 190 245 C 160 230, 145 190, 138 165 L 108 30 C 107 20, 103 18, 100 25 Z" fill="rgba(243, 229, 171, 0.15)"/>
                <path d="M 138 165 L 108 30 C 107 20, 103 18, 100 25 C 97 18, 93 20, 92 30 L 62 165 M 30 275 C 65 265, 85 245, 100 225 C 115 245, 135 265, 170 275" fill="none" stroke="var(--gold)" stroke-width="6" stroke-linejoin="round"/>
                <path d="M 62 165 C 55 190, 40 230, 10 245" fill="none" stroke="var(--gold)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M 138 165 C 145 190, 160 230, 190 245" fill="none" stroke="var(--gold)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M 0 240 Q 37.5 265, 75 240" fill="none" stroke="var(--gold)" stroke-width="6" stroke-linecap="round" transform="rotate(40, 37.5, 240)"/>
                <path d="M 5 232 Q 41.5 257, 78 232" fill="none" stroke="var(--gold)" stroke-width="6" stroke-linecap="round" transform="rotate(40, 37.5, 240)"/>
                <path d="M 200 240 Q 162.5 265, 125 240" fill="none" stroke="var(--gold)" stroke-width="6" stroke-linecap="round" transform="rotate(-40, 162.5, 240)"/>
                <path d="M 195 232 Q 158.5 257, 122 232" fill="none" stroke="var(--gold)" stroke-width="6" stroke-linecap="round" transform="rotate(-40, 162.5, 240)"/>
                <path d="M 96 23 C 98 25, 98 32, 94 34" stroke="var(--gold)" stroke-width="3" fill="none"/>
                <path d="M 104 23 C 102 25, 102 32, 106 34" stroke="var(--gold)" stroke-width="3" fill="none"/>
                <path d="M 100 25 L 100 160" stroke="var(--gold)" stroke-width="4" stroke-linecap="round" fill="none"/>
                <path d="M 100 195 L 100 225" stroke="var(--gold)" stroke-width="4" stroke-linecap="round" fill="none"/>
                <path d="M 136 175 C 125 155, 110 152, 102 155" stroke="var(--gold)" stroke-width="6" fill="none" stroke-linecap="round"/>
                <path d="M 63 170 C 80 155, 95 152, 112 158 C 118 160, 120 170, 115 175 C 95 188, 75 198, 63 215" stroke="var(--gold)" stroke-width="6" stroke-linejoin="round" stroke-linecap="round" fill="none"/>
                <path d="M 103 162 C 109 159, 113 161, 113 166 C 109 169, 103 167, 103 162 Z" stroke="var(--gold)" stroke-width="3" fill="none"/>
                <path d="M 105 182 Q 125 218 138 210" stroke="var(--gold)" stroke-width="5" stroke-linecap="round" fill="none"/>
                <path d="M 40 260 Q 70 250, 95 230" stroke="rgba(212,175,55,0.7)" stroke-width="4" fill="none" stroke-linecap="round"/>
                <path d="M 45 250 Q 70 240, 90 225" stroke="rgba(212,175,55,0.4)" stroke-width="3" fill="none" stroke-linecap="round"/>
                <path d="M 160 260 Q 130 250, 105 230" stroke="rgba(212,175,55,0.7)" stroke-width="4" fill="none" stroke-linecap="round"/>
                <path d="M 155 250 Q 130 240, 110 225" stroke="rgba(212,175,55,0.4)" stroke-width="3" fill="none" stroke-linecap="round"/>
            </svg>
        </div>
    </div>
</div>

<script>
    // ══════════════════════════════════════════
    // 星空穿梭引擎 (往前跑的感覺)
    // ══════════════════════════════════════════
    const cvs = document.getElementById('starCanvas');
    const ctx = cvs.getContext('2d');
    let cw, ch, stars = [];
    let warpSpeed = 1.5; // 預設速度
    let targetWarpSpeed = 1.5;

    function initStars() {
        cw = cvs.width = window.innerWidth; 
        ch = cvs.height = window.innerHeight;
        stars = Array.from({length: 300}, () => ({
            x: (Math.random() - 0.5) * 2000, 
            y: (Math.random() - 0.5) * 2000, 
            z: Math.random() * 2000, 
            c: Math.random() > 0.3 ? '#8ba89c' : '#f3e5ab' // 彩色星空
        }));
    }
    
    function drawStars() {
        ctx.fillStyle = 'rgba(1, 2, 4, 0.4)'; // 尾跡效果
        ctx.fillRect(0, 0, cw, ch); 
        ctx.globalCompositeOperation = 'screen';
        
        // 平滑加速
        warpSpeed += (targetWarpSpeed - warpSpeed) * 0.05;

        stars.forEach(s => {
            s.z -= warpSpeed; 
            if(s.z <= 0) { 
                s.z = 2000; 
                s.x = (Math.random() - 0.5) * 2000; 
                s.y = (Math.random() - 0.5) * 2000; 
            }
            let sc = 600 / (600 + s.z);
            let px = cw/2 + s.x * sc; 
            let py = ch/2 + s.y * sc;
            
            if(px > 0 && px < cw && py > 0 && py < ch) {
                ctx.fillStyle = s.c; 
                ctx.globalAlpha = Math.min(1, sc * 2);
                ctx.beginPath(); 
                // 當速度變快時，星星會拉長變成線條
                if (warpSpeed > 5) {
                    let prevSc = 600 / (600 + s.z + warpSpeed * 2);
                    let prevPx = cw/2 + s.x * prevSc;
                    let prevPy = ch/2 + s.y * prevSc;
                    ctx.moveTo(px, py);
                    ctx.lineTo(prevPx, prevPy);
                    ctx.lineWidth = 1.5 * sc;
                    ctx.strokeStyle = s.c;
                    ctx.stroke();
                } else {
                    ctx.arc(px, py, 1.5 * sc, 0, Math.PI*2); 
                    ctx.fill();
                }
            }
        });
        ctx.globalAlpha = 1; 
        ctx.globalCompositeOperation = 'source-over';
        requestAnimationFrame(drawStars);
    }
    window.addEventListener('resize', initStars); 
    initStars(); 
    drawStars();

    // ══════════════════════════════════════════
    // 能量光環邏輯 (彩色轉金色)
    // ══════════════════════════════════════════
    const ring = document.getElementById('energy-ring');
    const hint = document.getElementById('hint-text');
    let isGold = false;
    let isGameActive = true;
    let cycleTimer;

    function runRingCycle() {
        if (!isGameActive) return;
        
        // 狀態：彩色流轉
        isGold = false;
        ring.classList.remove('is-gold');
        hint.innerText = "心念收攝 ‧ 待金光化現";
        hint.style.color = "var(--cyan)";

        // 等待 2~4 秒後轉為金色
        let waitTime = 2000 + Math.random() * 2000;
        cycleTimer = setTimeout(() => {
            if (!isGameActive) return;
            
            // 狀態：純金瞬間
            isGold = true;
            ring.classList.add('is-gold');
            hint.innerText = "一念相應！按！";
            hint.style.color = "var(--gold)";

            // 金色只維持 0.8 ~ 1.2 秒
            let goldTime = 800 + Math.random() * 400;
            cycleTimer = setTimeout(() => {
                if (isGold && isGameActive) runRingCycle(); // 沒按到，重來
            }, goldTime);

        }, waitTime);
    }

    // 啟動循環
    setTimeout(runRingCycle, 1000);

    // ══════════════════════════════════════════
    // 按鈕判定與爆炸轉場
    // ══════════════════════════════════════════
    function checkTiming() {
        if (!isGameActive) return;

        if (isGold) {
            // 成功！
            isGameActive = false;
            clearTimeout(cycleTimer);
            hint.innerText = "業鏡啟動 ‧ 穿梭法界";
            hint.style.color = "var(--solid)";
            
            // 1. 星空極速加速 (衝進去的感覺)
            targetWarpSpeed = 80; 

            // 2. 按鈕 UI 淡出
            document.querySelector('.btn-wrapper').style.opacity = '0';
            document.querySelector('.btn-wrapper').style.transition = 'opacity 1s';

            // 3. 白光爆炸轉場 (2.5秒後全白)
            setTimeout(() => {
                document.getElementById('warp-flash').style.opacity = '1';
                
                // 【下一步：這裡將會銜接數字狂飆與五圖變換】
                setTimeout(() => {
                    alert("第一步完成！接下來畫面全白後，會進入數字亂飛與五圖切換的階段。");
                }, 2000);

            }, 1000);

        } else {
            // 失敗！
            hint.innerText = "心念散亂，請再定心";
            hint.style.color = "#ff4d4d";
            ring.style.opacity = '0';
            setTimeout(() => { ring.style.opacity = '0.7'; }, 300); // 閃爍懲罰
        }
    }
</script>
</body>
</html>
