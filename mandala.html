<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>五位階曼陀羅底座 × 基礎白蓮測試</title>
<style>
    body {
        background-color: #080604;
        color: #d4a824;
        font-family: 'Palatino Linotype', 'Book Antiqua', 'PingFang TC', 'Microsoft JhengHei', serif;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
        padding: 40px;
        flex-wrap: wrap;
        gap: 50px;
    }
    .lotus-card {
        display: flex;
        flex-direction: column;
        align-items: center;
        background: rgba(20, 15, 10, 0.4);
        border: 1px solid rgba(212, 168, 36, 0.15);
        border-radius: 12px;
        padding: 30px 20px;
        width: 160px;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
    }
    .svg-container {
        width: 140px;
        height: 140px;
        margin-bottom: 24px;
    }
    .rank-label {
        font-size: 15px;
        letter-spacing: 0.25em;
        opacity: 0.85;
        text-shadow: 0 2px 4px rgba(0,0,0,0.8);
    }
</style>
</head>
<body>

<script>
function getLotusSVG(rankType, nianCount = 0, overrideLevel = null) {
    const safeRank = rankType || ""; 
    
    let nLevel = 1;
    if (overrideLevel !== null) {
        nLevel = Math.max(1, Math.min(overrideLevel, 10)); 
    } else {
        if (nianCount >= 100000000) nLevel = 10;      
        else if (nianCount >= 10000000) nLevel = 9;   
        else if (nianCount >= 1000000) nLevel = 8;    
        else if (nianCount >= 500000) nLevel = 7;     
        else if (nianCount >= 100000) nLevel = 6;     
        else if (nianCount >= 10000) nLevel = 5;      
        else if (nianCount >= 5000) nLevel = 4;       
        else if (nianCount >= 500) nLevel = 3;        
        else if (nianCount >= 10) nLevel = 2;         
        else nLevel = 1;                              
    }

    const cx = 50, cy = 50;
    const id = `svg-${Math.random().toString(36).substr(2, 5)}`; 

    function P(r0, r1, hw, bulge, shape) {
        const bx = cx, by = cy - r0, tx = cx, ty = cy - r1;
        const my = cy - (r0 + r1) / 2;
        if (shape === 'slim') return `M${bx - hw * .7} ${by} C${bx - bulge * .75} ${my} ${tx - 1.5} ${ty + 3} ${tx} ${ty} C${tx + 1.5} ${ty + 3} ${bx + bulge * .75} ${my} ${bx + hw * .7} ${by}Z`;
        if (shape === 'wide') return `M${bx - hw} ${by} C${bx - bulge * 1.35} ${my + 4} ${tx - bulge * .45} ${ty + 7} ${tx} ${ty} C${tx + bulge * .45} ${ty + 7} ${bx + bulge * 1.35} ${my + 4} ${bx + hw} ${by}Z`;
        return `M${bx - hw} ${by} C${bx - bulge} ${my} ${tx - bulge * .3} ${ty + 5} ${tx} ${ty} C${tx + bulge * .3} ${ty + 5} ${bx + bulge} ${my} ${bx + hw} ${by}Z`;
    }

    function rotatedPetals(n, r0, r1, hw, bulge, shape, fill, op, offset = 0) {
        let s = '';
        for (let i = 0; i < n; i++) {
            const a = i * (360 / n) + offset;
            s += `<path d="${P(r0, r1, hw, bulge, shape)}" fill="${fill}" opacity="${op}" transform="rotate(${a} ${cx} ${cy})"/>`;
        }
        return s;
    }

    function pt(n, r, deg=0) {
        let pts=[], off = -Math.PI/2 + deg*Math.PI/180;
        for(let k=0;k<n;k++) pts.push([r*Math.cos(2*Math.PI*k/n + off), r*Math.sin(2*Math.PI*k/n + off)]);
        return pts;
    }
    function st(n, r1, r2, deg=0) {
        let pts=[], off=-Math.PI/2+deg*Math.PI/180;
        for(let k=0;k<2*n;k++) {
            let r=k%2===0?r1:r2;
            pts.push([r*Math.cos(Math.PI*k/n+off), r*Math.sin(Math.PI*k/n+off)]);
        }
        return pts;
    }
    function pStr(pts) { return pts.map(p=>p[0].toFixed(2)+','+p[1].toFixed(2)).join(' '); }
    function K(pts, stroke, sw, op) {
        let s='';
        for(let i=0;i<pts.length;i++) for(let j=i+1;j<pts.length;j++) s+=`<line x1="${pts[i][0].toFixed(2)}" y1="${pts[i][1].toFixed(2)}" x2="${pts[j][0].toFixed(2)}" y2="${pts[j][1].toFixed(2)}"/>`;
        return `<g stroke="${stroke}" stroke-width="${sw}" opacity="${op}">${s}</g>`;
    }
    function D(pts, r, fill, op) {
        return `<g opacity="${op}">${pts.map(p=>`<circle cx="${p[0].toFixed(2)}" cy="${p[1].toFixed(2)}" r="${r}" fill="${fill}"/>`).join('')}</g>`;
    }

    const sharedDefs = `
    <defs>
        <filter id="glo${id}" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="2.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <filter id="sof${id}" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="1.1" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <radialGradient id="rg-unified-gold" cx="50%" cy="50%" r="60%">
            <stop offset="0%" stop-color="#fffce0"/><stop offset="28%" stop-color="#f0c030"/><stop offset="65%" stop-color="#906010"/><stop offset="100%" stop-color="#4c3008"/>
        </radialGradient>
        <radialGradient id="rg-void" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#111111" stop-opacity="0.95"/><stop offset="70%" stop-color="#0a0500" stop-opacity="0.8"/><stop offset="100%" stop-color="#000000" stop-opacity="0"/>
        </radialGradient>
        <radialGradient id="rg-mandala-base-${id}" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#2a1606"/>
            <stop offset="60%" stop-color="#140a02"/>
            <stop offset="100%" stop-color="#080401"/>
        </radialGradient>
        <radialGradient id="rg-mandala-glow-${id}" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/>
            <stop offset="25%" stop-color="#fff8e0" stop-opacity="0.85"/>
            <stop offset="65%" stop-color="#e0c860" stop-opacity="0.15"/>
            <stop offset="100%" stop-color="#c89000" stop-opacity="0"/>
        </radialGradient>
    </defs>`;

    const voidBg = `<circle cx="50" cy="50" r="42" fill="url(#rg-void)"><animate attributeName="r" values="41;43;41" dur="6s" repeatCount="indefinite"/></circle>`;

    let innerSvg = '';
    const isRank = (t) => safeRank.includes(t);

    if (isRank('信') || isRank('Faith')) {
        let o = pt(9,97,0), i = pt(9,46,20);
        innerSvg = `
        <polygon points="${pStr(o)}" stroke="#c89030" stroke-width="1.1" fill="none" opacity="0.7"/>
        ${K(o,'#e8c860',0.52,0.55)}
        <polygon points="${pStr(st(9,97,12,0))}" fill="rgba(235,185,15,0.07)" stroke="#f5dc70" stroke-width="1.5"/>
        <circle cx="0" cy="0" r="65" fill="none" stroke="#906010" stroke-width="0.5" opacity="0.3"/>
        <polygon points="${pStr(i)}" stroke="#d4a820" stroke-width="0.8" fill="none" opacity="0.5"/>
        ${K(i,'#f0d060',0.5,0.52)}
        <polygon points="${pStr(st(9,46,9,20))}" fill="rgba(250,205,25,0.12)" stroke="#ffe070" stroke-width="1"/>
        ${D(o,2.2,'#f0d060',0.7)}${D(i,1.6,'#ffe880',0.65)}`;
    } else if (isRank('住') || isRank('Abiding')) {
        let o = pt(11,97,0), ip = pt(5,50,0), ig = pt(11,44,16.36);
        innerSvg = `
        <polygon points="${pStr(o)}" stroke="#b87820" stroke-width="1" fill="none" opacity="0.65"/>
        ${K(o,'#dca830',0.48,0.52)}
        <polygon points="${pStr(st(11,97,11,0))}" fill="rgba(220,160,10,0.06)" stroke="#f0cc50" stroke-width="1.4"/>
        <polygon points="${pStr(ip)}" stroke="#c89028" stroke-width="0.9" fill="none" opacity="0.55"/>
        ${K(ip,'#f0cc40',0.55,0.5)}
        <polygon points="${pStr(st(5,50,14,36))}" fill="rgba(240,195,20,0.1)" stroke="#ffd050" stroke-width="1.1"/>
        <polygon points="${pStr(ig)}" stroke="#c09020" stroke-width="0.6" fill="none" opacity="0.4"/>
        ${K(ig,'#ecc038',0.45,0.45)}
        ${D(o,2,'#e8c050',0.68)}`;
    } else if (isRank('行') || isRank('Practice')) {
        let oct1 = pt(8,97,0), oct2 = pt(8,97,22.5), all = [...oct1, ...oct2], io = pt(8,44,11.25);
        innerSvg = `
        <polygon points="${pStr(oct1)}" stroke="#d4a828" stroke-width="1.2" fill="none" opacity="0.65"/>
        <polygon points="${pStr(oct2)}" stroke="#e8c040" stroke-width="0.9" fill="none" opacity="0.5"/>
        ${K(all,'#f0d060',0.38,0.42)}
        <polygon points="${pStr(st(8,97,22,0))}" fill="rgba(240,195,20,0.07)" stroke="#f8d870" stroke-width="1.5"/>
        <polygon points="${pStr(st(8,97,22,22.5))}" fill="rgba(220,175,10,0.04)" stroke="#d4a830" stroke-width="1"/>
        <polygon points="${pStr(io)}" stroke="#c89028" stroke-width="0.8" fill="none" opacity="0.5"/>
        ${K(io,'#f0d050',0.5,0.5)}
        ${D(io,1.6,'#ffe870',0.65)}
        ${D(oct1,2.4,'#f8d860',0.72)}
        ${D(oct2,2,'#f0c848',0.6)}`;
    } else if (isRank('迴') || isRank('Dedication')) {
        let o = pt(10,97,0), i = pt(10,43,18);
        innerSvg = `
        <polygon points="${pStr(o)}" stroke="#b07818" stroke-width="1" fill="none" opacity="0.6"/>
        ${K(o,'#d8a030',0.52,0.53)}
        <polygon points="${pStr(st(5,97,18,0))}" fill="rgba(200,140,10,0.06)" stroke="#e8b030" stroke-width="1.4"/>
        <polygon points="${pStr(st(5,97,18,36))}" fill="rgba(200,140,10,0.04)" stroke="#c89020" stroke-width="1"/>
        <polygon points="${pStr(st(10,97,13,0))}" fill="rgba(215,155,15,0.07)" stroke="#f0c048" stroke-width="1.2" opacity="0.9"/>
        <circle cx="0" cy="0" r="65" fill="none" stroke="#806010" stroke-width="0.5" opacity="0.28"/>
        <polygon points="${pStr(i)}" stroke="#c89028" stroke-width="0.7" fill="none" opacity="0.45"/>
        ${K(i,'#f0c840',0.5,0.5)}
        <polygon points="${pStr(st(10,43,7,18))}" fill="rgba(245,195,25,0.12)" stroke="#ffd050" stroke-width="0.9"/>
        ${D(i,1.5,'#ffe868',0.6)}
        ${D(o,2.2,'#e8b830',0.7)}`;
    } else if (isRank('地') || isRank('Bhumi')) {
        let o = pt(12,97,0), i = pt(12,42,15);
        let t1 = st(3,97,9,0), t2 = st(3,97,9,30), t3 = st(3,97,9,60), t4 = st(3,97,9,90);
        let sq1 = pt(4,97,0), sq2 = pt(4,97,15), sq3 = pt(4,97,30);
        let it1 = st(3,42,5,15), it2 = st(3,42,5,45), it3 = st(3,42,5,75);
        innerSvg = `
        <polygon points="${pStr(o)}" stroke="#c8a020" stroke-width="1.1" fill="none" opacity="0.68"/>
        ${K(o,'#f0c840',0.46,0.5)}
        <polygon points="${pStr(t1)}" fill="rgba(240,180,15,0.03)" stroke="#e8c038" stroke-width="1.1" opacity="0.65"/>
        <polygon points="${pStr(t2)}" fill="rgba(240,180,15,0.04)" stroke="#e8c038" stroke-width="1.1" opacity="0.65"/>
        <polygon points="${pStr(t3)}" fill="rgba(240,180,15,0.05)" stroke="#e8c038" stroke-width="1.1" opacity="0.65"/>
        <polygon points="${pStr(t4)}" fill="rgba(240,180,15,0.06)" stroke="#e8c038" stroke-width="1.1" opacity="0.65"/>
        <polygon points="${pStr(sq1)}" fill="rgba(215,165,10,0.03)" stroke="#d4a028" stroke-width="1" opacity="0.6"/>
        <polygon points="${pStr(sq2)}" fill="rgba(215,165,10,0.03)" stroke="#d4a028" stroke-width="1" opacity="0.6"/>
        <polygon points="${pStr(sq3)}" fill="rgba(215,165,10,0.03)" stroke="#d4a028" stroke-width="1" opacity="0.6"/>
        <polygon points="${pStr(st(12,97,13,0))}" fill="rgba(255,200,20,0.06)" stroke="#f8d860" stroke-width="1.4"/>
        <circle cx="0" cy="0" r="66" fill="none" stroke="#906010" stroke-width="0.5" opacity="0.28"/>
        <polygon points="${pStr(i)}" stroke="#d4a820" stroke-width="0.7" fill="none" opacity="0.45"/>
        ${K(i,'#f5d050',0.47,0.5)}
        <polygon points="${pStr(st(12,42,7,15))}" fill="rgba(255,205,20,0.12)" stroke="#ffe870" stroke-width="0.9"/>
        <polygon points="${pStr(it1)}" fill="none" stroke="#ffd040" stroke-width="0.7" opacity="0.5"/>
        <polygon points="${pStr(it2)}" fill="none" stroke="#ffd040" stroke-width="0.7" opacity="0.5"/>
        <polygon points="${pStr(it3)}" fill="none" stroke="#ffd040" stroke-width="0.7" opacity="0.5"/>
        ${D(o,2.4,'#f8d060',0.72)}
        ${D(i,1.6,'#ffe878',0.6)}`;
    }

    let bgContent = '';
    if (innerSvg) {
        bgContent = `
        <circle cx="${cx}" cy="${cy}" r="21.8" fill="url(#rg-mandala-base-${id})" stroke="#b08820" stroke-width="0.8"/>
        <g transform="translate(${cx}, ${cy}) scale(0.193)">
            ${innerSvg}
            <circle cx="0" cy="0" r="28" fill="url(#rg-mandala-glow-${id})"/>
        </g>
        <circle cx="${cx}" cy="${cy}" r="21.8" fill="none" stroke="#000000" stroke-width="0.5" opacity="0.6"/>
        `;
    } else {
        bgContent = `<circle cx="${cx}" cy="${cy}" r="21.5" fill="url(#rg-unified-gold)" stroke="#f0d060" stroke-width=".7"/>`;
    }

    let lotusContent = '';

    if (nLevel === 1) { 
        lotusContent = `<defs><radialGradient id="lA${id}" cx="50%" cy="75%" r="100%"><stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/><stop offset="100%" stop-color="#cfd8dc" stop-opacity="0.6"/></radialGradient><radialGradient id="lB${id}" cx="50%" cy="65%" r="100%"><stop offset="0%" stop-color="#ffffff" stop-opacity="0.9"/><stop offset="100%" stop-color="#eceff1" stop-opacity="0.7"/></radialGradient></defs>
        ${rotatedPetals(8,22,46,7,11,'round',`url(#lA${id})`,.85)}${rotatedPetals(8,22,38,5.5,8,'round',`url(#lB${id})`,.65,22.5)}`;
    } 

    return `
    <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" style="width:100%; height:100%;">
        ${sharedDefs}${voidBg}${bgContent}
        <g filter="url(#sof${id})">
            ${lotusContent}
            <animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50" dur="40s" repeatCount="indefinite" additive="sum"/>
        </g>
        <circle cx="50" cy="50" r="1.8" fill="#ffffff" opacity=".95" filter="url(#glo${id})"/>
    </svg>`;
}

const ranksToTest = [
    { type: '信', label: '信位底座' },
    { type: '住', label: '住位底座' },
    { type: '行', label: '行位底座' },
    { type: '迴', label: '迴向底座' },
    { type: '地', label: '地位底座' }
];

ranksToTest.forEach(rank => {
    const card = document.createElement('div');
    card.className = 'lotus-card';

    const svgContainer = document.createElement('div');
    svgContainer.className = 'svg-container';
    // 呼叫主系統邏輯：對應的位階, 0次念佛(忽略), overrideLevel=1 (強制為基礎白蓮)
    svgContainer.innerHTML = getLotusSVG(rank.type, 0, 1);

    const label = document.createElement('div');
    label.className = 'rank-label';
    label.innerText = rank.label;

    card.appendChild(svgContainer);
    card.appendChild(label);
    document.body.appendChild(card);
});
</script>

</body>
</html>
