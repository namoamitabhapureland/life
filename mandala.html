<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>純向量法界美學 ‧ 選項一：透明琉璃光球與淺金淨瓶</title>
    <style>
        :root {
            --bg-deep: #010103;
            --gold-light: #f3e5ab; /* 淺金色，用於透明線框 */
            --gold-solid: #d4af37;
        }
        * { box-sizing: border-box; user-select: none; margin: 0; padding: 0; }
        body {
            background: radial-gradient(circle at 50% 50%, #16110a 0%, var(--bg-deep) 100%);
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: "PingFang TC", "Microsoft JhengHei", serif;
        }

        #starCanvas { position: absolute; inset: 0; z-index: 1; pointer-events: none; }
        #mainStage { position: absolute; width: 100vw; height: 100vh; z-index: 2; }
        
        .title-text { fill: var(--gold-light); font-size: 18px; letter-spacing: 4px; text-anchor: middle; filter: drop-shadow(0 0 5px rgba(243,229,171,0.5)); }
        .sub-text { fill: rgba(243,229,171,0.6); font-size: 13px; letter-spacing: 2px; text-anchor: middle; }
    </style>
</head>
<body>

    <canvas id="starCanvas"></canvas>

    <svg id="mainStage" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000" preserveAspectRatio="xMidYMid slice">
        <defs>
            <filter id="fine-glow" x="-50%" y="-50%" width="200%" height="200%">
                <feGaussianBlur stdDeviation="2.5" result="blur" />
                <feMerge>
                    <feMergeNode in="blur" />
                    <feMergeNode in="SourceGraphic" />
                </feMerge>
            </filter>

            <radialGradient id="glass-orb" cx="35%" cy="35%" r="65%">
                <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9"/>
                <stop offset="25%" stop-color="#ffffff" stop-opacity="0.05"/>
                <stop offset="85%" stop-color="var(--gold-light)" stop-opacity="0.3"/>
                <stop offset="100%" stop-color="var(--gold-light)" stop-opacity="0.9"/>
            </radialGradient>

            <g id="mani-jewel">
                <circle cx="0" cy="0" r="12" fill="url(#glass-orb)" stroke="var(--gold-light)" stroke-width="0.5" filter="url(#fine-glow)"/>
                <circle cx="0" cy="0" r="1.5" fill="#ffffff" style="filter: drop-shadow(0 0 4px var(--gold-solid));"/>
                <ellipse cx="-4" cy="-4" rx="4" ry="2" fill="#ffffff" opacity="0.8" transform="rotate(-40 -4 -4)" />
            </g>

            <g id="pure-water-bottle">
                <g>
                    <ellipse cx="0" cy="5" rx="12" ry="2.5" fill="rgba(243, 229, 171, 0.2)">
                        <animate attributeName="ry" values="2.5; 3.5; 2.5" dur="3s" repeatCount="indefinite" />
                        <animate attributeName="cy" values="5; 4.5; 5" dur="4s" repeatCount="indefinite" />
                    </ellipse>
                    
                    <path d="M -12,5 C -14,15 -10,25 0,28 C 10,25 14,15 12,5 Z" fill="rgba(243, 229, 171, 0.08)">
                        <animate attributeName="d" 
                                 values="M -12,5 C -14,15 -10,25 0,28 C 10,25 14,15 12,5 Z; 
                                         M -12,4.5 C -14,15 -10,25 0,27 C 10,25 14,15 12,4.5 Z; 
                                         M -12,5 C -14,15 -10,25 0,28 C 10,25 14,15 12,5 Z" 
                                 dur="4s" repeatCount="indefinite" />
                    </path>

                    <path d="M -6,5 Q 0,4 6,5" stroke="#ffffff" stroke-width="0.8" fill="none" opacity="0.8">
                        <animate attributeName="d" values="M -6,5 Q 0,4 6,5; M -6,4 Q 0,6 6,4; M -6,5 Q 0,4 6,5" dur="3s" repeatCount="indefinite" />
                    </path>
                </g>

                <g stroke="var(--gold-light)" stroke-width="1.0" fill="none" filter="url(#fine-glow)">
                    <path d="M -8,-15 C -8,-8 -16,0 -16,15 C -16,25 -8,30 0,30 C 8,30 16,25 16,15 C 16,0 8,-8 8,-15" />
                    <ellipse cx="0" cy="-15" rx="8" ry="2" />
                    <path d="M -6,30 C -6,32 6,32 6,30" />
                </g>
            </g>
        </defs>

        <text x="500" y="200" class="title-text">選項一：透明摩尼寶珠落雨 ＆ 淺金活水淨瓶</text>
        <text x="500" y="235" class="sub-text">( 觀察水面的無耗能波紋起伏，與光球的立體通透感 )</text>

        <g id="center-display">
            <ellipse cx="500" cy="550" rx="140" ry="12" fill="#010103" opacity="0.6" filter="blur(6px)"/>
            
            <use href="#pure-water-bottle" transform="translate(380, 500) scale(1.6)" />
            
            <use href="#pure-water-bottle" transform="translate(500, 480) scale(2.3)" />
            
            <use href="#pure-water-bottle" transform="translate(620, 500) scale(1.6)" />
        </g>

        <g id="orb-layer"></g>

    </svg>

    <script>
        // 星空背景邏輯 (Canvas)
        const canvas = document.getElementById('starCanvas');
        const ctx = canvas.getContext('2d');
        let width, height, stars = [];

        function resize() { width = window.innerWidth; height = window.innerHeight; canvas.width = width; canvas.height = height; }
        window.addEventListener('resize', resize); resize();

        const STAR_COLORS = ['#8ba89c', '#ffffff', '#f3e5ab'];
        for (let i = 0; i < 150; i++) {
            stars.push({ x: (Math.random() - 0.5) * 2000, y: (Math.random() - 0.5) * 2000, z: Math.random() * 2000, color: STAR_COLORS[Math.floor(Math.random() * STAR_COLORS.length)], s: Math.random() * 2.5 + 0.5 });
        }

        function renderStars() {
            ctx.clearRect(0, 0, width, height);
            ctx.globalCompositeOperation = 'screen';
            stars.forEach(s => {
                s.z -= 0.5;
                if (s.z <= 0) { s.z = 2000; s.x = (Math.random() - 0.5) * 2000; s.y = (Math.random() - 0.5) * 2000; }
                let sc = 400 / (400 + s.z);
                let drawY = (height / 2) + s.y * sc;
                if (drawY > height * 0.75) return;
                ctx.beginPath();
                ctx.arc((width / 2) + s.x * sc, drawY, s.s * sc, 0, Math.PI * 2);
                ctx.fillStyle = s.color;
                ctx.globalAlpha = Math.min(1, sc * 2.5) * 0.5;
                ctx.fill();
                ctx.globalAlpha = 1;
            });
            requestAnimationFrame(renderStars);
        }
        renderStars();

        // 漫天透明光球 (摩尼寶珠) 動態邏輯
        const orbLayer = document.getElementById('orb-layer');
        const activeOrbs = [];

        function createOrb() {
            if (activeOrbs.length >= 40) return; // 控制滿天寶珠的清淨密度
            
            const useTag = document.createElementNS('http://www.w3.org/2000/svg', 'use');
            useTag.setAttributeNS('http://www.w3.org/1999/xlink', 'href', '#mani-jewel'); 
            
            const x = Math.random() * 1200 - 100;
            const y = -50;
            // 給予不同的大小比例，營造強烈的空間遠近感
            const scale = 0.4 + Math.random() * 0.8; 
            
            // 光球比花瓣重，下落軌跡更平穩優雅
            const speedY = 0.6 + Math.random() * 1.0; 
            const speedX = (Math.random() - 0.5) * 0.3;
            
            let swayStep = Math.random() * 100;

            useTag.setAttribute('transform', `translate(${x}, ${y}) scale(${scale})`);
            orbLayer.appendChild(useTag);

            activeOrbs.push({ 
                element: useTag, x: x, y: y, scale: scale, 
                speedY: speedY, speedX: speedX, swayStep: swayStep 
            });
        }

        function updateOrbs() {
            for (let i = activeOrbs.length - 1; i >= 0; i--) {
                const p = activeOrbs[i];
                p.y += p.speedY; 
                p.swayStep += 0.015; // 極其緩慢的空氣阻力搖擺
                p.x += p.speedX + Math.sin(p.swayStep) * 0.3; 
                
                // 光球不需旋轉，只需平移與縮放
                p.element.setAttribute('transform', `translate(${p.x}, ${p.y}) scale(${p.scale})`);
                
                // 越過邊界自動消散
                if (p.y > 1050) { 
                    p.element.remove(); 
                    activeOrbs.splice(i, 1); 
                }
            }
            
            // 控制法雨落下的頻率
            if (Math.random() < 0.06) createOrb();
            
            requestAnimationFrame(updateOrbs);
        }
        
        // 啟動摩尼寶珠飄落
        updateOrbs();
    </script>
</body>
</html>
