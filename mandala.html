<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>淨土法界 ‧ 三層轉經輪與活水淨瓶</title>
    <style>
        :root {
            --bg-deep: #010103;
            --gold-light: #f3e5ab;
            --gold-solid: #d4af37;
        }
        * { box-sizing: border-box; user-select: none; margin: 0; padding: 0; }
        body {
            background: radial-gradient(circle at 50% 50%, #16110a 0%, var(--bg-deep) 100%);
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: "PingFang TC", "Microsoft JhengHei", serif;
        }
        #starCanvas { position: absolute; inset: 0; z-index: 1; pointer-events: none; }
        #mainStage { position: absolute; width: 100vw; height: 100vh; z-index: 2; }
    </style>
</head>
<body>

    <canvas id="starCanvas"></canvas>

    <svg id="mainStage" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000" preserveAspectRatio="xMidYMid slice">
        <defs>
            <filter id="fine-glow" x="-50%" y="-50%" width="200%" height="200%">
                <feGaussianBlur stdDeviation="2.5" result="blur" />
                <feMerge>
                    <feMergeNode in="blur" />
                    <feMergeNode in="SourceGraphic" />
                </feMerge>
            </filter>

            <linearGradient id="facet-light" x1="0%" y1="0%" x2="50%" y2="100%">
                <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9"/>
                <stop offset="100%" stop-color="#f3e5ab" stop-opacity="0.2"/>
            </linearGradient>
            <linearGradient id="facet-cyan" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#b2ebf2" stop-opacity="0.85"/>
                <stop offset="100%" stop-color="#00838f" stop-opacity="0.4"/>
            </linearGradient>
            <linearGradient id="facet-dark" x1="50%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#d4af37" stop-opacity="0.3"/>
                <stop offset="100%" stop-color="#b8860b" stop-opacity="0.8"/>
            </linearGradient>

            <linearGradient id="wheel-gold" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%" stop-color="#8B6508" />
                <stop offset="20%" stop-color="#FFDF00" />
                <stop offset="50%" stop-color="#FFF" />
                <stop offset="80%" stop-color="#D4AF37" />
                <stop offset="100%" stop-color="#8B6508" />
            </linearGradient>

            <g id="treasure-vase">
                <polygon points="45,20 55,20 60,40 40,40" fill="url(#facet-light)" stroke="#fff" stroke-width="0.5"/>
                
                <path class="dynamic-water" d="M 40,40 L 60,40 L 75,90 L 25,90 Z" fill="url(#facet-cyan)" opacity="0.95" stroke="#fff" stroke-width="0.5"/>
                
                <polygon points="50,40 60,40 75,90 50,90" fill="url(#facet-dark)" opacity="0.5"/>
                <polygon points="25,90 75,90 60,120 40,120" fill="url(#facet-light)" stroke="#f3e5ab" stroke-width="0.5"/>
                <polygon points="50,90 75,90 60,120 50,120" fill="url(#facet-dark)" opacity="0.7"/>
                <polygon points="40,25 60,25" stroke="#f3e5ab" stroke-width="1"/>
            </g>
        </defs>

        <circle cx="500" cy="380" r="180" fill="rgba(212,175,55,0.05)" filter="blur(15px)" />
        <g id="dharma-wheel-container"></g>


        <g id="altar-area" transform="translate(0, -20)">
            <g filter="url(#fine-glow)">
                <ellipse cx="500" cy="950" rx="180" ry="15" fill="#010103" opacity="0.8" filter="blur(5px)"/>
                <path d="M 320,950 Q 500,965 680,950" fill="none" stroke="var(--gold-solid)" stroke-width="1.5" opacity="0.8"/>
                <path d="M 340,958 Q 500,970 660,958" fill="none" stroke="var(--gold-light)" stroke-width="0.8" opacity="0.5"/>
            </g>

            <use href="#treasure-vase" x="350" y="810" transform="scale(1.1)" />
            <use href="#treasure-vase" x="363" y="775" transform="scale(1.25)" />
            <use href="#treasure-vase" x="468" y="810" transform="scale(1.1)" />
        </g>
    </svg>

    <script>
        // --- 1. 星空背景 ---
        const canvas = document.getElementById('starCanvas');
        const ctx = canvas.getContext('2d');
        let width, height, stars = [];

        function resize() { width = window.innerWidth; height = window.innerHeight; canvas.width = width; canvas.height = height; }
        window.addEventListener('resize', resize); resize();

        const STAR_COLORS = ['#8ba89c', '#ffffff', '#f3e5ab'];
        for (let i = 0; i < 150; i++) {
            stars.push({ x: (Math.random() - 0.5) * 2000, y: (Math.random() - 0.5) * 2000, z: Math.random() * 2000, color: STAR_COLORS[Math.floor(Math.random() * STAR_COLORS.length)], s: Math.random() * 2.5 + 0.5 });
        }

        function renderStars() {
            ctx.clearRect(0, 0, width, height);
            ctx.globalCompositeOperation = 'screen';
            stars.forEach(s => {
                s.z -= 0.5;
                if (s.z <= 0) { s.z = 2000; s.x = (Math.random() - 0.5) * 2000; s.y = (Math.random() - 0.5) * 2000; }
                let sc = 400 / (400 + s.z);
                let drawY = (height / 2) + s.y * sc;
                if (drawY > height * 0.75) return;
                ctx.beginPath();
                ctx.arc((width / 2) + s.x * sc, drawY, s.s * sc, 0, Math.PI * 2);
                ctx.fillStyle = s.color;
                ctx.globalAlpha = Math.min(1, sc * 2.5) * 0.5;
                ctx.fill();
                ctx.globalAlpha = 1;
            });
            requestAnimationFrame(renderStars);
        }
        renderStars();

        // --- 2. 活水蕩漾引擎 (針對淨瓶中的水面) ---
        // 我們直接操作 SVG 的路徑字串，模擬真實液體的正弦波起伏
        const waterPaths = document.querySelectorAll('.dynamic-water');
        let time = 0;

        function animateWater() {
            time += 0.05;
            waterPaths.forEach((path, index) => {
                // 原水面座標：左上 (40,40) 右上 (60,40) 左下 (25,90) 右下 (75,90)
                // 我們讓 Y=40 的水面產生波浪起伏
                let waveOffsetLeft = Math.sin(time + index) * 2;
                let waveOffsetRight = Math.cos(time + index) * 2;
                
                // 動態重構 Bezier 曲線以表現水的張力
                // M 左上 Q 控制點 右上 L 右下 L 左下 Z
                let d = `M 40,${40 + waveOffsetLeft} 
                         Q 50,${40 + (waveOffsetLeft + waveOffsetRight)/2 + Math.sin(time*1.5)*3} 60,${40 + waveOffsetRight} 
                         L 75,90 L 25,90 Z`;
                path.setAttribute('d', d);
            });
            requestAnimationFrame(animateWater);
        }
        animateWater();

        // --- 3. 核心亮點：純向量 3D 三層轉經輪 (數學投影) ---
        const wheelContainer = document.getElementById('dharma-wheel-container');
        
        // 定義三層法輪的 3D 結構 (由上到下)
        const wheels = [
            { cy: 220, r: 35, h: 50, speed: 0.02 },  // 頂層 (小)
            { cy: 320, r: 50, h: 70, speed: 0.015 }, // 中層 (中)
            { cy: 440, r: 70, h: 90, speed: 0.01 }   // 底層 (大)
        ];

        // 建立法輪基礎 SVG 結構
        let wheelHTML = '';
        
        // 繪製中心金剛軸
        wheelHTML += `<line x1="500" y1="150" x2="500" y2="580" stroke="var(--gold-solid)" stroke-width="6" style="filter: drop-shadow(0 0 10px #f3e5ab);"/>`;
        wheelHTML += `<polygon points="495,150 505,150 500,120" fill="var(--gold-solid)" style="filter: drop-shadow(0 0 10px #f3e5ab);"/>`;

        // 建立每個法輪的圓柱體與旋轉刻痕
        wheels.forEach((w, index) => {
            let rx = w.r;
            let ry = w.r * 0.25; // 產生俯視 3D 透視感
            let topY = w.cy;
            let botY = w.cy + w.h;

            // 圓柱體背部 (暗面)
            wheelHTML += `<path d="M ${500-rx},${topY} A ${rx} ${ry} 0 0 1 ${500+rx},${topY} L ${500+rx},${botY} A ${rx} ${ry} 0 0 0 ${500-rx},${botY} Z" fill="#3a2a00" opacity="0.8"/>`;
            
            // 圓柱體正面 (金屬光澤)
            wheelHTML += `<path d="M ${500-rx},${topY} A ${rx} ${ry} 0 0 0 ${500+rx},${topY} L ${500+rx},${botY} A ${rx} ${ry} 0 0 1 ${500-rx},${botY} Z" fill="url(#wheel-gold)" style="filter: drop-shadow(0 0 8px rgba(212,175,55,0.4));"/>`;
            
            // 法輪頂蓋
            wheelHTML += `<ellipse cx="500" cy="${topY}" rx="${rx}" ry="${ry}" fill="#f3e5ab" stroke="#d4af37" stroke-width="1.5"/>`;
            // 法輪底蓋裝飾緣
            wheelHTML += `<ellipse cx="500" cy="${botY}" rx="${rx}" ry="${ry}" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.7"/>`;

            // 產生旋轉刻文 (動態線條) 的容器
            wheelHTML += `<g id="wheel-lines-${index}" stroke="#010103" stroke-width="2" opacity="0.6"></g>`;
        });

        wheelContainer.innerHTML = wheelHTML;

        // 3D 旋轉引擎：利用三角函數投影到 2D 平面
        let rotationAngle = 0;
        function animateWheels() {
            rotationAngle += 1; // 統一時間軸
            
            wheels.forEach((w, index) => {
                const lineGroup = document.getElementById(`wheel-lines-${index}`);
                let linesHTML = '';
                const numLines = 12; // 法輪上的梵文刻痕數量
                
                for(let i = 0; i < numLines; i++) {
                    // 計算每條刻痕當前的 3D 角度
                    let angle = (rotationAngle * w.speed) + (i * Math.PI * 2 / numLines);
                    angle = angle % (Math.PI * 2);
                    
                    // 只繪製在「正面」的刻痕 (角度介於 0 到 PI 之間)
                    if (angle > 0 && angle < Math.PI) {
                        // X 軸座標投影：R * cos(θ)
                        let x = 500 + (w.r * Math.cos(angle));
                        
                        // Y 軸上下橢圓邊緣的位移：R_y * sin(θ)
                        let yOffset = w.r * 0.25 * Math.sin(angle);
                        
                        // 計算線條粗細與透明度 (越靠近邊緣越細、越淡，表現圓柱體的曲面感)
                        let visibility = Math.sin(angle);
                        let strokeWidth = visibility * 3;
                        let opacity = visibility * 0.7;

                        // 繪製垂直刻痕 (可以想像這是梵字或真言)
                        linesHTML += `<path d="M ${x},${w.cy + yOffset} L ${x},${w.cy + w.h + yOffset}" stroke-width="${strokeWidth}" opacity="${opacity}" />`;
                        
                        // 加一點點莊嚴的金點裝飾在中央
                        linesHTML += `<circle cx="${x}" cy="${w.cy + w.h/2 + yOffset}" r="${visibility*1.5}" fill="#f3e5ab" opacity="${opacity}" stroke="none"/>`;
                    }
                }
                lineGroup.innerHTML = linesHTML;
            });
            requestAnimationFrame(animateWheels);
        }
        animateWheels();

    </script>
</body>
</html>
