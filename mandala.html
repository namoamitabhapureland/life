<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>法界業鏡 ‧ 歷史迴廊</title>
<style>
  :root { --bg: #010204; --gold: #d4af37; --cyan: #8ba89c; }
  * { margin:0; padding:0; box-sizing:border-box; user-select:none; }
  body {
    background: radial-gradient(circle at 50% 0%, #151520 0%, var(--bg) 80%);
    color: #fff; font-family: "PingFang TC", serif; min-height: 100vh;
    display: flex; flex-direction: column; align-items: center; padding: 40px 20px;
    overflow-x: hidden;
  }

  /* 頂部資訊 */
  .header { text-align: center; margin-bottom: 40px; }
  .title { font-size: 1.5rem; color: #f3e5ab; letter-spacing: 8px; margin-bottom: 10px; }
  .sub-info { font-size: 0.85rem; color: var(--cyan); letter-spacing: 2px; }

  /* 能量棒區塊 */
  .energy-section { width: 100%; max-width: 600px; margin-bottom: 60px; position: relative; }
  .bar-container { position: relative; width: 100%; height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; margin-top: 60px; }
  
  /* 會跑動的能量光束 */
  .bar-fill { position: absolute; left: 0; top: -1px; height: 6px; width: 0%; background: linear-gradient(90deg, transparent, #fff, #f3e5ab); box-shadow: 0 0 15px #d4af37; border-radius: 3px; transition: width 2.5s cubic-bezier(0.2, 0.8, 0.2, 1); }

  /* 能量棒上的五個節點圖騰 */
  .node { position: absolute; top: -45px; transform: translateX(-50%) scale(0.5); filter: grayscale(100%) opacity(0.3); transition: all 0.5s ease; display: flex; flex-direction: column; align-items: center; }
  .node.active { filter: grayscale(0%) opacity(1); transform: translateX(-50%) scale(1.1); z-index: 10; }
  .node svg { width: 80px; height: 80px; filter: drop-shadow(0 0 10px rgba(255,255,255,0.2)); }
  .node-score { margin-top: 10px; font-size: 0.75rem; color: var(--gold); font-family: monospace; letter-spacing: 2px; }

  /* 最終分數顯示 */
  .final-score-display { text-align: center; margin-top: 60px; font-size: 3rem; color: #fff; font-family: monospace; text-shadow: 0 0 20px var(--gold); opacity: 0; transition: opacity 1s; }

  /* 歷史統計區塊 */
  .history-section { width: 100%; max-width: 800px; border-top: 1px solid rgba(212,175,55,0.2); padding-top: 40px; text-align: center; }
  .history-title { color: var(--cyan); letter-spacing: 6px; margin-bottom: 30px; font-size: 1.1rem; }
  
  .totem-grid { display: flex; justify-content: center; flex-wrap: wrap; gap: 30px; }
  .totem-card { display: flex; flex-direction: column; align-items: center; background: rgba(255,255,255,0.02); padding: 15px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.05); min-width: 120px; }
  .totem-card svg { width: 100px; height: 100px; }
  .totem-name { font-size: 0.75rem; color: #aaa; letter-spacing: 2px; margin-top: 10px; }
  .totem-count { font-size: 1.2rem; color: var(--gold); font-family: monospace; margin-top: 5px; }

</style>
</head>
<body>

  <div class="header">
    <div class="title">法界業鏡 ‧ 結算迴廊</div>
    <div class="sub-info" id="user-info">行者：妙依 ｜ 創立日：2026-01-01</div>
  </div>

  <div class="energy-section">
    <div style="text-align: center; color: var(--cyan); font-size: 0.85rem; letter-spacing: 3px;">本月清淨百分比</div>
    <div class="bar-container">
      <div class="bar-fill" id="energy-fill"></div>
      <div class="node" id="n1" style="left: 10%;"><svg id="svg1" viewBox="-100 -100 200 200"></svg><div class="node-score">0~20</div></div>
      <div class="node" id="n2" style="left: 30%;"><svg id="svg2" viewBox="-100 -100 200 200"></svg><div class="node-score">21~40</div></div>
      <div class="node" id="n3" style="left: 50%;"><svg id="svg3" viewBox="-100 -100 200 200"></svg><div class="node-score">41~60</div></div>
      <div class="node" id="n4" style="left: 70%;"><svg id="svg4" viewBox="-100 -100 200 200"></svg><div class="node-score">61~80</div></div>
      <div class="node" id="n5" style="left: 90%;"><svg id="svg5" viewBox="-100 -100 200 200"></svg><div class="node-score">81~100</div></div>
    </div>
    <div class="final-score-display" id="final-score">0%</div>
  </div>

  <div class="history-section">
    <div class="history-title">累劫資糧 ‧ 圖騰印記</div>
    <div class="totem-grid">
      <div class="totem-card"><svg id="hs1" viewBox="-100 -100 200 200"></svg><div class="totem-name">一階 ‧ 青琉璃</div><div class="totem-count">× 12</div></div>
      <div class="totem-card"><svg id="hs2" viewBox="-100 -100 200 200"></svg><div class="totem-name">二階 ‧ 綠翡翠</div><div class="totem-count">× 8</div></div>
      <div class="totem-card"><svg id="hs3" viewBox="-100 -100 200 200"></svg><div class="totem-name">三階 ‧ 紫星晶</div><div class="totem-count">× 15</div></div>
      <div class="totem-card"><svg id="hs4" viewBox="-100 -100 200 200"></svg><div class="totem-name">四階 ‧ 橙琥珀</div><div class="totem-count">× 24</div></div>
      <div class="totem-card"><svg id="hs5" viewBox="-100 -100 200 200"></svg><div class="totem-name">五階 ‧ 大千金</div><div class="totem-count">× 61</div></div>
    </div>
  </div>

<script>
  const NS = 'http://www.w3.org/2000/svg';

  /* ── 彩色琉璃曼陀羅 生成引擎 ── */
  function el(tag, attrs={}) {
    const e = document.createElementNS(NS, tag);
    for (const [k,v] of Object.entries(attrs)) e.setAttribute(k, v);
    return e;
  }
  function add(parent, tag, attrs={}) { const e = el(tag, attrs); parent.appendChild(e); return e; }
  
  // 計算多邊形頂點
  function poly(n, r, rotDeg=0) {
    const pts=[], off = -Math.PI/2 + rotDeg*Math.PI/180;
    for(let k=0;k<n;k++){ pts.push([r*Math.cos(2*Math.PI*k/n + off), r*Math.sin(2*Math.PI*k/n + off)]); }
    return pts;
  }

  // 繪製彩色透明玻璃花瓣 (核心)
  function drawGlassPetals(svg, pts, innerPts, baseColor, glowColor) {
    const g = add(svg, 'g');
    for(let i=0; i<pts.length; i++) {
      let next = (i+1) % pts.length;
      // 繪製從圓心到外緣邊緣的透明三角形
      let d = `M 0 0 L ${pts[i][0]} ${pts[i][1]} L ${pts[next][0]} ${pts[next][1]} Z`;
      // 顏色交替，營造光影折射感
      let opacity = i%2===0 ? 0.4 : 0.2;
      add(g, 'path', { d: d, fill: baseColor, stroke: glowColor, 'stroke-width': 0.5, opacity: opacity });
      
      // 內層星芒疊加
      if(innerPts) {
        let dIn = `M 0 0 L ${innerPts[i][0]} ${innerPts[i][1]} L ${innerPts[next][0]} ${innerPts[next][1]} Z`;
        add(g, 'path', { d: dIn, fill: glowColor, stroke: '#fff', 'stroke-width': 0.3, opacity: 0.3, 'mix-blend-mode': 'screen' });
      }
    }
  }

  /* ── 分階定義 5 個琉璃圖騰 ── */
  function renderTotems(svgId, tier) {
    const svg = document.getElementById(svgId);
    if(!svg) return;
    
    // 底座外框
    add(svg, 'circle', {cx:0, cy:0, r:90, fill:'none', stroke:'rgba(255,255,255,0.2)', 'stroke-width':0.5, 'stroke-dasharray':'2 4'});

    if(tier === 1) { // 0-20: 九角青琉璃 (Novenaria)
      let pts = poly(9, 85); let ptsIn = poly(9, 45, 20);
      drawGlassPetals(svg, pts, ptsIn, 'rgba(0, 200, 255, 0.4)', 'rgba(255, 255, 255, 0.6)');
    }
    else if(tier === 2) { // 21-40: 十一角綠翡翠 (Hendecagram)
      let pts = poly(11, 85); let ptsIn = poly(11, 50, 15);
      drawGlassPetals(svg, pts, ptsIn, 'rgba(50, 255, 150, 0.3)', 'rgba(200, 255, 200, 0.6)');
      add(svg, 'circle', {cx:0, cy:0, r:20, fill:'rgba(100,255,150,0.2)', stroke:'#fff', 'stroke-width':1});
    }
    else if(tier === 3) { // 41-60: 雙八角紫星晶 (Twin Ogdoad)
      let pts1 = poly(8, 85, 0); let pts2 = poly(8, 85, 22.5);
      drawGlassPetals(svg, pts1, null, 'rgba(200, 100, 255, 0.3)', 'rgba(255, 180, 255, 0.7)');
      drawGlassPetals(svg, pts2, null, 'rgba(255, 100, 150, 0.3)', 'rgba(255, 255, 255, 0.5)');
    }
    else if(tier === 4) { // 61-80: 十角橙琥珀 (Decalattice)
      let pts = poly(10, 85); let ptsIn = poly(10, 55, 18);
      drawGlassPetals(svg, pts, ptsIn, 'rgba(255, 150, 50, 0.4)', 'rgba(255, 220, 100, 0.8)');
      pts.forEach(p => add(svg, 'circle', {cx:p[0], cy:p[1], r:3, fill:'#fff'}));
    }
    else if(tier === 5) { // 81-100: 十二角大千金 (Dodecasacrum - 滿分彩虹金)
      let pts = poly(12, 85); let ptsIn = poly(12, 45, 15);
      // 滿分加入彩色漸層感
      const g = add(svg, 'g');
      for(let i=0; i<12; i++) {
        let next = (i+1)%12;
        let hue = i * 30; // 0 到 360 彩虹色譜
        let d = `M 0 0 L ${pts[i][0]} ${pts[i][1]} L ${pts[next][0]} ${pts[next][1]} Z`;
        add(g, 'path', { d: d, fill: `hsla(${hue}, 80%, 60%, 0.3)`, stroke: '#f3e5ab', 'stroke-width': 0.8 });
        
        let dIn = `M 0 0 L ${ptsIn[i][0]} ${ptsIn[i][1]} L ${ptsIn[next][0]} ${ptsIn[next][1]} Z`;
        add(g, 'path', { d: dIn, fill: `hsla(${hue+180}, 80%, 70%, 0.4)`, stroke: '#fff', 'stroke-width': 0.5 });
      }
      add(svg, 'circle', {cx:0, cy:0, r:15, fill:'#fff', filter:'drop-shadow(0 0 10px #fff)'});
    }
  }

  // 渲染節點與歷史圖騰
  for(let i=1; i<=5; i++) {
    renderTotems(`svg${i}`, i); // 渲染能量棒上的圖騰
    renderTotems(`hs${i}`, i);  // 渲染歷史紀錄的小圖騰
  }

  /* ── 互動：當月結算能量跑動 ── */
  window.onload = () => {
    // 假設系統經過完美比例換算後，行者本月得分為 88%
    const finalScore = 88; 
    
    // 延遲啟動動畫，製造期待感
    setTimeout(() => {
      const fillBar = document.getElementById('energy-fill');
      const scoreText = document.getElementById('final-score');
      
      // 光軌跑動
      fillBar.style.width = finalScore + '%';
      
      // 數字滾動效果
      let currentNum = 0;
      let timer = setInterval(() => {
        currentNum += 2;
        if(currentNum >= finalScore) { currentNum = finalScore; clearInterval(timer); }
        scoreText.innerText = currentNum + '%';
        scoreText.style.opacity = 1;

        // 沿途點亮圖騰 (依照 20, 40, 60, 80, 100 刻度)
        if(currentNum >= 10) document.getElementById('n1').classList.add('active');
        if(currentNum >= 30) document.getElementById('n2').classList.add('active');
        if(currentNum >= 50) document.getElementById('n3').classList.add('active');
        if(currentNum >= 70) document.getElementById('n4').classList.add('active');
        if(currentNum >= 90) document.getElementById('n5').classList.add('active'); // 88分不會點亮第五個，以此類推

      }, 50);

      // 最後把最終達標的那個圖騰放大發光 (這裡以判斷階級為例)
      setTimeout(() => {
        let activeTier = Math.ceil(finalScore / 20); // 88/20 = 4.4 -> 階級5
        if(activeTier < 1) activeTier = 1;
        
        let targetNode = document.getElementById(`n${activeTier}`);
        if(targetNode) {
          targetNode.style.transform = 'translateX(-50%) scale(1.6)';
          targetNode.style.filter = 'drop-shadow(0 0 25px rgba(255,255,255,0.8))';
          targetNode.style.zIndex = '20';
        }
      }, 2500); // 等待跑動結束

    }, 500);
  };

</script>
</body>
</html>
