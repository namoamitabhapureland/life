<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>華藏月相 ‧ 集氣與業鏡流轉</title>
    <style>
        :root { --bg: #010204; --gold: #f3e5ab; --solid: #d4af37; --cyan: #8ba89c; }
        body { margin: 0; background: var(--bg); overflow: hidden; font-family: "PingFang TC", serif; color: #fff; height: 100dvh; user-select: none; -webkit-touch-callout: none; }
        
        /* 3D 星空畫布 */
        canvas { position: absolute; inset: 0; z-index: 0; pointer-events: none; }

        /* 異光閃爍層 (紅綠紫銀) */
        #color-flash { position: absolute; inset: 0; z-index: 5; pointer-events: none; opacity: 0; transition: background 0.1s, opacity 0.1s; }

        /* ══════ 第一階段：互動 UI ══════ */
        #ui-layer { position: absolute; inset: 0; z-index: 10; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: opacity 1s; }
        #hint-text { font-size: 1rem; color: var(--cyan); letter-spacing: 5px; margin-bottom: 50px; text-shadow: 0 0 10px rgba(139,168,156,0.5); transition: color 0.3s; }

        .btn-wrapper { position: relative; width: 220px; height: 220px; display: flex; justify-content: center; align-items: center; }

        /* 能量圓框 */
        #energy-ring {
            position: absolute; inset: 0; border-radius: 50%;
            background: conic-gradient(from 0deg, #ff4d4d, #ffb703, #80ed99, #00e5ff, #d8b4fe, #ff4d4d);
            animation: spin 3s linear infinite;
            -webkit-mask: radial-gradient(transparent 62%, black 63%);
            mask: radial-gradient(transparent 62%, black 63%);
            opacity: 0.7; transition: all 0.3s ease;
        }
        #energy-ring.is-gold {
            background: conic-gradient(from 0deg, #d4af37, #fff, #f3e5ab, #d4af37, #fff, #d4af37);
            animation: spin 1s linear infinite; opacity: 1; filter: drop-shadow(0 0 15px var(--solid));
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* 毛玻璃浮雕按鈕 */
        #glass-btn {
            position: relative; z-index: 5; overflow: hidden;
            width: 170px; height: 170px; border-radius: 50%;
            display: flex; justify-content: center; align-items: center; cursor: pointer;
            background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(243, 229, 171, 0.2);
            box-shadow: inset 0 4px 20px rgba(255, 255, 255, 0.08), inset 0 -4px 20px rgba(0, 0, 0, 0.8), 0 15px 35px rgba(0, 0, 0, 0.9), 0 0 20px rgba(139,168,156,0.1);
            transition: transform 0.15s cubic-bezier(0.4, 0, 0.2, 1);
        }
        #glass-btn:active { transform: scale(0.95); box-shadow: inset 0 8px 25px rgba(0, 0, 0, 0.8), inset 0 -2px 10px rgba(255, 255, 255, 0.05), 0 5px 15px rgba(0, 0, 0, 0.9); }

        /* 集氣漸層填滿 (由下而上) */
        #charge-fill { position: absolute; bottom: 0; left: 0; width: 100%; height: 0%; background: linear-gradient(0deg, rgba(212,175,55,0.8) 0%, rgba(243,229,171,0.9) 100%); transition: height 0.05s linear; z-index: 1; opacity: 0.9; }
        
        #hands-svg { position: relative; z-index: 10; width: 70px; height: 112px; filter: drop-shadow(0 0 8px rgba(212,175,55,0.8)); pointer-events: none; }

        /* ══════ 第二階段：懸念與混亂 ══════ */
        #chaos-layer { position: absolute; inset: 0; z-index: 20; display: none; overflow: hidden; pointer-events: none; }
        
        #chaos-number { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 5rem; font-weight: bold; font-family: monospace; letter-spacing: 8px; color: #fff; text-shadow: 0 0 30px var(--solid); z-index: 30; }
        
        #chaos-svg-container { position: absolute; width: 250px; height: 250px; transition: all 0.4s cubic-bezier(0.1, 0.8, 0.3, 1); display: flex; justify-content: center; align-items: center; filter: drop-shadow(0 0 20px rgba(212,175,55,0.6)); }
        #chaos-svg-container svg { width: 100%; height: 100%; }
        
        /* 隱藏庫 */
        #svg-lib { display: none; }
    </style>
</head>
<body oncontextmenu="return false;">

<canvas id="starCanvas"></canvas>
<div id="color-flash"></div>

<div id="svg-lib">
    <svg id="svg-1" viewBox="-150 -150 300 300"><circle cx="0" cy="0" r="55" fill="rgba(139,168,156,0.1)"/><g stroke="#8ba89c" stroke-width="1.2" fill="rgba(139,168,156,0.05)"><polygon points="0,-45 45,0 0,45 -45,0" stroke-width="2"/><polygon points="0,-25 25,0 0,25 -25,0" fill="rgba(139,168,156,0.2)"/><line x1="0" y1="-65" x2="0" y2="65" /><line x1="-65" y1="0" x2="65" y2="0" /><circle cx="0" cy="0" r="65" fill="none" stroke-width="0.8"/></g></svg>
    <svg id="svg-2" viewBox="-150 -150 300 300"><circle cx="0" cy="0" r="70" fill="rgba(243,229,171,0.1)"/><g stroke="#8ba89c" stroke-width="1" fill="none"><rect x="-45" y="-45" width="90" height="90" /><rect x="-45" y="-45" width="90" height="90" transform="rotate(45)" /><line x1="-45" y1="-45" x2="45" y2="45" /><line x1="-45" y1="45" x2="45" y2="-45" /><line x1="0" y1="-63.6" x2="0" y2="63.6" /><line x1="-63.6" y1="0" x2="63.6" y2="0" /></g><polygon points="0,-25 25,0 0,25 -25,0" fill="rgba(243,229,171,0.2)" stroke="#d4af37" stroke-width="1"/></svg>
    <svg id="svg-3" viewBox="-150 -150 300 300"><circle cx="0" cy="0" r="80" fill="rgba(243,229,171,0.1)"/><g stroke="#f3e5ab" stroke-width="1.2" fill="none"><polygon points="0,-75 65,37.5 -65,37.5" /><polygon points="0,75 65,-37.5 -65,-37.5" /><polygon points="-75,0 37.5,65 37.5,-65" /><polygon points="75,0 -37.5,65 -37.5,-65" /></g><circle cx="0" cy="0" r="75" fill="none" stroke="#f3e5ab" stroke-width="0.8"/><circle cx="0" cy="0" r="37.5" fill="none" stroke="#d4af37" stroke-width="1.5"/></svg>
    <svg id="svg-4" viewBox="-150 -150 300 300"><circle cx="0" cy="0" r="95" fill="rgba(212,175,55,0.1)"/><g stroke="#d4af37" stroke-width="1.5" fill="none"><polygon points="0,-85 73.6,-42.5 73.6,42.5 0,85 -73.6,42.5 -73.6,-42.5" /><polygon points="0,-85 73.6,-42.5 73.6,42.5 0,85 -73.6,42.5 -73.6,-42.5" transform="rotate(30)" /></g><g stroke="#f3e5ab" stroke-width="0.8" fill="none"><line x1="0" y1="0" x2="0" y2="-85" /><line x1="0" y1="0" x2="0" y2="85" /><line x1="0" y1="0" x2="73.6" y2="-42.5" /><line x1="0" y1="0" x2="-73.6" y2="42.5" /><line x1="0" y1="0" x2="73.6" y2="42.5" /><line x1="0" y1="0" x2="-73.6" y2="-42.5" /><polygon points="0,-70 60.6,35 -60.6,35" stroke="#fff" stroke-width="1.5"/><polygon points="0,70 60.6,-35 -60.6,-35" stroke="#fff" stroke-width="1.5"/></g></svg>
    <svg id="svg-5" viewBox="-150 -150 300 300" style="filter: drop-shadow(0 0 15px rgba(212,175,55,0.8));"><circle cx="0" cy="0" r="105" fill="rgba(212,175,55,0.15)"/><g stroke="#d4af37" stroke-width="1.5" fill="none"><polygon points="0,-105 74.2,-74.2 105,0 74.2,74.2 0,105 -74.2,74.2 -105,0 -74.2,-74.2" /><polygon points="0,-105 105,0 0,105 -105,0" /><polygon points="74.2,-74.2 74.2,74.2 -74.2,74.2 -74.2,-74.2" /></g><g stroke="#fff" stroke-width="1.2" fill="none"><polygon points="0,-50 35.4,-35.4 50,0 35.4,35.4 0,50 -35.4,35.4 -50,0 -35.4,-35.4" stroke-width="2"/><line x1="0" y1="-105" x2="0" y2="105" /><line x1="-105" y1="0" x2="105" y2="0" /><line x1="-74.2" y1="-74.2" x2="74.2" y2="74.2" /><line x1="-74.2" y1="74.2" x2="74.2" y2="-74.2" /></g></svg>
</div>

<div id="ui-layer">
    <div id="hint-text">待金光化現 ‧ 默念佛號集氣</div>
    
    <div class="btn-wrapper">
        <div id="energy-ring"></div>
        <div id="glass-btn" onmousedown="startCharge()" onmouseup="stopCharge()" onmouseleave="stopCharge()" ontouchstart="startCharge()" ontouchend="stopCharge()">
            <div id="charge-fill"></div> <svg id="hands-svg" viewBox="0 0 200 320">
                <path d="M 100 25 C 97 18, 93 20, 92 30 L 62 165 C 55 190, 40 230, 10 245 L 30 275 C 65 265, 85 245, 100 225 C 115 245, 135 265, 170 275 L 190 245 C 160 230, 145 190, 138 165 L 108 30 C 107 20, 103 18, 100 25 Z" fill="rgba(243, 229, 171, 0.15)"/>
                <path d="M 138 165 L 108 30 C 107 20, 103 18, 100 25 C 97 18, 93 20, 92 30 L 62 165 M 30 275 C 65 265, 85 245, 100 225 C 115 245, 135 265, 170 275" fill="none" stroke="var(--gold)" stroke-width="6" stroke-linejoin="round"/>
                <path d="M 62 165 C 55 190, 40 230, 10 245" fill="none" stroke="var(--gold)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M 138 165 C 145 190, 160 230, 190 245" fill="none" stroke="var(--gold)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M 0 240 Q 37.5 265, 75 240" fill="none" stroke="var(--gold)" stroke-width="6" stroke-linecap="round" transform="rotate(40, 37.5, 240)"/>
                <path d="M 5 232 Q 41.5 257, 78 232" fill="none" stroke="var(--gold)" stroke-width="6" stroke-linecap="round" transform="rotate(40, 37.5, 240)"/>
                <path d="M 200 240 Q 162.5 265, 125 240" fill="none" stroke="var(--gold)" stroke-width="6" stroke-linecap="round" transform="rotate(-40, 162.5, 240)"/>
                <path d="M 195 232 Q 158.5 257, 122 232" fill="none" stroke="var(--gold)" stroke-width="6" stroke-linecap="round" transform="rotate(-40, 162.5, 240)"/>
                <path d="M 96 23 C 98 25, 98 32, 94 34" stroke="var(--gold)" stroke-width="3" fill="none"/>
                <path d="M 104 23 C 102 25, 102 32, 106 34" stroke="var(--gold)" stroke-width="3" fill="none"/>
                <path d="M 100 25 L 100 160" stroke="var(--gold)" stroke-width="4" stroke-linecap="round" fill="none"/>
                <path d="M 100 195 L 100 225" stroke="var(--gold)" stroke-width="4" stroke-linecap="round" fill="none"/>
                <path d="M 136 175 C 125 155, 110 152, 102 155" stroke="var(--gold)" stroke-width="6" fill="none" stroke-linecap="round"/>
                <path d="M 63 170 C 80 155, 95 152, 112 158 C 118 160, 120 170, 115 175 C 95 188, 75 198, 63 215" stroke="var(--gold)" stroke-width="6" stroke-linejoin="round" stroke-linecap="round" fill="none"/>
                <path d="M 103 162 C 109 159, 113 161, 113 166 C 109 169, 103 167, 103 162 Z" stroke="var(--gold)" stroke-width="3" fill="none"/>
                <path d="M 105 182 Q 125 218 138 210" stroke="var(--gold)" stroke-width="5" stroke-linecap="round" fill="none"/>
            </svg>
        </div>
    </div>
</div>

<div id="chaos-layer">
    <div id="chaos-svg-container"></div>
    <div id="chaos-number">000</div>
</div>

<script>
    // --- 星空引擎 ---
    const cvs = document.getElementById('starCanvas');
    const ctx = cvs.getContext('2d');
    let cw, ch, stars = [];
    let warpSpeed = 1.5;

    function initStars() {
        cw = cvs.width = window.innerWidth; ch = cvs.height = window.innerHeight;
        stars = Array.from({length: 250}, () => ({ x: (Math.random()-0.5)*2000, y: (Math.random()-0.5)*2000, z: Math.random()*2000, c: '#8ba89c' }));
    }
    function drawStars() {
        ctx.fillStyle = 'rgba(1, 2, 4, 0.4)'; ctx.fillRect(0, 0, cw, ch); ctx.globalCompositeOperation = 'screen';
        stars.forEach(s => {
            s.z -= warpSpeed; if(s.z<=0) { s.z=2000; s.x=(Math.random()-0.5)*2000; s.y=(Math.random()-0.5)*2000; }
            let sc = 600 / (600 + s.z), px = cw/2 + s.x*sc, py = ch/2 + s.y*sc;
            if(px>0 && px<cw && py>0 && py<ch) {
                ctx.fillStyle = s.c; ctx.globalAlpha = Math.min(1, sc*2); ctx.beginPath(); ctx.arc(px, py, 1.5*sc, 0, Math.PI*2); ctx.fill();
            }
        });
        ctx.globalAlpha = 1; ctx.globalCompositeOperation = 'source-over'; requestAnimationFrame(drawStars);
    }
    window.addEventListener('resize', initStars); initStars(); drawStars();

    // --- 第一階段：能量圈與集氣邏輯 ---
    const ring = document.getElementById('energy-ring');
    const hint = document.getElementById('hint-text');
    const chargeFill = document.getElementById('charge-fill');
    
    let isGold = false;
    let isPhaseOne = true;
    let cycleTimer;
    let chargeTimer;
    let chargeProgress = 0; // 0 to 100

    function runRingCycle() {
        if (!isPhaseOne) return;
        
        isGold = false;
        ring.classList.remove('is-gold');
        hint.innerText = "待金光化現 ‧ 默念佛號集氣";
        hint.style.color = "var(--cyan)";

        // 彩色維持 2~4 秒
        let waitTime = 2000 + Math.random() * 2000;
        cycleTimer = setTimeout(() => {
            if (!isPhaseOne) return;
            
            isGold = true;
            ring.classList.add('is-gold');
            hint.innerText = "金光現！長按默念集氣";
            hint.style.color = "var(--gold)";

            // 金色只維持短短的 1.2 ~ 1.8 秒，錯過就沒了
            let goldTime = 1200 + Math.random() * 600;
            cycleTimer = setTimeout(() => {
                if (isGold && isPhaseOne && chargeProgress === 0) runRingCycle(); 
            }, goldTime);

        }, waitTime);
    }
    setTimeout(runRingCycle, 1000);

    function startCharge() {
        if (!isPhaseOne) return;
        if (!isGold) {
            hint.innerText = "時機未到，心念勿亂";
            hint.style.color = "#ff4d4d";
            ring.style.opacity = '0'; setTimeout(() => ring.style.opacity='0.7', 200);
            return;
        }
        
        // 開始集氣，暫停變色循環
        clearTimeout(cycleTimer);
        hint.innerText = "南無阿彌陀佛... 保持安住";
        hint.style.color = "var(--solid)";

        chargeTimer = setInterval(() => {
            chargeProgress += 2; // 每 30ms 增加 2%，約需 1.5 秒充滿
            chargeFill.style.height = chargeProgress + "%";
            
            if (chargeProgress >= 100) {
                clearInterval(chargeTimer);
                triggerPhaseTwo();
            }
        }, 30);
    }

    function stopCharge() {
        if (!isPhaseOne || chargeProgress >= 100) return;
        // 放開太早，集氣失敗
        clearInterval(chargeTimer);
        if (chargeProgress > 0) {
            chargeProgress = 0;
            chargeFill.style.height = "0%";
            hint.innerText = "心念中斷，集氣散失";
            hint.style.color = "#ff4d4d";
            runRingCycle(); // 重新進入循環
        }
    }

    // --- 第二階段：業鏡混亂流轉 ---
    const svgs = [
        document.getElementById('svg-1').outerHTML,
        document.getElementById('svg-2').outerHTML,
        document.getElementById('svg-3').outerHTML,
        document.getElementById('svg-4').outerHTML,
        document.getElementById('svg-5').outerHTML
    ];

    function triggerPhaseTwo() {
        isPhaseOne = false;
        
        // 1. UI 消失
        document.getElementById('ui-layer').style.opacity = '0';
        
        // 2. 星空不再移動，保留背景
        warpSpeed = 0; 
        
        setTimeout(() => {
            document.getElementById('ui-layer').style.display = 'none';
            document.getElementById('chaos-layer').style.display = 'block';
            runChaos();
        }, 1000);
    }

    function runChaos() {
        const numEl = document.getElementById('chaos-number');
        const svgContainer = document.getElementById('chaos-svg-container');
        const flashLayer = document.getElementById('color-flash');
        
        const flashColors = [
            'rgba(255, 77, 77, 0.25)',  // 紅
            'rgba(128, 237, 153, 0.25)',// 綠
            'rgba(216, 180, 254, 0.25)',// 紫
            'rgba(255, 255, 255, 0.3)'  // 銀白
        ];

        // 時間拉長：狂跳 8 秒
        let rollTime = 8000; 
        let startTime = Date.now();
        
        let chaosTimer = setInterval(() => {
            let elapsed = Date.now() - startTime;
            if (elapsed >= rollTime) {
                clearInterval(chaosTimer);
                alert("測試：階段二結束！\n(接下來這裡會進入鎖定分數與陣法的階段，我們下一次再做。)");
                return;
            }

            // 1. 三位數字亂跳
            numEl.innerText = Math.floor(Math.random() * 1000).toString().padStart(3, '0');

            // 2. 5張圖切換，並且到處飛 (左上、右上、變大變小、轉動)
            svgContainer.innerHTML = svgs[Math.floor(Math.random() * 5)];
            
            // 隨機位置 (限制在畫布內)
            let randomTop = 10 + Math.random() * 60; // 10% to 70%
            let randomLeft = 10 + Math.random() * 60; 
            // 隨機大小與旋轉
            let randomScale = 0.5 + Math.random() * 1.2;
            let randomRotate = Math.floor(Math.random() * 360);

            svgContainer.style.top = randomTop + '%';
            svgContainer.style.left = randomLeft + '%';
            svgContainer.style.transform = `scale(${randomScale}) rotate(${randomRotate}deg)`;

            // 3. 異光閃爍 (紅綠紫銀)
            flashLayer.style.background = flashColors[Math.floor(Math.random() * flashColors.length)];
            flashLayer.style.opacity = '1';
            setTimeout(() => { flashLayer.style.opacity = '0'; }, 100);

        }, 250); // 每 0.25 秒變換一次，製造強烈的混沌感
    }
</script>
</body>
</html>
