<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>琉璃淨瓶供瓶示範</title>
    <style>
        body {
            background-color: #f0e6d6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
        }
        .altar {
            display: flex;
            align-items: flex-end;
            gap: 20px;
        }
        .vessel-container {
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="altar">
        <div class="vessel-container">
            <svg class="w-vessel" width="100" height="150" viewBox="0 0 100 150">
                <defs>
                    <linearGradient id="glassGradLeft" x1="0%" y1="0%" x2="0%" y2="100%">
                        <stop offset="0%" style="stop-color:#87CEEB;stop-opacity:0.8" />
                        <stop offset="100%" style="stop-color:#4682B4;stop-opacity:0.9" />
                    </linearGradient>
                    <linearGradient id="waterGrad" x1="0%" y1="0%" x2="0%" y2="100%">
                        <stop offset="0%" style="stop-color:#B0E0E6;stop-opacity:0.7" />
                        <stop offset="100%" style="stop-color:#4682B4;stop-opacity:0.8" />
                    </linearGradient>
                </defs>
                <path d="M20,10 C20,10 10,20 10,40 C10,60 20,70 30,75 L30,120 C30,130 40,140 50,140 C60,140 70,130 70,120 L70,75 C80,70 90,60 90,40 C90,20 80,10 80,10 Z" fill="url(#glassGradLeft)" stroke="#333" stroke-width="1"/>
                <path d="M30,110 Q50,105 70,110 L70,120 C70,130 60,140 50,140 C40,140 30,130 30,120 Z" fill="url(#waterGrad)">
                    <animate attributeName="d" dur="3s" repeatCount="indefinite" values="M30,110 Q50,105 70,110 L70,120 C70,130 60,140 50,140 C40,140 30,130 30,120 Z; M30,110 Q50,115 70,110 L70,120 C70,130 60,140 50,140 C40,140 30,130 30,120 Z; M30,110 Q50,105 70,110 L70,120 C70,130 60,140 50,140 C40,140 30,130 30,120 Z"/>
                </path>
            </svg>
        </div>

        <div class="vessel-container">
            <svg class="f-vessel" width="150" height="200" viewBox="0 0 150 200">
                <defs>
                    <linearGradient id="glassGradCenter" x1="0%" y1="0%" x2="0%" y2="100%">
                        <stop offset="0%" style="stop-color:#FFD700;stop-opacity:0.8" />
                        <stop offset="100%" style="stop-color:#FFA500;stop-opacity:0.9" />
                    </linearGradient>
                </defs>
                <line x1="75" y1="90" x2="75" y2="160" stroke="#228B22" stroke-width="2"/>
                <line x1="75" y1="100" x2="55" y2="80" stroke="#228B22" stroke-width="1.5"/>
                <line x1="75" y1="110" x2="95" y2="90" stroke="#228B22" stroke-width="1.5"/>
                <circle cx="75" cy="70" r="15" fill="#FFC0CB" stroke="#C71585" stroke-width="1"/>
                <circle cx="75" cy="70" r="5" fill="#FFFF00"/>
                <circle cx="50" cy="75" r="10" fill="#D8BFD8" stroke="#8B008B" stroke-width="1"/>
                <circle cx="100" cy="85" r="8" fill="#E6E6FA" stroke="#4B0082" stroke-width="1"/>
                <path d="M30,15 C30,15 15,30 15,60 C15,90 30,105 45,112 L45,180 C45,195 60,210 75,210 C90,210 105,195 105,180 L105,112 C115,105 135,90 135,60 C135,30 120,15 120,15 Z" fill="url(#glassGradCenter)" stroke="#333" stroke-width="1" transform="translate(0, -10)"/>
            </svg>
        </div>

        <div class="vessel-container">
            <svg class="w-vessel" width="100" height="150" viewBox="0 0 100 150">
                <defs>
                    <linearGradient id="glassGradRight" x1="0%" y1="0%" x2="0%" y2="100%">
                        <stop offset="0%" style="stop-color:#87CEEB;stop-opacity:0.8" />
                        <stop offset="100%" style="stop-color:#4682B4;stop-opacity:0.9" />
                    </linearGradient>
                    </defs>
                <path d="M20,10 C20,10 10,20 10,40 C10,60 20,70 30,75 L30,120 C30,130 40,140 50,140 C60,140 70,130 70,120 L70,75 C80,70 90,60 90,40 C90,20 80,10 80,10 Z" fill="url(#glassGradRight)" stroke="#333" stroke-width="1"/>
                <path d="M30,110 Q50,105 70,110 L70,120 C70,130 60,140 50,140 C40,140 30,130 30,120 Z" fill="url(#waterGrad)">
                    <animate attributeName="d" dur="3s" repeatCount="indefinite" values="M30,110 Q50,105 70,110 L70,120 C70,130 60,140 50,140 C40,140 30,130 30,120 Z; M30,110 Q50,115 70,110 L70,120 C70,130 60,140 50,140 C40,140 30,130 30,120 Z; M30,110 Q50,105 70,110 L70,120 C70,130 60,140 50,140 C40,140 30,130 30,120 Z"/>
                </path>
            </svg>
        </div>
    </div>
</body>
</html>
