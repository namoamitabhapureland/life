<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>五位階終極曼陀羅矩陣 × 基礎白蓮測試</title>
<style>
    body {
        background-color: #050403;
        color: #d4a824;
        font-family: 'Palatino Linotype', 'Book Antiqua', 'PingFang TC', 'Microsoft JhengHei', serif;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
        padding: 40px;
        flex-wrap: wrap;
        gap: 50px;
    }
    .lotus-card {
        display: flex;
        flex-direction: column;
        align-items: center;
        background: rgba(15, 10, 5, 0.6);
        border: 1px solid rgba(212, 168, 36, 0.15);
        border-radius: 12px;
        padding: 30px 20px;
        width: 170px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.8);
    }
    .svg-container {
        width: 150px;
        height: 150px;
        margin-bottom: 24px;
    }
    .rank-label {
        font-size: 15px;
        letter-spacing: 0.25em;
        opacity: 0.9;
        text-shadow: 0 2px 4px rgba(0,0,0,1);
    }
    .desc {
        font-size: 11px;
        color: #888;
        margin-top: 8px;
        letter-spacing: 0.1em;
    }
</style>
</head>
<body>

<script>
// ── 妙依主系統完全相容替換版：getLotusSVG ──
function getLotusSVG(rankType, nianCount = 0, overrideLevel = null) {
    const safeRank = rankType || ""; 
    
    let nLevel = 1;
    if (overrideLevel !== null) {
        nLevel = Math.max(1, Math.min(overrideLevel, 10)); 
    } else {
        if (nianCount >= 100000000) nLevel = 10;      
        else if (nianCount >= 10000000) nLevel = 9;   
        else if (nianCount >= 1000000) nLevel = 8;    
        else if (nianCount >= 500000) nLevel = 7;     
        else if (nianCount >= 100000) nLevel = 6;     
        else if (nianCount >= 10000) nLevel = 5;      
        else if (nianCount >= 5000) nLevel = 4;       
        else if (nianCount >= 500) nLevel = 3;        
        else if (nianCount >= 10) nLevel = 2;         
        else nLevel = 1;                              
    }

    const cx = 50, cy = 50;
    const id = `svg-${Math.random().toString(36).substr(2, 5)}`; 

    function P(r0, r1, hw, bulge, shape) {
        const bx = cx, by = cy - r0, tx = cx, ty = cy - r1;
        const my = cy - (r0 + r1) / 2;
        if (shape === 'slim') return `M${bx - hw * .7} ${by} C${bx - bulge * .75} ${my} ${tx - 1.5} ${ty + 3} ${tx} ${ty} C${tx + 1.5} ${ty + 3} ${bx + bulge * .75} ${my} ${bx + hw * .7} ${by}Z`;
        if (shape === 'wide') return `M${bx - hw} ${by} C${bx - bulge * 1.35} ${my + 4} ${tx - bulge * .45} ${ty + 7} ${tx} ${ty} C${tx + bulge * .45} ${ty + 7} ${bx + bulge * 1.35} ${my + 4} ${bx + hw} ${by}Z`;
        return `M${bx - hw} ${by} C${bx - bulge} ${my} ${tx - bulge * .3} ${ty + 5} ${tx} ${ty} C${tx + bulge * .3} ${ty + 5} ${bx + bulge} ${my} ${bx + hw} ${by}Z`;
    }

    function rotatedPetals(n, r0, r1, hw, bulge, shape, fill, op, offset = 0) {
        let s = '';
        for (let i = 0; i < n; i++) {
            const a = i * (360 / n) + offset;
            s += `<path d="${P(r0, r1, hw, bulge, shape)}" fill="${fill}" opacity="${op}" transform="rotate(${a} ${cx} ${cy})"/>`;
        }
        return s;
    }

    // 微型向量幾何引擎
    function pt(n, r, deg=0) {
        let pts=[], off = -Math.PI/2 + deg*Math.PI/180;
        for(let k=0;k<n;k++) pts.push([r*Math.cos(2*Math.PI*k/n + off), r*Math.sin(2*Math.PI*k/n + off)]);
        return pts;
    }
    function st(n, r1, r2, deg=0) {
        let pts=[], off=-Math.PI/2+deg*Math.PI/180;
        for(let k=0;k<2*n;k++) {
            let r=k%2===0?r1:r2;
            pts.push([r*Math.cos(Math.PI*k/n+off), r*Math.sin(Math.PI*k/n+off)]);
        }
        return pts;
    }
    function pStr(pts) { return pts.map(p=>p[0].toFixed(2)+','+p[1].toFixed(2)).join(' '); }
    function K(pts, stroke, sw, op) {
        let s='';
        for(let i=0;i<pts.length;i++) for(let j=i+1;j<pts.length;j++) s+=`<line x1="${pts[i][0].toFixed(2)}" y1="${pts[i][1].toFixed(2)}" x2="${pts[j][0].toFixed(2)}" y2="${pts[j][1].toFixed(2)}"/>`;
        return `<g stroke="${stroke}" stroke-width="${sw}" opacity="${op}">${s}</g>`;
    }
    function D(pts, r, fill, op) {
        return `<g opacity="${op}">${pts.map(p=>`<circle cx="${p[0].toFixed(2)}" cy="${p[1].toFixed(2)}" r="${r}" fill="${fill}"/>`).join('')}</g>`;
    }

    // 共用定義與五大位階專屬色彩濾鏡
    const sharedDefs = `
    <defs>
        <filter id="glo${id}" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="2.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
        <filter id="sof${id}" x="-20%" y="-20%" width="140%" height="140%"><feGaussianBlur stdDeviation="1.1" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
        
        <radialGradient id="rg-void" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#111111" stop-opacity="0.95"/><stop offset="70%" stop-color="#0a0500" stop-opacity="0.8"/><stop offset="100%" stop-color="#000000" stop-opacity="0"/>
        </radialGradient>
        <radialGradient id="rg-mandala-base-${id}" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#2a1606"/><stop offset="60%" stop-color="#140a02"/><stop offset="100%" stop-color="#080401"/>
        </radialGradient>
        
        <radialGradient id="rg-glow-faith-${id}" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/><stop offset="25%" stop-color="#ffe6d5" stop-opacity="0.85"/><stop offset="65%" stop-color="#ff9955" stop-opacity="0.25"/><stop offset="100%" stop-color="#cc5500" stop-opacity="0"/>
        </radialGradient>
        <radialGradient id="rg-glow-abiding-${id}" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/><stop offset="25%" stop-color="#fff4cc" stop-opacity="0.85"/><stop offset="65%" stop-color="#ffcc00" stop-opacity="0.2"/><stop offset="100%" stop-color="#aa7700" stop-opacity="0"/>
        </radialGradient>
        <radialGradient id="rg-glow-practice-${id}" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/><stop offset="25%" stop-color="#e6f9ff" stop-opacity="0.85"/><stop offset="65%" stop-color="#33bbff" stop-opacity="0.2"/><stop offset="100%" stop-color="#0066aa" stop-opacity="0"/>
        </radialGradient>
        <radialGradient id="rg-glow-dedication-${id}" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/><stop offset="25%" stop-color="#fae6fa" stop-opacity="0.85"/><stop offset="65%" stop-color="#dd66dd" stop-opacity="0.2"/><stop offset="100%" stop-color="#880088" stop-opacity="0"/>
        </radialGradient>
        <radialGradient id="rg-glow-bhumi-${id}" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/><stop offset="25%" stop-color="#e6ffe6" stop-opacity="0.85"/><stop offset="65%" stop-color="#33cc77" stop-opacity="0.2"/><stop offset="100%" stop-color="#007733" stop-opacity="0"/>
        </radialGradient>
    </defs>`;

    const voidBg = `<circle cx="50" cy="50" r="42" fill="url(#rg-void)"><animate attributeName="r" values="41;43;41" dur="6s" repeatCount="indefinite"/></circle>`;

    let innerSvg = '';
    let glowId = `rg-glow-abiding-${id}`; // 預設

    const isRank = (t) => safeRank.includes(t);

    if (isRank('信') || isRank('Faith')) {
        glowId = `rg-glow-faith-${id}`;
        let o = pt(9,97,0), m = pt(9,70,20), i = pt(9,40,0);
        innerSvg = `
        <polygon points="${pStr(o)}" stroke="#ffcca0" stroke-width="1.2" fill="none" opacity="0.8"/>
        <polygon points="${pStr(m)}" stroke="#ffaa66" stroke-width="0.8" fill="none" opacity="0.6"/>
        ${K(o,'#ffb870',0.3,0.4)}
        ${K(m,'#ff9955',0.4,0.5)}
        <polygon points="${pStr(st(9,97,25,0))}" fill="rgba(255,150,80,0.08)" stroke="#ffe0c0" stroke-width="1.5"/>
        <polygon points="${pStr(i)}" stroke="#ffcc99" stroke-width="1" fill="none" opacity="0.7"/>
        ${K(i,'#ffaa66',0.5,0.6)}
        ${D(o,2,'#ffcca0',0.8)}${D(m,1.5,'#ffb870',0.7)}
        `;
    } else if (isRank('住') || isRank('Abiding')) {
        glowId = `rg-glow-abiding-${id}`;
        let o = pt(10,97,0), p1 = pt(5,80,0), p2 = pt(5,80,36), i = pt(10,45,18);
        innerSvg = `
        <polygon points="${pStr(o)}" stroke="#ffe066" stroke-width="1.2" fill="none" opacity="0.8"/>
        ${K(o,'#ffd633',0.3,0.4)}
        <polygon points="${pStr(p1)}" stroke="#ffcc00" stroke-width="1" fill="rgba(255,200,0,0.05)"/>
        <polygon points="${pStr(p2)}" stroke="#ffcc00" stroke-width="1" fill="rgba(255,200,0,0.05)"/>
        <polygon points="${pStr(st(10,97,20,0))}" fill="none" stroke="#fff0b3" stroke-width="1.5"/>
        ${K(i,'#ffc266',0.5,0.6)}
        ${D(o,2,'#ffe066',0.8)}
        `;
    } else if (isRank('行') || isRank('Practice')) {
        glowId = `rg-glow-practice-${id}`;
        let o = pt(12,97,0), m = pt(12,65,15), i = pt(12,35,0);
        let t1 = pt(3,97,0), t2 = pt(3,97,30), t3 = pt(3,97,60), t4 = pt(3,97,90);
        innerSvg = `
        <polygon points="${pStr(o)}" stroke="#e6ffff" stroke-width="1.2" fill="none" opacity="0.8"/>
        ${K(o,'#99ffff',0.2,0.3)}
        <polygon points="${pStr(t1)}" stroke="#66ccff" stroke-width="1" fill="rgba(100,200,255,0.05)"/>
        <polygon points="${pStr(t2)}" stroke="#66ccff" stroke-width="1" fill="rgba(100,200,255,0.05)"/>
        <polygon points="${pStr(t3)}" stroke="#66ccff" stroke-width="1" fill="rgba(100,200,255,0.05)"/>
        <polygon points="${pStr(t4)}" stroke="#66ccff" stroke-width="1" fill="rgba(100,200,255,0.05)"/>
        <polygon points="${pStr(st(12,97,25,0))}" stroke="#ccffff" stroke-width="1.5" fill="none"/>
        ${K(m,'#33bbff',0.3,0.5)}
        ${K(i,'#99eeff',0.5,0.6)}
        ${D(o,2,'#e6ffff',0.8)}
        `;
    } else if (isRank('迴') || isRank('Dedication')) {
        glowId = `rg-glow-dedication-${id}`;
        let o1 = pt(8,97,0), o2 = pt(8,97,22.5), i1 = pt(8,50,11.25);
        let all = [...o1, ...o2];
        innerSvg = `
        <polygon points="${pStr(o1)}" stroke="#ffccff" stroke-width="1.2" fill="none" opacity="0.8"/>
        <polygon points="${pStr(o2)}" stroke="#ee99ee" stroke-width="1.2" fill="none" opacity="0.8"/>
        ${K(all,'#dd66dd',0.2,0.3)}
        <polygon points="${pStr(st(8,97,20,0))}" stroke="#ffe6ff" stroke-width="1.5" fill="rgba(255,100,255,0.05)"/>
        <polygon points="${pStr(st(8,97,20,22.5))}" stroke="#eebbff" stroke-width="1.2" fill="none"/>
        ${K(i1,'#ee77ee',0.5,0.6)}
        ${D(o1,2,'#ffccff',0.8)}
        ${D(o2,2,'#ee99ee',0.8)}
        `;
    } else if (isRank('地') || isRank('Bhumi')) {
        glowId = `rg-glow-bhumi-${id}`;
        let o = pt(14,97,0), i = pt(14,45,12.85);
        innerSvg = `
        <polygon points="${pStr(o)}" stroke="#ccffcc" stroke-width="1.2" fill="none" opacity="0.8"/>
        ${K(o,'#66dd99',0.18,0.35)}
        <polygon points="${pStr(st(14,97,30,0))}" stroke="#aaffaa" stroke-width="1.5" fill="rgba(100,255,100,0.05)"/>
        ${K(i,'#33cc77',0.4,0.5)}
        <polygon points="${pStr(st(7,45,15,0))}" stroke="#99ff99" stroke-width="1" fill="none"/>
        <polygon points="${pStr(st(7,45,15,25.7))}" stroke="#99ff99" stroke-width="1" fill="none"/>
        ${D(o,2,'#ccffcc',0.8)}
        `;
    }

    let bgContent = '';
    if (innerSvg) {
        bgContent = `
        <circle cx="${cx}" cy="${cy}" r="21.8" fill="url(#rg-mandala-base-${id})" stroke="#b08820" stroke-width="0.8"/>
        <g transform="translate(${cx}, ${cy}) scale(0.193)">
            ${innerSvg}
            <circle cx="0" cy="0" r="32" fill="url(#${glowId})"/>
        </g>
        <circle cx="${cx}" cy="${cy}" r="21.8" fill="none" stroke="#000000" stroke-width="0.5" opacity="0.6"/>
        `;
    } else {
        bgContent = `<circle cx="${cx}" cy="${cy}" r="21.5" fill="url(#rg-mandala-base-${id})" stroke="#f0d060" stroke-width=".7"/>`;
    }

    let lotusContent = '';

    if (nLevel === 1) { 
        lotusContent = `<defs><radialGradient id="lA${id}" cx="50%" cy="75%" r="100%"><stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/><stop offset="100%" stop-color="#cfd8dc" stop-opacity="0.6"/></radialGradient><radialGradient id="lB${id}" cx="50%" cy="65%" r="100%"><stop offset="0%" stop-color="#ffffff" stop-opacity="0.9"/><stop offset="100%" stop-color="#eceff1" stop-opacity="0.7"/></radialGradient></defs>
        ${rotatedPetals(8,22,46,7,11,'round',`url(#lA${id})`,.85)}${rotatedPetals(8,22,38,5.5,8,'round',`url(#lB${id})`,.65,22.5)}`;
    } 

    return `
    <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" style="width:100%; height:100%;">
        ${sharedDefs}${voidBg}${bgContent}
        <g filter="url(#sof${id})">
            ${lotusContent}
            <animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50" dur="40s" repeatCount="indefinite" additive="sum"/>
        </g>
        <circle cx="50" cy="50" r="1.8" fill="#ffffff" opacity=".95" filter="url(#glo${id})"/>
    </svg>`;
}

const ranksToTest = [
    { type: '信', label: '信位底座', desc: '晨曦玫瑰金 ‧ 9角星芒' },
    { type: '住', label: '住位底座', desc: '純粹琥珀金 ‧ 10角安住' },
    { type: '行', label: '行位底座', desc: '流光鉑金青 ‧ 12角動能' },
    { type: '迴', label: '迴向底座', desc: '悲智紫水晶 ‧ 16角雙疊' },
    { type: '地', label: '地位底座', desc: '厚德大地綠 ‧ 14角絕對密網' }
];

ranksToTest.forEach(rank => {
    const card = document.createElement('div');
    card.className = 'lotus-card';

    const svgContainer = document.createElement('div');
    svgContainer.className = 'svg-container';
    svgContainer.innerHTML = getLotusSVG(rank.type, 0, 1);

    const label = document.createElement('div');
    label.className = 'rank-label';
    label.innerText = rank.label;
    
    const desc = document.createElement('div');
    desc.className = 'desc';
    desc.innerText = rank.desc;

    card.appendChild(svgContainer);
    card.appendChild(label);
    card.appendChild(desc);
    document.body.appendChild(card);
});
</script>

</body>
</html>
