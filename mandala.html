<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>華藏月相 ‧ 極致立體幾何</title>
    <style>
        :root {
            --bg: #010204; --gold: #f3e5ab; --solid: #d4af37; --cyan: #8ba89c;
        }
        body { 
            background: var(--bg); color: #fff; margin: 0; overflow: hidden;
            font-family: "PingFang TC", serif; display: flex; flex-direction: column;
            justify-content: center; align-items: center; height: 100dvh;
        }
        #stage { width: 100vw; height: 60vh; position: relative; }
        svg { width: 100%; height: 100%; overflow: visible; }
        
        /* 文字面板：參考您圖中的極簡排版 */
        #ui { text-align: center; z-index: 10; pointer-events: none; }
        .title { font-size: 1.6rem; color: var(--gold); letter-spacing: 8px; margin-bottom: 10px; text-shadow: 0 0 10px rgba(212,175,55,0.5); }
        .desc { font-size: 0.85rem; color: var(--cyan); line-height: 2; max-width: 280px; letter-spacing: 2px; opacity: 0; transition: 2s; }
        
        .btn-wrap { margin-top: 30px; opacity: 0; transition: 1s; pointer-events: auto; }
        .btn {
            background: transparent; border: 1px solid var(--solid); color: var(--gold);
            padding: 10px 40px; font-size: 1rem; cursor: pointer; letter-spacing: 4px;
            transition: 0.3s;
        }
        .btn:hover { background: rgba(212,175,55,0.15); box-shadow: 0 0 20px var(--solid); }

        /* 輝光濾鏡定義 */
        .glow-node { filter: drop-shadow(0 0 3px var(--solid)); }
    </style>
</head>
<body>

<div id="stage">
    <svg id="m-svg" viewBox="-250 -250 500 500">
        <defs>
            <filter id="f-glow">
                <feGaussianBlur stdDeviation="2.5" result="blur" />
                <feComposite in="SourceGraphic" in2="blur" operator="over" />
            </filter>
            <radialGradient id="grad-core" cx="50%" cy="50%" r="50%">
                <stop offset="0%" stop-color="#fff" stop-opacity="0.8"/>
                <stop offset="100%" stop-color="#d4af37" stop-opacity="0"/>
            </radialGradient>
        </defs>
        <g id="g-world"></g>
    </svg>
</div>

<div id="ui">
    <div id="t-main" class="title">法界體檢中</div>
    <div id="t-desc" class="desc"></div>
    <div class="btn-wrap" id="b-wrap">
        <button class="btn" onclick="dedicate()">大迴向</button>
    </div>
</div>

<script>
    const db = JSON.parse(localStorage.getItem('PX_V15.0')) || { lunar: { points: 400 } };
    const points = db.lunar.points || 0; 
    // points = 380; // 測試用分數

    const world = document.getElementById('g-world');
    let angleX = 0, angleY = 0;

    // ══════════════════════════════════════════
    // 3D 幾何生成演算法 (Metatron 變體)
    // ══════════════════════════════════════════
    function initGeometry() {
        const nodes = [];
        // 分數越高，幾何層次與密度越高
        const layers = Math.min(6, Math.floor(points / 60) + 2); 
        const sideCount = Math.min(12, Math.floor(points / 40) + 3);

        for (let l = 1; l <= layers; l++) {
            const r = l * 35;
            for (let i = 0; i < sideCount; i++) {
                const phi = (i / sideCount) * Math.PI * 2;
                // 加入 Z 軸位移，營造 3D 體積感
                const z = (l % 2 === 0 ? 1 : -1) * (l * 10);
                nodes.push({
                    x: Math.cos(phi) * r,
                    y: Math.sin(phi) * r,
                    z: z,
                    id: `${l}-${i}`
                });
            }
        }
        return nodes;
    }

    const nodeList = initGeometry();

    function render() {
        angleY += 0.005; // 緩慢自轉
        angleX += 0.002;
        
        let html = '';
        const projected = nodeList.map(n => {
            // 3D 旋轉矩陣
            let x = n.x, y = n.y, z = n.z;
            // Y 軸旋轉
            let x1 = x * Math.cos(angleY) - z * Math.sin(angleY);
            let z1 = x * Math.sin(angleY) + z * Math.cos(angleY);
            // X 軸旋轉
            let y2 = y * Math.cos(angleX) - z1 * Math.sin(angleX);
            let z2 = y * Math.sin(angleX) + z1 * Math.cos(angleX);
            
            const scale = 400 / (400 + z2); // 透視縮放
            return { x: x1 * scale, y: y2 * scale, z: z2, scale: scale };
        });

        // 1. 繪製因陀羅網連線 (立體交織)
        projected.forEach((p, i) => {
            projected.forEach((p2, j) => {
                if (i >= j) return;
                const dist = Math.hypot(p.x - p2.x, p.y - p2.y);
                // 限制連線距離，產生精密的網格感而非混亂
                if (dist < 80 + (points/5)) { 
                    const op = Math.max(0, 0.4 - dist/200);
                    html += `<line x1="${p.x}" y1="${p.y}" x2="${p2.x}" y2="${p2.y}" stroke="${points > 200 ? '#f3e5ab' : '#8ba89c'}" stroke-width="${0.3 * p.scale}" opacity="${op}"/>`;
                }
            });
        });

        // 2. 繪製能量節點 (亮燈特效)
        projected.forEach(p => {
            const r = 1.5 * p.scale;
            html += `<circle cx="${p.x}" cy="${p.y}" r="${r}" fill="#fff" class="glow-node" opacity="${0.8 + Math.sin(Date.now()/500)*0.2}"/>`;
            if (points > 300) { // 高分者額外獲得節點輝光
                html += `<circle cx="${p.x}" cy="${p.y}" r="${r*3}" fill="url(#grad-core)" opacity="0.3"/>`;
            }
        });

        world.innerHTML = html;
        requestAnimationFrame(render);
    }

    // ══════════════════════════════════════════
    // UI 進場與文案
    // ══════════════════════════════════════════
    function initUI() {
        const tMain = document.getElementById('t-main');
        const tDesc = document.getElementById('t-desc');
        const bWrap = document.getElementById('b-wrap');

        let title = "微塵清淨", desc = "一念初發，法界已種金剛種。";
        if (points > 150) { title = "星輝交感"; desc = "相續不斷，願力如星軌交織。"; }
        if (points > 350) { title = "大千莊嚴"; desc = "悲智雙運，化作無盡幾何法界。"; }

        setTimeout(() => {
            tMain.innerText = title;
            tDesc.innerText = desc;
            tDesc.style.opacity = 1;
            setTimeout(() => bWrap.style.opacity = 1, 1500);
        }, 1000);
    }

    render();
    initUI();

    function dedicate() {
        // 大迴向聲光特效與歸零邏輯
        document.body.style.transition = '3s';
        document.body.style.background = '#fff'; // 瞬間白化（大破）
        setTimeout(() => {
            // 執行數據歸零 (與主系統聯動)
            if (db.lunar) {
                db.lunar.points = 0;
                db.lunar.dailyFlags = {};
                db.lunar.month = new Date().toISOString().slice(0,7);
                localStorage.setItem('PX_V15.0', JSON.stringify(db));
            }
            window.location.href = 'index.html';
        }, 2000);
    }
</script>
</body>
</html>
