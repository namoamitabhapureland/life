<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>幾何曼陀羅 - 覺性向量</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: #050505;
    min-height: 100vh;
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    align-items: center;
    gap: 40px;
    padding: 60px 20px;
  }
  .cell {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
  }
  svg { 
    width: 280px; 
    height: 280px; 
    filter: drop-shadow(0 0 8px rgba(212,168,36,0.15));
  }
  .lbl {
    font-family: 'Palatino', serif;
    font-size: 10px;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: rgba(212,168,36,0.4);
    border-top: 1px solid rgba(212,168,36,0.2);
    padding-top: 8px;
  }
</style>
</head>
<body>

<div class="cell"><svg id="m1" viewBox="-120 -120 240 240"></svg><span class="lbl">Novenaria</span></div>
<div class="cell"><svg id="m2" viewBox="-120 -120 240 240"></svg><span class="lbl">Hendecagram</span></div>
<div class="cell"><svg id="m3" viewBox="-120 -120 240 240"></svg><span class="lbl">Twin Ogdoad</span></div>
<div class="cell"><svg id="m4" viewBox="-120 -120 240 240"></svg><span class="lbl">Decalattice</span></div>
<div class="cell"><svg id="m5" viewBox="-120 -120 240 240"></svg><span class="lbl">Dodecasacrum</span></div>

<script>
(function(){
  const NS = 'http://www.w3.org/2000/svg';

  /* ── 核心工具函數 ────────────────────────────────────── */
  function el(tag, attrs={}) {
    const e = document.createElementNS(NS, tag);
    for (const [k,v] of Object.entries(attrs)) e.setAttribute(k, v);
    return e;
  }
  
  function add(parent, tag, attrs={}) {
    const e = el(tag, attrs); parent.appendChild(e); return e;
  }

  function poly(n, r, rotDeg=0) {
    const pts=[], off = -Math.PI/2 + rotDeg*Math.PI/180;
    for(let k=0;k<n;k++){
      const a = 2*Math.PI*k/n + off;
      pts.push([r*Math.cos(a), r*Math.sin(a)]);
    }
    return pts;
  }

  function ptStr(pts){ return pts.map(p=>p[0].toFixed(3)+','+p[1].toFixed(3)).join(' '); }

  // 繪製全連結圖（每一點連接其他所有點）
  function addFullWeb(parent, pts, attrs) {
    const g = add(parent, 'g', attrs);
    for(let i=0; i<pts.length; i++) {
      for(let j=i+1; j<pts.length; j++) {
        add(g, 'line', {
          x1: pts[i][0], y1: pts[i][1],
          x2: pts[j][0], y2: pts[j][1]
        });
      }
    }
  }

  // 基礎濾鏡與漸層
  function setupDefs(svg, id) {
    const defs = add(svg, 'defs');
    defs.innerHTML = `
      <radialGradient id="${id}_grad" cx="50%" cy="50%" r="50%">
        <stop offset="0%" stop-color="#FFF4D1" stop-opacity="0.8"/>
        <stop offset="100%" stop-color="#D4A824" stop-opacity="0"/>
      </radialGradient>
      <filter id="${id}_glow">
        <feGaussianBlur stdDeviation="1.5" result="blur"/>
        <feComposite in="SourceGraphic" in2="blur" operator="over"/>
      </filter>
    `;
  }

  /* ── 曼陀羅生成邏輯 ───────────────────────────────────── */

  // 共通底座：極簡刻度環
  function drawBase(svg) {
    add(svg, 'circle', {cx:0, cy:0, r:118, fill:'none', stroke:'#D4A824', 'stroke-width':0.2, opacity:0.3});
    for(let i=0; i<72; i++) {
      const a = (i*5)*Math.PI/180;
      const r1 = 115, r2 = 118;
      add(svg, 'line', {
        x1: r1*Math.cos(a), y1: r1*Math.sin(a),
        x2: r2*Math.cos(a), y2: r2*Math.sin(a),
        stroke: '#D4A824', 'stroke-width': 0.3, opacity: 0.5
      });
    }
  }

  // M1: Novenaria (九重之境) - 著重於九角星的交錯
  (function(){
    const svg=document.getElementById('m1'); setupDefs(svg, 'm1'); drawBase(svg);
    const pts = poly(9, 100);
    addFullWeb(svg, pts, {stroke:'#D4A824', 'stroke-width':0.4, opacity:0.6});
    const ptsInner = poly(9, 40, 20);
    addFullWeb(svg, ptsInner, {stroke:'#FFF', 'stroke-width':0.2, opacity:0.3});
    add(svg, 'circle', {r:6, fill:'url(#m1_grad)'});
  })();

  // M2: Hendecagram (十一法界) - 十一邊形的極致細線
  (function(){
    const svg=document.getElementById('m2'); setupDefs(svg, 'm2'); drawBase(svg);
    const pts = poly(11, 100);
    addFullWeb(svg, pts, {stroke:'#D4A824', 'stroke-width':0.3, opacity:0.5});
    const pts2 = poly(11, 70, 180/11);
    addFullWeb(svg, pts2, {stroke:'#8E6D3B', 'stroke-width':0.2, opacity:0.4});
    add(svg, 'circle', {r:5, fill:'url(#m2_grad)'});
  })();

  // M3: Twin Ogdoad (雙重八識) - 兩個八邊形錯位形成的共振
  (function(){
    const svg=document.getElementById('m3'); setupDefs(svg, 'm3'); drawBase(svg);
    const p1 = poly(8, 100, 0), p2 = poly(8, 100, 22.5);
    addFullWeb(svg, [...p1, ...p2], {stroke:'#D4A824', 'stroke-width':0.25, opacity:0.4});
    add(svg, 'polygon', {points:ptStr(p1), fill:'none', stroke:'#FFF', 'stroke-width':0.5, opacity:0.2});
    add(svg, 'polygon', {points:ptStr(p2), fill:'none', stroke:'#FFF', 'stroke-width':0.5, opacity:0.2});
    add(svg, 'circle', {r:7, fill:'url(#m3_grad)'});
  })();

  // M4: Decalattice (十方網格) - 幾何重疊的節點美學
  (function(){
    const svg=document.getElementById('m4'); setupDefs(svg, 'm4'); drawBase(svg);
    const pts = poly(10, 100);
    addFullWeb(svg, pts, {stroke:'#D4A824', 'stroke-width':0.4, opacity:0.5});
    pts.forEach(p => add(svg, 'circle', {cx:p[0], cy:p[1], r:1.5, fill:'#D4A824'}));
    const ptsIn = poly(5, 50, 18);
    addFullWeb(svg, ptsIn, {stroke:'#FFF', 'stroke-width':0.3, opacity:0.3});
    add(svg, 'circle', {r:4, fill:'url(#m4_grad)'});
  })();

  // M5: Dodecasacrum (十二圓滿) - 最複雜的結構，使用虛實線結合
  (function(){
    const svg=document.getElementById('m5'); setupDefs(svg, 'm5'); drawBase(svg);
    const pts = poly(12, 100);
    addFullWeb(svg, pts, {stroke:'#D4A824', 'stroke-width':0.2, opacity:0.4});
    // 強化星狀結構
    const star = [];
    for(let i=0; i<12; i++) {
      star.push(pts[i]);
      const midA = (i*30 + 15 - 90) * Math.PI / 180;
      star.push([35*Math.cos(midA), 35*Math.sin(midA)]);
    }
    add(svg, 'polygon', {points:ptStr(star), fill:'none', stroke:'#D4A824', 'stroke-width':0.8, opacity:0.6});
    add(svg, 'circle', {r:8, fill:'url(#m5_grad)'});
  })();

})();
</script>
</body>
</html>
