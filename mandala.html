<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>華藏月相 ‧ 法界體檢</title>
    <style>
        :root { --bg: #010204; --gold: #f3e5ab; --solid: #d4af37; --cyan: #8ba89c; }
        body { 
            background: var(--bg); margin: 0; overflow: hidden;
            font-family: "PingFang TC", serif; display: flex; flex-direction: column;
            justify-content: center; align-items: center; height: 100dvh;
        }
        #canvas-wrap { width: 100vw; height: 70vh; position: relative; }
        svg { width: 100%; height: 100%; filter: drop-shadow(0 0 12px rgba(212,175,55,0.3)); }
        
        /* 標題美學：參考圖片中的精密排版 */
        .ui-panel { text-align: center; z-index: 10; margin-top: -50px; }
        .main-title { 
            font-size: 1.5rem; color: var(--gold); letter-spacing: 12px; 
            margin-bottom: 20px; text-shadow: 0 0 20px rgba(212,175,55,0.6);
            animation: breath 4s ease-in-out infinite;
        }
        @keyframes breath { 0%, 100% { opacity: 0.6; } 50% { opacity: 1; } }

        .scan-line {
            width: 200px; height: 1px; background: linear-gradient(90deg, transparent, var(--cyan), transparent);
            margin: 0 auto; position: relative; overflow: hidden;
        }
        .scan-line::after {
            content: ''; position: absolute; left: -100%; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, #fff, transparent);
            animation: scan 2s linear infinite;
        }
        @keyframes scan { 100% { left: 100%; } }

        /* 幾何旋轉動畫 */
        .rot-slow { transform-origin: center; animation: rot 120s linear infinite; }
        .rot-fast { transform-origin: center; animation: rot 60s linear infinite reverse; }
        @keyframes rot { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="canvas-wrap">
    <svg id="m-svg" viewBox="-200 -200 400 400">
        <defs>
            <filter id="glow">
                <feGaussianBlur stdDeviation="1.5" result="blur" />
                <feComposite in="SourceGraphic" in2="blur" operator="over" />
            </filter>
        </defs>
        <g class="rot-slow" opacity="0.2">
            <circle cx="0" cy="0" r="180" fill="none" stroke="var(--cyan)" stroke-width="0.5" stroke-dasharray="2 4"/>
            <circle cx="0" cy="0" r="150" fill="none" stroke="var(--cyan)" stroke-width="0.3"/>
        </g>
        <g id="mandala-core" class="rot-fast"></g>
    </svg>
</div>

<div class="ui-panel">
    <div class="main-title">法界體檢中</div>
    <div class="scan-line"></div>
    <p style="color: var(--cyan); font-size: 0.8rem; letter-spacing: 4px; margin-top: 15px; opacity: 0.7;">
        正在凝結當月清淨資糧...
    </p>
</div>

<script>
    // 讀取分數 (防 Bug 預設 0)
    const db = JSON.parse(localStorage.getItem('PX_V15.0')) || { lunar: { points: 0 } };
    const points = db.lunar.points || 0; 

    function buildMandala() {
        const core = document.getElementById('mandala-core');
        let html = '';
        
        // 根據圖片美學：生成重疊的圓（生命之花/因陀羅網變體）
        // 分數越高，圓的交織數量與精密細節越多
        const count = Math.min(24, Math.floor(points / 20) + 6); 
        const radius = 80 + (points / 10);

        for (let i = 0; i < count; i++) {
            let angle = (i / count) * Math.PI * 2;
            let x = Math.cos(angle) * (radius * 0.5);
            let y = Math.sin(angle) * (radius * 0.5);
            
            // 繪製交織圓環
            html += `<circle cx="${x}" cy="${y}" r="${radius}" fill="none" stroke="${points > 200 ? 'var(--solid)' : 'var(--cyan)'}" stroke-width="0.4" opacity="0.5"/>`;
            
            // 繪製亮燈能量節點（在圓心）
            html += `<circle cx="${x}" cy="${y}" r="1.5" fill="#fff" filter="url(#glow)">
                <animate attributeName="opacity" values="0.3;1;0.3" dur="${2+Math.random()*2}s" repeatCount="indefinite" />
            </circle>`;
        }

        // 中心法界點
        html += `<circle cx="0" cy="0" r="3" fill="var(--gold)" filter="url(#glow)"/>`;
        
        // 增加放射狀光芒線條
        for (let i = 0; i < count * 2; i++) {
            let angle = (i / (count * 2)) * Math.PI * 2;
            let x2 = Math.cos(angle) * 180;
            let y2 = Math.sin(angle) * 180;
            html += `<line x1="0" y1="0" x2="${x2}" y2="${y2}" stroke="var(--gold)" stroke-width="0.2" opacity="0.1" />`;
        }

        core.innerHTML = html;
    }

    buildMandala();
</script>
</body>
</html>
