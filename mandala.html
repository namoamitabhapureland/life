   <!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>華藏月相 ‧ 資糧結晶演化 (全新幾何)</title>
    <style>
        body { 
            background: #010204; color: #fff; margin: 0; padding: 40px;
            display: flex; flex-wrap: wrap; justify-content: center; gap: 40px;
            font-family: "PingFang TC", serif;
        }
        .svg-container {
            width: 280px; height: 320px; position: relative;
            display: flex; flex-direction: column; align-items: center;
            background: rgba(255,255,255,0.02); border-radius: 12px; 
            border: 1px solid rgba(139,168,156,0.1); padding-top: 20px;
        }
        .label { margin-top: 25px; color: #8ba89c; letter-spacing: 5px; font-size: 0.9rem; font-weight: bold; }
        .desc { font-size: 0.75rem; color: #666; margin-top: 8px; letter-spacing: 2px; }
    </style>
</head>
<body>

    <svg style="width:0; height:0; position:absolute;">
        <defs>
            <radialGradient id="g-cyan" cx="50%" cy="50%" r="50%">
                <stop offset="0%" stop-color="#8ba89c" stop-opacity="0.25"/>
                <stop offset="100%" stop-color="#8ba89c" stop-opacity="0"/>
            </radialGradient>
            <radialGradient id="g-gold" cx="50%" cy="50%" r="50%">
                <stop offset="0%" stop-color="#f3e5ab" stop-opacity="0.35"/>
                <stop offset="100%" stop-color="#d4af37" stop-opacity="0"/>
            </radialGradient>
            <radialGradient id="g-solid" cx="50%" cy="50%" r="50%">
                <stop offset="0%" stop-color="#d4af37" stop-opacity="0.6"/>
                <stop offset="100%" stop-color="#d4af37" stop-opacity="0"/>
            </radialGradient>
            <filter id="glow-light"><feGaussianBlur stdDeviation="2.5" result="blur"/><feComposite in="SourceGraphic" in2="blur" operator="over"/></filter>
            <filter id="glow-heavy"><feGaussianBlur stdDeviation="4" result="blur"/><feComposite in="SourceGraphic" in2="blur" operator="over"/></filter>
        </defs>
    </svg>

    <div class="svg-container">
        <svg viewBox="-150 -150 300 300" style="filter: drop-shadow(0 0 10px rgba(139,168,156,0.3));">
            <circle cx="0" cy="0" r="55" fill="url(#g-cyan)"/>
            <g stroke="#8ba89c" stroke-width="1.2" fill="rgba(139,168,156,0.05)">
                <polygon points="0,-45 45,0 0,45 -45,0" stroke-width="2"/>
                <polygon points="0,-25 25,0 0,25 -25,0" fill="rgba(139,168,156,0.2)"/>
                <line x1="0" y1="-65" x2="0" y2="65" />
                <line x1="-65" y1="0" x2="65" y2="0" />
                <circle cx="0" cy="0" r="65" fill="none" stroke-width="0.8"/>
            </g>
            <text x="0" y="120" text-anchor="middle" fill="#8ba89c" font-size="22" font-family="monospace" letter-spacing="4">045</text>
        </svg>
        <div class="label">【 初凝 ‧ 鑽子 】</div>
        <div class="desc" style="color: #8ba89c;">十字交會 ‧ 資糧初結</div>
    </div>

    <div class="svg-container">
        <svg viewBox="-150 -150 300 300" style="filter: drop-shadow(0 0 15px rgba(243,229,171,0.2));">
            <circle cx="0" cy="0" r="70" fill="url(#g-gold)" opacity="0.6"/>
            <g stroke="#8ba89c" stroke-width="1" fill="rgba(139,168,156,0.05)">
                <rect x="-45" y="-45" width="90" height="90" />
                <rect x="-45" y="-45" width="90" height="90" transform="rotate(45)" />
                <line x1="-45" y1="-45" x2="45" y2="45" />
                <line x1="-45" y1="45" x2="45" y2="-45" />
                <line x1="0" y1="-63.6" x2="0" y2="63.6" />
                <line x1="-63.6" y1="0" x2="63.6" y2="0" />
            </g>
            <polygon points="0,-25 25,0 0,25 -25,0" fill="#f3e5ab" stroke="#d4af37" stroke-width="1" opacity="0.8"/>
            <circle cx="0" cy="0" r="4" fill="#fff" />
            <text x="0" y="120" text-anchor="middle" fill="#8ba89c" font-size="22" font-family="monospace" letter-spacing="4">120</text>
        </svg>
        <div class="label" style="color: #a0b8ad;">【 樞紐 ‧ 八陣 】</div>
        <div class="desc" style="color: #8ba89c;">方正互攝 ‧ 軌跡顯化</div>
    </div>

    <div class="svg-container" style="border-color: rgba(243,229,171,0.2);">
        <svg viewBox="-150 -150 300 300" style="filter: drop-shadow(0 0 18px rgba(243,229,171,0.4));">
            <circle cx="0" cy="0" r="80" fill="url(#g-gold)"/>
            <g stroke="#f3e5ab" stroke-width="1.2" fill="rgba(243,229,171,0.08)">
                <polygon points="0,-75 65,37.5 -65,37.5" />
                <polygon points="0,75 65,-37.5 -65,-37.5" />
                <polygon points="-75,0 37.5,65 37.5,-65" />
                <polygon points="75,0 -37.5,65 -37.5,-65" />
            </g>
            <circle cx="0" cy="0" r="75" fill="none" stroke="#f3e5ab" stroke-width="0.8" opacity="0.6"/>
            <circle cx="0" cy="0" r="37.5" fill="none" stroke="#d4af37" stroke-width="1.5"/>
            <circle cx="0" cy="0" r="12" fill="#fff" filter="url(#glow-light)"/>
            <text x="0" y="120" text-anchor="middle" fill="#f3e5ab" font-size="24" font-family="monospace" letter-spacing="4">240</text>
        </svg>
        <div class="label" style="color:#f3e5ab;">【 輪轉 ‧ 十二角 】</div>
        <div class="desc" style="color: #f3e5ab;">三角嵌套 ‧ 光輪常轉</div>
    </div>

        <div class="svg-container" style="border-color: rgba(212,175,55,0.3);">
        <svg viewBox="-150 -150 300 300" style="filter: drop-shadow(0 0 25px rgba(212,175,55,0.5));">
            <circle cx="0" cy="0" r="95" fill="url(#g-solid)"/>
            
            <g stroke="#d4af37" stroke-width="1.5" fill="rgba(212,175,55,0.05)">
                <polygon points="0,-85 73.6,-42.5 73.6,42.5 0,85 -73.6,42.5 -73.6,-42.5" />
                <polygon points="0,-85 73.6,-42.5 73.6,42.5 0,85 -73.6,42.5 -73.6,-42.5" transform="rotate(30)" />
            </g>
            
            <g stroke="#f3e5ab" stroke-width="0.8" fill="none">
                <line x1="0" y1="0" x2="0" y2="-85" /><line x1="0" y1="0" x2="0" y2="85" />
                <line x1="0" y1="0" x2="73.6" y2="-42.5" /><line x1="0" y1="0" x2="-73.6" y2="42.5" />
                <line x1="0" y1="0" x2="73.6" y2="42.5" /><line x1="0" y1="0" x2="-73.6" y2="-42.5" />
                
                <polygon points="0,-70 60.6,35 -60.6,35" stroke="#fff" stroke-width="1.5" fill="rgba(255,255,255,0.1)"/>
                <polygon points="0,70 60.6,-35 -60.6,-35" stroke="#fff" stroke-width="1.5" fill="rgba(255,255,255,0.1)"/>
            </g>
            
            <circle cx="0" cy="0" r="8" fill="#fff" filter="url(#glow-light)"/>
            <text x="0" y="125" text-anchor="middle" fill="#d4af37" font-size="26" font-weight="bold" font-family="monospace" letter-spacing="4">360</text>
        </svg>
        <div class="label" style="color:#d4af37;">【 寶網 ‧ 六和 】</div>
        <div class="desc" style="color: #f3e5ab;">內核擴張 ‧ 結成金剛</div>
    </div>

    <div class="svg-container" style="border-color: rgba(212,175,55,0.5); background: rgba(212,175,55,0.08); box-shadow: 0 0 30px rgba(212,175,55,0.15);">
        <svg viewBox="-150 -150 300 300" style="filter: drop-shadow(0 0 35px rgba(212,175,55,0.8));">
            <circle cx="0" cy="0" r="105" fill="url(#g-solid)"/>
            
            <g stroke="#d4af37" stroke-width="1.5" fill="rgba(212,175,55,0.08)" filter="url(#glow-light)">
                <polygon points="0,-105 74.2,-74.2 105,0 74.2,74.2 0,105 -74.2,74.2 -105,0 -74.2,-74.2" />
                <polygon points="0,-105 105,0 0,105 -105,0" />
                <polygon points="74.2,-74.2 74.2,74.2 -74.2,74.2 -74.2,-74.2" />
            </g>

            <g stroke="#fff" stroke-width="1.2" fill="none">
                <polygon points="0,-50 35.4,-35.4 50,0 35.4,35.4 0,50 -35.4,35.4 -50,0 -35.4,-35.4" stroke-width="2" fill="rgba(255,255,255,0.08)"/>
                
                <line x1="0" y1="-105" x2="0" y2="105" />
                <line x1="-105" y1="0" x2="105" y2="0" />
                <line x1="-74.2" y1="-74.2" x2="74.2" y2="74.2" />
                <line x1="-74.2" y1="74.2" x2="74.2" y2="-74.2" />
            </g>
            
            <circle cx="0" cy="0" r="18" fill="#fff" filter="url(#glow-heavy)"/>
            <circle cx="0" cy="0" r="6" fill="#d4af37" />

            <text x="0" y="130" text-anchor="middle" fill="#fff" font-size="30" font-weight="bold" font-family="monospace" letter-spacing="5" filter="url(#glow-heavy)">450</text>
        </svg>
        <div class="label" style="color: #fffce0; font-size: 1rem; text-shadow: 0 0 10px #d4af37;">【 華藏 ‧ 圓滿相 】</div>
        <div class="desc" style="color: #f3e5ab;">八方貫穿 ‧ 功德無漏</div>
    </div>

</body>
</html>
