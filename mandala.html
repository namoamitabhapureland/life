<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>法界業鏡 ‧ 菩提迴向與震撼賜寶</title>
<style>
  :root { --bg: #010204; --gold: #d4af37; --cyan: #8ba89c; }
  * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }
  
  body {
    background: radial-gradient(circle at 50% 50%, #15111a 0%, var(--bg) 100%);
    color: #fff; font-family: "Songti TC", "PMingLiU", "Noto Serif TC", serif; 
    height: 100vh; overflow: hidden;
    display: flex; justify-content: center; align-items: center;
  }

  /* ════ 頂部導航列 ════ */
  .top-nav { position: absolute; top: 20px; left: 0; width: 100%; display: flex; justify-content: space-between; padding: 0 20px; z-index: 100; pointer-events: none; }
  .nav-btn { pointer-events: auto; background: rgba(255,255,255,0.05); border: 1px solid rgba(212,175,55,0.3); color: var(--gold); padding: 8px 15px; border-radius: 20px; font-size: 0.9rem; letter-spacing: 2px; cursor: pointer; transition: 0.3s; backdrop-filter: blur(5px); font-family: inherit; }
  .nav-btn:active { background: rgba(212,175,55,0.2); }
  .nav-btn.circle { width: 36px; height: 36px; padding: 0; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-weight: bold; font-family: Arial, sans-serif; }

  /* ════ 說明面板 (問號) ════ */
  #help-panel { position: fixed; inset: 0; z-index: 300; background: rgba(0,0,0,0.85); backdrop-filter: blur(5px); display: none; justify-content: center; align-items: center; opacity: 0; transition: opacity 0.5s; }
  .help-box { background: #111; border: 1px solid var(--cyan); padding: 30px; border-radius: 15px; max-width: 90%; width: 400px; color: #ccc; line-height: 1.8; letter-spacing: 2px; font-size: 0.95rem; text-align: justify; box-shadow: 0 0 30px rgba(139,168,156,0.2); }
  .help-box h3 { color: var(--gold); text-align: center; margin-bottom: 20px; font-size: 1.2rem; letter-spacing: 5px; }

  /* ════ 星空與多寶閣紫金光幕 ════ */
  canvas { position: absolute; inset: 0; z-index: 0; pointer-events: none; }
  #indra-bg { 
    position: absolute; inset: 0; z-index: 1; pointer-events: none; opacity: 0; transition: opacity 1.5s;
    background-image: repeating-radial-gradient(circle at 50% 50%, transparent 0, rgba(156, 39, 176, 0.08) 2px, transparent 6px), radial-gradient(circle at 50% 50%, rgba(212, 175, 55, 0.15) 0%, transparent 70%);
  }

  /* ════ 第一階段：發菩提心 (金黃光點呼吸 + 誓願) ════ */
  #vow-layer {
    position: absolute; inset: 0; z-index: 50; display: flex; flex-direction: column; justify-content: center; align-items: center;
    background: rgba(1, 2, 4, 0.4); backdrop-filter: blur(3px); transition: opacity 1s ease; cursor: pointer;
  }
  
  #bodhi-light {
    width: 25px; height: 25px; border-radius: 50%; background: #ffd700;
    box-shadow: 0 0 20px #ffd700, 0 0 40px #d4af37, 0 0 80px #d4af37;
    animation: bodhiBreathe 3s ease-in-out infinite; margin-bottom: 40px; transition: transform 0.5s;
  }
  @keyframes bodhiBreathe {
    0%, 100% { transform: scale(1); box-shadow: 0 0 20px #ffd700, 0 0 40px #d4af37; opacity: 0.8; }
    50% { transform: scale(1.8); box-shadow: 0 0 30px #fffce0, 0 0 60px #ffd700, 0 0 120px #d4af37; opacity: 1; }
  }

  #vow-text { font-size: 2rem; color: #f3e5ab; letter-spacing: 8px; font-weight: normal; text-shadow: 0 0 20px rgba(212,175,55,0.8); margin-bottom: 20px; opacity: 1; transition: opacity 0.3s; text-align: center; }
  #vow-hint { font-size: 0.95rem; color: var(--cyan); letter-spacing: 5px; animation: pulse 2s infinite; }
  @keyframes pulse { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }

  /* ════ 第二階段：直立能量樞紐 (彩色透明能量柱) ════ */
  #core-layer { position: relative; width: 300px; height: 85vh; z-index: 10; display: flex; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 1.5s ease; }
  .track { position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); width: 4px; height: 100%; background: rgba(255,255,255,0.05); border-radius: 2px; }
  
  .fill { 
    position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); width: 8px; height: 0%; border-radius: 3px;
    background: linear-gradient(180deg, rgba(255,215,0,0.5), rgba(255,150,50,0.4), rgba(200,100,255,0.4), rgba(50,255,120,0.4), rgba(0,180,255,0.3));
    box-shadow: 0 0 15px rgba(212,175,55,0.8), 0 0 30px rgba(255,255,255,0.3);
    transition: height 4s cubic-bezier(0.2, 0.8, 0.2, 1); z-index: 5;
  }

  .node { position: absolute; left: 50%; transform: translate(-50%, 50%) scale(0.4); display: flex; justify-content: center; align-items: center; filter: grayscale(100%) brightness(0.3); opacity: 0.5; transition: all 1s cubic-bezier(0.3, 1, 0.3, 1); }
  .node.active { filter: grayscale(0%) brightness(1); opacity: 1; transform: translate(-50%, 50%) scale(0.9); z-index: 10; }
  .node.ultimate { transform: translate(-50%, 50%) scale(1.4); z-index: 20; filter: drop-shadow(0 0 35px rgba(212,175,55,0.8)); }
  .node svg { width: 140px; height: 140px; }
  .node-label { position: absolute; left: 90px; white-space: nowrap; font-size: 0.8rem; color: var(--cyan); letter-spacing: 4px; opacity: 0; transition: opacity 0.5s; text-shadow: 0 0 10px rgba(139,168,156,0.6); }
  .node.active .node-label { opacity: 1; color: var(--gold); }
  .node.ultimate .node-label { font-size: 1rem; text-shadow: 0 0 15px var(--gold); left: 110px; }
  #score-tracker { position: absolute; left: 50%; bottom: 0%; transform: translate(-50%, 50%); font-size: 2rem; color: #fff; font-family: monospace; text-shadow: 0 0 15px var(--gold); z-index: 30; transition: bottom 4s cubic-bezier(0.2, 0.8, 0.2, 1); }

  /* ════ 第三階段：法寶彈窗與文案 ════ */
  .modal-overlay { position: fixed; inset: 0; z-index: 100; background: rgba(1,2,4,0.85); backdrop-filter: blur(10px); display: none; flex-direction: column; justify-content: center; align-items: center; opacity: 0; transition: opacity 0.8s; }
  .t-box { background: radial-gradient(circle at 50% 50%, rgba(212,175,55,0.1) 0%, rgba(1,2,4,0.9) 100%); border: 1px solid rgba(212,175,55,0.5); border-radius: 20px; padding: 40px; display: flex; flex-direction: column; align-items: center; box-shadow: 0 0 50px rgba(212,175,55,0.3); transform: scale(0.8); transition: transform 0.8s cubic-bezier(0.1, 1.5, 0.5, 1); max-width: 90%; text-align: center; }
  .modal-overlay.show .t-box { transform: scale(1); }
  .t-title { font-size: 1.2rem; color: var(--cyan); letter-spacing: 6px; margin-bottom: 10px; }
  .t-svg-wrap { width: 160px; height: 160px; filter: drop-shadow(0 0 20px var(--gold)); margin-bottom: 15px; }
  .t-name { font-size: 1.8rem; color: var(--gold); letter-spacing: 5px; text-shadow: 0 0 15px var(--gold); margin-bottom: 15px; font-weight: bold;}
  
  /* ✨ 絕美法義文案 */
  .t-desc { font-size: 0.95rem; color: #e0e0e0; letter-spacing: 3px; line-height: 1.8; margin-bottom: 15px; }
  .t-highlight { color: #f3e5ab; font-weight: bold; }

  .t-btn { margin-top: 15px; padding: 10px 30px; background: transparent; border: 1px solid var(--gold); color: var(--gold); font-size: 1rem; border-radius: 25px; letter-spacing: 4px; cursor: pointer; transition: 0.3s; font-family: inherit; }
  .t-btn:active { background: rgba(212,175,55,0.2); }

  /* ════ 第四階段：專屬迴向庫 UI ════ */
  #vault-layer { position: absolute; inset: 0; z-index: 60; background: transparent; display: none; flex-direction: column; align-items: center; padding-top: 80px; opacity: 0; transition: opacity 0.8s; overflow-y: auto; }
  .vault-title { font-size: 1.6rem; color: var(--gold); letter-spacing: 8px; margin-bottom: 40px; text-shadow: 0 0 20px var(--gold); }
  .vault-grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; max-width: 800px; padding-bottom: 50px; }
  .vault-item { display: flex; flex-direction: column; align-items: center; background: rgba(255,255,255,0.03); border: 1px solid rgba(139,168,156,0.2); border-radius: 15px; padding: 20px; width: 150px; cursor: pointer; transition: 0.3s; }
  .vault-item:active { transform: scale(0.95); background: rgba(212,175,55,0.1); }
  .vault-item svg { width: 80px; height: 80px; filter: drop-shadow(0 0 10px rgba(255,255,255,0.2)); margin-bottom: 15px; }
  .v-count { color: #fff; font-family: monospace; font-size: 1.2rem; margin-top: 5px; }
  .v-name { color: var(--cyan); font-size: 0.85rem; letter-spacing: 2px; }

  /* ════ 第五階段：防錯位，絕對置中全螢幕震撼黃光微塵 ════ */
  #anim-overlay {
    position: fixed; inset: 0; z-index: 200; display: none; 
    background: rgba(1,1,3,0.9); opacity: 0; transition: opacity 0.5s;
  }
  #full-screen-flash {
    position: absolute; inset: 0; z-index: 10;
    background: radial-gradient(circle at 50% 50%, #fffce0 0%, #ffd700 40%, transparent 80%);
    opacity: 0; transform: scale(0); transition: transform 0.3s ease-out, opacity 0.8s; 
  }
  #anim-svg-container { 
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(1);
    width: 250px; height: 250px; transition: transform 1.5s ease-in, filter 1s; z-index: 20; 
  }
  #anim-svg-container svg { width: 100%; height: 100%; }
  #anim-text { position: absolute; top: 75%; left: 50%; transform: translateX(-50%); width: 100%; font-size: 1.3rem; color: #fffce0; letter-spacing: 6px; opacity: 0; transition: opacity 1.5s; text-align: center; line-height: 2.2; z-index: 30; }
  #close-anim-btn { position: absolute; top: 85%; left: 50%; transform: translateX(-50%); z-index: 40; }

  .dust-particle {
    position: absolute; top: 50%; left: 50%; border-radius: 50%; opacity: 0; z-index: 15;
    animation: floatDustExplosion ease-out forwards;
  }
  @keyframes floatDustExplosion {
    0% { transform: translate(-50%, -50%) scale(1); opacity: 0; }
    5% { opacity: 1; }
    100% { transform: translate(calc(-50% + var(--tx)), calc(-50% + var(--ty))) scale(0); opacity: 0; }
  }

</style>
</head>
<body>

<canvas id="starCanvas"></canvas>
<div id="indra-bg"></div>

<div class="top-nav" id="top-nav">
    <button class="nav-btn" onclick="location.href='index.html'">回道場</button>
    <button class="nav-btn circle" onclick="toggleHelp(true)">?</button>
</div>

<div id="help-panel" onclick="toggleHelp(false)">
    <div class="help-box" onclick="event.stopPropagation()">
        <h3>華藏月相 ‧ 運作指南</h3>
        本系統為純單機無漏運作，絕不連網，完全保障您的修行隱私。<br><br>
        系統將自動結集您於主道場之每日定課（頂禮、發心、行願、調頻、般若、淨室）。<br><br>
        當月資糧將依比例轉化為「0~100%」之清淨度。滿分者將獲贈對應之幾何曼陀羅印記，存入專屬迴向庫。<br><br>
        此印記可於庫中化作無量微塵，無相佈施，迴向十方法界。
    </div>
</div>

<div id="vow-layer" onclick="nextVow()">
    <div id="bodhi-light"></div>
    <div id="vow-text">發菩提心</div>
    <div id="vow-hint">點擊螢幕，攝心發願</div>
</div>

<div id="core-layer">
    <div class="track"></div><div class="fill" id="energy-fill"></div><div id="score-tracker">0%</div>
    <div class="node" id="n1" style="bottom: 10%;"><div id="svg-n1"></div><div class="node-label">0-20 ‧ 初發心</div></div>
    <div class="node" id="n2" style="bottom: 30%;"><div id="svg-n2"></div><div class="node-label">21-40 ‧ 安立境</div></div>
    <div class="node" id="n3" style="bottom: 50%;"><div id="svg-n3"></div><div class="node-label">41-60 ‧ 萬行起</div></div>
    <div class="node" id="n4" style="bottom: 70%;"><div id="svg-n4"></div><div class="node-label">61-80 ‧ 普迴向</div></div>
    <div class="node" id="n5" style="bottom: 90%;"><div id="svg-n5"></div><div class="node-label">81-100 ‧ 圓滿相</div></div>
</div>

<div id="treasure-modal" class="modal-overlay">
    <div class="t-box">
        <div class="t-title">業鏡定相</div>
        <div class="t-svg-wrap" id="t-svg-display"></div>
        <div class="t-name" id="t-name-display">大千金剛相</div>
        <div class="t-desc" id="t-desc-display">
            </div>
        <button class="t-btn" onclick="openVault()">收攝入庫</button>
    </div>
</div>

<div id="vault-layer">
    <div class="vault-title">法界印記 ‧ 專屬迴向庫</div>
    <div class="vault-grid" id="vault-grid"></div>
</div>

<div id="anim-overlay">
    <div id="full-screen-flash"></div> 
    <div id="anim-svg-container"></div> 
    <div id="anim-text"></div> 
    <button class="t-btn" id="close-anim-btn" style="opacity: 0; pointer-events: none;" onclick="closeAnim()">功德圓滿</button>
</div>

<script>
    // ════════════════════════════════════════════════════════════
    // ✨ Web Audio API：無版權純數學合成「法界引磬音效」
    // ════════════════════════════════════════════════════════════
    let audioCtx;
    function initAudio() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();
    }

    function playBell(type) {
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        const now = audioCtx.currentTime;

        if (type === 'low') {
            // 低頻共鳴 (發願)
            osc.type = 'sine';
            osc.frequency.setValueAtTime(108, now); 
            gain.gain.setValueAtTime(0, now);
            gain.gain.linearRampToValueAtTime(0.6, now + 0.1);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 1.5);
            osc.start(now); osc.stop(now + 1.5);
        } else if (type === 'high') {
            // 高頻引磬 (分數定格、迴向爆裂)
            osc.type = 'sine';
            osc.frequency.setValueAtTime(880, now); 
            osc.frequency.exponentialRampToValueAtTime(440, now + 2);
            gain.gain.setValueAtTime(0, now);
            gain.gain.linearRampToValueAtTime(0.8, now + 0.05);
            gain.gain.exponentialRampToValueAtTime(0.001, now + 3);
            osc.start(now); osc.stop(now + 3);
        }
    }

    // ════ 系統底層：無侵入式 DB 抓取與「精準 6 項目」結集引擎 ════
    let db;
    try { db = JSON.parse(localStorage.getItem('PX_V15.0')); } catch(e) {}
    if (!db) db = {};
    if (!db.mandalaVault) db.mandalaVault = [0, 0, 0, 0, 0];
    
    const userName = db.name || "行者";

    let todayDate = new Date();
    let today = todayDate.getFullYear() + '-' + String(todayDate.getMonth() + 1).padStart(2, '0') + '-' + String(todayDate.getDate()).padStart(2, '0');
    let currentMonthStr = today.slice(0, 7); 

    if (!db.lunar || db.lunar.month !== currentMonthStr) {
        db.lunar = { month: currentMonthStr, dailyPoints: 0, collectedDates: [] };
    }

    if (!db.lunar.collectedDates.includes(today)) {
        let earnedToday = 0;
        if (db.amitabhaLastDate === today) earnedToday++;
        if (db.bodhiLastDate === today) earnedToday++;
        if (db.puxianLastDate === today) earnedToday++;
        if (db.wheelLastDate === today) earnedToday++;
        if (db.prajnaLastDate === today) earnedToday++;
        if (db.personalRoom && db.personalRoom.lastDate === today) earnedToday++;

        if (earnedToday > 0) {
            db.lunar.dailyPoints += earnedToday;
            db.lunar.collectedDates.push(today);
            localStorage.setItem('PX_V15.0', JSON.stringify(db)); 
        }
    }

    let [lYear, lMonth] = currentMonthStr.split('-').map(Number);
    let daysInMonth = new Date(lYear, lMonth, 0).getDate(); 
    
    let maxPossiblePoints = daysInMonth * 6; 
    let actualPoints = db.lunar.dailyPoints || 0;

    let calculatedPercentage = Math.round((actualPoints / maxPossiblePoints) * 100);
    if(calculatedPercentage > 100) calculatedPercentage = 100;
    if(calculatedPercentage < 0) calculatedPercentage = 0;
    if(actualPoints > 0 && calculatedPercentage === 0) calculatedPercentage = 1;

    function saveDB() { localStorage.setItem('PX_V15.0', JSON.stringify(db)); }

    // 語音引擎
    let iosAudioUnlocked = false;
    document.body.addEventListener('touchstart', unlockAudio, { once: true });
    document.body.addEventListener('mousedown', unlockAudio, { once: true });
    function unlockAudio() {
        if (!iosAudioUnlocked) {
            initAudio(); // 初始化法界引磬音效
            if(window.speechSynthesis) window.speechSynthesis.speak(new SpeechSynthesisUtterance(''));
            iosAudioUnlocked = true;
        }
    }
    function speak(t) {
        if (!window.speechSynthesis) return; 
        window.speechSynthesis.cancel(); 
        let textToSpeak = /Android/i.test(navigator.userAgent) ? t : t.replace(/阿/g, 'ㄚ');
        const m = new SpeechSynthesisUtterance(textToSpeak); m.lang = 'zh-TW'; m.rate = 0.85; 
        window.speechSynthesis.speak(m);
    }

    // ════ 說明面板 (問號) ════
    function toggleHelp(show) {
        const el = document.getElementById('help-panel');
        if(show) { 
            el.style.display = 'flex'; 
            setTimeout(()=> el.style.opacity = 1, 10); 
        } else { 
            el.style.opacity = 0; 
            setTimeout(()=> el.style.display = 'none', 500); 
        }
    }

    // ════ 銳利星空引擎 (完美無霧霾版) ════
    const cvs = document.getElementById('starCanvas'); const ctx = cvs.getContext('2d');
    let cw, ch, stars = [];
    let warpSpeed = 1.0; 
    let targetWarpSpeed = 1.0; 

    function initStars() {
        cw = cvs.width = window.innerWidth; ch = cvs.height = window.innerHeight;
        stars = Array.from({length: 400}, () => ({ 
            x: (Math.random()-0.5)*cw*2, y: (Math.random()-0.5)*ch*2, z: Math.random()*2000, 
            c: Math.random()>0.2?'#ffffff':'#f3e5ab' 
        }));
    }
    function drawStars() {
        ctx.fillStyle = 'rgba(1, 2, 4, 0.4)'; ctx.fillRect(0, 0, cw, ch); ctx.globalCompositeOperation = 'screen';
        warpSpeed += (targetWarpSpeed - warpSpeed) * 0.1;
        stars.forEach(s => {
            s.z -= warpSpeed; if(s.z<=0) { s.z=2000; s.x=(Math.random()-0.5)*cw*2; s.y=(Math.random()-0.5)*ch*2; }
            let sc = 600 / (600 + s.z), px = cw/2 + s.x*sc, py = ch/2 + s.y*sc;
            ctx.fillStyle = s.c; ctx.globalAlpha = Math.min(1, sc*3); 
            ctx.beginPath();
            if (warpSpeed > 5) { 
                let prevSc = 600 / (600 + s.z + warpSpeed * 6);
                ctx.moveTo(px, py); ctx.lineTo(cw/2 + s.x*prevSc, ch/2 + s.y*prevSc);
                ctx.lineWidth = 2 * sc; ctx.strokeStyle = s.c; ctx.stroke();
            } else {
                ctx.arc(px, py, 1.5*sc, 0, Math.PI*2); ctx.fill();
            }
        });
        ctx.globalAlpha = 1; ctx.globalCompositeOperation = 'source-over'; requestAnimationFrame(drawStars);
    }
    window.addEventListener('resize', initStars); initStars(); drawStars();

    // ════ 陣法生成引擎 ════
    function poly(n, r, rotDeg=0) { const pts=[], off = -Math.PI/2 + rotDeg*Math.PI/180; for(let k=0;k<n;k++){ pts.push([r*Math.cos(2*Math.PI*k/n + off), r*Math.sin(2*Math.PI*k/n + off)]); } return pts; }
    function ptStr(pts){ return pts.map(p=>p[0].toFixed(3)+','+p[1].toFixed(3)).join(' '); }
    function getFullWeb(pts, stroke, width, opacity) { let html = ''; for(let i=0; i<pts.length; i++) { for(let j=i+1; j<pts.length; j++) { html += `<line x1="${pts[i][0]}" y1="${pts[i][1]}" x2="${pts[j][0]}" y2="${pts[j][1]}" stroke="${stroke}" stroke-width="${width}" opacity="${opacity}"/>`; } } return html; }

    const totemNames = ["青琉璃種子", "綠翡翠陣盤", "紫星晶雙輪", "橙琥珀金網", "大千金剛相"];
    let generatedSVGs = [];

    function generateDynamicSVG(tier) {
        const themes = [ ['rgba(0,180,255,0.1)','#80dfff'], ['rgba(50,255,120,0.1)','#80ffc0'], ['rgba(200,100,255,0.1)','#e0c0ff'], ['rgba(255,150,50,0.15)','#ffcc80'], ['rgba(255,215,0,0.2)','#fffce0'] ];
        let fill = themes[tier-1][0], stroke = themes[tier-1][1];
        let svg = `<svg viewBox="-120 -120 240 240" style="overflow:visible;">`;

        if (tier === 1) { 
            let pOut = poly(9, 100); let pIn = poly(9, 40, 20);
            svg += `<g><animateTransform attributeName="transform" type="rotate" from="0 0 0" to="360 0 0" dur="40s" repeatCount="indefinite"/><polygon points="${ptStr(pOut)}" fill="${fill}"/>${getFullWeb(pOut, stroke, 0.6, 0.6)}${getFullWeb(pIn, '#fff', 0.5, 0.5)}</g>`;
        } else if (tier === 2) { 
            let pOut = poly(11, 100); let pIn = poly(11, 70, 180/11);
            svg += `<g><animate attributeName="opacity" values="0.6; 1; 0.6" dur="3s" repeatCount="indefinite"/><polygon points="${ptStr(pOut)}" fill="${fill}"/>${getFullWeb(pOut, stroke, 0.5, 0.7)}${getFullWeb(pIn, '#fff', 0.4, 0.6)}</g>`;
        } else if (tier === 3) { 
            let p1 = poly(8, 100, 0); let p2 = poly(8, 100, 22.5);
            svg += `<g><animateTransform attributeName="transform" type="rotate" from="0 0 0" to="360 0 0" dur="30s" repeatCount="indefinite"/><polygon points="${ptStr(p1)}" fill="${fill}"/>${getFullWeb(p1, stroke, 0.4, 0.6)}</g><g><animateTransform attributeName="transform" type="rotate" from="360 0 0" to="0 0 0" dur="25s" repeatCount="indefinite"/><polygon points="${ptStr(p2)}" fill="${fill}"/>${getFullWeb(p2, '#fff', 0.4, 0.6)}</g>`;
        } else if (tier === 4) { 
            let pOut = poly(10, 100); let pIn = poly(5, 50, 18);
            svg += `<g><animateTransform attributeName="transform" type="scale" values="0.95; 1.05; 0.95" dur="4s" repeatCount="indefinite"/><polygon points="${ptStr(pOut)}" fill="${fill}"/>${getFullWeb(pOut, stroke, 0.5, 0.6)}${getFullWeb(pIn, '#fff', 0.6, 0.8)}</g>`;
        } else if (tier === 5) { 
            let pOut = poly(12, 100); const star = [];
            for(let i=0; i<12; i++) { star.push(pOut[i]); star.push([35*Math.cos((i*30-75)*Math.PI/180), 35*Math.sin((i*30-75)*Math.PI/180)]); }
            svg += `<g><animateTransform attributeName="transform" type="rotate" from="0 0 0" to="360 0 0" dur="60s" repeatCount="indefinite"/>`;
            for(let i=0; i<12; i++) {
                let next = (i+1)%12; let hue = i * 30;
                svg += `<polygon points="0,0 ${pOut[i][0]},${pOut[i][1]} ${pOut[next][0]},${pOut[next][1]}" fill="hsla(${hue}, 80%, 55%, 0.2)" />`;
                svg += `<polygon points="0,0 ${star[i*2][0]},${star[i*2][1]} ${star[i*2+1][0]},${star[i*2+1][1]}" fill="hsla(${hue+40}, 90%, 65%, 0.4)" />`;
                svg += `<polygon points="0,0 ${star[next*2][0]},${star[next*2][1]} ${star[i*2+1][0]},${star[i*2+1][1]}" fill="hsla(${hue+80}, 90%, 65%, 0.4)" />`;
            }
            svg += `${getFullWeb(pOut, stroke, 0.6, 0.7)}<polygon points="${ptStr(star)}" fill="none" stroke="#fff" stroke-width="1.5" opacity="0.9"/></g>`;
        }
        svg += `</svg>`;
        return svg;
    }

    for(let i=1; i<=5; i++) {
        let svgCode = generateDynamicSVG(i);
        generatedSVGs.push(svgCode);
        document.getElementById(`svg-n${i}`).innerHTML = svgCode;
    }

    // ════ 第一階段：四宏願與光速衝刺 ════
    const vows = ["眾生無邊誓願度", "煩惱無盡誓願斷", "法門無量誓願學", "佛道無上誓願成"];
    let vowStep = -1;
    const vowText = document.getElementById('vow-text');
    const vowLayer = document.getElementById('vow-layer');
    const bodhiLight = document.getElementById('bodhi-light');

    function nextVow() {
        playBell('low'); // ✨ 觸發低頻引磬音效

        if (vowStep === -1) {
            document.getElementById('top-nav').style.display = 'none'; // 隱藏頂部選單
            targetWarpSpeed = 25; 
            document.getElementById('vow-hint').style.display = 'none';
        }
        vowStep++;
        
        if (vowStep < 4) {
            bodhiLight.style.transform = `scale(${1 + vowStep*0.4})`;
            vowText.style.opacity = 0;
            setTimeout(() => {
                vowText.innerText = vows[vowStep];
                vowText.style.opacity = 1;
                speak(vows[vowStep]);
            }, 300);
        } else if (vowStep === 4) {
            vowLayer.style.opacity = 0;
            vowLayer.style.pointerEvents = 'none';
            targetWarpSpeed = 1.0; 
            speak("功德結集，業鏡顯化");
            
            setTimeout(() => {
                vowLayer.style.display = 'none'; 
                document.getElementById('core-layer').style.opacity = 1;
                startScoreAnimation();
            }, 1000);
        }
    }

    // ════ 第二階段：跑分動畫 ════
    let finalTier = 1;
    function startScoreAnimation() {
        const finalScore = calculatedPercentage; // 真實算分
        
        const fillBar = document.getElementById('energy-fill');
        const scoreTracker = document.getElementById('score-tracker');
        
        fillBar.style.height = finalScore + '%';
        scoreTracker.style.bottom = finalScore + '%';
        
        if(finalScore === 0) {
            speak("資糧未滿，請精進修持");
            setTimeout(() => { location.href = 'index.html'; }, 3000);
            return;
        }

        let currentNum = 0;
        let timer = setInterval(() => {
            currentNum += 1;
            if(currentNum >= finalScore) { 
                currentNum = finalScore; 
                clearInterval(timer); 
                playBell('high'); // ✨ 停止時觸發高頻引磬清脆聲
            }
            scoreTracker.innerText = currentNum + '%';

            if(currentNum >= 10) document.getElementById('n1').classList.add('active');
            if(currentNum >= 30) document.getElementById('n2').classList.add('active');
            if(currentNum >= 50) document.getElementById('n3').classList.add('active');
            if(currentNum >= 70) document.getElementById('n4').classList.add('active');
            if(currentNum >= 90) document.getElementById('n5').classList.add('active'); 
        }, 40);

        setTimeout(() => {
            finalTier = Math.ceil(finalScore / 20); if(finalTier < 1) finalTier = 1; if(finalTier > 5) finalTier = 5;
            let targetNode = document.getElementById(`n${finalTier}`);
            if(targetNode) targetNode.classList.add('active', 'ultimate');

            setTimeout(showTreasureModal, 3000);
        }, 4000);
    }

    // ════ 第三階段：法寶賜予 ════
    function showTreasureModal() {
        const modal = document.getElementById('treasure-modal');
        modal.style.display = 'flex'; 
        
        document.getElementById('t-svg-display').innerHTML = generatedSVGs[finalTier - 1];
        document.getElementById('t-name-display').innerText = totemNames[finalTier - 1];
        
        // ✨ 寫入專屬法義文案
        document.getElementById('t-desc-display').innerHTML = `
            行者 <span class="t-highlight">${userName}</span>，您本月勤修信願行，嚴持戒定慧。<br>
            內觀六度般若，外照四聖諦理。<br>
            資糧具足，法界特賜此印記。
        `;

        db.mandalaVault[finalTier - 1]++;
        db.lunar.dailyPoints = 0; // ✨ 賜寶後月度結算歸零
        saveDB();

        speak(`獲贈印記，${totemNames[finalTier - 1]}`);
        
        setTimeout(() => {
            modal.style.pointerEvents = 'auto'; 
            modal.style.opacity = 1;
            modal.classList.add('show');
        }, 50);
    }

    // ════ 第四階段：專屬迴向庫 ════
    function openVault() {
        document.getElementById('treasure-modal').style.display = 'none';
        document.getElementById('core-layer').style.display = 'none';
        document.getElementById('top-nav').style.display = 'flex'; // 恢復導航
        document.getElementById('indra-bg').style.opacity = 1;
        
        const vaultLayer = document.getElementById('vault-layer');
        const grid = document.getElementById('vault-grid');
        grid.innerHTML = '';

        for(let i=0; i<5; i++) {
            let count = db.mandalaVault[i];
            let item = document.createElement('div');
            item.className = 'vault-item';
            item.innerHTML = `${generatedSVGs[i]} <div class="v-name">${totemNames[i]}</div> <div class="v-count">× ${count}</div>`;
            
            item.onclick = () => {
                if(db.mandalaVault[i] > 0) dedicateTotem(i, item);
                else speak("此印記資糧不足");
            };
            grid.appendChild(item);
        }

        vaultLayer.style.display = 'flex';
        setTimeout(() => {
            vaultLayer.style.opacity = 1; 
            vaultLayer.style.pointerEvents = 'auto';
        }, 50);
        
        speak("進入法界印記專屬庫，點擊即可迴向");
    }

    // ════ 第五階段：防錯位，絕對置中全螢幕震撼黃光微塵 ════
    function dedicateTotem(index, el) {
        db.mandalaVault[index]--;
        saveDB();
        el.querySelector('.v-count').innerText = `× ${db.mandalaVault[index]}`;

        const animOverlay = document.getElementById('anim-overlay');
        const animSvg = document.getElementById('anim-svg-container');
        const animText = document.getElementById('anim-text');
        const closeBtn = document.getElementById('close-anim-btn');
        const flash = document.getElementById('full-screen-flash');

        animOverlay.style.display = 'block'; 

        animSvg.innerHTML = generatedSVGs[index];
        animSvg.style.transform = 'translate(-50%, -50%) scale(1)';
        animSvg.style.filter = 'drop-shadow(0 0 20px #ffd700)';
        animText.style.opacity = 0; closeBtn.style.opacity = 0; closeBtn.style.pointerEvents = 'none';
        flash.style.opacity = 0; flash.style.transform = 'scale(0)';

        speak("大願迴向十方");
        playBell('low'); // ✨ 迴向時的低頻共鳴

        setTimeout(() => {
            animOverlay.style.opacity = 1;
        }, 50);

        setTimeout(() => {
            animSvg.style.transform = 'translate(-50%, -50%) scale(1.5)';
            animSvg.style.filter = 'drop-shadow(0 0 60px #fff)';
            
            setTimeout(() => {
                flash.style.transform = 'scale(2)';
                flash.style.opacity = 1;
                
                animSvg.innerHTML = '';
                
                createDustExplosionExplosion(document.getElementById('anim-overlay')); 
                
                speak("化作無量微塵，悉皆迴向虛空");
                playBell('high'); // ✨ 爆裂時的高頻清脆聲
                
                setTimeout(() => { flash.style.opacity = 0; }, 300);

                animText.innerHTML = "【 因緣圓滿 ． 悉皆迴向 】<br><span style='font-size:0.9rem; color:#f3e5ab;'><br>您的印記已化作無漏金剛光束，迴向虛空法界。</span>";
                animText.style.opacity = 1;
                
                setTimeout(() => {
                    closeBtn.style.opacity = 1; closeBtn.style.pointerEvents = 'auto';
                }, 2000);

            }, 1500); 
        }, 1000); 
    }

    function createDustExplosionExplosion(container) {
        const vw = window.innerWidth;
        const vh = window.innerHeight;
        for (let i = 0; i < 300; i++) {
            let dust = document.createElement('div');
            dust.className = 'dust-particle';
            
            dust.style.background = Math.random() > 0.5 ? '#ffd700' : '#fffce0';
            dust.style.width = Math.random() * 5 + 3 + 'px'; 
            dust.style.height = dust.style.width;
            
            let angle = Math.random() * Math.PI * 2;
            let maxDistance = Math.hypot(vw, vh); 
            let distance = (maxDistance / 3) + Math.random() * (maxDistance / 1.2);
            
            dust.style.setProperty('--tx', `${Math.cos(angle) * distance}px`);
            dust.style.setProperty('--ty', `${Math.sin(angle) * distance}px`);
            
            dust.style.animationDuration = (0.5 + Math.random() * 2) + 's';
            container.appendChild(dust);
        }
    }

    function closeAnim() {
        const animOverlay = document.getElementById('anim-overlay');
        animOverlay.style.opacity = 0;
        animOverlay.style.pointerEvents = 'none';
        setTimeout(() => {
            animOverlay.style.display = 'none'; 
            document.querySelectorAll('.dust-particle').forEach(e => e.remove());
        }, 800);
    }

</script>
</body>
