<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>十階琉璃蓮花 ． 視覺展示</title>
    <style>
        body {
            background: radial-gradient(circle at 50% 50%, #0a0e14 0%, #020203 100%);
            color: #f3e5ab;
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 {
            letter-spacing: 8px;
            text-shadow: 0 0 15px rgba(212,175,55,0.6);
            margin-bottom: 40px;
        }
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 40px;
            width: 100%;
            max-width: 1200px;
        }
        .lotus-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(212,175,55,0.3);
            border-radius: 20px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.5), 0 10px 30px rgba(0,0,0,0.8);
            transition: 0.3s;
        }
        .lotus-card:hover {
            transform: translateY(-10px);
            border-color: #d4af37;
            box-shadow: inset 0 0 30px rgba(212,175,55,0.1), 0 15px 40px rgba(0,0,0,0.9);
        }
        .svg-wrapper {
            width: 150px;
            height: 150px;
            margin-bottom: 15px;
        }
        .level-title {
            font-size: 1.1rem;
            font-weight: bold;
            color: #fff;
            letter-spacing: 2px;
            margin-bottom: 5px;
        }
        .level-desc {
            font-size: 0.8rem;
            color: #888;
            letter-spacing: 1px;
            text-align: center;
        }
    </style>
</head>
<body>

    <h1>✦ 十階琉璃仙氣蓮花 ． 演化大觀 ✦</h1>
    <div class="grid-container" id="grid"></div>

<script>
    // 這裡直接貼上你主系統裡的 getLotusSVG 函數
    function getLotusSVG(rankType, nianCount = 0, overrideLevel = null) {
        const safeRank = rankType || ""; 
        let nLevel = 1;
        if (overrideLevel !== null) {
            nLevel = Math.max(1, Math.min(overrideLevel, 10)); 
        } 

        const cx = 50, cy = 50;
        const id = `svg-${Math.random().toString(36).substr(2, 5)}`; 

        function P(r0, r1, hw, bulge, shape) {
            const bx = cx, by = cy - r0, tx = cx, ty = cy - r1;
            const my = cy - (r0 + r1) / 2;
            if (shape === 'slim') return `M${bx - hw * .7} ${by} C${bx - bulge * .75} ${my} ${tx - 1.5} ${ty + 3} ${tx} ${ty} C${tx + 1.5} ${ty + 3} ${bx + bulge * .75} ${my} ${bx + hw * .7} ${by}Z`;
            if (shape === 'wide') return `M${bx - hw} ${by} C${bx - bulge * 1.35} ${my + 4} ${tx - bulge * .45} ${ty + 7} ${tx} ${ty} C${tx + bulge * .45} ${ty + 7} ${bx + bulge * 1.35} ${my + 4} ${bx + hw} ${by}Z`;
            return `M${bx - hw} ${by} C${bx - bulge} ${my} ${tx - bulge * .3} ${ty + 5} ${tx} ${ty} C${tx + bulge * .3} ${ty + 5} ${bx + bulge} ${my} ${bx + hw} ${by}Z`;
        }

        function rotatedPetals(n, r0, r1, hw, bulge, shape, fill, op, offset = 0) {
            let s = '';
            for (let i = 0; i < n; i++) {
                const a = i * (360 / n) + offset;
                s += `<path d="${P(r0, r1, hw, bulge, shape)}" fill="${fill}" opacity="${op}" transform="rotate(${a} ${cx} ${cy})"/>`;
            }
            return s;
        }

        const sharedDefs = `
        <defs>
            <filter id="glo${id}" x="-50%" y="-50%" width="200%" height="200%">
                <feGaussianBlur stdDeviation="2.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
            </filter>
            <filter id="sof${id}" x="-20%" y="-20%" width="140%" height="140%">
                <feGaussianBlur stdDeviation="1.1" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
            </filter>
            <radialGradient id="rg-unified-gold" cx="50%" cy="50%" r="60%">
                <stop offset="0%" stop-color="#fffce0"/><stop offset="28%" stop-color="#f0c030"/><stop offset="65%" stop-color="#906010"/><stop offset="100%" stop-color="#4c3008"/>
            </radialGradient>
            <radialGradient id="rg-void" cx="50%" cy="50%" r="50%">
                <stop offset="0%" stop-color="#111111" stop-opacity="0.95"/><stop offset="70%" stop-color="#0a0500" stop-opacity="0.8"/><stop offset="100%" stop-color="#000000" stop-opacity="0"/>
            </radialGradient>
        </defs>`;

        const voidBg = `<circle cx="50" cy="50" r="42" fill="url(#rg-void)"><animate attributeName="r" values="41;43;41" dur="6s" repeatCount="indefinite"/></circle>`;

        // 為了展示方便，底座統一用信位的金剛座
        let bgContent = `
        <circle cx="${cx}" cy="${cy}" r="21" fill="url(#rg-unified-gold)" stroke="#f0d060" stroke-width=".7"/>
        <g transform="translate(${cx}, ${cy}) scale(0.35) translate(-50, -50)">
            <path d="M44 32 L44 68 M56 32 L56 68" stroke="#fffce0" stroke-width="2.5" fill="none"/>
            <g transform="translate(50, 50) scale(0.65) translate(-50, -50)">
                <polygon points="50,33 52.5,42.5 62,38 57.5,47.5 67,50 57.5,52.5 62,62 52.5,57.5 50,67 47.5,57.5 38,62 42.5,52.5 33,50 42.5,47.5 38,38 47.5,42.5" fill="url(#rg-unified-gold)" opacity="0.95"/>
            </g>
        </g>`;

        let lotusContent = '';

        if (nLevel === 1) { // [0] 白瓷銀
            lotusContent = `<defs><radialGradient id="lA${id}" cx="50%" cy="75%" r="100%"><stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/><stop offset="100%" stop-color="#cfd8dc" stop-opacity="0.6"/></radialGradient><radialGradient id="lB${id}" cx="50%" cy="65%" r="100%"><stop offset="0%" stop-color="#ffffff" stop-opacity="0.9"/><stop offset="100%" stop-color="#eceff1" stop-opacity="0.7"/></radialGradient></defs>
            ${rotatedPetals(8,22,46,7,11,'round',`url(#lA${id})`,.9)}${rotatedPetals(8,22,38,5.5,8,'round',`url(#lB${id})`,.8,22.5)}`;
        } else if (nLevel === 2) { // [10] 玫瑰金
            lotusContent = `<defs><radialGradient id="lA${id}" cx="50%" cy="75%" r="100%"><stop offset="0%" stop-color="#fff0f0" stop-opacity="0.95"/><stop offset="100%" stop-color="#e4a8a8" stop-opacity="0.65"/></radialGradient><radialGradient id="lB${id}" cx="50%" cy="65%" r="100%"><stop offset="0%" stop-color="#fff5f5" stop-opacity="0.9"/><stop offset="100%" stop-color="#f4c8c8" stop-opacity="0.75"/></radialGradient></defs>
            ${rotatedPetals(8,22,46,7,11,'round',`url(#lA${id})`,.9)}${rotatedPetals(8,22,38,5.5,8,'round',`url(#lB${id})`,.8,22.5)}`;
        } else if (nLevel === 3) { // [500] 琉璃粉
            lotusContent = `<defs><radialGradient id="lA${id}" cx="50%" cy="75%" r="100%"><stop offset="0%" stop-color="#fff0f5"/><stop offset="100%" stop-color="#f48fb1" stop-opacity=".75"/></radialGradient><radialGradient id="lB${id}" cx="50%" cy="65%" r="100%"><stop offset="0%" stop-color="#ffe8f2"/><stop offset="100%" stop-color="#f8bbd0" stop-opacity=".85"/></radialGradient></defs>
            ${rotatedPetals(8,22,46,7,11,'round',`url(#lA${id})`,.92)}${rotatedPetals(8,22,38,5.5,8,'round',`url(#lB${id})`,.8,22.5)}`;
        } else if (nLevel === 4) { // [5000] 冰晶藍
            lotusContent = `<defs><radialGradient id="lA${id}" cx="50%" cy="72%" r="100%"><stop offset="0%" stop-color="#e0f7fa" stop-opacity="0.95"/><stop offset="100%" stop-color="#81d4fa" stop-opacity="0.7"/></radialGradient><radialGradient id="lB${id}" cx="50%" cy="58%" r="100%"><stop offset="0%" stop-color="#e1f5fe" stop-opacity="0.9"/><stop offset="100%" stop-color="#b3e5fc" stop-opacity="0.8"/></radialGradient></defs>
            ${rotatedPetals(8,22,46,9,14,'wide',`url(#lA${id})`,.9)}${rotatedPetals(8,22,37,6,9,'wide',`url(#lB${id})`,.8,22.5)}`;
        } else if (nLevel === 5) { // [1萬] 翡翠玉
            lotusContent = `<defs><radialGradient id="lA${id}" cx="50%" cy="78%" r="100%"><stop offset="0%" stop-color="#e0f2f1"/><stop offset="100%" stop-color="#80cbc4" stop-opacity=".8"/></radialGradient><radialGradient id="lB${id}" cx="50%" cy="62%" r="100%"><stop offset="0%" stop-color="#e0f7fa"/><stop offset="100%" stop-color="#b2dfdb" stop-opacity=".85"/></radialGradient></defs>
            ${rotatedPetals(10,22,46,6,9,'point',`url(#lA${id})`,.92)}${rotatedPetals(10,22,36,4,6,'slim',`url(#lB${id})`,.8,18)}`;
        } else if (nLevel === 6) { // [10萬] 幻光銀
            lotusContent = `<defs><radialGradient id="lA${id}" cx="50%" cy="78%" r="100%"><stop offset="0%" stop-color="#e8eaf6"/><stop offset="100%" stop-color="#9fa8da" stop-opacity=".85"/></radialGradient><radialGradient id="lB${id}" cx="50%" cy="62%" r="100%"><stop offset="0%" stop-color="#f8bbd0"/><stop offset="100%" stop-color="#c5cae9" stop-opacity=".85"/></radialGradient></defs>
            ${rotatedPetals(10,22,47,6.5,10,'point',`url(#lA${id})`,.95)}${rotatedPetals(10,22,38,4.5,7,'slim',`url(#lB${id})`,.85,18)}`;
        } else if (nLevel === 7) { // [50萬] 珍珠彩虹
            const cols=['#ffcdd2','#ffe0b2','#fff9c4','#dcedc8','#b2dfdb','#b3e5fc','#c5cae9','#e1bee7','#f8bbd0','#f5f5f5'];
            lotusContent = Array.from({length:10},(_,i)=>`<path d="${P(22,46,7.5,11,'round')}" fill="${cols[i]}" opacity=".9" transform="rotate(${i*36} ${cx} ${cy})"/>`).join('');
        } else if (nLevel === 8) { // [100萬] 仙氣紫金
            lotusContent = `<defs><radialGradient id="lA${id}" cx="50%" cy="75%" r="100%"><stop offset="0%" stop-color="#fff8e1"/><stop offset="100%" stop-color="#ce93d8" stop-opacity=".85"/></radialGradient><radialGradient id="lB${id}" cx="50%" cy="65%" r="100%"><stop offset="0%" stop-color="#f3e5f5"/><stop offset="100%" stop-color="#e1bee7" stop-opacity=".9"/></radialGradient></defs>
            ${rotatedPetals(10,22,47,7,12,'wide',`url(#lA${id})`,.95)}${rotatedPetals(10,22,38,5,8,'round',`url(#lB${id})`,.85,18)}`;
        } else if (nLevel === 9) { // [1000萬] 耀眼純金
            lotusContent = `<defs><radialGradient id="lA${id}" cx="50%" cy="73%" r="100%"><stop offset="0%" stop-color="#ffffff"/><stop offset="100%" stop-color="#ffd54f" stop-opacity=".9"/></radialGradient><radialGradient id="lB${id}" cx="50%" cy="63%" r="100%"><stop offset="0%" stop-color="#fffde7"/><stop offset="100%" stop-color="#ffe082" stop-opacity=".85"/></radialGradient></defs>
            ${rotatedPetals(8,22,47,8.5,12,'round',`url(#lA${id})`,.95)}${rotatedPetals(8,22,44,8,11,'round',`url(#lB${id})`,.9,22.5)}`;
        } else { // [1億] 琉璃金光
            lotusContent = `<defs><radialGradient id="lA${id}" cx="50%" cy="75%" r="100%"><stop offset="0%" stop-color="#ffffff"/><stop offset="100%" stop-color="#ffca28" stop-opacity=".9"/></radialGradient><radialGradient id="lB${id}" cx="50%" cy="65%" r="100%"><stop offset="0%" stop-color="#fffde7"/><stop offset="100%" stop-color="#ffb300" stop-opacity=".85"/></radialGradient></defs>
            ${rotatedPetals(12,22,48,7,10,'round',`url(#lA${id})`,.98)}${rotatedPetals(12,22,42,6,8.5,'round',`url(#lB${id})`,.9,15)}${rotatedPetals(12,22,34,4.5,6.5,'round',`url(#lA${id})`,.85,7.5)}`;
        }

        return `
        <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" style="width:100%; height:100%;">
            ${sharedDefs}${voidBg}${bgContent}
            <g filter="url(#sof${id})">
                ${lotusContent}
                <animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50" dur="40s" repeatCount="indefinite" additive="sum"/>
            </g>
            <circle cx="50" cy="50" r="1.8" fill="#ffffff" opacity=".95" filter="url(#glo${id})"/>
        </svg>`;
    }

    const levelsInfo = [
        { lv: 1, title: "白瓷銀", desc: "0 ~ 9 念 (初發心)" },
        { lv: 2, title: "玫瑰金", desc: "10 念圓滿" },
        { lv: 3, title: "琉璃粉", desc: "500 念 (一念清淨)" },
        { lv: 4, title: "冰晶藍", desc: "5,000 念 (淨念相繼)" },
        { lv: 5, title: "翡翠玉", desc: "1萬念 (信願具足)" },
        { lv: 6, title: "幻光銀", desc: "10萬念 (蓮池海會)" },
        { lv: 7, title: "珍珠彩虹", desc: "50萬念 (不退轉)" },
        { lv: 8, title: "仙氣紫金", desc: "100萬念 (無相念佛)" },
        { lv: 9, title: "耀眼純金", desc: "1,000萬念 (念佛三昧)" },
        { lv: 10, title: "琉璃金光", desc: "1億念 (圓滿成佛)" }
    ];

    const grid = document.getElementById('grid');

    levelsInfo.forEach(info => {
        const card = document.createElement('div');
        card.className = 'lotus-card';
        
        const svgWrap = document.createElement('div');
        svgWrap.className = 'svg-wrapper';
        // 呼叫你的函數，傳入 overrideLevel 強制生成每一階的蓮花
        svgWrap.innerHTML = getLotusSVG('信', 0, info.lv); 

        const title = document.createElement('div');
        title.className = 'level-title';
        title.innerText = `Lv.${info.lv} ${info.title}`;

        const desc = document.createElement('div');
        desc.className = 'level-desc';
        desc.innerText = info.desc;

        card.appendChild(svgWrap);
        card.appendChild(title);
        card.appendChild(desc);
        grid.appendChild(card);
    });
</script>

</body>
</html>
