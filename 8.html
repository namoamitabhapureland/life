<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
                <link rel="manifest" href="manifest.json">
    <title>悲願化城 ． 八寶閣</title>
    <style>
        :root {
            --gold-light: #f3e5ab;
            --gold-solid: #d4af37;
            --cyan-jade: #8ba89c;
            --bg-deep: #010204;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }
        
        body {
            background: var(--bg-deep); 
            color: #fff; 
            font-family: "PingFang TC", "Microsoft JhengHei", serif;
            height: 100vh; height: 100dvh;
            overflow: hidden;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        /* ════ 頂部導航列 (承襲華藏月相) ════ */
       .top-nav {
    position: absolute; top: 25px; left: 0; width: 100%;
    display: flex; justify-content: space-between; align-items: center;
    /* 增加 safe-area-inset 防護 */
    padding: env(safe-area-inset-top, 0px) 20px 0 20px; 
    z-index: 200;
}
        .nav-btn {
            color: var(--cyan-jade); font-size: 0.85rem; letter-spacing: 2px;
            padding: 6px 14px; border: 1px solid rgba(139,168,156,0.3); border-radius: 20px;
            background: rgba(1,2,4,0.6); cursor: pointer; backdrop-filter: blur(5px);
            transition: all 0.3s;
        }
.nav-btn:active { 
    background: rgba(139,168,156,0.2); 
    transform: scale(0.95); 
    opacity: 0.8; 
}
        .nav-title {
            color: var(--gold-light); font-size: 1.1rem; letter-spacing: 4px; text-shadow: 0 0 10px rgba(243,229,171,0.3);
        }

        /* ════ 法相 SVG 專屬全域樣式 ════ */
        .wire-white:not([fill]) { stroke: rgba(255, 255, 255, 0.9); stroke-width: 1.5; stroke-linejoin: round; fill: none; }
        .wire-white-thin:not([fill]) { stroke: rgba(255, 255, 255, 0.5); stroke-width: 1; stroke-linejoin: round; fill: none; }
        .wire-gold:not([fill]) { stroke: url(#pureGold); stroke-width: 2.5; stroke-linejoin: round; fill: none; }
        .wire-gold-thin:not([fill]) { stroke: url(#pureGold); stroke-width: 1; stroke-linecap: round; fill: none; }
        .edge-gold:not([fill]) { stroke: url(#pureGold); stroke-width: 4; stroke-linejoin: round; fill: none; }

        canvas { position: absolute; inset: 0; z-index: 0; pointer-events: none; }

        /* ════ 第一階段：八卦方位 抽卡場景 ════ */
        #draw-scene {
            position: absolute; inset: 0; z-index: 10;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 1.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .center-hint {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: var(--gold-light); font-size: 0.95rem; letter-spacing: 6px; text-indent: 6px;
            opacity: 0.8; text-align: center; line-height: 2; text-shadow: 0 0 15px rgba(212,175,55,0.4);
            transition: opacity 0.8s; pointer-events: none; z-index: 5;
        }

        .bagua-container { position: absolute; top: 50%; left: 50%; width: 0; height: 0; z-index: 10; }

        .card-wrapper {
            position: absolute; width: 150px; height: 255px; top: 0; left: 0;
            transform: translate(-50%, -50%) rotate(var(--angle)) translateY(-120px) rotate(calc(-1 * var(--angle)));
            transition: all 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
            perspective: 1500px; cursor: pointer; z-index: 10;
        }

        @media (hover: hover) { .card-wrapper:hover { z-index: 50; transform: translate(-50%, -50%) rotate(var(--angle)) translateY(-120px) rotate(calc(-1 * var(--angle))) scale(1.05); } }
        .card-wrapper:active { z-index: 50; transform: translate(-50%, -50%) rotate(var(--angle)) translateY(-120px) rotate(calc(-1 * var(--angle))) scale(0.98); }

        .card-inner { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; transition: transform 1.2s cubic-bezier(0.2, 0.8, 0.2, 1); box-shadow: 0 10px 40px rgba(0,0,0,0.9); border-radius: 14px; }
        .card-wrapper.is-flipped .card-inner { transform: rotateY(180deg); }
        .card-face { position: absolute; inset: 0; backface-visibility: hidden; border-radius: inherit; overflow: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; }

                           /* 卡背：移除實體邊框，改用高雅的懸浮質感 */
      /* 修改 .card-back 基礎定義 */
.card-back {
    width: 100%;
    height: 100%;
    /* 使用放射狀漸層，讓中心稍微亮一點點，周圍變暗，模擬物體體積感 */
    background: radial-gradient(circle at 50% 50%, #1a1c22 0%, #010204 100%);
    /* 增加一點點內陰影，讓邊緣產生微微的凹陷感 */
    box-shadow: inset 0 0 60px rgba(255, 255, 255, 0.03);
    border: 1px solid rgba(212, 175, 55, 0.15); /* 極細金邊，維持高雅 */
    transition: all 0.6s ease;
    overflow: hidden;
}

/* 當發光時，讓底色與光暈疊加 */
.card-back.red-glow {
    /* 在深色背景下，光暈看起來會更溫潤、不刺眼 */
    box-shadow: inset 0 0 100px rgba(0, 0, 0, 0.5), 0 0 40px rgba(180, 40, 40, 0.3);
    border-color: rgba(212, 175, 55, 0.3);
}

.card-back.blue-glow {
    box-shadow: inset 0 0 100px rgba(0, 0, 0, 0.5), 0 0 40px rgba(40, 100, 180, 0.3);
    border-color: rgba(212, 175, 55, 0.3);
} 
               /* 修正曼陀羅：讓它適應卡片並懸浮 */
        .mandala-svg { 
            position: absolute;
            top: 50%;
            left: 50%;
            width: 90%;        /* 💡 調整為 90% 使其完整顯示，不會被切掉 */
            height: 90%;       /* 💡 保持比例 */
            transform: translate(-50%, -50%); /* 💡 確保圖案中心對齊卡片中心 */
            pointer-events: none;
            opacity: 0.85; 
            mix-blend-mode: screen; /* 💡 讓金色線條與黑色底完美融合 */
            filter: drop-shadow(0 0 10px rgba(212, 175, 55, 0.6));
        }
               /* 卡面實體感 */
        .card-front {
                        /* 💡 替換：深藍色實體質感 (舊：#0d1214 -> 新：#1a233a) */
            background: radial-gradient(circle at 50% 40%, #1a233a 0%, #060912 100%);
            border: 1px solid rgba(212, 175, 55, 0.6); transform: rotateY(180deg);
            box-shadow: inset 0 0 50px rgba(0,0,0,0.9), inset 0 0 20px rgba(212,175,55,0.1);
        }

                .treasure-glow {
            position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%);
            width: 180px; height: 180px; background: radial-gradient(circle, var(--glow-color) 0%, transparent 65%);
            animation: var(--glow-anime) 4s ease-in-out infinite; z-index: 1; pointer-events: none;
        }

        /* 1. 圖片區塊 (更新) */
        .treasure-svg-box {
            position: absolute; top: 5%; width: 90%; height: 60%;
            display: flex; align-items: center; justify-content: center; z-index: 2; overflow: visible;
        }

        .treasure-svg-box svg { width: 100%; height: 100%; filter: drop-shadow(0 0 10px rgba(0,0,0,0.8)); animation: var(--treasure-anime) 4s ease-in-out infinite; }

        @keyframes float-swim { 0%, 100% { transform: scale(0.96) translateY(0); } 50% { transform: scale(1.05) translateY(-8px); } }
        @keyframes steady-rotate { from { transform: rotate(0deg) scale(0.98); } to { transform: rotate(360deg) scale(0.98); } }
        @keyframes float-knot { 0%, 100% { transform: scale(0.98) translateY(0); } 50% { transform: scale(1.03) translateY(-4px); } }
        @keyframes pulse-glow { 0%, 100% { opacity: 0.4; transform: translate(-50%, -50%) scale(0.9); } 50% { opacity: 0.85; transform: translate(-50%, -50%) scale(1.15); } }

        /* 2. 文字區塊 (更新) */
        .treasure-info { 
            position: absolute; bottom: 5%; width: 100%; text-align: center; z-index: 3; 
            padding: 0 4px; 
        }
        
        /* 3. 名稱 (更新) */
        .t-name { 
            color: #efd07b; font-size: 0.75rem; letter-spacing: 1px; 
            text-shadow: 0 0 10px rgba(239, 208, 123, 0.4); 
            line-height: 1.1;
        }
        
        /* 4. 功德文字 (更新) */
        .t-merit { 
            color: var(--cyan-jade); font-size: 0.5rem; letter-spacing: 0.5px; 
            margin-top: 4px; opacity: 0.85; line-height: 1.1;
        }
        .card-wrapper.focused { transform: translate(-50%, -50%) scale(2.2); z-index: 100 !important; }
        .card-wrapper.scattered { opacity: 0; pointer-events: none; transform: translate(-50%, -50%) rotate(var(--angle)) translateY(-250px) scale(0); }

        /* 合十收攝按鈕 */
        .btn-action {
            position: absolute; bottom: 12%; left: 50%; transform: translateX(-50%);
            padding: 12px 35px; border-radius: 30px; border: 1px solid var(--gold-solid); 
            background: linear-gradient(to right, rgba(212,175,55,0.08), rgba(212,175,55,0.2));
            color: var(--gold-light); font-size: 0.85rem; letter-spacing: 4px; text-indent: 4px;
            cursor: pointer; opacity: 0; pointer-events: none;
            transition: all 0.8s cubic-bezier(0.2, 0.8, 0.2, 1); backdrop-filter: blur(8px); z-index: 200;
        }
        .btn-action.show { opacity: 1; pointer-events: auto; }

        /* ════ 第二階段：八寶閣 圖鑑場景 (三三二排版) ════ */
        #gallery-scene {
            position: absolute; inset: 0; z-index: 5;
            display: flex; flex-direction: column; align-items: center; justify-content: flex-start;
            opacity: 0; pointer-events: none; transition: opacity 1.5s cubic-bezier(0.4, 0, 0.2, 1); 
            padding: 90px 20px 50px 20px; overflow-y: auto; 
        }
        
        .gallery-grid {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; width: 100%; max-width: 800px;
        }
        .gallery-grid > div:nth-child(7) { transform: translateX(53%); }
        .gallery-grid > div:nth-child(8) { transform: translateX(53%); }

        .grid-item {
            background: rgba(14, 18, 20, 0.95); border: 1px solid rgba(139, 168, 156, 0.3); border-radius: 12px;
            min-height: 180px; display: flex; flex-direction: column; align-items: center; justify-content: space-between;
            padding: 15px 5px; position: relative; box-shadow: inset 0 0 30px rgba(0,0,0,0.8); transition: all 0.5s; cursor: pointer;
        }

        .grid-item.locked { background: rgba(8, 10, 12, 0.9); border-color: rgba(139, 168, 156, 0.15); opacity: 0.6; }
        .grid-item.unlocked { border-color: rgba(239, 208, 123, 0.5); box-shadow: inset 0 0 40px rgba(239, 208, 123, 0.1); }

        .grid-svg-container { width: 100%; height: 100px; display: flex; align-items: center; justify-content: center; overflow: hidden; }

        .grid-info { text-align: center; width: 100%; }
        .grid-name { font-size: 0.75rem; color: #fff; letter-spacing: 2px; margin-bottom: 8px; }
        .grid-item.locked .grid-name { color: #566461; }
        .grid-count-tag { font-size: 0.65rem; color: var(--gold-light); display: inline-block; border: 1px solid rgba(212, 175, 55, 0.3); padding: 4px 10px; border-radius: 8px; background: rgba(212, 175, 55, 0.08); }
        .grid-item.locked .grid-count-tag { color: #404a48; border-color: rgba(139,168,156,0.1); background: transparent; }

        @media (max-width: 768px) {
            .card-wrapper { width: 95px; height: 160px; transform: translate(-50%, -50%) rotate(var(--angle)) translateY(-90px) rotate(calc(-1 * var(--angle))); }
            .card-wrapper.focused { transform: translate(-50%, -50%) scale(2.5); }
            .gallery-grid { gap: 10px; }
            .grid-item { min-height: 160px; }
            .grid-svg-container { height: 80px; }
        }
        /* ════ 微塵迴向特效 CSS ════ */
.dust-particle {
    position: absolute;
    width: 3px; height: 3px;
    background: #8ba89c; /* 與您系統色調一致的琉璃色 */
    border-radius: 50%;
    pointer-events: none;
    animation: drift 2s ease-out forwards;
}

@keyframes drift {
    0% { transform: translate(0, 0); opacity: 1; }
    100% { transform: translate(var(--dx), var(--dy)); opacity: 0; }
}

/* 迴向確認遮罩層 (抄襲月相結構) */
#confirm-layer {
    position: fixed; inset: 0; background: rgba(0,0,0,0.85);
    display: none; opacity: 0; transition: opacity 0.5s;
    justify-content: center; align-items: center; z-index: 999;
}
    /* ════ 新增：黑金彈框樣式 ════ */
.modal-overlay { 
    position: fixed; inset: 0; z-index: 999; background: rgba(1,2,4,0.85); backdrop-filter: blur(15px); 
    display: none; flex-direction: column; justify-content: center; align-items: center; 
    opacity: 0; transition: opacity 0.5s; 
}
.t-box { 
    background: radial-gradient(circle at 50% 50%, rgba(212,175,55,0.12) 0%, rgba(1,2,4,0.95) 100%); 
    border: 1px solid rgba(212,175,55,0.4); border-radius: 25px; padding: 40px; 
    display: flex; flex-direction: column; align-items: center; max-width: 85%; text-align: center; 
    box-shadow: 0 0 30px rgba(0,0,0,0.8);
}  
       
    </style>
</head>
<body>

    <div class="top-nav">
        <div class="nav-btn" onclick="goHome()">歸返道場</div>
        <div class="nav-title" id="display-name" onclick="enterGallery()" style="cursor: pointer; transition: all 0.3s;">八寶閣</div>
        <div class="nav-btn" onclick="toggleHelp()">法寶說明</div>
    </div>

    <canvas id="starCanvas"></canvas>

    <div id="draw-scene">
        <div class="center-hint" id="center-hint">五萬功德聚<br>憑心擇一印</div>
        <div class="bagua-container" id="bagua-container"></div>
        <button class="btn-action" id="btn-collect" onclick="enterGallery()">合十收攝</button>
    </div>

    <div id="gallery-scene">
        <div class="gallery-grid" id="gallery-grid"></div>
    </div>

    <svg style="position: absolute; width: 0; height: 0; pointer-events: none;" aria-hidden="true">
        <defs>
            <linearGradient id="pureGold" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#FFF3D1" /><stop offset="35%" stop-color="#FCD873" /><stop offset="75%" stop-color="#C6972E" /><stop offset="100%" stop-color="#845F13" /></linearGradient>
            <linearGradient id="lapisBlue" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#4AA8FF" /><stop offset="50%" stop-color="#0A5C99" /><stop offset="100%" stop-color="#011526" /></linearGradient>
            <linearGradient id="coralRed" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#FF7B7B" /><stop offset="50%" stop-color="#D93636" /><stop offset="100%" stop-color="#4A0000" /></linearGradient>
            <linearGradient id="emeraldGreen" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#208C65" /><stop offset="50%" stop-color="#0B593D" /><stop offset="100%" stop-color="#021A10" /></linearGradient>
            <linearGradient id="softBlueGrad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#E6F2FF" /><stop offset="50%" stop-color="#80C3FF" /><stop offset="100%" stop-color="#0066CC" /></linearGradient>
            <linearGradient id="lightRedLine" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.95" /><stop offset="50%" stop-color="#FF9999" stop-opacity="0.8" /><stop offset="100%" stop-color="#CC0000" stop-opacity="0.2" /></linearGradient>
            <linearGradient id="lightBlueLine" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.95" /><stop offset="50%" stop-color="#80C3FF" stop-opacity="0.8" /><stop offset="100%" stop-color="#0066CC" stop-opacity="0.2" /></linearGradient>
            <linearGradient id="petalGrad" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#FFFFFF" /><stop offset="60%" stop-color="#FEF1D4" /><stop offset="100%" stop-color="#FCD873" /></linearGradient>
            <linearGradient id="petalDark" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#FEF1D4" /><stop offset="50%" stop-color="#FCD873" /><stop offset="100%" stop-color="#C6972E" /></linearGradient>
            <linearGradient id="stemGrad" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#0B593D" /><stop offset="50%" stop-color="#40D99D" /><stop offset="100%" stop-color="#0B593D" /></linearGradient>
            <linearGradient id="leafBlueGrad" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#E1F5FE" stop-opacity="0.8" /><stop offset="60%" stop-color="#81D4FA" stop-opacity="0.3" /><stop offset="100%" stop-color="#81D4FA" stop-opacity="0" /></linearGradient>
            <linearGradient id="leafRedGrad" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#FFEBEE" stop-opacity="0.8" /><stop offset="60%" stop-color="#EF9A9A" stop-opacity="0.3" /><stop offset="100%" stop-color="#EF9A9A" stop-opacity="0" /></linearGradient>

            <pattern id="diamondPattern" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse"><rect width="40" height="40" fill="url(#lapisBlue)" /><path d="M 20 0 L 40 20 L 20 40 L 0 20 Z" fill="url(#coralRed)" class="wire-gold" /><path d="M 20 5 L 35 20 L 20 35 L 5 20 Z" class="wire-white" /></pattern>
            <pattern id="zigzagPattern" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse"><rect width="40" height="40" fill="url(#emeraldGreen)" /><path d="M 0 10 L 20 30 L 40 10 L 40 20 L 20 40 L 0 20 Z" fill="url(#pureGold)" class="wire-white" /></pattern>

            <g id="horizontal-bands"><rect x="-60" y="0" width="120" height="20" fill="url(#pureGold)" class="edge-gold" /><rect x="-60" y="20" width="120" height="20" fill="url(#emeraldGreen)" class="wire-white"/><circle cx="0" cy="30" r="4" fill="url(#coralRed)" class="wire-gold" /><circle cx="-30" cy="30" r="4" fill="url(#coralRed)" class="wire-gold" /><circle cx="30" cy="30" r="4" fill="url(#coralRed)" class="wire-gold" /><rect x="-60" y="40" width="120" height="20" fill="url(#pureGold)" class="edge-gold" /></g>
            <g id="banner-top"><path d="M -70 50 C -40 20, 40 20, 70 50 L 60 70 L -60 70 Z" fill="url(#pureGold)" class="edge-gold" /><path d="M -50 50 C -20 35, 20 35, 50 50" class="wire-white"/><circle cx="0" cy="20" r="12" fill="url(#coralRed)" class="wire-gold" /><path d="M -5 15 C 0 10, 5 10, 5 15" class="wire-white"/></g>
            <g id="center-petal"><path d="M 0 -25 C -25 -55, 25 -55, 0 -25 Z" fill="url(#lapisBlue)" stroke="url(#pureGold)" stroke-width="2" /><path d="M 0 -30 L 0 -50" stroke="rgba(255,255,255,0.8)" stroke-width="1.2" /></g>
            <g id="outer-petal"><path d="M 0 -60 C -35 -95, 35 -95, 0 -60 Z" fill="url(#emeraldGreen)" stroke="url(#pureGold)" stroke-width="2" /></g>
            <g id="dharma-spoke"><path d="M -12 -55 L -20 -155 L 20 -155 L 12 -55 Z" fill="url(#lapisBlue)" class="edge-gold" /><path d="M -5 -65 L -10 -145 L 10 -145 L 5 -65 Z" class="wire-white" opacity="0.6"/><path d="M -15 -195 L 0 -225 L 15 -195 Z" fill="url(#pureGold)" class="edge-gold" /><path d="M 0 -195 L 0 -220" class="wire-white" /></g>
            <g id="lotus-petal"><path d="M 0 -15 C -15 -35, 15 -35, 0 -15 Z" fill="url(#coralRed)" stroke="url(#pureGold)" stroke-width="1.5" /><path d="M 0 -18 L 0 -30" stroke="rgba(255,255,255,0.8)" stroke-width="1" /></g>
            <g id="blue-leaf-left"><path d="M 0 0 C -60 -50, -90 -160, -20 -240 C 30 -160, 20 -70, 0 0 Z" fill="url(#leafBlueGrad)" class="wire-gold-thin" /><path d="M 0 0 C -15 -80, -20 -160, -15 -230" class="wire-gold-thin" opacity="0.6"/></g>
            <g id="red-leaf-right"><path d="M 0 0 C 60 -50, 90 -160, 20 -240 C -30 -160, -20 -70, 0 0 Z" fill="url(#leafRedGrad)" class="wire-gold-thin" /><path d="M 0 0 C 15 -80, 20 -160, 15 -230" class="wire-gold-thin" opacity="0.6"/></g>
            <g id="red-leaf-left"><path d="M 0 0 C -50 -40, -80 -130, -15 -200 C 25 -130, 15 -60, 0 0 Z" fill="url(#leafRedGrad)" class="wire-gold-thin" /><path d="M 0 0 C -10 -70, -15 -140, -10 -190" class="wire-gold-thin" opacity="0.6"/></g>
            <g id="blue-leaf-right"><path d="M 0 0 C 50 -40, 80 -130, 15 -200 C -25 -130, -15 -60, 0 0 Z" fill="url(#leafBlueGrad)" class="wire-gold-thin" /><path d="M 0 0 C 10 -70, 15 -140, 10 -190" class="wire-gold-thin" opacity="0.6"/></g>

            <g id="treasure-banner">
                <linearGradient id="tailRed" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#FF7B7B" stop-opacity="0.9" /><stop offset="50%" stop-color="#D93636" stop-opacity="0.7" /><stop offset="100%" stop-color="#4A0000" stop-opacity="0.1" /></linearGradient>

        function initConchSpirals() {
            const container = document.getElementById('conch-spiral-container');
            if(!container) return;
            const SCX = 145, SCY = 224, MAX_R = 222, TURNS = 3.5, ARMS = 4, SEGS = 100;
            const colors = ['#FFB3B3', '#81D4FA', '#FFB3B3', '#81D4FA'];
            let html = '';
            for(let a=0; a<ARMS; a++) {
                let pts = [];
                for(let i=0; i<=SEGS; i++) {
                    const t = i/SEGS;
                    const r = MAX_R * Math.pow(t, 0.85);
                    const theta = t * Math.PI * 2 * TURNS + (Math.PI * 2 / ARMS) * a;
                    pts.push(`${SCX + r * Math.cos(theta)},${SCY + r * Math.sin(theta)}`);
                }
                let d = `M ${pts[0]} ` + pts.slice(1).map(p => `L ${p}`).join(' ');
                html += `<path d="${d}" fill="none" stroke="${colors[a]}" stroke-width="4.5" stroke-linecap="round" />`;
            }
            container.innerHTML = html;

        function poly(n, r, rotDeg=0) {
            const pts=[], off = -Math.PI/2 + rotDeg*Math.PI/180;
            for(let k=0;k<n;k++) pts.push([r*Math.cos(2*Math.PI*k/n + off), r*Math.sin(2*Math.PI*k/n + off)]);
            return pts;
        }
        function ptStr(pts) { return pts.map(p=>p[0].toFixed(2)+','+p[1].toFixed(2)).join(' '); }
        function getWeb(pts, stroke, width, op) {
            let html = `<g stroke="${stroke}" stroke-width="${width}" opacity="${op}" fill="none">`;
            for(let i=0; i<pts.length; i++) for(let j=i+1; j<pts.length; j++) html += `<line x1="${pts[i][0]}" y1="${pts[i][1]}" x2="${pts[j][0]}" y2="${pts[j][1]}"/>`;
            return html + `</g>`;
        }

    // 呼叫現有的彈窗系統來顯示這段精美的 HTML

// 💡 修正 6B：替換為完整爆發特效邏輯
let pendingDedicateIdx = -1;

function handleDedicateClick(idx) {
    if (db.eightTreasures[idx] <= 0) return;
    pendingDedicateIdx = idx;
    
    const t = TREASURES[idx];
    document.getElementById('confirm-svg').innerHTML = `<svg viewBox="${t.viewBox}" style="width:100%; height:100%;"><use href="#${t.svgId}"></use></svg>`;
    document.getElementById('confirm-name').innerText = t.name;
    
    const m = document.getElementById('confirm-layer');
    m.style.display = 'flex';
    setTimeout(() => m.style.opacity = 1, 10);
}

function executeDedicate(idx) {
    // 關閉確認框
    document.getElementById('confirm-layer').style.opacity = 0;
    setTimeout(() => document.getElementById('confirm-layer').style.display = 'none', 500);

    // 扣除並存檔
    db.eightTreasures[idx]--; 
    saveDB(); // 💾 統一呼叫存檔函數
    
    const t = TREASURES[idx];
    const ov = document.getElementById('anim-overlay'), 
          flash = document.getElementById('full-screen-flash'), 
          txt = document.getElementById('anim-text'), 
          btn = document.getElementById('close-anim-btn'),
          svgCont = document.getElementById('anim-svg-container');

    // 初始化動畫場景
    ov.style.display = 'flex';
    svgCont.innerHTML = `<svg viewBox="${t.viewBox}" style="width:100%; height:100%; filter: drop-shadow(0 0 25px ${t.glow});"><use href="#${t.svgId}"></use></svg>`;
    txt.style.opacity = 0;
    btn.style.opacity = 0;
    btn.style.pointerEvents = 'none';

    setTimeout(() => ov.style.opacity = 1, 50);

    // 觸發閃光與微塵
    setTimeout(() => {
        flash.style.opacity = 1; 
        svgCont.innerHTML = ''; // 實體消失，化為微塵
        
        for (let k = 0; k < 250; k++) {
            let d = document.createElement('div');
            d.className = 'dust-particle';
            d.style.background = Math.random() > 0.5 ? '#f3e5ab' : '#FCF6D8'; 
            d.style.width = Math.random() * 4 + 2 + 'px'; 
            d.style.height = d.style.width;
            d.style.position = 'absolute';
            d.style.left = '50%'; d.style.top = '50%';
            let a = Math.random() * Math.PI * 2, dist = 100 + Math.random() * 600;
            d.style.setProperty('--dx', Math.cos(a) * dist + 'px');
            d.style.setProperty('--dy', Math.sin(a) * dist + 'px');
            d.style.animationDuration = (0.7 + Math.random() * 1.5) + 's';
            ov.appendChild(d);
        }
        
        setTimeout(() => { 
            flash.style.transition = 'opacity 1.5s ease-in'; 
            flash.style.opacity = 0; 
        }, 1200); 

        txt.innerHTML = "【 因緣圓滿 ‧ 悉皆迴向 】<br><span style='font-size:0.95rem; color:var(--cyan-jade);'><br>寶物已化作無漏金剛光束，迴向虛空法界。</span>";
        txt.style.opacity = 1;
        
        setTimeout(() => { btn.style.opacity = 1; btn.style.pointerEvents = 'auto'; }, 2500);
    }, 1600);
}

function closeAnim() {
    const ov = document.getElementById('anim-overlay');
    ov.style.opacity = 0;
    setTimeout(() => {
        ov.style.display = 'none';
        document.querySelectorAll('#anim-overlay .dust-particle').forEach(d => d.remove());
        // 重新渲染圖鑑狀態
        document.getElementById('gallery-grid').innerHTML = ""; 
        buildGallery();
    }, 500);
}
        // 新增：黑金彈窗控制函數
function showCustomAlert(msg, title = "法界告示") {
    document.getElementById('custom-alert-title').innerText = title;
    document.getElementById('custom-alert-desc').innerHTML = msg;
    const m = document.getElementById('custom-alert-modal');
    m.style.display = 'flex';
    setTimeout(() => m.style.opacity = 1, 50);
}
function closeCustomAlert() {
    const m = document.getElementById('custom-alert-modal');
    m.style.opacity = 0;
    setTimeout(() => m.style.display = 'none', 500);
}
