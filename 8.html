<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <link rel="manifest" href="manifest.json">
    <title>佛教八寶．卡牌契印</title>
    <style>
        :root {
            --gold: #f3e5ab;
            --solid-gold: #d4af37;
            --bg-deep: #020203;
        }

        body {
            margin: 0; padding: 0;
            height: 100vh; height: 100dvh;
            overflow: hidden;
            background: radial-gradient(circle at 50% 50%, #111518 0%, var(--bg-deep) 100%);
            color: #fff; font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            user-select: none; -webkit-tap-highlight-color: transparent;
        }

        canvas { 
            position: absolute; inset: 0; 
            width: 100%; height: 100%; 
            z-index: 1; pointer-events: none; 
        }

        /* 左上角歸返按鈕 */
        .top-nav-btn {
            position: absolute; top: 20px; left: 20px;
            background: rgba(0, 0, 0, 0.5); border: 1px solid rgba(212,175,55,0.3); color: var(--gold); 
            padding: 8px 16px; border-radius: 20px; font-size: 0.85rem; font-weight: bold; letter-spacing: 1px; 
            display: flex; align-items: center; gap: 6px; z-index: 1000; cursor: pointer; 
            backdrop-filter: blur(5px); transition: opacity 0.8s, transform 0.3s;
        }
        .top-nav-btn:active { 
            transform: scale(0.95); 
            background: rgba(212,175,55,0.2); 
        }

        /* 卡牌容器佈局 */
        #deck-container {
            position: absolute;
            bottom: 5%; 
            width: 100%; height: 480px; /* 增加高度以適應放大的插圖 */
            display: flex; justify-content: center; align-items: flex-end;
            padding-bottom: 30px;
            z-index: 10;
            perspective: 1500px;
        }

        .card {
            position: absolute;
            width: 250px; height: 430px; /* 拉高拉寬，適應新插圖 */
            transition: all 1.2s cubic-bezier(0.2, 0.8, 0.2, 1.1);
            cursor: pointer;
        }

        .card-inner {
            position: relative;
            width: 100%; height: 100%;
            transform-style: preserve-3d;
            transition: transform 1.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .card.is-flipped .card-inner { 
            transform: rotateY(180deg); 
        }

        .card-face {
            position: absolute; width: 100%; height: 100%;
            backface-visibility: hidden;
            border-radius: 20px;
            border: 1px solid rgba(212, 175, 55, 0.25);
            box-shadow: 0 10px 40px rgba(0,0,0,0.9);
            display: flex; flex-direction: column; align-items: center;
            overflow: hidden;
        }

        /* --- 卡牌背面 --- */
        .card-back {
            background: linear-gradient(145deg, #0a0c0e, #010101);
            justify-content: center;
        }
        .totem-prajna { 
            width: 90px; height: 90px; 
            fill: none; stroke-width: 1; opacity: 0.5; 
        }

        /* --- 卡牌正面 --- */
        .card-front {
            background: linear-gradient(135deg, rgba(15,15,12,0.95), rgba(2,2,0,1));
            transform: rotateY(180deg);
            padding: 25px 15px; 
            justify-content: space-between;
        }

        /* 插圖容器 */
        .icon-container { 
            width: 200px; height: 200px; /* 放大的插圖容器 */
            display: flex; align-items: center; justify-content: center; 
            margin: 20px 0;
            position: relative;
        }
        
        /* 動畫和發光效果 */
        .lotus-spin { 
            animation: slow-spin 50s linear infinite; 
        }
        @keyframes slow-spin { 
            from { transform: rotate(0deg); } 
            to { transform: rotate(360deg); } 
        }

        /* 細線條和光影效果 */
        .draw-petal { 
            stroke-dasharray: 1000; stroke-dashoffset: 1000; fill-opacity: 0; 
            animation: dash-draw 3s cubic-bezier(0.4, 0, 0.2, 1) forwards 0.5s, color-fade 2.5s ease forwards 2.5s; 
        }
        @keyframes dash-draw { to { stroke-dashoffset: 0; } }
        @keyframes color-fade { to { fill-opacity: 0.8; } }

        .cert-header { 
            color: var(--gold); font-size: 0.9rem; letter-spacing: 5px; 
            font-weight: bold; text-transform: uppercase; 
        }
        .cert-user { 
            color: var(--gold); font-size: 1.4rem; font-weight: bold; 
            letter-spacing: 4px; margin: 8px 0; text-shadow: 0 0 10px rgba(212,175,55,0.4); 
        }
        .cert-desc { 
            color: #ccc; font-size: 0.8rem; line-height: 1.8; 
            text-align: center; padding: 0 5px; 
        }
        .cert-desc b { 
            color: var(--solid-gold); 
        }

        .btn-confirm {
            margin-top: 15px; width: 100%; padding: 12px 0; border-radius: 30px;
            border: 1px solid var(--solid-gold); 
            background: linear-gradient(to right, rgba(212,175,55,0.1), rgba(212,175,55,0.2));
            color: var(--gold); font-size: 0.9rem; font-weight: bold; 
            cursor: pointer; transition: 0.3s;
        }

        /* 扇形陣列座標 */
        .card-0 { transform: rotateZ(-12deg) translateX(-180px) translateY(35px); z-index: 5; }
        .card-1 { transform: rotateZ(-9deg) translateX(-120px) translateY(18px); z-index: 6; }
        .card-2 { transform: rotateZ(-6deg) translateX(-60px) translateY(8px); z-index: 7; }
        .card-3 { transform: rotateZ(0deg) translateX(0px) translateY(0px); z-index: 8; }
        .card-4 { transform: rotateZ(6deg) translateX(60px) translateY(8px); z-index: 7; }
        .card-5 { transform: rotateZ(9deg) translateX(120px) translateY(18px); z-index: 6; }
        .card-6 { transform: rotateZ(12deg) translateX(180px) translateY(35px); z-index: 5; }
        .card-7 { transform: rotateZ(15deg) translateX(240px) translateY(60px); z-index: 4; }

        /* 聚焦狀態 */
        .card.is-active {
            transform: scale(1.1) rotateZ(0deg) translateX(0px) translateY(-100px) !important;
            z-index: 100 !important;
        }

        #page-curtain { 
            position: fixed; inset: 0; background: #000; 
            z-index: 999999; pointer-events: none; transition: opacity 1s; opacity: 1; 
        }
    </style>
</head>
<body onclick="resetAllCards(event)">

    <div id="page-curtain"></div>

    <div class="top-nav-btn" onclick="goHome('index.html')">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="19" y1="12" x2="5" y2="12"></line>
            <polyline points="12 19 5 12 12 5"></polyline>
        </svg>
        歸返
    </div>

    <svg style="position: absolute; width: 0; height: 0;">
        <defs>
            <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
                <feGaussianBlur stdDeviation="3.5" result="coloredBlur"/>
                <feMerge>
                    <feMergeNode in="coloredBlur"/>
                    <feMergeNode in="SourceGraphic"/>
                </feMerge>
            </filter>
            
            <g id="common-lotus-base" transform="translate(0, 150) scale(1.1)">
                <path d="M-40 0 C -20 20, 20 20, 40 0 C 20 -20, -20 -20, -40 0 Z" fill="#f8bbd0" stroke="#d4af37" stroke-width="0.8" class="draw-petal" />
                <path d="M-60 20 C -30 40, 30 40, 60 20 C 30 -20, -30 -20, -60 20 Z" fill="#f48fb1" stroke="#d4af37" stroke-width="0.8" opacity="0.9" />
                <path d="M-90 50 C -40 80, 40 80, 90 50 C 40 20, -40 20, -90 50 Z" fill="#e1bee7" stroke="#d4af37" stroke-width="0.8" opacity="0.8" />
                <path d="M-120 90 C -60 120, 60 120, 120 90 C 60 40, -60 40, -120 90 Z" fill="#ba68c8" stroke="#d4af37" stroke-width="0.8" opacity="0.7" />
            </g>

            <g id="totem-prajna-symbol">
                <path d="M50 10 C 75 40, 75 70, 50 95 C 25 70, 25 40, 50 10 Z" />
                <path d="M50 35 L 65 55 L 50 75 L 35 55 Z" stroke-width="0.8"/>
                <circle cx="50" cy="55" r="5" stroke-width="0.8"/>
            </g>
        </defs>
    </svg>

    <canvas id="starCanvas"></canvas>
    <div id="deck-container"></div>

    <script>
        // 星空背景渲染邏輯
        const canvas = document.getElementById('starCanvas');
        const ctx = canvas.getContext('2d');
        let width, height, stars = [];
        
        function resize() { 
            width = window.innerWidth; 
            height = window.innerHeight; 
            canvas.width = width; 
            canvas.height = height; 
        }
        
        window.addEventListener('resize', resize); 
        resize();
        
        for(let i=0; i<150; i++) {
            stars.push({ 
                x: (Math.random() - 0.5) * 2000, 
                y: (Math.random() - 0.5) * 2000, 
                z: Math.random() * 1000, 
                s: Math.random() * 2 
            });
        }
        
        function draw() {
            ctx.fillStyle = 'rgba(2, 2, 4, 0.4)'; 
            ctx.fillRect(0, 0, width, height);
            ctx.globalCompositeOperation = 'screen';
            
            stars.forEach(s => { 
                s.z -= 0.8; 
                if(s.z <= 0) s.z = 1000; 
                let sc = 300 / (300 + s.z);
                let sx = width / 2 + s.x * sc;
                let sy = height / 2 + s.y * sc; 
                
                ctx.beginPath(); 
                ctx.arc(sx, sy, s.s * sc, 0, Math.PI * 2); 
                ctx.fillStyle = `rgba(243, 229, 171, ${sc * 1.5})`; 
                ctx.fill(); 
            });
            
            requestAnimationFrame(draw);
        }
        draw();

        // 佛教八寶數據 (放大的精緻線條風格，共用底部蓮花座)
        const TREASURES = [
            {
                name: '法輪', sanskrit: 'Dharmachakra', color: '#ba68c8',
                svg: `<svg viewBox="-150 -150 300 300" style="width:100%;height:100%;overflow:visible; filter:url(#glow)">
                      <use href="#common-lotus-base" />
                      <g id="dharma-wheel" transform="scale(1.3)">
                          <circle cx="0" cy="-50" r="12" fill="#fff"/><circle cx="0" cy="-50" r="10" fill="none" stroke="#d4af37" stroke-width="1.2"/>
                          <line x1="0" y1="-50" x2="0" y2="-10" stroke="#d4af37" stroke-width="1.2" />
                          <line x1="0" y1="-50" x2="28" y2="-22" stroke="#d4af37" stroke-width="1.2" />
                          <line x1="0" y1="-50" x2="40" y2="-50" stroke="#d4af37" stroke-width="1.2" />
                          <line x1="0" y1="-50" x2="28" y2="-78" stroke="#d4af37" stroke-width="1.2" />
                          <line x1="0" y1="-50" x2="0" y2="-90" stroke="#d4af37" stroke-width="1.2" />
                          <line x1="0" y1="-50" x2="-28" y2="-78" stroke="#d4af37" stroke-width="1.2" />
                          <line x1="0" y1="-50" x2="-40" y2="-50" stroke="#d4af37" stroke-width="1.2" />
                          <line x1="0" y1="-50" x2="-28" y2="-22" stroke="#d4af37" stroke-width="1.2" />
                          <circle cx="0" cy="-50" r="50" fill="none" stroke="#d4af37" stroke-width="1.5" />
                          <circle cx="0" cy="-50" r="40" fill="none" stroke="#d4af37" stroke-width="1" />
                      </g>
                    </svg>`
            },
            {
                name: '法螺', sanskrit: 'Shankha', color: '#4dd0e1',
                svg: `<svg viewBox="-150 -150 300 300" style="width:100%;height:100%;overflow:visible; filter:url(#glow)">
                      <use href="#common-lotus-base" />
                      <g id="conch-shell" transform="scale(1.3) translate(0,-50)">
                          <path d="M-30 0 C -10 -20, 20 -20, 30 0 C 40 20, 40 50, 30 70 C 20 80, -20 80, -30 70 C -40 50, -40 20, -30 0 Z" fill="#eeeeee" stroke="#d4af37" stroke-width="1.2" />
                          <path d="M-15 10 C -5 0, 15 0, 20 10 C 25 20, 25 40, 20 50 C 15 60, -5 60, -10 50 C -15 40, -15 20, -10 10" fill="none" stroke="#cccccc" stroke-width="1" />
                          <path d="M-5 20 C 0 15, 10 15, 15 20 C 18 25, 18 35, 15 40 C 10 45, 0 45, -2 40 C -5 35, -5 25, -2 20" fill="none" stroke="#cccccc" stroke-width="1" />
                          <path d="M30 70 L 40 90 L 50 95 L 40 100 L 30 105 Z" fill="#d4af37" stroke="#d4af37" stroke-width="1.2" />
                      </g>
                    </svg>`
            },
            {
                name: '寶傘', sanskrit: 'Chattra', color: '#f48fb1',
                svg: `<svg viewBox="-150 -150 300 300" style="width:100%;height:100%;overflow:visible; filter:url(#glow)">
                      <use href="#common-lotus-base" />
                      <g id="parasol" transform="scale(1.3) translate(0,-50)">
                          <path d="M-60 20 C -60 -10, 60 -10, 60 20 Z" fill="#c62828" stroke="#d4af37" stroke-width="1.2" />
                          <line x1="0" y1="-10" x2="0" y2="70" stroke="#d4af37" stroke-width="2" stroke-linecap="round" />
                          <path d="M-60 20 Q -40 30 -20 20 Q 0 30 20 20 Q 40 30 60 20" fill="none" stroke="#f3e5ab" stroke-width="1.2" />
                          <circle cx="0" y1="-10" r="5" fill="#d4af37" />
                      </g>
                    </svg>`
            },
            {
                name: '吉祥結', sanskrit: 'Shrivatsa', color: '#81d4fa',
                svg: `<svg viewBox="-150 -150 300 300" style="width:100%;height:100%;overflow:visible; filter:url(#glow)">
                      <use href="#common-lotus-base" />
                      <g id="endless-knot" transform="scale(1.3) translate(0,-50)">
                          <path d="M-30 -20 L 30 40 L 10 60 L -50 0 Z" fill="none" stroke="#d4af37" stroke-width="3" stroke-linejoin="round" class="draw-petal" />
                          <path d="M30 -20 L -30 40 L -10 60 L 50 0 Z" fill="none" stroke="#d4af37" stroke-width="3" stroke-linejoin="round" />
                          <path d="M-20 -10 L 40 50 L 20 70 L -40 10 Z" fill="none" stroke="#f3e5ab" stroke-width="2" stroke-linejoin="round" />
                      </g>
                    </svg>`
            },
            {
                name: '蓮花', sanskrit: 'Padma', color: '#ffb300',
                svg: `<svg viewBox="-150 -150 300 300" style="width:100%;height:100%;overflow:visible; filter:url(#glow)">
                      <use href="#common-lotus-base" />
                      <g id="padma-flower" transform="scale(1.3) translate(0,-50)">
                          <path d="M0 60 C -15 50, -15 30, 0 10 C 15 30, 15 50, 0 60 Z" fill="#ffffff" stroke="#f48fb1" stroke-width="1.2" />
                          <path d="M0 60 L -10 70 L 0 75 L 10 70 Z" fill="#fbd22e" />
                      </g>
                    </svg>`
            },
            {
                name: '金魚', sanskrit: 'Matsya', color: '#ba68c8',
                svg: `<svg viewBox="-150 -150 300 300" style="width:100%;height:100%;overflow:visible; filter:url(#glow)">
                      <use href="#common-lotus-base" />
                      <g id="golden-fish" transform="scale(1.3) translate(0,-50)">
                          <g transform="rotate(30 -15 30)">
                              <path d="M-15 0 C -5 10, -5 40, -15 50 C -25 40, -25 10, -15 0 Z" fill="#ffb300" opacity="0.9"/>
                              <path d="M-15 50 L -25 65 L -10 65 Z" fill="#ffb300"/>
                              <circle cx="-20" cy="15" r="2" fill="#000"/>
                          </g>
                          <g transform="rotate(-30 15 30)">
                              <path d="M15 0 C 25 10, 25 40, 15 50 C 5 40, 5 10, 15 0 Z" fill="#ffca28" opacity="0.9"/>
                              <path d="M15 50 L 5 65 L 20 65 Z" fill="#ffca28"/>
                              <circle cx="20" cy="15" r="2" fill="#000"/>
                          </g>
                      </g>
                    </svg>`
            },
            {
                name: '勝利幢', sanskrit: 'Dhvaja', color: '#4dd0e1',
                svg: `<svg viewBox="-150 -150 300 300" style="width:100%;height:100%;overflow:visible; filter:url(#glow)">
                      <use href="#common-lotus-base" />
                      <g id="victory-banner" transform="scale(1.3) translate(0,-50)">
                          <rect x="-3" y="-10" width="6" height="85" fill="#d4af37"/>
                          <path d="M-25 15 L 25 15 L 20 30 L -20 30 Z" fill="#006064"/>
                          <path d="M-20 30 L 20 30 L 15 50 L -15 50 Z" fill="#c62828"/>
                          <path d="M-15 50 L 15 50 L 10 70 L -10 70 Z" fill="#f3e5ab"/>
                          <circle cx="0" cy="-10" r="5" fill="#d4af37"/>
                      </g>
                    </svg>`
            },
            {
                name: '寶瓶', sanskrit: 'Kalasha', color: '#f48fb1',
                svg: `<svg viewBox="-150 -150 300 300" style="width:100%;height:100%;overflow:visible; filter:url(#glow)">
                      <use href="#common-lotus-base" />
                      <g id="treasure-vase" transform="scale(1.3) translate(0,-50)">
                          <path d="M-15 0 L 15 0 L 12 10 L -12 10 Z" fill="#d4af37"/>
                          <path d="M-15 10 C -30 20, -30 50, -10 60 L 10 60 C 30 50, 30 20, 15 10 Z" fill="#006064" stroke="#4dd0e1" stroke-width="2"/>
                          <circle cx="0" cy="35" r="8" fill="#d4af37"/>
                          <path d="M0 -15 C -5 -10, -5 -5, 0 0 C 5 -5, 5 -10, 0 -15 Z" fill="#f48fb1"/>
                      </g>
                    </svg>`
            }
        ];

        let db; 
        try { 
            db = JSON.parse(localStorage.getItem('PX_V15.0')) || {}; 
        } catch(e) { 
            db = {}; 
        }
        
        const userName = db.name || "行者";
        const deck = document.getElementById('deck-container');
        
        TREASURES.forEach((t, idx) => {
            const card = document.createElement('div');
            card.className = `card card-${idx}`;
            card.onclick = (e) => { 
                e.stopPropagation(); 
                focusCard(idx); 
            };

            card.innerHTML = `
                <div class="card-inner">
                    <div class="card-back card-face">
                        <svg class="totem-prajna" style="stroke:#d4af37" viewBox="0 0 100 100">
                            <use href="#totem-prajna-symbol"/>
                        </svg>
                        <div style="margin-top:20px; color:#d4af37; font-size:0.75rem; letter-spacing:3px; font-weight:bold; opacity:0.8">
                            功德契印
                        </div>
                    </div>
                    <div class="card-front card-face">
                        <div class="cert-header">✦ ${t.name} ✦</div>
                        <div class="icon-container">${t.svg}</div>
                        <div class="cert-name-wrap" style="text-align:center">
                            <div style="color:var(--gold); font-size:0.6rem; letter-spacing:2px; text-transform:uppercase">${t.sanskrit}</div>
                            <div class="cert-user">${userName}</div>
                        </div>
                        <button class="btn-confirm" onclick="returnToSystem()">收起契印</button>
                    </div>
                </div>
            `;
            deck.appendChild(card);
        });

        // 初始載入動畫邏輯
        window.onload = () => {
            setTimeout(() => { 
                document.getElementById('page-curtain').style.opacity = '0'; 
            }, 300);
        };

        // 聚焦卡牌邏輯
        function focusCard(idx) {
            resetAllCards();
            const targetCard = document.querySelector(`.card-${idx}`);
            targetCard.classList.add('is-active');
            
            setTimeout(() => {
                targetCard.classList.add('is-flipped');
            }, 800);
        }

        // 重置所有卡牌狀態
        function resetAllCards(e) {
            document.querySelectorAll('.card').forEach(c => {
                c.classList.remove('is-active');
                c.classList.remove('is-flipped');
            });
        }

        // 回首頁的函數
        function goHome(targetUrl) {
            document.getElementById('page-curtain').style.opacity = '1';
            setTimeout(() => { 
                window.location.href = targetUrl; 
            }, 800);
        }

        // 返回系統邏輯
        function returnToSystem() {
            resetAllCards(); 
        }
    </script>
</body>
</html>
