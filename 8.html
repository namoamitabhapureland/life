<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>悲願化城 ． 隨緣契印</title>
    <style>
        :root {
            --gold-light: #f3e5ab;
            --gold-solid: #d4af37;
            --cyan-jade: #8ba89c;
            --bg-center: #091114; 
            --bg-deep: #010304;
            --card-base: linear-gradient(145deg, #12181a, #050809); 
        }

        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }
        
        body {
            background: radial-gradient(circle at 50% 40%, var(--bg-center) 0%, var(--bg-deep) 100%);
            color: #fff; 
            font-family: "PingFang TC", "Microsoft JhengHei", serif;
            height: 100vh; height: 100dvh;
            overflow: hidden;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        /* ════ 法相 SVG 專屬全域樣式 ════ */
        .wire-white { stroke: rgba(255, 255, 255, 0.9); stroke-width: 1.5; stroke-linejoin: round; fill: none; }
        .wire-gold { stroke: url(#pureGold); stroke-width: 2.5; stroke-linejoin: round; fill: none; }
        .edge-gold { stroke: url(#pureGold); stroke-width: 4; stroke-linejoin: round; }

        canvas { position: absolute; inset: 0; z-index: 0; pointer-events: none; }

        /* ════ 第一階段：八卦方位 抽卡場景 ════ */
        #draw-scene {
            position: absolute; inset: 0; z-index: 10;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 1.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .center-hint {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            color: var(--gold-light); font-size: 0.95rem; letter-spacing: 6px; text-indent: 6px;
            opacity: 0.8; text-align: center; line-height: 2;
            text-shadow: 0 0 15px rgba(212,175,55,0.4);
            transition: opacity 0.8s; pointer-events: none; z-index: 5;
        }

        .bagua-container {
            position: absolute; top: 50%; left: 50%;
            width: 0; height: 0; z-index: 10;
        }

        .card-wrapper {
            position: absolute;
            width: 140px; height: 235px;
            top: 0; left: 0;
            transform: translate(-50%, -50%) rotate(var(--angle)) translateY(-120px) rotate(calc(-1 * var(--angle)));
            transition: all 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
            perspective: 1500px; cursor: pointer; z-index: 10;
        }

        /* 盲選觸碰浮出 */
        @media (hover: hover) {
            .card-wrapper:hover {
                z-index: 50;
                transform: translate(-50%, -50%) rotate(var(--angle)) translateY(-135px) rotate(calc(-1 * var(--angle))) scale(1.05);
            }
        }
        .card-wrapper:active {
            z-index: 50;
            transform: translate(-50%, -50%) rotate(var(--angle)) translateY(-135px) rotate(calc(-1 * var(--angle))) scale(1.05);
        }

        .card-inner {
            width: 100%; height: 100%;
            position: relative; transform-style: preserve-3d;
            transition: transform 1.2s cubic-bezier(0.2, 0.8, 0.2, 1);
            box-shadow: 0 10px 40px rgba(0,0,0,0.9); border-radius: 14px;
        }

        .card-wrapper.is-flipped .card-inner { transform: rotateY(180deg); }

        .card-face {
            position: absolute; inset: 0; backface-visibility: hidden;
            border-radius: inherit; overflow: hidden;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        /* 卡背 */
        .card-back {
            background: var(--card-base);
            border: 1px solid rgba(212, 175, 55, 0.35);
            box-shadow: inset 0 0 30px rgba(212, 175, 55, 0.05);
        }
        .mandala-svg { width: 250%; height: 250%; opacity: 0.5; }

        /* 卡面 (徹底去除方框與多餘背景) */
        .card-front {
            background: radial-gradient(circle at 50% 40%, #080d12 0%, #010203 100%);
            border: 1px solid rgba(212, 175, 55, 0.6);
            transform: rotateY(180deg);
            box-shadow: inset 0 0 50px rgba(0,0,0,0.8);
        }

        /* ✨ 發光核心 ✨ */
        .treasure-glow {
            position: absolute; top: 40%; left: 50%;
            transform: translate(-50%, -50%);
            width: 160px; height: 160px;
            background: radial-gradient(circle, var(--glow-color) 0%, transparent 65%);
            animation: var(--glow-anime) 4s ease-in-out infinite;
            z-index: 1; pointer-events: none;
        }

        .treasure-svg-box {
            position: absolute; top: 5%; 
            width: 90%; height: 65%; /* 佔據卡面最莊嚴的黃金比例 */
            display: flex; align-items: center; justify-content: center;
            z-index: 2; overflow: visible;
        }

        .treasure-svg-box svg {
            width: 100%; height: 100%;
            filter: drop-shadow(0 0 10px rgba(0,0,0,0.8));
            animation: var(--treasure-anime) 4s ease-in-out infinite;
        }

        /* =════ 動畫定義 ════= */

        /* 1. 金魚專屬：游泳動畫 (縮放幅度更大，上下浮動) */
        @keyframes float-swim {
            0%, 100% { transform: scale(0.96) translateY(0); }
            50% { transform: scale(1.05) translateY(-8px); }
        }
        /* 2. 傘蓋/幡蓋專屬：自轉動畫 */
        @keyframes steady-rotate {
            from { transform: rotate(0deg) scale(0.98); }
            to { transform: rotate(360deg) scale(0.98); }
        }
        /* 3. 吉祥結專屬：複合縮放 */
        @keyframes float-knot {
            0%, 100% { transform: scale(0.98); }
            50% { transform: scale(1.03); }
        }

        /* 光暈呼吸動畫 (配合游泳節奏) */
        @keyframes pulse-glow {
            0%, 100% { opacity: 0.4; transform: translate(-50%, -50%) scale(0.9); }
            50% { opacity: 0.85; transform: translate(-50%, -50%) scale(1.15); }
        }

        /* 卡面文字微調，優雅不搶戲 */
        .treasure-info {
            position: absolute; bottom: 8%; width: 100%; text-align: center; z-index: 3;
        }
        .t-name { color: #efd07b; font-size: 1.05rem; letter-spacing: 5px; text-shadow: 0 0 10px rgba(239, 208, 123, 0.5); }
        .t-rarity { color: var(--cyan-jade); font-size: 0.65rem; letter-spacing: 3px; margin-top: 8px; opacity: 0.8; }

        .card-wrapper.focused { transform: translate(-50%, -50%) scale(2.2); z-index: 100 !important; }
        .card-wrapper.scattered {
            opacity: 0; pointer-events: none;
            transform: translate(-50%, -50%) rotate(var(--angle)) translateY(-250px) scale(0);
        }

        .btn-action {
            position: absolute; bottom: 12%; left: 50%; transform: translateX(-50%);
            padding: 14px 40px; border-radius: 30px;
            border: 1px solid var(--gold-solid); 
            background: linear-gradient(to right, rgba(212,175,55,0.08), rgba(212,175,55,0.2));
            color: var(--gold-light); font-size: 0.9rem; letter-spacing: 4px; text-indent: 4px;
            cursor: pointer; opacity: 0; pointer-events: none;
            transition: all 0.8s cubic-bezier(0.2, 0.8, 0.2, 1); backdrop-filter: blur(8px); z-index: 200;
        }
        .btn-action.show { opacity: 1; pointer-events: auto; }

        /* ════ 第二階段：多寶閣 圖鑑場景 (圓環陣法) ════ */
        #gallery-scene {
            position: absolute; inset: 0; z-index: 5;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            opacity: 0; pointer-events: none; transition: opacity 1.5s cubic-bezier(0.4, 0, 0.2, 1); padding: 20px;
        }

        .gallery-header { text-align: center; margin-bottom: 35px; }
        .gallery-title { color: var(--gold-light); font-size: 1.3rem; letter-spacing: 12px; text-indent: 12px; font-weight: normal; }
        
        .gallery-grid {
            display: grid; grid-template-columns: repeat(4, 1fr); grid-template-rows: repeat(2, 1fr);
            gap: 20px; width: 100%; max-width: 900px;
        }

        .grid-item {
            background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(139, 168, 156, 0.25); border-radius: 12px;
            min-height: 200px; display: flex; flex-direction: column; align-items: center; justify-content: space-between;
            padding: 15px 10px; position: relative; box-shadow: inset 0 0 25px rgba(0,0,0,0.6); transition: all 0.5s;
        }

        .grid-item.locked { border-style: dashed; opacity: 0.45; }
        .grid-item.unlocked { border-color: rgba(239, 208, 123, 0.6); box-shadow: inset 0 0 30px rgba(239, 208, 123, 0.15); }

        .grid-svg-container { width: 100%; height: 110px; display: flex; align-items: center; justify-content: center; overflow: hidden; }

        .grid-info { text-align: center; width: 100%; }
        .grid-name { font-size: 0.85rem; color: #fff; letter-spacing: 2px; margin-bottom: 8px; }
        .grid-item.locked .grid-name { color: var(--cyan-jade); opacity: 0.7; }
        .grid-count-tag { font-size: 0.7rem; color: var(--gold-light); display: inline-block; border: 1px solid rgba(212, 175, 55, 0.3); padding: 4px 10px; border-radius: 8px; background: rgba(212, 175, 55, 0.08); }
        .grid-item.locked .grid-count-tag { color: #566461; border-color: rgba(139,168,156,0.1); background: transparent; }

        @media (max-width: 768px) {
            .card-wrapper { width: 95px; height: 160px; transform: translate(-50%, -50%) rotate(var(--angle)) translateY(-90px) rotate(calc(-1 * var(--angle))); }
            .card-wrapper.focused { transform: translate(-50%, -50%) scale(2.5); }
            .gallery-grid { gap: 12px; }
            .grid-item { min-height: 150px; padding: 10px 5px;}
            .grid-svg-container { height: 70px; }
            .grid-name { font-size: 0.75rem; }
        }
    </style>
</head>

            top: 0; left: 0;
            transform: translate(-50%, -50%) rotate(var(--angle)) translateY(-120px) rotate(calc(-1 * var(--angle)));
            transition: all 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
            perspective: 1500px; cursor: pointer; z-index: 10;
        }

        /* 盲選觸碰浮出 */
        @media (hover: hover) {
            .card-wrapper:hover {
                z-index: 50;
                transform: translate(-50%, -50%) rotate(var(--angle)) translateY(-135px) rotate(calc(-1 * var(--angle))) scale(1.05);
            }
        }
        .card-wrapper:active {
            z-index: 50;
            transform: translate(-50%, -50%) rotate(var(--angle)) translateY(-135px) rotate(calc(-1 * var(--angle))) scale(1.05);
        }

        .card-inner {
            width: 100%; height: 100%;
            position: relative; transform-style: preserve-3d;
            transition: transform 1.2s cubic-bezier(0.2, 0.8, 0.2, 1);
            box-shadow: 0 10px 40px rgba(0,0,0,0.9); border-radius: 14px;
        }

        .card-wrapper.is-flipped .card-inner { transform: rotateY(180deg); }

        .card-face {
            position: absolute; inset: 0; backface-visibility: hidden;
            border-radius: inherit; overflow: hidden;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        /* 卡背 */
        .card-back {
            background: var(--card-base);
            border: 1px solid rgba(212, 175, 55, 0.35);
            box-shadow: inset 0 0 30px rgba(212, 175, 55, 0.05);
        }
        .mandala-svg { width: 250%; height: 250%; opacity: 0.5; }

        /* 卡面 (徹底去除方框與多餘背景) */
        .card-front {
            background: radial-gradient(circle at 50% 40%, #080d12 0%, #010203 100%);
            border: 1px solid rgba(212, 175, 55, 0.6);
            transform: rotateY(180deg);
            box-shadow: inset 0 0 50px rgba(0,0,0,0.8);
        }

        /* ✨ 發光核心 ✨ */
        .treasure-glow {
            position: absolute; top: 40%; left: 50%;
            transform: translate(-50%, -50%);
            width: 160px; height: 160px;
            background: radial-gradient(circle, var(--glow-color) 0%, transparent 65%);
            animation: var(--glow-anime) 4s ease-in-out infinite;
            z-index: 1; pointer-events: none;
        }

        .treasure-svg-box {
            position: absolute; top: 5%; 
            width: 90%; height: 65%; /* 佔據卡面最莊嚴的黃金比例 */
            display: flex; align-items: center; justify-content: center;
            z-index: 2; overflow: visible;
        }

        .treasure-svg-box svg {
            width: 100%; height: 100%;
            filter: drop-shadow(0 0 10px rgba(0,0,0,0.8));
            animation: var(--treasure-anime) 4s ease-in-out infinite;
        }

        /* =════ 動畫定義 ════= */

        /* 1. 金魚專屬：游泳動畫 (縮放幅度更大，上下浮動) */
        @keyframes float-swim {
            0%, 100% { transform: scale(0.96) translateY(0); }
            50% { transform: scale(1.05) translateY(-8px); }
        }
        /* 2. 傘蓋/幡蓋專屬：自轉動畫 */
        @keyframes steady-rotate {
            from { transform: rotate(0deg) scale(0.98); }
            to { transform: rotate(360deg) scale(0.98); }
        }
        /* 3. 吉祥結專屬：複合縮放 */
        @keyframes float-knot {
            0%, 100% { transform: scale(0.98); }
            50% { transform: scale(1.03); }
        }

        /* 光暈呼吸動畫 (配合游泳節奏) */
        @keyframes pulse-glow {
            0%, 100% { opacity: 0.4; transform: translate(-50%, -50%) scale(0.9); }
            50% { opacity: 0.85; transform: translate(-50%, -50%) scale(1.15); }
        }

        /* 卡面文字微調，優雅不搶戲 */
        .treasure-info {
            position: absolute; bottom: 8%; width: 100%; text-align: center; z-index: 3;
        }
        .t-name { color: #efd07b; font-size: 1.05rem; letter-spacing: 5px; text-shadow: 0 0 10px rgba(239, 208, 123, 0.5); }
        .t-rarity { color: var(--cyan-jade); font-size: 0.65rem; letter-spacing: 3px; margin-top: 8px; opacity: 0.8; }

        .card-wrapper.focused { transform: translate(-50%, -50%) scale(2.2); z-index: 100 !important; }
        .card-wrapper.scattered {
            opacity: 0; pointer-events: none;
            transform: translate(-50%, -50%) rotate(var(--angle)) translateY(-250px) scale(0);
        }

        .btn-action {
            position: absolute; bottom: 12%; left: 50%; transform: translateX(-50%);
            padding: 14px 40px; border-radius: 30px;
            border: 1px solid var(--gold-solid); 
            background: linear-gradient(to right, rgba(212,175,55,0.08), rgba(212,175,55,0.2));
            color: var(--gold-light); font-size: 0.9rem; letter-spacing: 4px; text-indent: 4px;
            cursor: pointer; opacity: 0; pointer-events: none;
            transition: all 0.8s cubic-bezier(0.2, 0.8, 0.2, 1); backdrop-filter: blur(8px); z-index: 200;
        }
        .btn-action.show { opacity: 1; pointer-events: auto; }

        /* ════ 第二階段：多寶閣 圖鑑場景 (圓環陣法) ════ */
        #gallery-scene {
            position: absolute; inset: 0; z-index: 5;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            opacity: 0; pointer-events: none; transition: opacity 1.5s cubic-bezier(0.4, 0, 0.2, 1); padding: 20px;
        }

        .gallery-header { text-align: center; margin-bottom: 35px; }
        .gallery-title { color: var(--gold-light); font-size: 1.3rem; letter-spacing: 12px; text-indent: 12px; font-weight: normal; }
        
        .gallery-grid {
            display: grid; grid-template-columns: repeat(4, 1fr); grid-template-rows: repeat(2, 1fr);
            gap: 20px; width: 100%; max-width: 900px;
        }

        .grid-item {
            background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(139, 168, 156, 0.25); border-radius: 12px;
            min-height: 200px; display: flex; flex-direction: column; align-items: center; justify-content: space-between;
            padding: 15px 10px; position: relative; box-shadow: inset 0 0 25px rgba(0,0,0,0.6); transition: all 0.5s;
        }

        .grid-item.locked { border-style: dashed; opacity: 0.45; }
        .grid-item.unlocked { border-color: rgba(239, 208, 123, 0.6); box-shadow: inset 0 0 30px rgba(239, 208, 123, 0.15); }

        .grid-svg-container { width: 100%; height: 110px; display: flex; align-items: center; justify-content: center; overflow: hidden; }

        .grid-info { text-align: center; width: 100%; }
        .grid-name { font-size: 0.85rem; color: #fff; letter-spacing: 2px; margin-bottom: 8px; }
        .grid-item.locked .grid-name { color: var(--cyan-jade); opacity: 0.7; }
        .grid-count-tag { font-size: 0.7rem; color: var(--gold-light); display: inline-block; border: 1px solid rgba(212, 175, 55, 0.3); padding: 4px 10px; border-radius: 8px; background: rgba(212, 175, 55, 0.08); }
        .grid-item.locked .grid-count-tag { color: #566461; border-color: rgba(139,168,156,0.1); background: transparent; }

        @media (max-width: 768px) {
            .card-wrapper { width: 95px; height: 160px; transform: translate(-50%, -50%) rotate(var(--angle)) translateY(-90px) rotate(calc(-1 * var(--angle))); }
            .card-wrapper.focused { transform: translate(-50%, -50%) scale(2.5); }
            .gallery-grid { gap: 12px; }
            .grid-item { min-height: 150px; padding: 10px 5px;}
            .grid-svg-container { height: 70px; }
            .grid-name { font-size: 0.75rem; }
        }
    </style>

                <linearGradient id="tailGold" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#FFF3D1" stop-opacity="0.8" /><stop offset="60%" stop-color="#C6972E" stop-opacity="0.5" /><stop offset="100%" stop-color="#3E2723" stop-opacity="0.1" /></linearGradient>
                <clipPath id="clipSW"><circle cx="85" cy="220" r="32"/></clipPath>
                <path id="pathN" d="M150,155 A65,65 0 0,0 150,25 A65,65 0 0,0 150,155"/>
                <path id="pathS" d="M150,155 A65,65 0 0,1 150,285 A65,65 0 0,1 150,155"/>

                <g transform="translate(350, 180)">
                    <g fill="none" stroke-linecap="round">
                        <use href="#pathW" stroke="#4A3311" stroke-width="24"/>

                        <use href="#pathN" stroke="url(#lapisBlue)" stroke-width="18"/>
                        <use href="#pathN" stroke="#FFFFFF" stroke-width="3" opacity="0.6"/>
                        <use href="#pathE" stroke="#021A10" stroke-width="24"/>
                        <use href="#pathE" stroke="url(#emeraldGreen)" stroke-width="18"/>
                        <use href="#pathE" stroke="#FFFFFF" stroke-width="3" opacity="0.6"/>
                        <use href="#pathS" stroke="#4A0000" stroke-width="24"/>
                        <use href="#pathS" stroke="url(#coralRed)" stroke-width="18"/>
                        <use href="#pathS" stroke="#FFFFFF" stroke-width="3" opacity="0.6"/>
                        <g clip-path="url(#clipSW)">
                            <use href="#pathW" stroke="#4A3311" stroke-width="24"/>
                            <use href="#pathW" stroke="url(#pureGold)" stroke-width="18"/>
                            <use href="#pathW" stroke="#FFFFFF" stroke-width="3" opacity="0.7"/>
                        </g>
                    </g>
                    <circle cx="150" cy="157" r="16.5" fill="#3E0000" opacity="0.6"/>
                    <circle cx="150" cy="155" r="16" fill="url(#goldBead)"/>
                    <ellipse cx="145" cy="149" rx="4" ry="3" fill="#FFFFFF" opacity="0.6" transform="rotate(-30 145 149)"/>
                    <line x1="150" y1="282" x2="150" y2="310" stroke="#8E0000" stroke-width="7" stroke-linecap="round"/>
                    <line x1="150" y1="282" x2="150" y2="310" stroke="url(#pureGold)" stroke-width="3" stroke-linecap="round"/>
                    <circle cx="150" cy="325" r="21" fill="#3E0000" opacity="0.6"/>
                    <circle cx="150" cy="323" r="20" fill="url(#goldBead)"/>
                    <ellipse cx="142" cy="314" rx="6" ry="4" fill="#FFFFFF" opacity="0.6" transform="rotate(-30 142 314)"/>
                    <line x1="150" y1="341" x2="150" y2="352" stroke="#8E0000" stroke-width="5" stroke-linecap="round"/>
                    <circle cx="150" cy="362" r="11" fill="#3E0000" opacity="0.6"/>
                    <circle cx="150" cy="360" r="10" fill="url(#goldBead)"/>
                    <ellipse cx="146" cy="355" rx="3" ry="2" fill="#FFFFFF" opacity="0.6" transform="rotate(-30 146 355)"/>
                    <path d="M138,370 Q150,365 162,370 L164,380 Q150,375 136,380 Z" fill="#4A3311"/>
                    <path d="M139,372 Q150,368 161,372 L162,378 Q150,374 138,378 Z" fill="url(#pureGold)"/>
                    <g transform="translate(150, 380)">
                        <path d="M 0 0 C -100 80, -150 200, -80 300 C -40 200, -20 100, 0 0 Z" fill="url(#tailBlue)" opacity="0.6"/>
                        <path d="M 0 0 C 100 80, 150 200, 80 300 C 40 200, 20 100, 0 0 Z" fill="url(#tailGreen)" opacity="0.6"/>
                        <path d="M 0 0 C -40 100, 20 220, -30 320 C 30 220, 10 100, 0 0 Z" fill="url(#tailRed)" opacity="0.75"/>
                        <path d="M 0 0 C 40 100, -20 220, 30 320 C -30 220, -10 100, 0 0 Z" fill="url(#tailGold)" opacity="0.75"/>
                        <path d="M 0 0 C -60 70, -80 180, -40 270 C -10 180, -10 90, 0 0 Z" fill="url(#tailBlue)" opacity="0.9"/>
                        <path d="M 0 0 C 60 70, 80 180, 40 270 C 10 180, 10 90, 0 0 Z" fill="url(#tailGreen)" opacity="0.9"/>
                        <path d="M 0 0 C -20 80, -40 160, 0 250 C 40 160, 20 80, 0 0 Z" fill="url(#tailRed)" opacity="0.85"/>
                        <path d="M 0 0 C -80 120, -60 200, -70 280" stroke="rgba(255,255,255,0.4)" stroke-width="1.5" fill="none" stroke-linecap="round"/>
                        <path d="M 0 0 C 80 120, 60 200, 70 280" stroke="rgba(255,255,255,0.4)" stroke-width="1.5" fill="none" stroke-linecap="round"/>
                        <path d="M 0 0 C -20 100, 0 180, -10 260" stroke="rgba(255,255,255,0.5)" stroke-width="1.5" fill="none" stroke-linecap="round"/>

                    </g>
                </g>
            </g>
        </defs>
    </svg>

    <script>
        const TREASURES = [
            { id: "banner", name: "吉祥寶幡", rarity: "罕見瑞相", svgId: "treasure-banner", viewBox: "0 0 1000 1000", glow: "rgba(239, 208, 123, 0.45)", tAnime: "steady-rotate", gAnime: "pulse-glow" },
            { id: "fish", name: "雙壽金魚", rarity: "恆常顯現金", svgId: "treasure-fish", viewBox: "0 0 1000 562", glow: "rgba(255, 179, 0, 0.35)", tAnime: "float-swim", gAnime: "pulse-glow" },
            { id: "umbrella", name: "妙寶傘蓋", rarity: "恆常顯現金", svgId: "treasure-umbrella", viewBox: "0 0 1000 800", glow: "rgba(74, 168, 255, 0.35)", tAnime: "steady-rotate", gAnime: "pulse-glow" },
            { id: "knot", name: "吉祥如意結", rarity: "精進瑞相", svgId: "treasure-knot", viewBox: "0 0 1000 900", glow: "rgba(217, 54, 54, 0.4)", tAnime: "float-knot", gAnime: "pulse-glow" },
            { id: "t5", name: "待顯法相", rarity: "靜待因緣", svgId: null, viewBox: "0 0 100 100", glow: "transparent", tAnime: "none", gAnime: "none" },
            { id: "t6", name: "待顯法相", rarity: "靜待因緣", svgId: null, viewBox: "0 0 100 100", glow: "transparent", tAnime: "none", gAnime: "none" },
            { id: "t7", name: "待顯法相", rarity: "靜待因緣", svgId: null, viewBox: "0 0 100 100", glow: "transparent", tAnime: "none", gAnime: "none" },
            { id: "t8", name: "待顯法相", rarity: "靜待因緣", svgId: null, viewBox: "0 0 100 100", glow: "transparent", tAnime: "none", gAnime: "none" }
        ];

        let hasDrawn = false;
        let drawnIndex = 3; // 💡 測試：這次強制抽中第四格的「吉祥如意結」
        let mockUnlocked = [0, 1, 2, 3]; // 💡 測試：圖鑑中模擬已獲得前四尊法相

        // 背景星空渲染
        const canvas = document.getElementById('starCanvas');
        const ctx = canvas.getContext('2d');
        let width, height, stars = [];
        function resize() { width = window.innerWidth; height = window.innerHeight; canvas.width = width; canvas.height = height; }
        window.addEventListener('resize', resize); resize();
        for(let i=0; i<150; i++) stars.push({ x: (Math.random()-0.5)*2000, y: (Math.random()-0.5)*2000, z: Math.random()*1000, s: Math.random()*1.5 });
        
        function drawStars() {
            ctx.fillStyle = 'rgba(1, 3, 4, 0.4)'; ctx.fillRect(0, 0, width, height); ctx.globalCompositeOperation = 'screen';
            stars.forEach(s => { 
                s.z -= 0.5; if(s.z <= 0) s.z = 1000; 
                let sc = 300 / (300 + s.z);
                ctx.beginPath(); ctx.arc(width/2 + s.x*sc, height/2 + s.y*sc, s.s*sc, 0, Math.PI*2); 
                ctx.fillStyle = `rgba(243, 229, 171, ${sc})`; ctx.fill(); 
            });
            requestAnimationFrame(drawStars);
        }
        drawStars();

        // 卡背曼陀羅生成
        function poly(n, r, rotDeg=0) {
            const pts=[], off = -Math.PI/2 + rotDeg*Math.PI/180;
            for(let k=0;k<n;k++) pts.push([r*Math.cos(2*Math.PI*k/n + off), r*Math.sin(2*Math.PI*k/n + off)]);
            return pts;
        }
        function ptStr(pts) { return pts.map(p=>p[0].toFixed(2)+','+p[1].toFixed(2)).join(' '); }
        function getWeb(pts, stroke, width, op) {
            let html = `<g stroke="${stroke}" stroke-width="${width}" opacity="${op}" fill="none">`;
            for(let i=0; i<pts.length; i++) for(let j=i+1; j<pts.length; j++) html += `<line x1="${pts[i][0]}" y1="${pts[i][1]}" x2="${pts[j][0]}" y2="${pts[j][1]}"/>`;
            return html + `</g>`;
        }
        function getMandala() {
            let html = `<svg class="mandala-svg" viewBox="-115 -115 230 230"><g><animateTransform attributeName="transform" type="rotate" from="0 0 0" to="360 0 0" dur="80s" repeatCount="indefinite"/>`;
            const p12 = poly(12, 102);
            html += `<polygon points="${ptStr(p12)}" fill="rgba(200,144,48,0.03)" stroke="#c89030" stroke-width="1.2" opacity="0.7"/>` + getWeb(p12, '#c89030', 0.45, 0.4);
            html += getWeb([...poly(8, 55, 0), ...poly(8, 55, 22.5)], '#f3e5ab', 0.5, 0.5);
            html += `<polygon points="${ptStr(poly(4, 20, 45))}" fill="rgba(255,255,255,0.1)" stroke="#fff" stroke-width="0.8" opacity="0.6"/><circle cx="0" cy="0" r="6" fill="#fff" opacity="0.9"/></g></svg>`;
            return html;
        }

        // 建立八卦抽卡陣列
        const bagua = document.getElementById('bagua-container');
        for(let i=0; i<8; i++) {
            const angle = i * 45;
            const card = document.createElement('div');
            card.className = 'card-wrapper';
            card.style.setProperty('--angle', `${angle}deg`);
            card.onclick = () => selectCard(i, card);

            const t = TREASURES[drawnIndex];
            card.innerHTML = `
                <div class="card-inner">
                    <div class="card-back card-face">${getMandala()}</div>
                    <div class="card-front card-face">
                        <div class="treasure-glow" style="--glow-color: ${t.glow}; --glow-anime: ${t.gAnime};"></div>
                        <div class="treasure-svg-box">
                            <svg viewBox="${t.viewBox}" style="--treasure-anime: ${t.tAnime};">
                                <use href="#${t.svgId}"></use>
                            </svg>
                        </div>
                        <div class="treasure-info">
                            <div class="t-name">${t.name}</div>
                            <div class="t-rarity">${t.rarity}</div>
                        </div>
                    </div>
                </div>
            `;
            bagua.appendChild(card);
        }

        // 抽卡動畫
        function selectCard(selectedIndex, selectedCard) {
            if (hasDrawn) return;
            hasDrawn = true;
            document.getElementById('center-hint').style.opacity = 0;
            
            const allCards = document.querySelectorAll('.card-wrapper');
            allCards.forEach((c, idx) => {
                if (idx === selectedIndex) {
                    c.classList.add('focused');
                    setTimeout(() => c.classList.add('is-flipped'), 1000);
                } else {
                    c.classList.add('scattered');
                }
            });
            setTimeout(() => document.getElementById('btn-collect').classList.add('show'), 2200);
        }

        // 進入圖鑑
        function enterGallery() {
            document.getElementById('draw-scene').style.opacity = '0';
            document.getElementById('draw-scene').style.pointerEvents = 'none';
            setTimeout(() => {
                document.getElementById('gallery-scene').style.opacity = '1';
                document.getElementById('gallery-scene').style.pointerEvents = 'auto';
                buildGallery();
            }, 1000);
        }

        // 建立多寶閣 (同時點亮四尊法寶供測試)
        function buildGallery() {
            const grid = document.getElementById('gallery-grid');
            if (grid.innerHTML !== "") return;

            let html = "";
            TREASURES.forEach((t, idx) => {
                const isUnlocked = mockUnlocked.includes(idx);
                const cls = isUnlocked ? "grid-item unlocked" : "grid-item locked";
                
                const svgContent = isUnlocked 
                    ? `<svg viewBox="${t.viewBox}" style="width:120%; height:120%;"><use href="#${t.svgId}"></use></svg>`
                    : `<div style="width:50px; height:50px; border:1px dashed rgba(139,168,156,0.3); border-radius:50%;"></div>`;

                html += `
                    <div class="${cls}">
                        <div class="grid-svg-container">${svgContent}</div>
                        <div class="grid-info">
                            <div class="grid-name">${t.name}</div>
                            <div class="grid-count-tag">${isUnlocked ? '結緣：1 尊' : '空龕'}</div>
                        </div>
                    </div>
                `;
            });
            grid.innerHTML = html;
        }
    </script>
</body>
