<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>悲願化城 ． 隨緣契印</title>
    <style>
        :root {
            --gold-light: #f3e5ab;
            --gold-solid: #d4af37;
            --bronze-glow: #c89030;
            --cyan-jade: #8ba89c;
            --bg-center: #091114; /* 徹底拔除紫色，改用深邃碧墨琉璃色調 */
            --bg-deep: #010304;
            --card-base: linear-gradient(145deg, #12181a, #050809); /* 告別死黑，帶有隱約的青銅墨玉質感 */
        }

        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }
        
        body {
            background: radial-gradient(circle at 50% 40%, var(--bg-center) 0%, var(--bg-deep) 100%);
            color: #fff; 
            font-family: "PingFang TC", "Microsoft JhengHei", serif;
            height: 100vh; height: 100dvh;
            overflow: hidden;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        canvas { position: absolute; inset: 0; z-index: 0; pointer-events: none; }

        /* ════ 第一階段：單抽顯化場景 ════ */
        #draw-scene {
            position: absolute; inset: 0; z-index: 10;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 1.2s cubic-bezier(0.4, 0, 0.2, 1), transform 1.2s;
        }

        .card-container {
            width: 230px; height: 390px;
            perspective: 1500px;
            cursor: pointer;
            position: relative;
        }

        .card-inner {
            width: 100%; height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 1.5s cubic-bezier(0.2, 0.8, 0.2, 1);
            box-shadow: 0 15px 50px rgba(0,0,0,0.9);
            border-radius: 20px;
        }

        /* 點擊觸發翻轉與整體放大 */
        .card-container.is-flipped .card-inner {
            transform: rotateY(180deg) scale(1.06);
        }

        .card-face {
            position: absolute; inset: 0;
            backface-visibility: hidden;
            border-radius: 20px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            overflow: hidden;
        }

        /* ── 卡背設計（融合幾何曼陀羅與高雅墨玉底色） ── */
        .card-back {
            background: var(--card-base);
            border: 1px solid rgba(212, 175, 55, 0.3);
            box-shadow: inset 0 0 35px rgba(139, 168, 156, 0.1);
            transition: border-color 0.5s, box-shadow 0.5s;
        }

        #mandala-back {
            width: 210px; height: 210px;
            opacity: 0.75; /* 提升初始透明度，讓色彩浮現 */
            transition: filter 0.5s ease, transform 0.5s;
        }

        /* 輕觸未翻轉前的高光爆發與凝聚感 */
        .card-container:active .card-back {
            border-color: var(--gold-solid);
            box-shadow: inset 0 0 40px rgba(212,175,55,0.3), 0 0 30px rgba(212,175,55,0.2);
        }
        .card-container:active #mandala-back {
            filter: brightness(1.5) drop-shadow(0 0 15px var(--gold-solid));
        }

        /* ── 卡面設計（暫位符） ── */
        .card-front {
            background: linear-gradient(135deg, rgba(14,20,22,0.95), rgba(2,4,5,1));
            border: 1px solid rgba(212, 175, 55, 0.5);
            transform: rotateY(180deg);
            box-shadow: inset 0 0 50px rgba(212,175,55,0.15);
            padding: 25px 20px;
            justify-content: space-between;
        }

        .treasure-svg-space {
            width: 150px; height: 150px;
            display: flex; align-items: center; justify-content: center;
            position: relative;
        }

        .placeholder-glow {
            width: 100%; height: 100%;
            border: 1px dashed rgba(243,229,171,0.2);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            color: var(--cyan-jade); font-size: 0.75rem; letter-spacing: 2px;
            animation: breathe 4s infinite alternate;
        }
        @keyframes breathe {
            0% { box-shadow: inset 0 0 15px rgba(139,168,156,0.1); border-color: rgba(139,168,156,0.2); }
            100% { box-shadow: inset 0 0 35px rgba(212,175,55,0.3); border-color: rgba(212,175,55,0.5); }
        }

        .draw-hint {
            position: absolute; bottom: -55px;
            color: var(--gold-light); font-size: 0.85rem; letter-spacing: 6px;
            opacity: 0.6; transition: opacity 0.5s;
        }

        .btn-action {
            position: absolute; bottom: -75px;
            padding: 12px 35px; border-radius: 30px;
            border: 1px solid var(--gold-solid); 
            background: linear-gradient(to right, rgba(212,175,55,0.08), rgba(212,175,55,0.18));
            color: var(--gold-light); font-size: 0.85rem; letter-spacing: 4px; text-indent: 4px;
            cursor: pointer; opacity: 0; pointer-events: none;
            transition: all 0.8s cubic-bezier(0.2, 0.8, 0.2, 1); backdrop-filter: blur(5px);
        }
        .btn-action.show { opacity: 1; pointer-events: auto; bottom: -65px; }

        /* ════ 第二階段：八寶圖鑑場景（上四下四） ════ */
        #gallery-scene {
            position: absolute; inset: 0; z-index: 5;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            opacity: 0; pointer-events: none;
            transition: opacity 1.5s cubic-bezier(0.4, 0, 0.2, 1);
            padding: 20px;
        }

        .gallery-header {
            text-align: center; margin-bottom: 35px;
        }
        .gallery-title {
            color: var(--gold-light); font-size: 1.25rem; letter-spacing: 14px; text-indent: 14px;
            text-shadow: 0 0 20px rgba(212,175,55,0.3); font-weight: normal;
        }
        .gallery-subtitle {
            color: var(--cyan-jade); font-size: 0.75rem; letter-spacing: 4px; text-indent: 4px; margin-top: 8px; opacity: 0.8;
        }

        /* 穩重對稱的上四下四佈局 */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(2, 1fr);
            gap: 25px;
            width: 100%; max-width: 860px;
        }

        .grid-item {
            background: rgba(255, 255, 255, 0.01);
            border: 1px solid rgba(139, 168, 156, 0.25);
            border-radius: 16px;
            min-height: 190px;
            display: flex; flex-direction: column; align-items: center; justify-content: space-between;
            padding: 20px 10px; position: relative; 
            box-shadow: inset 0 0 25px rgba(0,0,0,0.6);
            transition: all 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .grid-item.locked {
            border-style: dashed; border-color: rgba(139, 168, 156, 0.15); opacity: 0.45;
        }
        .grid-item.new-unlocked {
            border-color: var(--gold-solid);
            box-shadow: inset 0 0 25px rgba(212,175,55,0.1), 0 0 20px rgba(212,175,55,0.15);
        }

        .grid-svg-container {
            width: 100%; height: 95px;
            display: flex; align-items: center; justify-content: center;
        }

        .grid-info {
            text-align: center; width: 100%;
        }
        .grid-name {
            font-size: 0.85rem; color: #fff; letter-spacing: 2px; text-indent: 2px; margin-bottom: 8px;
            text-shadow: 0 0 10px rgba(255,255,255,0.2);
        }
        .grid-item.locked .grid-name { color: var(--cyan-jade); opacity: 0.7; }

        .grid-count-tag {
            font-size: 0.65rem; color: var(--gold-light); display: inline-block;
            border: 1px solid rgba(212, 175, 55, 0.3); padding: 3px 10px;
            border-radius: 10px; background: rgba(212, 175, 55, 0.06);
            white-space: nowrap; letter-spacing: 1px;
        }
        .grid-item.locked .grid-count-tag {
            color: #566461; border-color: rgba(139,168,156,0.1); background: transparent;
        }

        /* 手機板響應式微調 */
        @media (max-width: 768px) {
            .gallery-grid { gap: 12px; max-width: 100%; }
            .grid-item { min-height: 155px; padding: 12px 5px; border-radius: 12px; }
            .grid-svg-container { height: 70px; }
            .grid-name { font-size: 0.75rem; margin-bottom: 5px; }
        }
    </style>
</head>
<body>

    <canvas id="starCanvas"></canvas>

    <div id="draw-scene">
        <div class="card-container" id="main-card" onclick="triggerFlip()">
            <div class="card-inner">
                <div class="card-back card-face">
                    <svg id="mandala-back" viewBox="-115 -115 230 230"></svg>
                </div>
                <div class="card-front card-face">
                    <div style="color: var(--gold-light); font-size: 0.75rem; letter-spacing: 4px;">✦ 功德顯化 ✦</div>
                    <div class="treasure-svg-space">
                        <div class="placeholder-glow">
                            <span>法相線條預留</span>
                        </div>
                    </div>
                    <div class="grid-info">
                        <div style="color: #fff; font-size: 1.05rem; letter-spacing: 3px; font-weight: bold;" id="drawn-name">法輪契印</div>
                        <div style="margin-top: 6px; color: var(--cyan-jade); font-size: 0.7rem; letter-spacing: 2px;">恆常顯現金 ‧ 重複率高</div>
                    </div>
                </div>
            </div>
        </div>
        <div class="draw-hint" id="draw-hint">五萬功德聚 ‧ 輕觸以顯化</div>
        <button class="btn-action" id="btn-collect" onclick="transitionToGallery()">收攝法相 ‧ 觀多寶閣</button>
    </div>

    <div id="gallery-scene">
        <div class="gallery-header">
            <h2 class="gallery-title">悲願化城 ． 琉璃多寶閣</h2>
            <p class="gallery-subtitle">每五萬聲佛號凝聚一契印 ． 妙依定課資糧紀錄</p>
        </div>
        
        <div class="gallery-grid" id="gallery-grid"></div>
        
        <button class="btn-action show" style="position: relative; bottom: 0; margin-top: 40px;" onclick="location.reload()">返回重置 (測試用)</button>
    </div>

    <script>
        // 佛八寶定義（對應完整 8 張卡片）
        const TREASURES_LIST = [
            { id: "wheel",    name: "八吉祥法輪", type: "common" },
            { id: "umbrella", name: "妙寶傘蓋",   type: "common" },
            { id: "fish",     name: "雙壽金魚",   type: "common" },
            { id: "vase",     name: "隨心寶瓶",   type: "common" },
            { id: "lotus",    name: "妙淨蓮華",   type: "rare" },
            { id: "conch",    name: "法音白螺",   type: "rare" },
            { id: "knot",     name: "吉祥如意結", type: "epic" },
            { id: "banner",   name: "尊勝寶幢",   type: "ultimate" } // 0.01% 終極大獎
        ];

        // 模擬當前抽中的索引（此處暫定為第0個法輪）
        let currentDrawnIdx = 0;

        // ════ 1. 星空背景渲染 ════
        const canvas = document.getElementById('starCanvas');
        const ctx = canvas.getContext('2d');
        let width, height, stars = [];
        
        function resize() { 
            width = window.innerWidth; height = window.innerHeight; 
            canvas.width = width; canvas.height = height; 
        }
        window.addEventListener('resize', resize); resize();
        
        for(let i=0; i<160; i++) {
            stars.push({ x: (Math.random()-0.5)*2000, y: (Math.random()-0.5)*2000, z: Math.random()*1000, s: Math.random()*1.8 });
        }
        
        function drawStars() {
            ctx.fillStyle = 'rgba(1, 3, 4, 0.4)'; ctx.fillRect(0, 0, width, height);
            ctx.globalCompositeOperation = 'screen';
            stars.forEach(s => { 
                s.z -= 0.4; if(s.z <= 0) s.z = 1000; 
                let sc = 300 / (300 + s.z);
                let sx = width / 2 + s.x * sc, sy = height / 2 + s.y * sc; 
                ctx.beginPath(); ctx.arc(sx, sy, s.s * sc, 0, Math.PI * 2); 
                ctx.fillStyle = `rgba(243, 229, 171, ${sc * 0.9})`; ctx.fill(); 
            });
            requestAnimationFrame(drawStars);
        }
        drawStars();

        // ════ 2. 卡背曼陀羅生成（融合雙八角與十二角，精緻上色版） ════
        function poly(n, r, rotDeg=0) {
            const pts=[], off = -Math.PI/2 + rotDeg*Math.PI/180;
            for(let k=0;k<n;k++) pts.push([r*Math.cos(2*Math.PI*k/n + off), r*Math.sin(2*Math.PI*k/n + off)]);
            return pts;
        }
        function ptStr(pts) { return pts.map(p=>p[0].toFixed(2)+','+p[1].toFixed(2)).join(' '); }
        function getWeb(pts, stroke, width, op) {
            let html = `<g stroke="${stroke}" stroke-width="${width}" opacity="${op}" fill="none">`;
            for(let i=0; i<pts.length; i++) {
                for(let j=i+1; j<pts.length; j++) {
                    html += `<line x1="${pts[i][0]}" y1="${pts[i][1]}" x2="${pts[j][0]}" y2="${pts[j][1]}"/>`;
                }
            }
            return html + `</g>`;
        }

        const mSvg = document.getElementById('mandala-back');
        // 設定平滑恆常自轉
        let mHtml = `<g><animateTransform attributeName="transform" type="rotate" from="0 0 0" to="360 0 0" dur="75s" repeatCount="indefinite"/>`;
        
        // 結構一：外圍 12角幾何網絡（使用高雅的暗金銅色）
        const p12 = poly(12, 102);
        mHtml += `<polygon points="${ptStr(p12)}" fill="rgba(200,144,48,0.03)" stroke="#c89030" stroke-width="1.2" opacity="0.7"/>`;
        mHtml += getWeb(p12, '#c89030', 0.45, 0.4);
        
        // 結構二：內嵌雙軀幹 8角星陣（交錯22.5度，使用明亮的白金色線條）
        const p8a = poly(8, 55, 0), p8b = poly(8, 55, 22.5);
        mHtml += getWeb([...p8a, ...p8b], '#f3e5ab', 0.5, 0.5);
        
        // 結構三：核心緻密交織點
        const pInside = poly(4, 20, 45);
        mHtml += `<polygon points="${ptStr(pInside)}" fill="rgba(255,255,255,0.1)" stroke="#fff" stroke-width="0.8" opacity="0.6"/>`;
        mHtml += `<circle cx="0" cy="0" r="6" fill="#fff" opacity="0.9"/>`;
        
        mHtml += `</g>`;
        mSvg.innerHTML = mHtml;

        // 設定初始隨機抽中的卡片名稱顯示
        document.getElementById('drawn-name').innerText = TREASURES_LIST[currentDrawnIdx].name;

        // ════ 3. 互動與翻轉核心 ════
        let isFlipped = false;

        function triggerFlip() {
            if (isFlipped) return;
            isFlipped = true;
            
            const card = document.getElementById('main-card');
            card.classList.add('is-flipped');
            document.getElementById('draw-hint').style.opacity = 0;
            
            // 翻開後優雅淡入收攝按鈕
            setTimeout(() => {
                document.getElementById('btn-collect').classList.add('show');
            }, 900);
        }

        // ════ 4. 場景滑順轉場與完整 8張卡片生成 ════
        function transitionToGallery() {
            const drawScene = document.getElementById('draw-scene');
            const galleryScene = document.getElementById('gallery-scene');
            
            drawScene.style.transform = 'scale(0.85)';
            drawScene.style.opacity = '0';
            drawScene.style.pointerEvents = 'none';

            setTimeout(() => {
                galleryScene.style.opacity = '1';
                galleryScene.style.pointerEvents = 'auto';
                buildGalleryGrid();
            }, 750);
        }

        // 確實安立 8 張卡片（上四下四）的排版生成
        function buildGalleryGrid() {
            const grid = document.getElementById('gallery-grid');
            if (grid.innerHTML !== "") return; // 避免重複渲染

            let html = "";
            TREASURES_LIST.forEach((item, idx) => {
                // 模擬狀態：剛剛抽中的項目顯示為「新解鎖」，其餘模擬為「未解鎖空龕」
                const isCurrentDrawn = idx === currentDrawnIdx;
                
                let itemClass = "grid-item";
                let countLabel = "因緣未具";
                
                if (isCurrentDrawn) {
                    itemClass += " new-unlocked";
                    countLabel = "結緣：1 尊";
                } else {
                    itemClass += " locked";
                }
                
                html += `
                    <div class="${itemClass}">
                        <div class="grid-svg-container">
                            <div style="width:70px; height:70px; border:1px dashed rgba(139,168,156,0.2); border-radius:50%; display:flex; align-items:center; justify-content:center;">
                                <span style="font-size:0.6rem; color:var(--cyan-jade); opacity:0.6;">八寶形制</span>
                            </div>
                        </div>
                        <div class="grid-info">
                            <div class="grid-name">${item.name}</div>
                            <div class="grid-count-tag">${countLabel}</div>
                        </div>
                    </div>
                `;
            });
            grid.innerHTML = html;
        }
    </script>
</body>
</html>
