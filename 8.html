<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>悲願化城 ． 抽卡契印</title>
    <style>
        :root {
            --gold: #f3e5ab;
            --solid-gold: #d4af37;
            --bronze: #c89030;
            --bg-deep: #020203;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }
        
        body {
            background: radial-gradient(circle at 50% 50%, #111518 0%, var(--bg-deep) 100%);
            color: #fff; 
            font-family: "PingFang TC", "Microsoft JhengHei", serif;
            height: 100vh; height: 100dvh;
            overflow: hidden;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        canvas { position: absolute; inset: 0; z-index: 0; pointer-events: none; }

        /* ════ 第一階段：單抽顯化場景 ════ */
        #draw-scene {
            position: absolute; inset: 0; z-index: 10;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 1.2s cubic-bezier(0.4, 0, 0.2, 1), transform 1.2s;
        }

        .card-container {
            width: 240px; height: 400px;
            perspective: 1500px;
            cursor: pointer;
            position: relative;
        }

        .card-inner {
            width: 100%; height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 1.5s cubic-bezier(0.2, 0.8, 0.2, 1);
            box-shadow: 0 0 40px rgba(0,0,0,0.8);
            border-radius: 20px;
        }

        .card-container.is-flipped .card-inner {
            transform: rotateY(180deg) scale(1.05);
        }

        .card-face {
            position: absolute; inset: 0;
            backface-visibility: hidden;
            border-radius: 20px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            overflow: hidden;
        }

        /* 卡背：融合幾何曼陀羅 */
        .card-back {
            background: linear-gradient(145deg, #0a0c0e, #010101);
            border: 1px solid rgba(212, 175, 55, 0.25);
            box-shadow: inset 0 0 30px rgba(212,175,55,0.05);
        }

        #mandala-back {
            width: 220px; height: 220px;
            opacity: 0.6;
            filter: drop-shadow(0 0 10px rgba(212,175,55,0.2));
        }

        /* 卡面：預留給八寶的空間 */
        .card-front {
            background: linear-gradient(135deg, rgba(15,15,12,0.95), rgba(2,2,0,1));
            border: 1px solid rgba(212, 175, 55, 0.5);
            transform: rotateY(180deg);
            box-shadow: inset 0 0 50px rgba(212,175,55,0.15);
            padding: 20px;
        }

        .temp-treasure-placeholder {
            width: 160px; height: 160px;
            border-radius: 50%;
            border: 1px dashed rgba(243,229,171,0.3);
            display: flex; align-items: center; justify-content: center;
            color: var(--gold); font-size: 0.85rem; letter-spacing: 2px;
            animation: breathe 3s infinite alternate;
        }

        @keyframes breathe {
            0% { box-shadow: inset 0 0 10px rgba(212,175,55,0.1); border-color: rgba(212,175,55,0.2); }
            100% { box-shadow: inset 0 0 30px rgba(212,175,55,0.4); border-color: rgba(212,175,55,0.6); }
        }

        .draw-hint {
            position: absolute; bottom: -50px;
            color: var(--gold); font-size: 0.85rem; letter-spacing: 6px;
            opacity: 0.7; transition: opacity 0.5s;
        }

        .btn-collect {
            position: absolute; bottom: -70px;
            padding: 12px 30px; border-radius: 30px;
            border: 1px solid var(--solid-gold); 
            background: linear-gradient(to right, rgba(212,175,55,0.1), rgba(212,175,55,0.2));
            color: var(--gold); font-size: 0.9rem; letter-spacing: 4px; 
            cursor: pointer; opacity: 0; pointer-events: none;
            transition: all 0.8s ease; backdrop-filter: blur(5px);
        }

        .btn-collect.show {
            opacity: 1; pointer-events: auto; bottom: -60px;
        }

        /* ════ 第二階段：八寶圖鑑場景 ════ */
        #gallery-scene {
            position: absolute; inset: 0; z-index: 5;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            opacity: 0; pointer-events: none;
            transition: opacity 1.5s cubic-bezier(0.4, 0, 0.2, 1);
            padding: 40px 20px;
        }

        .gallery-title {
            color: var(--gold); font-size: 1.2rem; letter-spacing: 12px; text-indent: 12px;
            margin-bottom: 40px; text-shadow: 0 0 20px rgba(212,175,55,0.4);
        }

        /* 上四下四排版 */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(2, 1fr);
            gap: 20px;
            width: 100%; max-width: 900px;
        }

        /* 針對窄螢幕的手機適配：若螢幕過小則轉為 4x2 滾動或適當縮放 */
        @media (max-width: 768px) {
            .gallery-grid {
                gap: 12px;
            }
            .grid-item { min-height: 140px !important; }
        }

        .grid-item {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(139, 168, 156, 0.3);
            border-radius: 12px;
            min-height: 180px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            position: relative; box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
            transition: all 0.5s;
        }

        /* 尚未獲得的狀態 */
        .grid-item.locked {
            border-style: dashed; opacity: 0.6;
        }

        /* 預留 SVG 空間 */
        .grid-svg-box {
            width: 80%; aspect-ratio: 1;
            margin-bottom: 15px;
            display: flex; align-items: center; justify-content: center;
        }

        .grid-count {
            font-size: 0.75rem; color: var(--gold); letter-spacing: 2px;
            background: rgba(212, 175, 55, 0.1); padding: 4px 12px;
            border-radius: 10px; border: 1px solid rgba(212, 175, 55, 0.3);
        }
        
        .grid-item.locked .grid-count {
            color: #666; border-color: rgba(255,255,255,0.1); background: transparent;
        }

    </style>
</head>
<body>

    <canvas id="starCanvas"></canvas>

    <div id="draw-scene">
        <div class="card-container" id="main-card" onclick="flipCard()">
            <div class="card-inner">
                <div class="card-back card-face">
                    <svg id="mandala-back" viewBox="-115 -115 230 230"></svg>
                </div>
                <div class="card-front card-face">
                    <div class="temp-treasure-placeholder">
                        法相顯化處
                    </div>
                    <div style="margin-top: 20px; color: var(--gold); font-size: 1rem; letter-spacing: 4px;">琉璃淨瓶</div>
                    <div style="margin-top: 5px; color: #8ba89c; font-size: 0.7rem; letter-spacing: 2px;">恆常顯現金</div>
                </div>
            </div>
        </div>
        <div class="draw-hint" id="draw-hint">五萬功德聚 ‧ 輕觸以顯化</div>
        <button class="btn-collect" id="btn-collect" onclick="enterGallery()">收攝法相 ‧ 觀圖鑑</button>
    </div>

    <div id="gallery-scene">
        <div class="gallery-title">琉璃多寶閣</div>
        <div class="gallery-grid" id="gallery-grid">
            </div>
        <button class="btn-collect show" style="position: relative; bottom: 0; margin-top: 50px;" onclick="location.reload()">返回重置 (測試用)</button>
    </div>

    <script>
        // ════ 1. 星空背景渲染 ════
        const canvas = document.getElementById('starCanvas');
        const ctx = canvas.getContext('2d');
        let width, height, stars = [];
        
        function resize() { 
            width = window.innerWidth; height = window.innerHeight; 
            canvas.width = width; canvas.height = height; 
        }
        window.addEventListener('resize', resize); resize();
        
        for(let i=0; i<150; i++) {
            stars.push({ x: (Math.random()-0.5)*2000, y: (Math.random()-0.5)*2000, z: Math.random()*1000, s: Math.random()*2 });
        }
        
        function drawStars() {
            ctx.fillStyle = 'rgba(2, 2, 4, 0.4)'; ctx.fillRect(0, 0, width, height);
            ctx.globalCompositeOperation = 'screen';
            stars.forEach(s => { 
                s.z -= 0.5; if(s.z <= 0) s.z = 1000; 
                let sc = 300 / (300 + s.z);
                let sx = width / 2 + s.x * sc, sy = height / 2 + s.y * sc; 
                ctx.beginPath(); ctx.arc(sx, sy, s.s * sc, 0, Math.PI * 2); 
                ctx.fillStyle = `rgba(243, 229, 171, ${sc})`; ctx.fill(); 
            });
            requestAnimationFrame(drawStars);
        }
        drawStars();

        // ════ 2. 卡背曼陀羅生成 (融合 12角與雙8角) ════
        function poly(n, r, rotDeg=0) {
            const pts=[], off = -Math.PI/2 + rotDeg*Math.PI/180;
            for(let k=0;k<n;k++) pts.push([r*Math.cos(2*Math.PI*k/n + off), r*Math.sin(2*Math.PI*k/n + off)]);
            return pts;
        }
        function ptStr(pts) { return pts.map(p=>p[0].toFixed(2)+','+p[1].toFixed(2)).join(' '); }
        function getWeb(pts, stroke, width, op) {
            let html = `<g stroke="${stroke}" stroke-width="${width}" opacity="${op}" fill="none">`;
            for(let i=0; i<pts.length; i++) {
                for(let j=i+1; j<pts.length; j++) {
                    html += `<line x1="${pts[i][0]}" y1="${pts[i][1]}" x2="${pts[j][0]}" y2="${pts[j][1]}"/>`;
                }
            }
            return html + `</g>`;
        }
        function getStar(n, r1, r2, rotDeg, stroke, fill) {
            const pts=[], off=-Math.PI/2+rotDeg*Math.PI/180;
            for(let k=0;k<2*n;k++){
                const r=k%2===0?r1:r2;
                pts.push([r*Math.cos(Math.PI*k/n+off), r*Math.sin(Math.PI*k/n+off)]);
            }
            return `<polygon points="${ptStr(pts)}" fill="${fill}" stroke="${stroke}" stroke-width="1.2"/>`;
        }

        const mSvg = document.getElementById('mandala-back');
        let mHtml = `<g><animateTransform attributeName="transform" type="rotate" from="0 0 0" to="360 0 0" dur="80s" repeatCount="indefinite"/>`;
        // 外層 12 角 K12 連線 (深銅金)
        const p12 = poly(12, 100);
        mHtml += `<polygon points="${ptStr(p12)}" fill="rgba(212,175,55,0.02)" stroke="#c89030" stroke-width="1" opacity="0.6"/>`;
        mHtml += getWeb(p12, '#c89030', 0.4, 0.35);
        // 內層 雙 8 角 (錯開 22.5 度)
        const p8a = poly(8, 50, 0), p8b = poly(8, 50, 22.5);
        mHtml += getWeb([...p8a, ...p8b], '#d4af37', 0.5, 0.4);
        mHtml += getStar(8, 50, 15, 0, '#d4af37', 'rgba(212,175,55,0.05)');
        mHtml += `</g>`;
        mSvg.innerHTML = mHtml;

        // ════ 3. 互動與場景切換 ════
        let isFlipped = false;

        function flipCard() {
            if (isFlipped) return;
            isFlipped = true;
            document.getElementById('main-card').classList.add('is-flipped');
            document.getElementById('draw-hint').style.opacity = 0;
            
            // 翻牌後顯示收攝按鈕
            setTimeout(() => {
                document.getElementById('btn-collect').classList.add('show');
            }, 1000);
        }

        function enterGallery() {
            const drawScene = document.getElementById('draw-scene');
            const galleryScene = document.getElementById('gallery-scene');
            
            // 縮小並淡出單抽場景
            drawScene.style.transform = 'scale(0.8)';
            drawScene.style.opacity = '0';
            drawScene.style.pointerEvents = 'none';

            // 淡入圖鑑場景
            setTimeout(() => {
                galleryScene.style.opacity = '1';
                galleryScene.style.pointerEvents = 'auto';
                initGallery();
            }, 800);
        }

        // 初始化八寶空龕
        function initGallery() {
            const grid = document.getElementById('gallery-grid');
            if (grid.innerHTML !== "") return;

            let html = "";
            for(let i=0; i<8; i++) {
                // 示範：第一格設定為剛抽到的寶物，其餘為未解鎖狀態
                const isUnlocked = i === 0;
                const statusClass = isUnlocked ? "" : "locked";
                const countText = isUnlocked ? "結緣：1 尊" : "因緣未具";
                
                html += `
                    <div class="grid-item ${statusClass}">
                        <div class="grid-svg-box">
                            <div style="width:100%; height:100%; border:1px dashed rgba(243,229,171,0.2); border-radius:50%; display:flex; align-items:center; justify-content:center;">
                                <span style="font-size:0.65rem; color:#8ba89c;">SVG ${i+1}</span>
                            </div>
                        </div>
                        <div class="grid-count">${countText}</div>
                    </div>
                `;
            }
            grid.innerHTML = html;
        }
    </script>
</body>
</html>
