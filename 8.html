<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>佛教八寶</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:#07050e;
  min-height:100vh;
  padding:60px 32px 72px;
  font-family:'Noto Serif SC','Palatino Linotype',serif;
  background-image:
    radial-gradient(ellipse 60% 40% at 50% 0%, rgba(120,80,20,.18) 0%, transparent 70%),
    radial-gradient(ellipse 50% 50% at 50% 100%, rgba(60,30,80,.12) 0%, transparent 65%);
}
header{text-align:center;margin-bottom:58px}
h1{
  font-size:26px;
  font-weight:300;
  letter-spacing:.7em;
  color:transparent;
  background:linear-gradient(160deg,#b8902a 0%,#f0dfa0 42%,#e8c870 58%,#a87820 100%);
  -webkit-background-clip:text;background-clip:text;
  margin-bottom:10px;
}
.sub{
  font-size:10.5px;letter-spacing:.32em;
  color:rgba(190,148,52,.3);text-transform:uppercase;
  font-weight:300;
}
.rule{width:160px;height:.8px;background:linear-gradient(90deg,transparent,rgba(190,150,40,.45),transparent);margin:18px auto 0}
.grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:38px 30px;
  max-width:1060px;
  margin:0 auto;
}
.cell{display:flex;flex-direction:column;align-items:center;gap:13px}
.disc{
  width:222px;height:222px;
  border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  position:relative;overflow:hidden;
  box-shadow:0 0 60px rgba(0,0,0,.7),0 0 2px 1px rgba(160,120,30,.1);
}
.disc::before{
  content:'';position:absolute;inset:0;border-radius:50%;
  border:1.5px solid rgba(180,138,38,.5);
  box-shadow:inset 0 0 0 4px rgba(130,95,20,.12);
  pointer-events:none;z-index:2;
}
.disc::after{
  content:'';position:absolute;inset:6px;border-radius:50%;
  border:.6px solid rgba(200,158,48,.15);
  pointer-events:none;z-index:2;
}
.disc svg{width:184px;height:184px;position:relative;z-index:1}
.zh{color:#c09830;font-size:14.5px;letter-spacing:.35em;font-weight:400}
.en{color:rgba(168,126,35,.35);font-size:9.5px;letter-spacing:.22em;text-transform:uppercase;margin-top:-5px}
@media(max-width:720px){.grid{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<header>
  <h1>佛 教 八 寶</h1>
  <p class="sub">Ashtamangala · Eight Auspicious Symbols</p>
  <div class="rule"></div>
</header>
<div class="grid">
<!-- ══════════════════════════════════════════════
     1. 法輪  Dharma Wheel
     Warm burnished gold, tri-ring rim, lotus hub
══════════════════════════════════════════════ -->
<div class="cell">
<div class="disc" style="background:radial-gradient(circle at 42% 38%,#1e1604 0%,#100c02 55%,#080601 100%)">
<svg viewBox="-90 -90 180 180" xmlns="http://www.w3.org/2000/svg">
<defs>
  <radialGradient id="w-hub" cx="42%" cy="38%" r="64%">
    <stop offset="0%" stop-color="#fef8e4"/>
    <stop offset="28%" stop-color="#f0d264"/>
    <stop offset="65%" stop-color="#c89030"/>
    <stop offset="100%" stop-color="#8a6018"/>
  </radialGradient>
  <radialGradient id="w-pet" cx="50%" cy="82%" r="82%">
    <stop offset="0%" stop-color="#fffae8"/>
    <stop offset="42%" stop-color="#f4d060"/>
    <stop offset="100%" stop-color="#a87820"/>
  </radialGradient>
  <linearGradient id="w-spk" x1="0%" y1="100%" x2="0%" y2="0%">
    <stop offset="0%" stop-color="#f8f0d0"/>
    <stop offset="38%" stop-color="#e8c86a"/>
    <stop offset="100%" stop-color="#a07820"/>
  </linearGradient>
  <filter id="w-glow">
    <feGaussianBlur stdDeviation="2.8" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="w-sm">
    <feGaussianBlur stdDeviation="1.2" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <!-- One spoke template -->
  <path id="w-s" d="M -2.8,-27 C -3,-42 -1.8,-60 -1,-78 C 1,-78 3,-60 3,-42 2.8,-27 Z"/>
  <!-- Hub petal -->
  <path id="w-hp" d="M 0,-16 C -7,-21 -7,-28 0,-33 C 7,-28 7,-21 0,-16"/>
</defs>
<!-- Outer decoration ring -->
<circle r="87" fill="none" stroke="#6a4c10" stroke-width=".7" opacity=".35"/>
<!-- 24 tick marks -->
<g stroke="#c0900a" stroke-width="1.1" opacity=".45">
  <line y1="-82" y2="-87"/><line y1="-82" y2="-87" transform="rotate(15)"/>
  <line y1="-82" y2="-87" transform="rotate(30)"/><line y1="-82" y2="-87" transform="rotate(45)"/>
  <line y1="-82" y2="-87" transform="rotate(60)"/><line y1="-82" y2="-87" transform="rotate(75)"/>
  <line y1="-82" y2="-87" transform="rotate(90)"/><line y1="-82" y2="-87" transform="rotate(105)"/>
  <line y1="-82" y2="-87" transform="rotate(120)"/><line y1="-82" y2="-87" transform="rotate(135)"/>
  <line y1="-82" y2="-87" transform="rotate(150)"/><line y1="-82" y2="-87" transform="rotate(165)"/>
  <line y1="-82" y2="-87" transform="rotate(180)"/><line y1="-82" y2="-87" transform="rotate(195)"/>
  <line y1="-82" y2="-87" transform="rotate(210)"/><line y1="-82" y2="-87" transform="rotate(225)"/>
  <line y1="-82" y2="-87" transform="rotate(240)"/><line y1="-82" y2="-87" transform="rotate(255)"/>
  <line y1="-82" y2="-87" transform="rotate(270)"/><line y1="-82" y2="-87" transform="rotate(285)"/>
  <line y1="-82" y2="-87" transform="rotate(300)"/><line y1="-82" y2="-87" transform="rotate(315)"/>
  <line y1="-82" y2="-87" transform="rotate(330)"/><line y1="-82" y2="-87" transform="rotate(345)"/>
</g>
<!-- Triple rim -->
<circle r="80" fill="none" stroke="#b89030" stroke-width="5.5"/>
<circle r="84" fill="none" stroke="rgba(240,200,80,.22)" stroke-width="1"/>
<circle r="76" fill="none" stroke="rgba(200,160,40,.3)" stroke-width=".8"/>
<!-- 8 between-spoke arc-petal ornaments (at 22.5° offsets, radius 63) -->
<g fill="rgba(220,175,45,.12)" stroke="#c0940a" stroke-width=".8" opacity=".8">
  <path d="M 45.8,-26.4 C 53,-18 53,18 45.8,26.4 C 56,14 63,0 56,-14Z" transform="rotate(0)"/>
  <path d="M 45.8,-26.4 C 53,-18 53,18 45.8,26.4 C 56,14 63,0 56,-14Z" transform="rotate(45)"/>
  <path d="M 45.8,-26.4 C 53,-18 53,18 45.8,26.4 C 56,14 63,0 56,-14Z" transform="rotate(90)"/>
  <path d="M 45.8,-26.4 C 53,-18 53,18 45.8,26.4 C 56,14 63,0 56,-14Z" transform="rotate(135)"/>
  <path d="M 45.8,-26.4 C 53,-18 53,18 45.8,26.4 C 56,14 63,0 56,-14Z" transform="rotate(180)"/>
  <path d="M 45.8,-26.4 C 53,-18 53,18 45.8,26.4 C 56,14 63,0 56,-14Z" transform="rotate(225)"/>
  <path d="M 45.8,-26.4 C 53,-18 53,18 45.8,26.4 C 56,14 63,0 56,-14Z" transform="rotate(270)"/>
  <path d="M 45.8,-26.4 C 53,-18 53,18 45.8,26.4 C 56,14 63,0 56,-14Z" transform="rotate(315)"/>
</g>
<!-- Mid ring -->
<circle r="54" fill="none" stroke="#9a7018" stroke-width=".9" opacity=".38"/>
<!-- 8 main spokes (tapered, gold gradient) -->
<g fill="url(#w-spk)" stroke="none">
  <use href="#w-s"/><use href="#w-s" transform="rotate(45)"/>
  <use href="#w-s" transform="rotate(90)"/><use href="#w-s" transform="rotate(135)"/>
  <use href="#w-s" transform="rotate(180)"/><use href="#w-s" transform="rotate(225)"/>
  <use href="#w-s" transform="rotate(270)"/><use href="#w-s" transform="rotate(315)"/>
</g>
<!-- Spoke center highlight -->
<g stroke="rgba(255,248,220,.4)" stroke-width=".6" fill="none">
  <line y1="-28" y2="-77"/><line y1="-28" y2="-77" transform="rotate(45)"/>
  <line y1="-28" y2="-77" transform="rotate(90)"/><line y1="-28" y2="-77" transform="rotate(135)"/>
  <line y1="-28" y2="-77" transform="rotate(180)"/><line y1="-28" y2="-77" transform="rotate(225)"/>
  <line y1="-28" y2="-77" transform="rotate(270)"/><line y1="-28" y2="-77" transform="rotate(315)"/>
</g>
<!-- 8 thin diagonal spokes between main -->
<g stroke="rgba(200,158,38,.22)" stroke-width=".9" fill="none">
  <line y1="-30" y2="-78" transform="rotate(22.5)"/>
  <line y1="-30" y2="-78" transform="rotate(67.5)"/>
  <line y1="-30" y2="-78" transform="rotate(112.5)"/>
  <line y1="-30" y2="-78" transform="rotate(157.5)"/>
  <line y1="-30" y2="-78" transform="rotate(202.5)"/>
  <line y1="-30" y2="-78" transform="rotate(247.5)"/>
  <line y1="-30" y2="-78" transform="rotate(292.5)"/>
  <line y1="-30" y2="-78" transform="rotate(337.5)"/>
</g>
<!-- Hub outer band -->
<circle r="29" fill="none" stroke="#b89020" stroke-width="2.2"/>
<!-- 8 hub jewel dots -->
<g fill="#f4d060" filter="url(#w-sm)">
  <circle cy="-29" r="2.2"/>
  <circle cy="-29" r="2.2" transform="rotate(45)"/>
  <circle cy="-29" r="2.2" transform="rotate(90)"/>
  <circle cy="-29" r="2.2" transform="rotate(135)"/>
  <circle cy="-29" r="2.2" transform="rotate(180)"/>
  <circle cy="-29" r="2.2" transform="rotate(225)"/>
  <circle cy="-29" r="2.2" transform="rotate(270)"/>
  <circle cy="-29" r="2.2" transform="rotate(315)"/>
</g>
<!-- 8 hub lotus petals -->
<g fill="url(#w-pet)" stroke="#9a7014" stroke-width=".8">
  <use href="#w-hp"/><use href="#w-hp" transform="rotate(45)"/>
  <use href="#w-hp" transform="rotate(90)"/><use href="#w-hp" transform="rotate(135)"/>
  <use href="#w-hp" transform="rotate(180)"/><use href="#w-hp" transform="rotate(225)"/>
  <use href="#w-hp" transform="rotate(270)"/><use href="#w-hp" transform="rotate(315)"/>
</g>
<!-- Petal highlight veins -->
<g stroke="rgba(255,245,200,.45)" stroke-width=".5" fill="none">
  <line y1="-17" y2="-31"/><line y1="-17" y2="-31" transform="rotate(45)"/>
  <line y1="-17" y2="-31" transform="rotate(90)"/><line y1="-17" y2="-31" transform="rotate(135)"/>
  <line y1="-17" y2="-31" transform="rotate(180)"/><line y1="-17" y2="-31" transform="rotate(225)"/>
  <line y1="-17" y2="-31" transform="rotate(270)"/><line y1="-17" y2="-31" transform="rotate(315)"/>
</g>
<!-- Hub center disc -->
<circle r="15" fill="url(#w-hub)" stroke="#9a7010" stroke-width="1.5"/>
<circle r="10" fill="none" stroke="rgba(240,200,70,.4)" stroke-width=".8"/>
<!-- Center gem -->
<circle r="5.5" fill="white" opacity=".82" filter="url(#w-glow)"/>
<circle r="2.8" fill="#fef8e4"/>
</svg>
</div>
<span class="zh">法 輪</span><span class="en">Dharma Wheel</span>
</div>
<!-- ══════════════════════════════════════════════
     2. 法螺  Conch Shell
     Pearl ivory, azure interior, crimson ribbon
══════════════════════════════════════════════ -->
<div class="cell">
<div class="disc" style="background:radial-gradient(circle at 42% 38%,#0c1220 0%,#060810 55%,#030508 100%)">
<svg viewBox="-90 -90 180 180" xmlns="http://www.w3.org/2000/svg">
<defs>
  <radialGradient id="sc-b" cx="32%" cy="28%" r="68%">
    <stop offset="0%" stop-color="#fdfaf0"/>
    <stop offset="35%" stop-color="#f0e8cc"/>
    <stop offset="70%" stop-color="#d8c888"/>
    <stop offset="100%" stop-color="#b0a050"/>
  </radialGradient>
  <radialGradient id="sc-ap" cx="42%" cy="38%" r="60%">
    <stop offset="0%" stop-color="#fffee8"/>
    <stop offset="55%" stop-color="#e8d880"/>
    <stop offset="100%" stop-color="#c0aa48"/>
  </radialGradient>
  <radialGradient id="sc-mouth" cx="38%" cy="38%" r="62%">
    <stop offset="0%" stop-color="#9cc0e8"/>
    <stop offset="45%" stop-color="#4878c0"/>
    <stop offset="100%" stop-color="#1c3e90"/>
  </radialGradient>
  <filter id="sc-glow">
    <feGaussianBlur stdDeviation="3" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
</defs>
<!-- Shadow base -->
<path d="M 6,68 C -26,66 -62,40 -68,4 C -74,-34 -54,-72 -18,-80
         C 16,-86 54,-70 68,-40 C 80,-12 66,26 42,50 C 28,62 14,68 6,68 Z"
      fill="rgba(0,0,0,.4)" transform="translate(4,4)"/>
<!-- Main shell body -->
<path d="M 6,68 C -26,66 -62,40 -68,4 C -74,-34 -54,-72 -18,-80
         C 16,-86 54,-70 68,-40 C 80,-12 66,26 42,50 C 28,62 14,68 6,68 Z"
      fill="url(#sc-b)" stroke="#a09040" stroke-width="1.4"/>
<!-- Shadow-side shading -->
<path d="M 6,68 C 14,68 28,62 42,50 C 66,26 80,-12 68,-40 C 60,-62 38,-76 14,-80"
      fill="rgba(100,80,20,.14)"/>
<!-- Spiral whorl lines (surface texture) -->
<g fill="none" stroke="#b8a448" stroke-linecap="round" opacity=".65">
  <path d="M -55,-5 C -38,-20 4,-16 26,-2" stroke-width="2.2"/>
  <path d="M -62,22 C -42,8 6,12 30,28" stroke-width="2"/>
  <path d="M -58,46 C -38,34 8,38 26,52" stroke-width="1.6"/>
  <path d="M -44,-30 C -28,-44 8,-38 24,-24" stroke-width="1.9"/>
  <path d="M -24,-54 C -10,-64 18,-58 28,-44" stroke-width="1.5"/>
  <path d="M -2,-68 C 10,-76 28,-68 32,-56" stroke-width="1.2"/>
</g>
<!-- Whorl highlight threads (lighter) -->
<g fill="none" stroke="rgba(255,250,220,.3)" stroke-linecap="round">
  <path d="M -55,-5 C -38,-20 4,-16 26,-2" stroke-width=".8"/>
  <path d="M -62,22 C -42,8 6,12 30,28" stroke-width=".7"/>
  <path d="M -44,-30 C -28,-44 8,-38 24,-24" stroke-width=".7"/>
</g>
<!-- Aperture (mouth) with depth -->
<path d="M -8,64 C -28,58 -34,44 -28,36 C -22,28 -4,24 8,28 C 20,32 26,44 20,58 C 14,66 4,66 -8,64 Z"
      fill="url(#sc-mouth)" stroke="#2858a8" stroke-width="1.2"/>
<!-- Aperture highlight rim -->
<path d="M -8,64 C -28,58 -34,44 -28,36 C -22,28 -4,24 8,28 C 20,32 26,44 20,58 C 14,66 4,66 -8,64 Z"
      fill="none" stroke="rgba(160,200,255,.4)" stroke-width=".7"/>
<!-- Aperture inner dark -->
<path d="M -6,60 C -22,54 -28,42 -22,36 C -16,30 -2,28 8,32 C 18,36 22,48 16,58 C 10,64 2,62 -6,60 Z"
      fill="rgba(10,20,60,.5)"/>
<!-- Columella spiral suggestion -->
<path d="M 2,50 C -8,46 -12,36 -8,30 C -2,26 6,28 8,36 C 10,42 6,48 2,50 Z"
      fill="rgba(60,100,180,.3)" stroke="rgba(120,170,240,.4)" stroke-width=".6"/>
<!-- Apex tip -->
<ellipse cx="55" cy="-60" rx="8.5" ry="13" fill="url(#sc-ap)" stroke="#c0a840" stroke-width="1.2" transform="rotate(26,55,-60)"/>
<ellipse cx="57" cy="-65" rx="4.5" ry="7" fill="rgba(255,252,230,.7)" transform="rotate(26,57,-65)"/>
<!-- Apex highlight -->
<path d="M 50,-68 C 54,-72 60,-70 62,-66" fill="none" stroke="rgba(255,250,220,.5)" stroke-width=".9" stroke-linecap="round"/>
<!-- Silk ribbon loops -->
<path d="M -66,6 C -80,-8 -84,-32 -74,-54 C -68,-66 -56,-70 -50,-62 C -46,-56 -50,-44 -52,-38"
      fill="none" stroke="#8a2838" stroke-width="4.5" stroke-linecap="round"/>
<path d="M -66,6 C -76,22 -72,46 -58,56 C -48,62 -36,58 -34,48 C -32,40 -38,32 -40,26"
      fill="none" stroke="#a83040" stroke-width="4" stroke-linecap="round"/>

<path d="M -72,0 C -78,-12 -78,-28 -70,-46"
      fill="none" stroke="rgba(220,100,120,.4)" stroke-width="1.2" stroke-linecap="round"/>
<!-- Gold ribbon knot -->
<circle cx="-66" cy="6" r="4.5" fill="#c0a038" stroke="#e8d060" stroke-width="1" filter="url(#sc-glow)"/>
</svg>
</div>
<span class="zh">法 螺</span><span class="en">Conch Shell</span>
</div>
<!-- ══════════════════════════════════════════════
     3. 寶傘  Precious Parasol
     Deep crimson, antique gold, silk scallops
══════════════════════════════════════════════ -->
<div class="cell">
<div class="disc" style="background:radial-gradient(circle at 42% 32%,#1c0606 0%,#0e0303 55%,#070201 100%)">
<svg viewBox="-90 -90 180 180" xmlns="http://www.w3.org/2000/svg">
<defs>
  <radialGradient id="um-d" cx="50%" cy="22%" r="78%">
    <stop offset="0%" stop-color="#c43030"/>
    <stop offset="48%" stop-color="#9a1818"/>
    <stop offset="100%" stop-color="#5a0808"/>
  </radialGradient>
  <radialGradient id="um-d2" cx="50%" cy="22%" r="78%">
    <stop offset="0%" stop-color="#e04040"/>
    <stop offset="55%" stop-color="#b82020"/>

  </radialGradient>
  <linearGradient id="um-pole" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#907010"/><stop offset="35%" stop-color="#e8c860"/>
    <stop offset="65%" stop-color="#e8c860"/><stop offset="100%" stop-color="#907010"/>
  </linearGradient>
  <linearGradient id="um-gold" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#a06818"/><stop offset="45%" stop-color="#f0d060"/>
    <stop offset="100%" stop-color="#a06818"/>
  </linearGradient>
  <filter id="um-glow">
    <feGaussianBlur stdDeviation="2.5" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
</defs>
<!-- Pole -->
<rect x="-2.5" y="-86" width="5" height="155" rx="2.5" fill="url(#um-pole)"/>
<rect x="-1" y="-86" width="2" height="155" fill="rgba(255,248,180,.3)" rx="1"/>

<circle cx="0" cy="-88" r="7" fill="#d4aa38" stroke="#987010" stroke-width="1.5" filter="url(#um-glow)"/>
<circle cx="0" cy="-88" r="4" fill="rgba(255,250,220,.7)"/>
<!-- Finial secondary bead -->
<circle cx="0" cy="-70" r="4" fill="#c89828" stroke="#987010" stroke-width="1"/>
<!-- Dome shadow -->
<path d="M -77,4 Q -70,-60 0,-70 Q 70,-60 77,4 Z"
      fill="rgba(0,0,0,.35)" transform="translate(3,4)"/>
<!-- Dome canopy outer -->
<path d="M -77,4 Q -70,-60 0,-70 Q 70,-60 77,4 Z"
      fill="url(#um-d)" stroke="#7a0c0c" stroke-width="1.2"/>
<!-- Dome inner lighter section -->
<path d="M -72,4 Q -66,-55 0,-64 Q 66,-55 72,4 Z"
      fill="url(#um-d2)" opacity=".5"/>
<!-- Dome panel ribs (9 sections) -->
<g stroke="rgba(80,0,0,.45)" stroke-width="1" fill="none">
  <path d="M 0,-70 Q 9,-42 17,4"/>
  <path d="M 0,-70 Q 26,-36 40,4"/>
  <path d="M 0,-70 Q 56,-18 66,4"/>
  <path d="M 0,-70 Q -9,-42 -17,4"/>
  <path d="M 0,-70 Q -26,-36 -40,4"/>
  <path d="M 0,-70 Q -56,-18 -66,4"/>
</g>
<!-- Panel rib highlights -->
<g stroke="rgba(200,60,60,.35)" stroke-width=".5" fill="none">
  <path d="M 0,-70 Q 9,-42 17,4"/>
  <path d="M 0,-70 Q -9,-42 -17,4"/>
  <path d="M 0,-70 Q 26,-36 40,4"/>
  <path d="M 0,-70 Q -26,-36 -40,4"/>
</g>
<!-- Dome-edge gold band -->
<path d="M -77,4 Q -70,-60 0,-70 Q 70,-60 77,4"
      fill="none" stroke="url(#um-gold)" stroke-width="3"/>
<!-- Scalloped hanging border -->
<path d="M -77,4 Q -70,14 -61,4 Q -54,22 -44,10 Q -36,28 -26,14
          Q -16,30 -6,18 Q -1,34 0,26
          Q 1,34 6,18 Q 16,30 26,14 Q 36,28 44,10
          Q 54,22 61,4 Q 70,14 77,4"
      fill="#901010" stroke="#6a0808" stroke-width=".9"/>
<!-- Scallop edge gold line -->
<path d="M -77,4 Q -70,14 -61,4 Q -54,22 -44,10 Q -36,28 -26,14
          Q -16,30 -6,18 Q -1,34 0,26
          Q 1,34 6,18 Q 16,30 26,14 Q 36,28 44,10
          Q 54,22 61,4 Q 70,14 77,4"
      fill="none" stroke="url(#um-gold)" stroke-width="1.8"/>

<path d="M -58,-20 Q 0,-27 58,-20" fill="none" stroke="rgba(200,80,80,.28)" stroke-width="1"/>
<!-- Hanging silk tassels -->
<g stroke-linecap="round">
  <line x1="-61" y1="5" x2="-68" y2="28" stroke="#b09028" stroke-width="1.8"/>
  <line x1="-61" y1="5" x2="-65" y2="24" stroke="#e0c050" stroke-width=".7"/>
